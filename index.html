            padding:"12px 8px", borderRadius:10, cursor:"pointer", textAlign:"left",
            background: cur===val ? "rgba(var(--accent-rgb),0.12)" : "var(--bg-surface)",
            border:`1px solid ${cur===val ? "var(--accent)" : "var(--border)"}`,
            transition:"all 0.15s",
          }}>
            <div style={{fontSize:9, fontWeight:800, letterSpacing:"0.06em", color: cur===val ? "var(--accent)" : "var(--text-dim)", marginBottom:4}}>{abbrev}</div>
            <div style={{fontSize:12, fontWeight:700, color: cur===val ? "var(--accent)" : "var(--text-primary)"}}>{label}</div>
            <div style={{fontSize:10, color:"var(--text-muted)", marginTop:2, lineHeight:1.3}}>{desc}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── HOME VIEW ────────────────────────────────────────────────────────────────
function HomeView({ currentWeek, setCurrentWeek, onSelectDay, completedDays, onReset, activeDays, profile }) {
  const [tab, setTab] = useState("landing");
  const [expandedWeek, setExpandedWeek] = useState(null);
  const [showReset, setShowReset] = useState(false);

  useEffect(() => { setExpandedWeek(currentWeek); }, [currentWeek]);
  useEffect(() => { window.scrollTo(0, 0); }, []);

  const goTo   = (key) => { setTab(key); window.scrollTo(0,0); };
  const goBack = ()    => { setTab("landing"); window.scrollTo(0,0); };

  const SubHeader = ({ label }) => (
    <div style={{display:"flex", alignItems:"center", gap:12, padding:"16px 16px 12px", background:"var(--bg-deep)", borderBottom:"1px solid var(--border)"}}>
      <button onClick={goBack} className="btn-ghost" style={{
        background:"transparent", border:"none", cursor:"pointer",
        color:"var(--accent)", fontSize:20, lineHeight:1, padding:"2px 4px",
        display:"flex", alignItems:"center",
      }}>‹</button>
      <span style={{fontSize:12, fontWeight:600, letterSpacing:"0.05em", color:"var(--text-secondary)"}}>{label}</span>
    </div>
  );

  // ── Landing data ──
  // "current week" = first week that is not fully completed
  const activeWeek = useMemo(() => {
    for (let w = 0; w < MESO.weeks; w++) {
      const allDone = activeDays.every((_, i) => completedDays.has(`${i}:${w}`));
      if (!allDone) return w;
    }
    return MESO.weeks; // deload
  }, [completedDays, activeDays]);

  const phase = WEEK_PHASE[Math.min(activeWeek, MESO.weeks - 1)] || "Deload";
  const pc    = PHASE_COLOR[phase];
  const rir   = WEEK_RIR[Math.min(activeWeek, MESO.weeks - 1)] || "N/A";

  // Week summary for activeWeek
  const weekDone  = activeDays.filter((_, i) => completedDays.has(`${i}:${activeWeek}`)).length;
  const weekTotal = activeDays.length;
  const weekPct   = weekTotal > 0 ? Math.round((weekDone / weekTotal) * 100) : 0;
  const weekMuscles = { PUSH:0, PULL:0, LEGS:0 };
  activeDays.forEach((day, dayIdx) => {
    if (!completedDays.has(`${dayIdx}:${activeWeek}`)) return;
    const wd = loadDayWeek(dayIdx, activeWeek);
    day.exercises.forEach((ex, exIdx) => {
      const filled = Object.values(wd[exIdx] || {}).filter(s => s && s.reps && s.reps !== "").length;
      if (filled > 0) weekMuscles[day.tag] += filled;
    });
  });

  // Meso summary
  const totalSessions = MESO.weeks * MESO.days;
  const doneSessions  = completedDays.size;
  const mesoPct = totalSessions > 0 ? Math.round((doneSessions / totalSessions) * 100) : 0;

  // Progress bar component — animates from 0 on mount
  const ProgressBar = ({ pct: p, color }) => {
    const [width, setWidth] = React.useState(0);
    React.useEffect(() => {
      const t = requestAnimationFrame(() => setWidth(p));
      return () => cancelAnimationFrame(t);
    }, [p]);
    return (
      <div style={{height:4, background:"var(--bg-inset)", borderRadius:2, overflow:"hidden", marginTop:6}}>
        <div style={{height:"100%", width:`${width}%`, background:color, borderRadius:2, transition:"width 0.6s cubic-bezier(0.22,1,0.36,1)"}} />
      </div>
    );
  };

  return (
    <div style={{paddingBottom:120}}>
      {showReset && (
        <ResetDialog
          onCancel={() => setShowReset(false)}
          onConfirmed={() => { setShowReset(false); onReset(); }}
        />
      )}

      {/* ── LANDING ── */}
      {tab === "landing" && (() => {
        // Find next incomplete day this week
        const nextDayIdx = activeDays.findIndex((_, i) => !completedDays.has(`${i}:${activeWeek}`));
        const nextDay = nextDayIdx >= 0 ? activeDays[nextDayIdx] : null;
        const nextDayAccent = nextDay ? TAG_ACCENT[nextDay.tag] : "var(--accent)";

        // SVG icons
        const icons = {
          schedule: (color) => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="14" x2="8" y2="14" strokeWidth="2.5"/><line x1="12" y1="14" x2="12" y2="14" strokeWidth="2.5"/>
              <line x1="16" y1="14" x2="16" y2="14" strokeWidth="2.5"/>
            </svg>
          ),
          overview: (color) => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="14"/><line x1="3" y1="20" x2="21" y2="20"/>
            </svg>
          ),
          progress: (color) => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
              <polyline points="16 7 22 7 22 13"/>
            </svg>
          ),
          warmup: (color) => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 2c0 4-4 6-4 10a4 4 0 0 0 8 0c0-4-4-6-4-10z"/>
              <path d="M12 12c0 2-2 3-2 5a2 2 0 0 0 4 0c0-2-2-3-2-5z" fill={color} fillOpacity="0.3"/>
            </svg>
          ),
          prs: (color) => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
            </svg>
          ),
          history: (color) => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 8v4l3 3"/>
              <path d="M3.05 11a9 9 0 1 1 .5 4M3 21v-5h5"/>
            </svg>
          ),
          weekly: (color) => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="3"/>
              <line x1="3" y1="9" x2="21" y2="9"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
              <path d="M8 14l2.5 2.5L15 13"/>
            </svg>
          ),
          datamgmt: (color) => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
              <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
              <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
          ),
        };

        const navItems = [
          { key:"schedule",  label:"Schedule",       sub:"Week-by-week plan",            color:"var(--accent-blue)" },
          { key:"overview",  label:"Meso Overview",  sub:"Phases & session breakdown",   color:"var(--phase-deload)" },
          { key:"progress",  label:"Progress",       sub:`Wk ${activeWeek+1} · ${weekDone}/${weekTotal} sessions`, color:"var(--phase-accum)" },
          { key:"prs",       label:"PR Tracker",     sub:"Best sets & estimated 1RMs",   color:"var(--phase-intens)" },
          { key:"history",   label:"Meso History",   sub:"Past cycles & archived lifts", color:"var(--accent-blue)" },
          { key:"warmup",    label:"Warm-up",        sub:"Anchor lift protocol",         color:"var(--phase-intens)" },
        ];

        return (
          <div style={{padding:"16px 16px 0", display:"flex", flexDirection:"column", gap:12}}>

            {/* ── DASHBOARD ── */}
            <div style={{display:"flex", flexDirection:"column", gap:10}}>

              {/* ─ TOP ROW: Meso ring + week status ─ */}
              <div style={{display:"flex", gap:10}}>

                {/* Meso progress ring */}
                <div style={{
                  background:"var(--bg-card)", border:"1px solid var(--border)",
                  borderRadius:14, padding:"14px 16px",
                  display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                  gap:6, flexShrink:0, width:100, boxShadow:"var(--shadow-sm)",
                }}>
                  {(() => {
                    const r = 26, circ = 2 * Math.PI * r;
                    const dash = circ * (mesoPct / 100);
                    return (
                      <svg width="64" height="64" viewBox="0 0 64 64" style={{overflow:"visible"}}>
                        <circle cx="32" cy="32" r={r} fill="none" stroke="var(--bg-inset)" strokeWidth="5"/>
                        <circle cx="32" cy="32" r={r} fill="none" stroke={pc} strokeWidth="5"
                          strokeDasharray={`${dash} ${circ}`}
                          strokeDashoffset={circ * 0.25}
                          strokeLinecap="round"
                          style={{transition:"stroke-dasharray 0.7s cubic-bezier(0.22,1,0.36,1)"}}
                        />
                        <text x="32" y="35" textAnchor="middle" fontSize="13" fontWeight="800"
                          fill="var(--text-primary)" fontFamily="inherit">{mesoPct}%</text>
                      </svg>
                    );
                  })()}
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-muted)"}}>MESO</div>
                    <div style={{fontSize:10, color:"var(--text-secondary)", fontWeight:500}}>{doneSessions}/{totalSessions} sessions</div>
                  </div>
                </div>

                {/* Current week card */}
                <div style={{
                  flex:1, background:"var(--bg-card)", border:"1px solid var(--border)",
                  borderRadius:14, padding:"14px 14px", boxShadow:"var(--shadow-sm)",
                  display:"flex", flexDirection:"column", gap:8,
                }}>
                  {/* Phase + week */}
                  <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                    <div style={{display:"flex", alignItems:"center", gap:6}}>
                      <div style={{
                        fontSize:9, fontWeight:700, letterSpacing:"0.06em",
                        color:pc, background:pc+"18", padding:"3px 7px", borderRadius:4,
                      }}>{phase.toUpperCase()}</div>
                      <div style={{fontSize:9, color:"var(--text-muted)", fontWeight:600, letterSpacing:"0.04em"}}>WK {activeWeek+1}/{MESO.weeks}</div>
                    </div>
                    <div style={{fontSize:10, color:"var(--text-secondary)", fontWeight:600}}>{rir}</div>
                  </div>

                  {/* Day pills */}
                  <div style={{display:"flex", gap:4, flexWrap:"wrap"}}>
                    {activeDays.map((day, i) => {
                      const done = completedDays.has(`${i}:${activeWeek}`);
                      const isNext = !done && activeDays.slice(0, i).every((_, j) => completedDays.has(`${j}:${activeWeek}`));
                      const tc = TAG_ACCENT[day.tag];
                      return (
                        <button key={i} onClick={(e) => { e.stopPropagation(); goBack(); onSelectDay(i); }}
                          style={{
                            flex:1, minWidth:0, padding:"5px 4px",
                            borderRadius:7, border:`1px solid`,
                            borderColor: done ? tc+"60" : isNext ? tc : "var(--border)",
                            background: done ? tc+"1a" : isNext ? tc+"12" : "transparent",
                            cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2,
                          }}>
                          <div style={{
                            fontSize:7, fontWeight:800, letterSpacing:"0.04em",
                            color: done ? tc : isNext ? tc : "var(--text-dim)",
                          }}>{day.tag.slice(0,2)}</div>
                          <div style={{fontSize:12, lineHeight:1}}>
                            {done ? <span style={{color:tc}}>✓</span> : isNext ? <span style={{color:tc, fontSize:8}}>●</span> : <span style={{color:"var(--text-dim)", fontSize:10}}>·</span>}
                          </div>
                        </button>
                      );
                    })}
                  </div>

                  {/* Week progress bar */}
                  <div style={{display:"flex", alignItems:"center", gap:6}}>
                    <div style={{flex:1, height:3, background:"var(--bg-inset)", borderRadius:2, overflow:"hidden"}}>
                      <div style={{height:"100%", width:`${weekPct}%`, background:pc, borderRadius:2, transition:"width 0.5s ease"}} />
                    </div>
                    <div style={{fontSize:10, color:"var(--text-secondary)", fontWeight:600, flexShrink:0}}>{weekDone}/{weekTotal}</div>
                  </div>
                </div>
              </div>

              {/* ─ NEXT SESSION card ─ */}
              {nextDay ? (() => {
                // Preview first 3 exercises from next session
                const preview = nextDay.exercises ? nextDay.exercises.slice(0, 3) : [];
                // Carry weight from last logged week for context
                const lastWeekData = (() => {
                  for (let w = activeWeek - 1; w >= 0; w--) {
                    const raw = store.get(`ppl:day${nextDayIdx}:week${w}`);
                    if (raw) return JSON.parse(raw);
                  }
                  return {};
                })();

                return (
                  <div style={{
                    background:"var(--bg-card)", border:`1px solid ${nextDayAccent}30`,
                    borderRadius:14, overflow:"hidden", boxShadow:"var(--shadow-sm)",
                  }}>
                    {/* Header — tappable to go to session */}
                    <button onClick={(e) => { e.stopPropagation(); goBack(); setCurrentWeek(activeWeek); onSelectDay(nextDayIdx); }}
                      style={{
                        width:"100%", background:`linear-gradient(135deg, ${nextDayAccent}0d 0%, transparent 100%)`,
                        border:"none", cursor:"pointer", padding:"12px 16px",
                        display:"flex", alignItems:"center", justifyContent:"space-between",
                        borderBottom:`1px solid ${nextDayAccent}18`,
                      }}
                      onMouseEnter={e => e.currentTarget.style.background = nextDayAccent+"14"}
                      onMouseLeave={e => e.currentTarget.style.background = `linear-gradient(135deg, ${nextDayAccent}0d 0%, transparent 100%)`}
                    >
                      <div style={{display:"flex", alignItems:"center", gap:10}}>
                        <div style={{
                          width:36, height:36, borderRadius:9, flexShrink:0,
                          background:nextDayAccent+"22",
                          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:0,
                        }}>
                          <div style={{fontSize:8, fontWeight:800, color:nextDayAccent, letterSpacing:"0.04em"}}>{nextDay.tag}</div>
                          <div style={{fontSize:13, fontWeight:800, color:nextDayAccent, lineHeight:1}}>{nextDayIdx + 1}</div>
                        </div>
                        <div style={{textAlign:"left"}}>
                          <div style={{fontSize:9, color:"var(--text-muted)", fontWeight:700, letterSpacing:"0.06em", marginBottom:2}}>NEXT SESSION</div>
                          <div style={{fontSize:14, fontWeight:700, color:"var(--text-primary)"}}>{nextDay.label}</div>
                        </div>
                      </div>
                      <div style={{
                        width:28, height:28, borderRadius:8, background:nextDayAccent+"18",
                        display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0,
                      }}>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={nextDayAccent} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                          <polyline points="9 18 15 12 9 6"/>
                        </svg>
                      </div>
                    </button>

                    {/* Exercise preview list */}
                    <div style={{padding:"8px 0 4px"}}>
                      {preview.map((ex, ei) => {
                        const prevData = lastWeekData[ei];
                        const prevSets = prevData ? Object.values(prevData).filter(s => s && s.weight && parseFloat(s.weight) > 0) : [];
                        const prevWeight = prevSets.length > 0 ? prevSets[0].weight : null;
                        const ovId = store.get(`ppl:exov:d${nextDayIdx}:ex${ei}`) || null;
                        const dbEx = ovId ? EXERCISE_DB.find(e => e.id === ovId) : null;
                        const exName = dbEx ? dbEx.name : ex.name;
                        return (
                          <div key={ei} style={{
                            display:"flex", alignItems:"center", justifyContent:"space-between",
                            padding:"7px 16px",
                            borderBottom: ei < preview.length - 1 ? "1px solid var(--border-subtle)" : "none",
                          }}>
                            <div style={{flex:1, minWidth:0}}>
                              <div style={{
                                fontSize:12, fontWeight:600, color:"var(--text-primary)",
                                whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                              }}>{exName}</div>
                              <div style={{fontSize:10, color:"var(--text-muted)", marginTop:1}}>
                                {ex.sets} sets · {ex.reps} reps{ex.rest ? ` · ${ex.rest}` : ""}
                              </div>
                            </div>
                            {prevWeight && (
                              <div style={{
                                flexShrink:0, marginLeft:10, textAlign:"right",
                              }}>
                                <div style={{fontSize:11, fontWeight:700, color:"var(--text-secondary)"}}>{prevWeight}</div>
                                <div style={{fontSize:9, color:"var(--text-dim)"}}>last wk</div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                      {nextDay.exercises && nextDay.exercises.length > 3 && (
                        <div style={{padding:"6px 16px 8px", fontSize:10, color:"var(--text-dim)", fontStyle:"italic"}}>
                          +{nextDay.exercises.length - 3} more exercises
                        </div>
                      )}
                    </div>
                  </div>
                );
              })() : (
                <div style={{
                  background:"var(--bg-card)", border:"1px solid var(--border)",
                  borderRadius:14, padding:"16px 20px", display:"flex", alignItems:"center", gap:12,
                  boxShadow:"var(--shadow-sm)",
                }}>
                  <div style={{
                    width:36, height:36, borderRadius:9, background:"rgba(var(--accent-rgb),0.1)",
                    display:"flex", alignItems:"center", justifyContent:"center", fontSize:18,
                  }}>🏆</div>
                  <div>
                    <div style={{fontSize:14, fontWeight:700, color:"var(--phase-accum)"}}>Week complete!</div>
                    <div style={{fontSize:11, color:"var(--text-secondary)"}}>Rest. Recover. Return stronger.</div>
                  </div>
                </div>
              )}

              {/* ─ THIS WEEK VOLUME ─ */}
              {weekDone > 0 && (() => {
                const maxSets = Math.max(...Object.values(weekMuscles), 1);
                const tags = [
                  { label:"PUSH", key:"PUSH", color:"#e07a5f" },
                  { label:"PULL", key:"PULL", color:"#6b9ac4" },
                  { label:"LEGS", key:"LEGS", color:"#81b29a" },
                ].filter(t => weekMuscles[t.key] > 0);
                if (!tags.length) return null;
                return (
                  <button onClick={(e) => { e.stopPropagation(); goTo("weekly"); }} style={{
                    width:"100%", background:"var(--bg-card)", border:"1px solid var(--border)",
                    borderRadius:14, padding:"12px 16px", boxShadow:"var(--shadow-sm)",
                    cursor:"pointer", textAlign:"left", transition:"border-color 0.15s",
                    WebkitTapHighlightColor:"transparent",
                  }}
                    onMouseEnter={e => e.currentTarget.style.borderColor = "var(--phase-accum)"}
                    onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}
                  >
                    <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10}}>
                      <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)"}}>THIS WEEK · SETS LOGGED</div>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="9 18 15 12 9 6"/>
                      </svg>
                    </div>
                    <div style={{display:"flex", flexDirection:"column", gap:7}}>
                      {tags.map(({ label, key, color }) => {
                        const sets = weekMuscles[key];
                        const pct  = Math.round((sets / maxSets) * 100);
                        return (
                          <div key={key} style={{display:"flex", alignItems:"center", gap:10}}>
                            <div style={{width:30, fontSize:9, fontWeight:700, letterSpacing:"0.05em", color, flexShrink:0}}>{label}</div>
                            <div style={{flex:1, height:6, background:"var(--bg-inset)", borderRadius:3, overflow:"hidden"}}>
                              <div style={{
                                height:"100%", width:`${pct}%`, borderRadius:3,
                                background:`linear-gradient(90deg, ${color}aa, ${color})`,
                                transition:"width 0.5s cubic-bezier(0.22,1,0.36,1)",
                              }}/>
                            </div>
                            <div style={{width:24, textAlign:"right", fontSize:11, fontWeight:700, color:"var(--text-secondary)", flexShrink:0}}>{sets}</div>
                          </div>
                        );
                      })}
                    </div>
                  </button>
                );
              })()}

            </div>

            {/* ── NAV GRID ── */}
            <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)", paddingTop:4}}>QUICK ACCESS</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8}}>
              {navItems.map(({ key, label, sub, color: cardColor }) => (
                <button key={key} onClick={() => goTo(key)} style={{
                  background:"var(--bg-card)", border:"1px solid var(--border)",
                  borderRadius:12, padding:"14px 12px 10px",
                  display:"flex", flexDirection:"column", gap:7,
                  cursor:"pointer", textAlign:"left",
                  boxShadow:"var(--shadow-sm)",
                  transition:"transform 0.12s, box-shadow 0.12s, border-color 0.15s",
                }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = cardColor; e.currentTarget.style.transform = "translateY(-1px)"; e.currentTarget.style.boxShadow = "var(--shadow-md)"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.18)"; }}
                  onMouseDown={e => e.currentTarget.style.transform = "translateY(0px) scale(0.98)"}
                  onMouseUp={e => e.currentTarget.style.transform = "translateY(-1px)"}
                >
                  <div style={{
                    width:28, height:28, borderRadius:7,
                    background:cardColor+"15",
                    display:"flex", alignItems:"center", justifyContent:"center",
                  }}>{icons[key]?.(cardColor)}</div>
                  <div>
                    <div style={{fontSize:11, fontWeight:700, color:"var(--text-primary)", marginBottom:2, lineHeight:1.2}}>{label}</div>
                    <div style={{fontSize:9, color:"var(--text-muted)", lineHeight:1.4}}>{sub}</div>
                  </div>
                </button>
              ))}
            </div>

            {/* ── BOTTOM ROW: Data + Theme ── */}
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
              <button onClick={() => goTo("datamgmt")} style={{
                background:"var(--bg-card)", border:"1px solid var(--border)",
                borderRadius:12, padding:"12px",
                display:"flex", alignItems:"center", gap:8,
                cursor:"pointer", textAlign:"left",
                boxShadow:"0 2px 8px rgba(0,0,0,0.18)",
                transition:"transform 0.12s, box-shadow 0.12s, border-color 0.15s",
              }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--accent)"; e.currentTarget.style.transform = "translateY(-1px)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.transform = "none"; }}
                onMouseDown={e => e.currentTarget.style.transform = "scale(0.98)"}
                onMouseUp={e => e.currentTarget.style.transform = "translateY(-1px)"}
              >
                <div style={{width:28, height:28, borderRadius:7, background:"var(--accent)15", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0}}>
                  {icons.datamgmt("var(--accent)")}
                </div>
                <div>
                  <div style={{fontSize:11, fontWeight:700, color:"var(--text-primary)", marginBottom:1}}>Data</div>
                  <div style={{fontSize:9, color:"var(--text-muted)"}}>Backup & restore</div>
                </div>
              </button>
              <ThemeToggleCard compact />
            </div>

            <div style={{height:8}} />
          </div>
        );
      })()}

      {/* ── PROGRESS sub-page ── */}
      {tab === "progress" && (
        <ProgressPage
          activeWeek={activeWeek}
          phase={phase}
          pc={pc}
          rir={rir}
          weekDone={weekDone}
          weekTotal={weekTotal}
          weekPct={weekPct}
          weekMuscles={weekMuscles}
          mesoPct={mesoPct}
          doneSessions={doneSessions}
          totalSessions={totalSessions}
          completedDays={completedDays}
          activeDays={activeDays}
          goBack={goBack}
        />
      )}

            {/* ── SCHEDULE ── */}
      {tab === "schedule" && (
        <div style={{animation:"tabFadeIn 0.15s ease-out"}}>
          <SubHeader label="SCHEDULE" />
          <div style={{padding:"0 16px"}}>
            {Array.from({length: MESO.weeks}, (_,w) => (
              <WeekSection
                key={w} weekIdx={w} currentWeek={currentWeek}
                onSelectDay={(dayIdx, weekIdx) => {
                  setCurrentWeek(weekIdx);
                  saveCurrentWeek(weekIdx);
                  onSelectDay(dayIdx);
                }}
                completedDays={completedDays}
                isExpanded={expandedWeek === w}
                onToggle={() => setExpandedWeek(expandedWeek === w ? null : w)}
                activeDays={activeDays}
                workoutDays={profile?.workoutDays || []}
              />
            ))}
            <DeloadSection
              currentWeek={currentWeek}
              completedDays={completedDays}
              isExpanded={expandedWeek === MESO.weeks}
              onToggle={() => setExpandedWeek(expandedWeek === MESO.weeks ? null : MESO.weeks)}
              activeDays={activeDays}
              workoutDays={profile?.workoutDays || []}
            />
          </div>
        </div>
      )}

      {/* ── MESO OVERVIEW ── */}
      {tab === "overview" && (
        <div style={{animation:"tabFadeIn 0.15s ease-out"}}>
          <SubHeader label="MESO OVERVIEW" />
          <MesoOverview />
        </div>
      )}

      {/* ── DATA MANAGEMENT ── */}
      {tab === "datamgmt" && (
        <div style={{animation:"tabFadeIn 0.15s ease-out"}}>
          <SubHeader label="DATA MANAGEMENT" />
          <div style={{padding:"20px 16px", display:"flex", flexDirection:"column", gap:12}}>
            <div style={{
              background:"var(--bg-card)", border:"1px solid var(--border)",
              borderRadius:14, overflow:"hidden",
            }}>
              <button onClick={exportData} className="btn-row" style={{
                width:"100%", padding:"16px", cursor:"pointer", background:"transparent",
                border:"none", borderBottom:"1px solid var(--border)",
                display:"flex", alignItems:"center", gap:16, textAlign:"left",
              }}>
                <div style={{width:38,height:38,borderRadius:9,background:"rgba(var(--accent-rgb),0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>⬇</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,letterSpacing:"0.02em",color:"var(--accent)"}}>Export backup</div>
                  <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>Download all your workout data as JSON</div>
                </div>
                <div style={{color:"var(--text-dim)",fontSize:18}}>›</div>
              </button>
              <label style={{
                width:"100%", padding:"16px", cursor:"pointer", background:"transparent",
                borderBottom:"1px solid var(--border)",
                display:"flex", alignItems:"center", gap:16, boxSizing:"border-box",
              }}>
                <div style={{width:38,height:38,borderRadius:9,background:"rgba(var(--accent-rgb),0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>⬆</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,letterSpacing:"0.02em",color:"var(--accent)"}}>Import backup</div>
                  <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>Restore from a previously exported file</div>
                </div>
                <div style={{color:"var(--text-dim)",fontSize:18}}>›</div>
                <input type="file" accept=".json" style={{display:"none"}} onChange={e => {
                  const file = e.target.files?.[0];
                  if (!file) return;
                  importData(file, (ok) => {
                    if (ok) { alert("Data restored! Reloading..."); window.location.reload(); }
                    else { alert("Import failed — invalid backup file."); }
                  });
                }} />
              </label>
              <button onClick={()=>setShowReset(true)} className="btn-danger" style={{
                width:"100%", padding:"16px", cursor:"pointer", background:"transparent",
                border:"none", display:"flex", alignItems:"center", gap:16, textAlign:"left",
              }}>
                <div style={{width:38,height:38,borderRadius:9,background:"rgba(var(--accent-rgb),0.08)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:9,fontWeight:800,letterSpacing:"0.04em",color:"var(--danger)"}}>RST</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,letterSpacing:"0.02em",color:"var(--danger)"}}>Reset meso cycle</div>
                  <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>Erase all progress and start fresh</div>
                </div>
                <div style={{color:"var(--text-dim)",fontSize:18}}>›</div>
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── WARM-UP ── */}
      {tab === "warmup" && (
        <div>
          <SubHeader label="WARM-UP PROTOCOL" />
          <WarmupCard />
        </div>
      )}

      {/* ── PR TRACKER ── */}
      {tab === "prs" && (
        <PRTracker activeDays={activeDays} goBack={goBack} />
      )}

      {/* ── MESO HISTORY ── */}
      {tab === "history" && (
        <MesoHistory goBack={goBack} />
      )}

      {/* ── WEEKLY SUMMARY ── */}
      {tab === "weekly" && (
        <WeeklySummary activeDays={activeDays} completedDays={completedDays} goBack={goBack} />
      )}
    </div>
  );
}

// ─── WEEKLY SUMMARY ───────────────────────────────────────────────────────────
function WeeklySummary({ activeDays, completedDays, goBack }) {
  // Default to the most recently completed or current active week
  const defaultWeek = React.useMemo(() => {
    for (let w = MESO.weeks - 1; w >= 0; w--) {
      const allDone = activeDays.every((_, i) => completedDays.has(`${i}:${w}`));
      if (allDone) return w;
    }
    // Fall back to first incomplete week (active week)
    for (let w = 0; w < MESO.weeks; w++) {
      const anyDone = activeDays.some((_, i) => completedDays.has(`${i}:${w}`));
      if (anyDone) return w;
    }
    return 0;
  }, [activeDays, completedDays]);

  const [week, setWeek] = React.useState(defaultWeek);
  const [expandedDay, setExpandedDay] = React.useState(null);

  const phase    = WEEK_PHASE[Math.min(week, MESO.weeks - 1)] || "Deload";
  const pc       = PHASE_COLOR[phase];
  const rir      = WEEK_RIR[Math.min(week, MESO.weeks - 1)] || "N/A";
  const weekDone = activeDays.filter((_, i) => completedDays.has(`${i}:${week}`)).length;
  const weekTotal = activeDays.length;
  const compliance = weekTotal > 0 ? Math.round((weekDone / weekTotal) * 100) : 0;

  // Volume by tag for selected week
  const byTag = calcMuscleSetsByTag(activeDays, completedDays, week);
  const totalSets = Object.values(byTag).reduce((s, muscles) =>
    s + Object.values(muscles).reduce((a, b) => a + b, 0), 0);

  // PRs hit this week: exercises where this week's best e1RM > any prior week
  const prsHit = React.useMemo(() => {
    const hits = [];
    activeDays.forEach((day, dayIdx) => {
      if (!completedDays.has(`${dayIdx}:${week}`)) return;
      const thisWeekData = loadDayWeek(dayIdx, week);

      day.exercises.forEach((baseEx, exIdx) => {
        // Resolve exercise name (check override)
        const ovId = store.get(`ppl:exov:d${dayIdx}:w${week}:ex${exIdx}`)
                  || store.get(`ppl:exov:d${dayIdx}:ex${exIdx}`);
        const dbEx = ovId ? EXERCISE_DB.find(e => e.id === ovId) : null;
        const exName = dbEx ? dbEx.name : baseEx.name;

        // This week best e1RM
        const thisExData = thisWeekData[exIdx] || {};
        let thisE1rm = 0, thisWeight = 0, thisReps = 0;
        Object.values(thisExData).forEach(s => {
          if (!s || !s.weight || !s.reps) return;
          const wt = parseFloat(s.weight), rp = parseInt(s.reps);
          if (!wt || !rp) return;
          const e = wt * (1 + rp / 30);
          if (e > thisE1rm) { thisE1rm = e; thisWeight = wt; thisReps = rp; }
        });
        if (!thisE1rm) return;

        // Prior best e1RM (all weeks before this one)
        let priorE1rm = 0;
        for (let w = 0; w < week; w++) {
          const wd = loadDayWeek(dayIdx, w);
          const ed = wd[exIdx] || {};
          Object.values(ed).forEach(s => {
            if (!s || !s.weight || !s.reps) return;
            const wt = parseFloat(s.weight), rp = parseInt(s.reps);
            if (!wt || !rp) return;
            const e = wt * (1 + rp / 30);
            if (e > priorE1rm) priorE1rm = e;
          });
        }

        if (thisE1rm > priorE1rm && priorE1rm > 0) {
          const gain = Math.round(thisE1rm - priorE1rm);
          hits.push({ name: exName, tag: day.tag, weight: thisWeight, reps: thisReps, e1rm: Math.round(thisE1rm), gain });
        } else if (priorE1rm === 0 && thisE1rm > 0) {
          // First time logged — count as a PR
          hits.push({ name: exName, tag: day.tag, weight: thisWeight, reps: thisReps, e1rm: Math.round(thisE1rm), gain: null });
        }
      });
    });
    return hits.sort((a, b) => (b.gain || 0) - (a.gain || 0));
  }, [week, activeDays, completedDays]);

  // Session breakdown for selected week
  const sessions = activeDays.map((day, dayIdx) => {
    const done    = completedDays.has(`${dayIdx}:${week}`);
    const wd      = loadDayWeek(dayIdx, week);
    const notes   = loadNotes(dayIdx, week);
    const setCount = done ? Object.values(wd).reduce((total, exData) =>
      total + Object.values(exData || {}).filter(s => s && s.reps && s.reps !== "").length, 0) : 0;
    return { day, dayIdx, done, setCount, notes };
  });

  const tagColor = { PUSH:"#e07a5f", PULL:"#6b9ac4", LEGS:"#81b29a" };
  const complianceColor = compliance >= 100 ? "var(--phase-accum)" : compliance >= 60 ? "var(--phase-intens)" : "var(--danger)";

  return (
    <div style={{animation:"tabFadeIn 0.15s ease-out"}}>
      {/* Header */}
      <div style={{display:"flex", alignItems:"center", gap:12, padding:"16px 16px 12px", background:"var(--bg-deep)", borderBottom:"1px solid var(--border)", position:"sticky", top:0, zIndex:10}}>
        <button onClick={goBack} className="btn-ghost" style={{
          background:"transparent", border:"none", cursor:"pointer",
          color:"var(--accent)", fontSize:20, lineHeight:1, padding:"2px 4px",
          display:"flex", alignItems:"center",
        }}>‹</button>
        <span style={{fontSize:12, fontWeight:600, letterSpacing:"0.05em", color:"var(--text-secondary)"}}>WEEKLY SUMMARY</span>

        {/* Week picker */}
        <div style={{marginLeft:"auto", display:"flex", alignItems:"center", gap:4}}>
          <button onClick={() => setWeek(w => Math.max(0, w - 1))} disabled={week === 0}
            style={{
              background:"transparent", border:"none", cursor: week === 0 ? "default" : "pointer",
              color: week === 0 ? "var(--text-dim)" : "var(--accent)",
              fontSize:18, lineHeight:1, padding:"2px 6px",
            }}>‹</button>
          <span style={{fontSize:12, fontWeight:700, color:"var(--text-primary)", minWidth:50, textAlign:"center"}}>
            Week {week + 1}
          </span>
          <button onClick={() => setWeek(w => Math.min(MESO.weeks - 1, w + 1))} disabled={week === MESO.weeks - 1}
            style={{
              background:"transparent", border:"none", cursor: week === MESO.weeks - 1 ? "default" : "pointer",
              color: week === MESO.weeks - 1 ? "var(--text-dim)" : "var(--accent)",
              fontSize:18, lineHeight:1, padding:"2px 6px",
            }}>›</button>
        </div>
      </div>

      <div style={{padding:"14px 16px", display:"flex", flexDirection:"column", gap:12}}>

        {/* ── COMPLIANCE + PHASE ── */}
        <div style={{display:"flex", gap:10}}>
          {/* Compliance ring */}
          <div style={{
            background:"var(--bg-card)", border:"1px solid var(--border)",
            borderRadius:14, padding:"14px 16px",
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            gap:6, flexShrink:0, width:100, boxShadow:"var(--shadow-sm)",
          }}>
            {(() => {
              const r = 26, circ = 2 * Math.PI * r;
              const dash = circ * (compliance / 100);
              return (
                <svg width="64" height="64" viewBox="0 0 64 64">
                  <circle cx="32" cy="32" r={r} fill="none" stroke="var(--bg-inset)" strokeWidth="5"/>
                  <circle cx="32" cy="32" r={r} fill="none" stroke={complianceColor} strokeWidth="5"
                    strokeDasharray={`${dash} ${circ}`}
                    strokeDashoffset={circ * 0.25}
                    strokeLinecap="round"
                  />
                  <text x="32" y="35" textAnchor="middle" fontSize="13" fontWeight="800"
                    fill="var(--text-primary)" fontFamily="inherit">{compliance}%</text>
                </svg>
              );
            })()}
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-muted)"}}>DONE</div>
              <div style={{fontSize:10, color:"var(--text-secondary)", fontWeight:500}}>{weekDone}/{weekTotal} sessions</div>
            </div>
          </div>

          {/* Phase info */}
          <div style={{
            flex:1, background:"var(--bg-card)", border:"1px solid var(--border)",
            borderRadius:14, padding:"14px", boxShadow:"var(--shadow-sm)",
            display:"flex", flexDirection:"column", justifyContent:"space-between",
          }}>
            <div style={{display:"flex", alignItems:"center", gap:6}}>
              <div style={{
                fontSize:9, fontWeight:700, letterSpacing:"0.06em",
                color:pc, background:pc+"18", padding:"3px 8px", borderRadius:4,
              }}>{phase.toUpperCase()}</div>
              <div style={{fontSize:9, color:"var(--text-muted)", fontWeight:600}}>{rir}</div>
            </div>
            <div style={{fontSize:26, fontWeight:900, color:"var(--text-primary)", lineHeight:1}}>
              {totalSets} <span style={{fontSize:12, fontWeight:600, color:"var(--text-muted)"}}>sets</span>
            </div>
            <div style={{fontSize:10, color:"var(--text-secondary)"}}>Total volume logged</div>
            {/* Day pills */}
            <div style={{display:"flex", gap:4, marginTop:6}}>
              {activeDays.map((day, i) => {
                const done = completedDays.has(`${i}:${week}`);
                const tc = TAG_ACCENT[day.tag];
                return (
                  <div key={i} style={{
                    flex:1, height:5, borderRadius:3,
                    background: done ? tc : "var(--border)",
                  }}/>
                );
              })}
            </div>
          </div>
        </div>

        {/* ── PRs HIT ── */}
        {prsHit.length > 0 && (
          <div style={{
            background:"var(--bg-card)", border:"1px solid var(--border)",
            borderRadius:14, overflow:"hidden", boxShadow:"var(--shadow-sm)",
          }}>
            <div style={{
              padding:"12px 16px 10px",
              borderBottom:"1px solid var(--border-subtle)",
              display:"flex", alignItems:"center", gap:8,
            }}>
              <div style={{fontSize:18}}>🏆</div>
              <div>
                <div style={{fontSize:12, fontWeight:700, color:"var(--text-primary)"}}>
                  {prsHit.length} PR{prsHit.length > 1 ? "s" : ""} hit this week
                </div>
                <div style={{fontSize:10, color:"var(--text-muted)"}}>Estimated 1RM improved</div>
              </div>
            </div>
            <div style={{padding:"8px 0 4px"}}>
              {prsHit.map((pr, i) => {
                const tc = tagColor[pr.tag] || "var(--accent)";
                return (
                  <div key={i} style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"8px 16px",
                    borderBottom: i < prsHit.length - 1 ? "1px solid var(--border-subtle)" : "none",
                  }}>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:2}}>
                        <div style={{width:6, height:6, borderRadius:"50%", background:tc, flexShrink:0}}/>
                        <div style={{
                          fontSize:12, fontWeight:600, color:"var(--text-primary)",
                          whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                        }}>{pr.name}</div>
                      </div>
                      <div style={{fontSize:10, color:"var(--text-muted)", paddingLeft:12}}>
                        {pr.weight} × {pr.reps} reps
                      </div>
                    </div>
                    <div style={{textAlign:"right", flexShrink:0, marginLeft:12}}>
                      <div style={{fontSize:13, fontWeight:800, color:"var(--phase-accum)"}}>
                        ~{pr.e1rm}
                      </div>
                      {pr.gain !== null && (
                        <div style={{fontSize:9, color:"var(--phase-accum)", fontWeight:700}}>+{pr.gain} e1RM</div>
                      )}
                      {pr.gain === null && (
                        <div style={{fontSize:9, color:"var(--text-dim)"}}>first log</div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── VOLUME BY MUSCLE ── */}
        {totalSets > 0 && (
          <div style={{
            background:"var(--bg-card)", border:"1px solid var(--border)",
            borderRadius:14, padding:"14px 16px", boxShadow:"var(--shadow-sm)",
          }}>
            <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)", marginBottom:12}}>
              VOLUME BREAKDOWN
            </div>
            {["PUSH","PULL","LEGS"].map(tag => {
              const muscles = byTag[tag] || {};
              const entries = Object.entries(muscles).sort((a,b) => b[1]-a[1]);
              const tagTotal = entries.reduce((s,[,v]) => s+v, 0);
              const maxSets = entries.length > 0 ? entries[0][1] : 1;
              const tc = tagColor[tag] || "var(--accent)";
              if (tagTotal === 0) return null;
              return (
                <div key={tag} style={{marginBottom:12}}>
                  <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6}}>
                    <span style={{
                      fontSize:9, fontWeight:700, letterSpacing:"0.05em",
                      color:tc, background:tc+"1a", padding:"2px 8px", borderRadius:3,
                    }}>{tag}</span>
                    <span style={{fontSize:11, fontWeight:700, color:"var(--text-secondary)"}}>{tagTotal} sets</span>
                  </div>
                  {entries.map(([muscle, sets]) => (
                    <div key={muscle} style={{display:"flex", alignItems:"center", gap:10, marginBottom:5}}>
                      <div style={{width:72, fontSize:10, color:"var(--text-muted)", textAlign:"right", flexShrink:0, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{muscle}</div>
                      <div style={{flex:1, height:6, background:"var(--bg-inset)", borderRadius:3, overflow:"hidden"}}>
                        <div style={{
                          height:"100%", borderRadius:3,
                          width:`${Math.round((sets / maxSets) * 100)}%`,
                          background:`linear-gradient(90deg, ${tc}88, ${tc})`,
                          transition:"width 0.5s cubic-bezier(0.22,1,0.36,1)",
                        }}/>
                      </div>
                      <div style={{width:20, fontSize:11, fontWeight:700, color:tc, textAlign:"right", flexShrink:0}}>{sets}</div>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        )}

        {/* ── SESSION BREAKDOWN ── */}
        <div style={{
          background:"var(--bg-card)", border:"1px solid var(--border)",
          borderRadius:14, overflow:"hidden", boxShadow:"var(--shadow-sm)",
        }}>
          <div style={{padding:"12px 16px 10px", borderBottom:"1px solid var(--border-subtle)"}}>
            <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)"}}>SESSION LOG</div>
          </div>
          {sessions.map(({ day, dayIdx, done, setCount, notes }, si) => {
            const tc = TAG_ACCENT[day.tag];
            const isOpen = expandedDay === dayIdx;
            return (
              <div key={dayIdx} style={{borderBottom: si < sessions.length - 1 ? "1px solid var(--border-subtle)" : "none"}}>
                <button onClick={() => setExpandedDay(isOpen ? null : dayIdx)}
                  style={{
                    width:"100%", background:"transparent", border:"none", cursor:"pointer",
                    padding:"12px 16px", display:"flex", alignItems:"center", gap:12,
                    textAlign:"left",
                  }}>
                  {/* Status dot */}
                  <div style={{
                    width:32, height:32, borderRadius:8, flexShrink:0,
                    background: done ? tc+"1a" : "var(--bg-inset)",
                    border:`1px solid ${done ? tc+"44" : "var(--border-subtle)"}`,
                    display:"flex", alignItems:"center", justifyContent:"center",
                  }}>
                    {done
                      ? <span style={{color:tc, fontSize:14}}>✓</span>
                      : <span style={{color:"var(--text-dim)", fontSize:10}}>—</span>}
                  </div>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:12, fontWeight:700, color: done ? "var(--text-primary)" : "var(--text-dim)"}}>
                      {day.label}
                    </div>
                    <div style={{fontSize:10, color:"var(--text-muted)", marginTop:1}}>
                      {done ? `${setCount} sets logged` : "Not completed"}
                      {notes && " · has notes"}
                    </div>
                  </div>
                  {done && (
                    <span style={{
                      color:"var(--text-dim)", fontSize:16, transition:"transform 0.2s",
                      display:"inline-block", transform: isOpen ? "rotate(90deg)" : "none",
                    }}>›</span>
                  )}
                </button>

                {/* Expanded: exercise summary + notes */}
                {isOpen && done && (() => {
                  const wd = loadDayWeek(dayIdx, week);
                  return (
                    <div style={{padding:"0 16px 12px", display:"flex", flexDirection:"column", gap:6}}>
                      {day.exercises.map((baseEx, exIdx) => {
                        const exData = wd[exIdx] || {};
                        const sets = Object.values(exData).filter(s => s && (s.weight || s.reps));
                        if (!sets.length) return null;
                        const ovId = store.get(`ppl:exov:d${dayIdx}:w${week}:ex${exIdx}`)
                                  || store.get(`ppl:exov:d${dayIdx}:ex${exIdx}`);
                        const dbEx = ovId ? EXERCISE_DB.find(e => e.id === ovId) : null;
                        const exName = dbEx ? dbEx.name : baseEx.name;
                        const best = sets.reduce((b, s) => {
                          const wt = parseFloat(s.weight || 0), rp = parseInt(s.reps || 0);
                          return wt > b ? wt : b;
                        }, 0);
                        return (
                          <div key={exIdx} style={{
                            display:"flex", alignItems:"center", justifyContent:"space-between",
                            padding:"7px 10px",
                            background:"var(--bg-inset)", borderRadius:7,
                            border:"1px solid var(--border-subtle)",
                          }}>
                            <div style={{flex:1, minWidth:0}}>
                              <div style={{
                                fontSize:11, fontWeight:600, color:"var(--text-primary)",
                                whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                              }}>{exName}</div>
                              <div style={{fontSize:10, color:"var(--text-muted)", marginTop:1}}>
                                {sets.length} sets · top {best} lbs
                              </div>
                            </div>
                          </div>
                        );
                      }).filter(Boolean)}
                      {notes && (
                        <div style={{
                          marginTop:2, padding:"8px 10px",
                          background:"var(--bg-inset)", borderRadius:7,
                          border:"1px solid var(--border-subtle)",
                          fontSize:11, color:"var(--text-secondary)", lineHeight:1.5,
                          fontStyle:"italic",
                        }}>
                          📝 {notes}
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            );
          })}
        </div>

        {/* Empty state */}
        {weekDone === 0 && (
          <div style={{padding:"20px", textAlign:"center", color:"var(--text-muted)", fontSize:12}}>
            No sessions logged for Week {week + 1} yet.
          </div>
        )}

        <div style={{height:8}} />
      </div>
    </div>
  );
}

// ─── MESO HISTORY ─────────────────────────────────────────────────────────────
function MesoHistory({ goBack }) {
  const [archive, setArchive] = React.useState(loadArchive);
  const [expanded, setExpanded] = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);

  const handleDelete = (id) => {
    deleteArchiveEntry(id);
    setArchive(loadArchive());
    setExpanded(null);
    setConfirmDelete(null);
  };

  // For a given record, compute per-exercise best sets
  const computeRecordPRs = (record) => {
    // Build exercise name map: {d}-{ex} -> name
    const exNames = {};
    // Use profile to regenerate day structure
    let days = [];
    try {
      days = generateProgram(record.profile).slice(0, record.mesoDays);
    } catch {}

    const prMap = {}; // key: `${d}-${ex}` -> {name, tag, bestWeight, bestReps, e1rm}

    record.sessions.forEach(({ d, w, data, exOvs }) => {
      if (!data) return;
      Object.entries(data).forEach(([exIdxStr, exData]) => {
        const exIdx = parseInt(exIdxStr);
        const key = `${d}-${exIdx}`;

        // Resolve name
        if (!prMap[key]) {
          let name = days[d]?.exercises?.[exIdx]?.name || `Day ${d+1} Ex ${exIdx+1}`;
          let tag  = days[d]?.tag || "PUSH";
          const ovId = exOvs?.[exIdx];
          if (ovId) {
            const dbEx = EXERCISE_DB.find(e => e.id === ovId);
            if (dbEx) { name = dbEx.name; tag = dbEx.tag; }
          }
          prMap[key] = { name, tag, bestWeight: 0, bestReps: 0, e1rm: 0 };
        }

        // Find best set this session
        Object.values(exData).forEach(s => {
          if (!s || !s.weight || !s.reps) return;
          const wt = parseFloat(s.weight);
          const rp = parseInt(s.reps);
          if (!wt || !rp) return;
          const e1rm = wt * (1 + rp / 30);
          if (e1rm > prMap[key].e1rm) {
            prMap[key].e1rm = e1rm;
            prMap[key].bestWeight = wt;
            prMap[key].bestReps = rp;
          }
        });
      });
    });

    return Object.values(prMap)
      .filter(p => p.e1rm > 0)
      .sort((a, b) => b.e1rm - a.e1rm);
  };

  const formatDate = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  };

  const splitLabel = (profile) => {
    const s = profile?.splitType || "ppl";
    return s.toUpperCase().replace(/_/g, " ");
  };

  const tagColor = { PUSH: "#e07a5f", PULL: "#6b9ac4", LEGS: "#81b29a" };

  return (
    <div style={{animation:"tabFadeIn 0.15s ease-out"}}>
      {/* Header */}
      <div style={{display:"flex", alignItems:"center", gap:12, padding:"16px 16px 12px", background:"var(--bg-deep)", borderBottom:"1px solid var(--border)"}}>
        <button onClick={goBack} className="btn-ghost" style={{
          background:"transparent", border:"none", cursor:"pointer",
          color:"var(--accent)", fontSize:20, lineHeight:1, padding:"2px 4px",
          display:"flex", alignItems:"center",
        }}>‹</button>
        <span style={{fontSize:12, fontWeight:600, letterSpacing:"0.05em", color:"var(--text-secondary)"}}>MESO HISTORY</span>
        <span style={{
          marginLeft:"auto", fontSize:10, fontWeight:700, letterSpacing:"0.05em",
          color:"var(--text-muted)", background:"var(--bg-inset)",
          padding:"3px 8px", borderRadius:10,
        }}>{archive.length} / 10</span>
      </div>

      {/* Empty state */}
      {archive.length === 0 && (
        <div style={{padding:"60px 20px", textAlign:"center", color:"var(--text-dim)"}}>
          <div style={{fontSize:36, marginBottom:14}}>📦</div>
          <div style={{fontSize:14, fontWeight:700, color:"var(--text-secondary)", marginBottom:8}}>No archived cycles yet</div>
          <div style={{fontSize:12, color:"var(--text-muted)", lineHeight:1.6}}>
            When you reset a meso cycle, it gets saved here automatically so you can look back at your progress.
          </div>
        </div>
      )}

      {/* Archive list */}
      <div style={{padding:"12px 16px", display:"flex", flexDirection:"column", gap:10}}>
        {archive.map((record) => {
          const isOpen = expanded === record.id;
          const pct = record.totalSessions > 0
            ? Math.round((record.completedSessions / record.totalSessions) * 100)
            : 0;
          const prs = isOpen ? computeRecordPRs(record) : [];
          const tagCounts = { PUSH:0, PULL:0, LEGS:0 };
          prs.forEach(p => { if (tagCounts[p.tag] !== undefined) tagCounts[p.tag]++; });

          return (
            <div key={record.id} style={{
              background:"var(--bg-card)",
              border:`1px solid ${isOpen ? "var(--accent)" : "var(--border)"}`,
              borderRadius:12, overflow:"hidden",
              boxShadow:"var(--shadow-sm)",
              transition:"border-color 0.2s",
            }}>
              {/* Cycle header — always visible */}
              <button onClick={() => setExpanded(isOpen ? null : record.id)} style={{
                width:"100%", background:"transparent", border:"none", cursor:"pointer",
                padding:"14px 16px", textAlign:"left",
                display:"flex", flexDirection:"column", gap:10,
              }}>
                {/* Top row */}
                <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between"}}>
                  <div>
                    <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:5}}>
                      <span style={{
                        fontSize:10, fontWeight:700, letterSpacing:"0.06em",
                        color:"var(--accent)", background:"rgba(var(--accent-rgb),0.12)",
                        padding:"2px 8px", borderRadius:3,
                      }}>{record.mesoWeeks}WK {splitLabel(record.profile)}</span>
                      {record.profile?.name && (
                        <span style={{fontSize:10, color:"var(--text-muted)", fontWeight:600}}>
                          {record.profile.name}
                        </span>
                      )}
                    </div>
                    <div style={{fontSize:12, color:"var(--text-secondary)", fontWeight:500}}>
                      {formatDate(record.archivedAt)}
                    </div>
                  </div>
                  <div style={{display:"flex", alignItems:"center", gap:8, flexShrink:0}}>
                    <div style={{
                      fontSize:15, fontWeight:800,
                      color: pct >= 80 ? "var(--phase-accum)" : pct >= 50 ? "var(--phase-intens)" : "var(--text-muted)",
                    }}>{pct}%</div>
                    <div style={{
                      fontSize:14, color: isOpen ? "var(--accent)" : "var(--text-dim)",
                      transition:"transform 0.2s",
                      transform: isOpen ? "rotate(90deg)" : "none",

                  </div>
                </div>

                {/* Stats row */}
                <div style={{display:"flex", gap:16}}>
                  <div>
                    <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-muted)"}}>SESSIONS</div>
                    <div style={{fontSize:13, fontWeight:700, color:"var(--text-primary)"}}>{record.completedSessions}/{record.totalSessions}</div>
                  </div>
                  <div>
                    <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-muted)"}}>DAYS/WEEK</div>
                    <div style={{fontSize:13, fontWeight:700, color:"var(--text-primary)"}}>{record.mesoDays}</div>
                  </div>
                  <div>
                    <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-muted)"}}>EQUIPMENT</div>
                    <div style={{fontSize:13, fontWeight:700, color:"var(--text-primary)", textTransform:"capitalize"}}>
                      {(record.profile?.equipment || ["barbell"]).join(", ")}
                    </div>
                  </div>
                </div>

                {/* Progress bar */}
                <div style={{height:3, background:"var(--bg-inset)", borderRadius:2, overflow:"hidden"}}>
                  <div style={{
                    height:"100%", borderRadius:2, transition:"width 0.5s cubic-bezier(0.22,1,0.36,1)",
                    width:`${pct}%`,
                    background: pct >= 80 ? "var(--phase-accum)" : pct >= 50 ? "var(--phase-intens)" : "var(--text-muted)",
                  }}/>
                </div>
              </button>

              {/* Expanded exercise PRs */}
              {isOpen && (
                <div style={{borderTop:"1px solid var(--border-subtle)"}}>
                  {prs.length === 0 ? (
                    <div style={{padding:"20px 16px", textAlign:"center", color:"var(--text-muted)", fontSize:12}}>
                      No workout data logged in this cycle
                    </div>
                  ) : (
                    <>
                      {/* Tag summary pills */}
                      <div style={{padding:"10px 16px 0", display:"flex", gap:6}}>
                        {Object.entries(tagCounts).filter(([,c]) => c > 0).map(([tag, count]) => (
                          <span key={tag} style={{
                            fontSize:9, fontWeight:700, letterSpacing:"0.05em",
                            color: tagColor[tag] || "var(--accent)",
                            background:(tagColor[tag] || "#888") + "18",
                            padding:"3px 8px", borderRadius:10,
                          }}>{tag} · {count}</span>
                        ))}
                      </div>

                      {/* Exercise PR list */}
                      <div style={{padding:"8px 16px 14px", display:"flex", flexDirection:"column", gap:6}}>
                        {prs.map((pr, i) => {
                          const tc = tagColor[pr.tag] || "var(--accent)";
                          return (
                            <div key={i} style={{

// ─── PR TRACKER ───────────────────────────────────────────────────────────────
function PRTracker({ activeDays, goBack }) {
  const [filter, setFilter] = React.useState("ALL");

  // Build PR table: for each exercise slot, scan all weeks and find best set
  const prs = React.useMemo(() => {
    const results = [];
    activeDays.forEach((day, dayIdx) => {
      day.exercises.forEach((baseEx, exIdx) => {
        let bestWeight = 0, bestReps = 0, bestWeek = -1, bestE1RM = 0;
        const history = []; // {week, weight, reps, e1rm}

        for (let w = 0; w <= (MESO ? MESO.weeks : 6); w++) {
          const raw = store.get(`ppl:day${dayIdx}:week${w}`);
          if (!raw) continue;
          const dayData = JSON.parse(raw);
          const exData = dayData[exIdx];
          if (!exData) continue;

          const sets = Object.values(exData).filter(s => s && s.weight && s.reps && parseFloat(s.weight) > 0 && parseInt(s.reps) > 0);
          if (!sets.length) continue;

          // Best set this week = highest e1RM
          let weekBestE1RM = 0, weekBestWeight = 0, weekBestReps = 0;
          sets.forEach(s => {
            const wt = parseFloat(s.weight);
            const rp = parseInt(s.reps);
            const e1rm = wt * (1 + rp / 30); // Epley formula
            if (e1rm > weekBestE1RM) { weekBestE1RM = e1rm; weekBestWeight = wt; weekBestReps = rp; }
          });

          history.push({ week: w + 1, weight: weekBestWeight, reps: weekBestReps, e1rm: Math.round(weekBestE1RM) });

          if (weekBestE1RM > bestE1RM) {
            bestE1RM = weekBestE1RM;
            bestWeight = weekBestWeight;
            bestReps = weekBestReps;
            bestWeek = w + 1;
          }
        }

        if (bestWeek < 0) return; // no data logged for this slot

        // Resolve exercise name (check overrides across weeks, use most common or latest)
        let exName = baseEx.name;
        let exTag = day.tag;
        // Try to find the override for the most recent logged week
        for (let w = (MESO ? MESO.weeks : 6); w >= 0; w--) {
          const ovId = store.get(`ppl:exov:d${dayIdx}:w${w}:ex${exIdx}`)
                    || store.get(`ppl:exov:d${dayIdx}:ex${exIdx}`);
          if (ovId) {
            const dbEx = EXERCISE_DB.find(e => e.id === ovId);
            if (dbEx) { exName = dbEx.name; exTag = dbEx.tag; }
            break;
          }
        }

        results.push({
          key: `${dayIdx}-${exIdx}`,
          name: exName,
          tag: exTag,
          muscle: baseEx.muscle || "",
          bestWeight,
          bestReps,
          bestWeek,
          e1rm: Math.round(bestE1RM),
          history,
        });
      });
    });

    // Sort by e1RM descending
    results.sort((a, b) => b.e1rm - a.e1rm);
    return results;
  }, [activeDays]);

  const tags = ["ALL", "PUSH", "PULL", "LEGS"];
  const filtered = filter === "ALL" ? prs : prs.filter(p => p.tag === filter);

  const tagColor = { PUSH: "var(--push-accent,#e07a5f)", PULL: "var(--pull-accent,#6b9ac4)", LEGS: "var(--legs-accent,#81b29a)" };
  const TAG_LABEL = { PUSH:"Push", PULL:"Pull", LEGS:"Legs" };

  return (
    <div style={{animation:"tabFadeIn 0.15s ease-out"}}>
      {/* Header */}
      <div style={{display:"flex", alignItems:"center", gap:12, padding:"16px 16px 12px", background:"var(--bg-deep)", borderBottom:"1px solid var(--border)"}}>
        <button onClick={goBack} className="btn-ghost" style={{
          background:"transparent", border:"none", cursor:"pointer",
          color:"var(--accent)", fontSize:20, lineHeight:1, padding:"2px 4px",
          display:"flex", alignItems:"center",
        }}>‹</button>
        <span style={{fontSize:12, fontWeight:600, letterSpacing:"0.05em", color:"var(--text-secondary)"}}>PR TRACKER</span>
      </div>

      {/* Filter pills */}
      <div style={{display:"flex", gap:8, padding:"14px 16px 2px", overflowX:"auto"}}>
        {tags.map(t => (
          <button key={t} onClick={() => setFilter(t)} style={{
            flexShrink:0, padding:"6px 14px", borderRadius:20, border:"1px solid",
            borderColor: filter === t ? "var(--accent)" : "var(--border)",
            background: filter === t ? "rgba(var(--accent-rgb),0.12)" : "transparent",
            color: filter === t ? "var(--accent)" : "var(--text-secondary)",
            fontSize:11, fontWeight:700, letterSpacing:"0.05em", cursor:"pointer",
          }}>{t === "ALL" ? "All" : TAG_LABEL[t]}</button>
        ))}
      </div>

      {/* PR List */}
      <div style={{padding:"12px 16px", display:"flex", flexDirection:"column", gap:10}}>
        {filtered.length === 0 && (
          <div style={{
            padding:"48px 20px", textAlign:"center",
            color:"var(--text-dim)", fontSize:13,
          }}>
            <div style={{fontSize:32, marginBottom:12}}>🏋️</div>
            <div style={{fontWeight:600, marginBottom:6}}>No data yet</div>
            <div style={{fontSize:12, color:"var(--text-muted)"}}>Log some sets to see your PRs here</div>
          </div>
        )}

        {filtered.map((pr, idx) => {
          const tc = tagColor[pr.tag] || "var(--accent)";
          const trendUp = pr.history.length >= 2 &&
            pr.history[pr.history.length - 1].e1rm > pr.history[0].e1rm;
          const trendFlat = pr.history.length >= 2 &&
            pr.history[pr.history.length - 1].e1rm === pr.history[0].e1rm;

          return (
            <div key={pr.key} style={{
              background:"var(--bg-card)",
              border:"1px solid var(--border)",
              borderRadius:12,
              overflow:"hidden",
              boxShadow:"var(--shadow-sm)",
            }}>
              {/* Top row */}
              <div style={{
                display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"14px 16px 10px",
                borderBottom:"1px solid var(--border-subtle)",
              }}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:4}}>
                    <span style={{
                      fontSize:9, fontWeight:700, letterSpacing:"0.06em",
                      color:tc, background:tc+"1a", padding:"2px 7px", borderRadius:3,
                      flexShrink:0,
                    }}>{pr.tag}</span>
                    {pr.muscle && (
                      <span style={{fontSize:10, color:"var(--text-muted)", fontWeight:500}}>
                        {pr.muscle}
                      </span>
                    )}
                  </div>
                  <div style={{
                    fontSize:14, fontWeight:700, color:"var(--text-primary)",
                    letterSpacing:"0.01em", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                  }}>{pr.name}</div>
                </div>

                {/* Trend arrow */}
                <div style={{
                  marginLeft:12, fontSize:16, flexShrink:0,
                  color: trendFlat ? "var(--text-muted)" : trendUp ? "var(--phase-accum)" : "var(--danger)",
                }}>
                  {trendFlat ? "→" : trendUp ? "↑" : "↓"}
                </div>
              </div>

              {/* Stats row */}
              <div style={{display:"flex", borderBottom:"1px solid var(--border-subtle)"}}>
                {[
                  { label:"BEST SET", value:`${pr.bestWeight} × ${pr.bestReps}`, unit:"reps" },
                  { label:"EST. 1RM", value:pr.e1rm, unit:"lbs" },
                  { label:"PEAK WEEK", value:`Wk ${pr.bestWeek}`, unit:"" },
                ].map((stat, i) => (
                  <div key={i} style={{
                    flex:1, padding:"10px 12px",
                    borderRight: i < 2 ? "1px solid var(--border-subtle)" : "none",
                    textAlign:"center",
                  }}>
                    <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)", marginBottom:3}}>{stat.label}</div>
                    <div style={{fontSize:15, fontWeight:800, color:"var(--text-primary)", lineHeight:1}}>{stat.value}</div>
                    {stat.unit && <div style={{fontSize:9, color:"var(--text-dim)", marginTop:1}}>{stat.unit}</div>}
                  </div>
                ))}
              </div>

              {/* Mini history bar chart */}
              {pr.history.length > 1 && (() => {
                const maxE = Math.max(...pr.history.map(h => h.e1rm));
                const minE = Math.min(...pr.history.map(h => h.e1rm));
                const range = maxE - minE || 1;
                return (
                  <div style={{padding:"10px 16px 12px"}}>
                    <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-muted)", marginBottom:8}}>EST. 1RM TREND</div>
                    <div style={{display:"flex", alignItems:"flex-end", gap:4, height:32}}>
                      {pr.history.map((h, hi) => {
                        const heightPct = 20 + ((h.e1rm - minE) / range) * 80;
                        const isMax = h.e1rm === maxE;
                        return (
                          <div key={hi} style={{
                            flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3,
                          }}>
                            <div style={{
                              width:"100%", height:`${heightPct}%`, borderRadius:"3px 3px 0 0",
                              background: isMax ? tc : tc + "55",
                              minHeight:4, transition:"height 0.3s ease",
                            }}/>
                            <div style={{fontSize:8, color:"var(--text-dim)", lineHeight:1}}>W{h.week}</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [profile, setProfile]             = useState(loadProfile);
  const [view, setView]                   = useState("home");
  const [selectedDay, setSelectedDay]     = useState(null);
  const [currentWeek, setCurrentWeek]     = useState(loadCurrentWeek);
  const [completedDays, setCompletedDays] = useState(loadCompleted);

  // Request persistent storage on mount (silent — prevents browser auto-cleanup)
  useEffect(() => {
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist();
    }
  }, []);

  // Show setup if no profile
  if (!profile) {
    return <SetupPage onComplete={p => {
      saveProfile(p);
      // Reload so MESO recomputes from new mesoLength
      window.location.reload();
    }} />;
  }

  const handleComplete = (dayIdx, weekIdx) => {
    markComplete(dayIdx, weekIdx);
    const newCompleted = new Set([...completedDays, `${dayIdx}:${weekIdx}`]);
    setCompletedDays(newCompleted);

    // Check if entire week is now done
    const weekFinished = Array.from({length: MESO.days}, (_, d) => d)
      .every(d => newCompleted.has(`${d}:${weekIdx}`));
    if (weekFinished) {
      snapshotData();
      // Advance to next week so schedule auto-opens it
      const nextWeek = weekIdx + 1;
      if (nextWeek <= MESO.weeks) {
        setCurrentWeek(nextWeek);
        saveCurrentWeek(nextWeek);
      }
    }
  };

  const handleReset = () => {
    archiveCurrentMeso(profile);
    resetMeso();
    // Clear profile so setup page shows again (user can pick new meso length)
    // Page reload ensures MESO config recomputes from scratch
    localStorage.removeItem("ppl:profile");
    window.location.reload();
  };

  const handleNextDay = (dayIdx, weekIdx) => {
    const nextDayIdx = dayIdx + 1;
    if (nextDayIdx <= MESO.days - 1) {
      setSelectedDay(nextDayIdx);
    } else {
      const nextWeek = weekIdx + 1;
      if (nextWeek <= MESO.weeks - 1) {
        setCurrentWeek(nextWeek);
        saveCurrentWeek(nextWeek);
        setSelectedDay(0);
      } else {
        setView("home");
      }
    }
  };

  // Compute active days from profile — always reflects current equipment/duration selection
  const activeDays = useMemo(() => {
    if (!profile) return [];
    return generateProgram(profile).slice(0, MESO.days);
  }, [profile]);

  const phase = WEEK_PHASE[currentWeek];
  const pc    = PHASE_COLOR[phase];

  return (
    <div style={{minHeight:"100vh", background:"var(--bg-root)", color:"var(--text-primary)", fontFamily:"'Exo 2',system-ui,sans-serif", maxWidth:480, margin:"0 auto"}}>
      {/* Header */}
      <div style={{position:"sticky", top:0, zIndex:50}}>
        <IronOakBanner subtitle={`${profile.name ? profile.name.toUpperCase() + " · " : ""}${MESO.weeks}WK ${(MESO.splitType||"ppl").toUpperCase().replace(/_/g," ")} · WEEK ${currentWeek+1}`} />
      </div>

      {view==="home" && (
        <HomeView
          currentWeek={currentWeek}
          setCurrentWeek={setCurrentWeek}
          onSelectDay={i=>{setSelectedDay(i); setView("day");}}
          completedDays={completedDays}
          profile={profile}
          activeDays={activeDays}
          onReset={handleReset}
        />
      )}
      {view==="day" && selectedDay!==null && (
        <DayView
          dayIdx={selectedDay}
          weekIdx={currentWeek}
          onBack={()=>{ window.scrollTo(0,0); setView("home"); }}
          onComplete={handleComplete}
          onNextDay={handleNextDay}
          completedDays={completedDays}
          profile={profile}
          activeDays={activeDays}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
