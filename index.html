// ─── DAY VIEW ─────────────────────────────────────────────────────────────────
function DayView({ dayIdx, weekIdx, onBack, onComplete, onNextDay, completedDays, profile, activeDays }) {
  const day = activeDays[dayIdx];
  const accent = TAG_ACCENT[day.tag];
  const pc = PHASE_COLOR[WEEK_PHASE[weekIdx]];
  const isDone = completedDays.has(`${dayIdx}:${weekIdx}`);

  // Day is locked (view-only, no input) if any prior day this week is incomplete
  const isLocked = !isDone && Array.from({length: dayIdx}, (_, d) => d)
    .some(d => !completedDays.has(`${d}:${weekIdx}`));

  const [weekData, setWeekData]           = useState(() => loadDayWeekWithCarryover(dayIdx, weekIdx, day));
  const [notes, setNotes]                 = useState(() => loadNotes(dayIdx, weekIdx));
  const [expandedIdx, setExpandedIdx]     = useState(0);
  const [doneExercises, setDoneExercises] = useState(new Set());
  const [dialog, setDialog]               = useState(null);
  const [showWorkoutModal, setShowWorkoutModal] = useState(false);
  const [showReadyDialog, setShowReadyDialog]   = useState(false);
  const [showUnfinishedPrompt, setShowUnfinishedPrompt] = useState(false);
  const [swapTarget, setSwapTarget]             = useState(null); // {exIdx}
  const dialogShownRef = React.useRef(new Set());

  // Build resolved exercises by applying any saved overrides
  const [exercises, setExercises] = useState(() => {
    return day.exercises.map((ex, i) => {
      const ovId = loadExOverride(dayIdx, weekIdx, i);
      if (!ovId) return ex;
      const dbEx = EXERCISE_DB.find(e => e.id === ovId);
      if (!dbEx) return ex;
      const wu = ex.anchor
        ? (profile?.sessionDuration <= 30 ? "2 ramp sets — time is tight, be thorough" : dbEx.warmup)
        : (dbEx.fatigue === "low" ? "—" : "1 feeler set");
      return {
        id: dbEx.id, name: dbEx.name, muscle: dbEx.muscle, equipment: dbEx.equipment,
        tag: dbEx.tag, anchor: ex.anchor, sets: dbEx.sets, reps: dbEx.reps,
        rest: dbEx.rest, warmup: wu,
        progression: dbEx.pattern === "isolation" ? "reps" : "weight",
      };
    });
  });

  const handleSwap = (newDbEx, scope) => {
    const { exIdx } = swapTarget;
    const oldEx = exercises[exIdx];
    const wu = oldEx.anchor
      ? (profile?.sessionDuration <= 30 ? "2 ramp sets — time is tight, be thorough" : newDbEx.warmup)
      : (newDbEx.fatigue === "low" ? "—" : "1 feeler set");
    const newEx = {
      id: newDbEx.id, name: newDbEx.name, muscle: newDbEx.muscle, equipment: newDbEx.equipment,
      tag: newDbEx.tag, anchor: oldEx.anchor, sets: newDbEx.sets, reps: newDbEx.reps,
      rest: newDbEx.rest, warmup: wu,
      progression: newDbEx.pattern === "isolation" ? "reps" : "weight",
    };
    saveExOverride(dayIdx, weekIdx, exIdx, newDbEx.id, scope);
    setExercises(prev => prev.map((ex, i) => i === exIdx ? newEx : ex));
    setSwapTarget(null);
  };

  const handleUpdateSet = useCallback((exIdx, setIdx, field, value) => {
    // If user edits data for a done exercise, un-done it so they can re-complete
    setDoneExercises(prev => {
      if (prev.has(exIdx)) {
        const next = new Set(prev);
        next.delete(exIdx);
        return next;
      }
      return prev;
    });
    // Allow dialog to fire again for this exercise after an edit
    dialogShownRef.current.delete(exIdx);

    setWeekData(prev => {
      const next = {
        ...prev,
        [exIdx]: {
          ...(prev[exIdx] || {}),
          [setIdx]: {...((prev[exIdx] || {})[setIdx] || {}), [field]: value}
        }
      };
      saveDayWeek(dayIdx, weekIdx, next);
      return next;
    });
  }, [dayIdx, weekIdx]);

  const handleWeightAutoFill = useCallback((exIdx, weight, numSets) => {
    setWeekData(prev => {
      const exData = prev[exIdx] || {};
      const next = { ...prev, [exIdx]: { ...exData } };
      for (let s = 1; s < numSets; s++) {
        const existing = (exData[s] || {}).weight;
        if (!existing || existing === "") {
          next[exIdx][s] = { ...(exData[s] || {}), weight };
        }
      }
      saveDayWeek(dayIdx, weekIdx, next);
      return next;
    });
  }, [dayIdx, weekIdx]);

  const handleLastSetFilled = useCallback((exIdx, exName) => {
    // Don't fire if already done or already shown since last edit
    if (doneExercises.has(exIdx) || dialogShownRef.current.has(exIdx)) return;
    dialogShownRef.current.add(exIdx);
    setDialog({ exIdx, exName });
  }, [doneExercises]);

  const handleDialogYes = () => {
    const { exIdx } = dialog;
    setDialog(null);
    setDoneExercises(prev => new Set([...prev, exIdx]));
    const nextIdx = exIdx + 1;
    if (nextIdx < exercises.length) {
      setExpandedIdx(nextIdx);
      setTimeout(() => {
        const el = document.getElementById(`ex-${nextIdx}`);
        if (el) el.scrollIntoView({ behavior:"smooth", block:"start" });
      }, 120);
    } else {
      setExpandedIdx(null);
    }
  };

  const handleDialogNo = () => setDialog(null);

  const handleNoteChange = (val) => {
    setNotes(val);
    saveNotes(dayIdx, weekIdx, val);
  };

  const handleComplete = () => {
    const allExDone = doneExercises.size === exercises.length;
    if (!allExDone) {
      setShowUnfinishedPrompt(true);
      return;
    }
    doComplete();
  };

  const doComplete = () => {
    setShowUnfinishedPrompt(false);
    markComplete(dayIdx, weekIdx);
    onComplete(dayIdx, weekIdx);
    setShowWorkoutModal(true);
  };

  return (
    <div style={{paddingBottom:100}}>
      {showReadyDialog && (
        <ReadyDialog
          dayLabel={day.label}
          userName={profile?.name || ""}
          isDone={isDone}
          isLocked={isLocked}
          onYes={() => setShowReadyDialog(false)}
          onNo={onBack}
        />
      )}
      {showWorkoutModal && (
        <WorkoutCompleteModal
          dayLabel={day.label}
          gender={profile?.gender}
          onOk={() => { setShowWorkoutModal(false); window.scrollTo(0,0); onBack(); window.scrollTo(0,0); }}
        />
      )}
      {dialog && (
        <CompleteDialog exerciseName={dialog.exName} onYes={handleDialogYes} onNo={handleDialogNo} />
      )}
      {showUnfinishedPrompt && (
        <div style={{
          position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:200,
          display:"flex", alignItems:"center", justifyContent:"center", padding:"24px",
        }}>
          <div style={{
            background:"var(--bg-card)", border:"1px solid var(--border)",
            borderRadius:20, padding:"28px 24px", maxWidth:340, width:"100%",
          }}>
            <div style={{fontSize:11, fontWeight:800, letterSpacing:"0.06em", color:"var(--text-muted)", textAlign:"center", marginBottom:14}}>NOTE</div>
            <div style={{fontSize:15, fontWeight:700, letterSpacing:"0.02em", color:"var(--text-primary)", textAlign:"center", marginBottom:8}}>
              Not quite done
            </div>
            <div style={{fontSize:13, color:"var(--text-secondary)", textAlign:"center", lineHeight:1.6, marginBottom:24}}>
              Looks like this workout isn't finished yet. Do you still want to mark it complete?
            </div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
              <button onClick={() => setShowUnfinishedPrompt(false)} className="btn-ghost" style={{
                padding:"16px", borderRadius:12, cursor:"pointer", background:"var(--bg-surface)",
                border:"1px solid var(--border)",
                color:"var(--text-secondary)", fontSize:13, fontWeight:700,
              }}>Keep Going</button>
              <button onClick={doComplete} className="btn-primary" style={{
                padding:"16px", borderRadius:12, cursor:"pointer", background:"var(--btn-primary-bg)",
                border:"1px solid var(--btn-primary-border)",
                color:"var(--btn-primary-text)", fontSize:13, fontWeight:700,
              }}>Mark Complete</button>
            </div>
          </div>
        </div>
      )}
      {swapTarget !== null && (
        <SwapModal
          exercise={exercises[swapTarget.exIdx]}
          dayTag={day.tag}
          profile={profile}
          onSwap={handleSwap}
          onClose={() => setSwapTarget(null)}
        />
      )}

      {/* Day header */}
      <div style={{
        background:"var(--bg-surface)",
        borderBottom:"1px solid var(--border)",
        padding:"16px",
        boxShadow:"var(--shadow-sm)",
      }}>
        <button onClick={onBack} className="btn-ghost" style={{background:"none", border:"none", color:"var(--accent)", fontSize:15, cursor:"pointer", padding:"0 0 12px", display:"flex", alignItems:"center", gap:8}}>
          ‹ Back
        </button>
        <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8}}>
          <div style={{flex:1}}>
            <div style={{display:"flex", alignItems:"center", flexWrap:"wrap", gap:8, marginBottom:8}}>
              {pill(accent, day.tag)}
              {pill(pc, `W${weekIdx+1} · ${WEEK_RIR[weekIdx]}`)}
              {pill("#fbbf24", PROG_TARGETS.weight[weekIdx])}
              {isDone && pill("var(--phase-accum)", "✓ Done")}
            </div>
            <div style={{fontSize:21, fontWeight:700, color:"var(--text-primary)"}}>{day.label}</div>
            <div style={{fontSize:13, color:"var(--text-secondary)", marginTop:4}}>{day.muscles}</div>
          </div>
        </div>
        {day.cardio && (
          <div style={{marginTop:12, padding:"8px 12px", background:"var(--border)", borderRadius:10, display:"flex", alignItems:"center", gap:8}}>
            <span style={{fontSize:9,fontWeight:800,letterSpacing:"0.04em",color:"var(--text-muted)"}}>CARDIO</span>
            <span style={{fontSize:13, color:"var(--accent)", fontWeight:700}}>{day.cardio} · Norwegian 4x4 — PM session</span>
          </div>
        )}
        <div style={{marginTop:10, padding:"8px 16px", background:"var(--bg-root)", borderRadius:10, borderLeft:`3px solid ${accent}`}}>
          <span style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.6}}>{day.note}</span>
        </div>
      </div>

      {/* Exercises */}
      <div style={{margin:"16px 16px 0", display:"flex", flexDirection:"column", gap:8}}>
        <div style={{
          display:"flex", justifyContent:"space-between", alignItems:"center",
          padding:"0 4px", marginBottom:2,
        }}>
          <span style={{fontSize:12, fontWeight:700, letterSpacing:"0.04em", color:"var(--accent)"}}>Exercises</span>
          <span style={{fontSize:12, color:"var(--text-dim)"}}>{doneExercises.size}/{exercises.length} done</span>
        </div>
        {exercises.map((ex, i) => (
          <div key={i} id={`ex-${i}`}>
            <ExerciseCard
              exercise={ex}
              exIdx={i}
              dayIdx={dayIdx}
              weekIdx={weekIdx}
              weekData={weekData}
              onUpdateSet={handleUpdateSet}
              onWeightAutoFill={handleWeightAutoFill}
              onLastSetFilled={handleLastSetFilled}
              expanded={expandedIdx === i}
              onToggle={() => setExpandedIdx(expandedIdx === i ? null : i)}
              done={doneExercises.has(i)}
              readOnly={isDone || isLocked}
              onSwapClick={!isDone && !isLocked ? () => setSwapTarget({exIdx: i}) : null}
            />
          </div>
        ))}
      </div>
      <div style={{margin:"16px 16px 0"}}>
        <div style={{
          background:"var(--bg-card)",
          border:"1px solid var(--border)",
          borderRadius:12,
          overflow:"hidden",
          boxShadow:"var(--shadow-xs)",
        }}>
          <div style={{
            padding:"8px 16px", borderBottom:"1px solid var(--border)",
            background:"var(--bg-deep)",
            display:"flex", alignItems:"center", justifyContent:"space-between",
          }}>
            <span style={{fontSize:12, fontWeight:700, letterSpacing:"0.04em", color:"var(--text-secondary)"}}>Session notes</span>
            {isDone && <span style={{fontSize:11, color:"var(--success)", fontWeight:600}}>✎ editable</span>}
          </div>
          <textarea
            value={notes}
            onChange={e => !isLocked && handleNoteChange(e.target.value)}
            readOnly={isLocked}
            placeholder="How'd it feel? Any PRs? Notes for next session..."
            style={{
              display:"block", width:"100%", minHeight:96,
              background: isLocked ? "var(--bg-deep)" : "var(--bg-card)",
              border:"none",
              color:"var(--text-secondary)", fontSize:14, padding:"16px", resize:"vertical",
              outline:"none", lineHeight:1.6,
              opacity: isLocked ? 0.5 : 1,
            }}
          />
        </div>
      </div>

      {/* Complete button / locked / done banner */}
      <div style={{margin:"16px 16px 0"}}>
        {isDone ? (
          <div style={{
            width:"100%", padding:"16px", borderRadius:12,
            background:"var(--success-bg)", border:"1px solid var(--success-bg)",
            color:"var(--phase-accum)", fontSize:15, fontWeight:700,
            textAlign:"center", letterSpacing:"0.04em", lineHeight:1.5,
          }}>
            ✓ Session Complete — Review Only
            <div style={{fontSize:12, color:"var(--success)", marginTop:4, fontWeight:400}}>
              Changes are not allowed for completed sessions
            </div>
          </div>
        ) : isLocked ? (
          <div style={{
            width:"100%", padding:"16px", borderRadius:12,
            background:"var(--bg-surface)", border:"1px solid var(--text-dim)",
            color:"var(--text-muted)", fontSize:15, fontWeight:700,
            textAlign:"center", letterSpacing:"0.04em", lineHeight:1.5,
          }}>
            LOCKED — Complete Previous Days First
            <div style={{fontSize:12, color:"var(--text-dim)", marginTop:4, fontWeight:400}}>
              Finish all prior sessions this week to unlock this day
            </div>
          </div>
        ) : (() => {
          const allDone = doneExercises.size === exercises.length;
          return (
            <button
              onClick={handleComplete}
              style={{
                width:"100%", padding:"16px", borderRadius:12,
                background: allDone ? accent : "var(--bg-surface)",
                border:`1px solid ${allDone ? accent : "var(--border)"}`,
                color: allDone ? "var(--text-primary)" : "var(--text-muted)",
                fontSize:16, fontWeight:700,
                cursor:"pointer",
                letterSpacing:"0.05em",
                transition:"all 0.2s",
              }}
            >
              {allDone
                ? "Mark Session Complete ✓"
                : `Complete All Exercises — ${doneExercises.size}/${exercises.length} done`}
            </button>
          );
        })()}
      </div>
    </div>
  );
}

// ─── PROGRESS VIEW ────────────────────────────────────────────────────────────
function ProgressView({ currentWeek, completedDays, activeDays }) {
  const [expandedDay, setExpandedDay] = useState(null);
  // Tally sets per muscle group across completed sessions in current week
  const muscleGroups = { PUSH: 0, PULL: 0, LEGS: 0 };
  activeDays.forEach((day, dayIdx) => {
    if (!completedDays.has(`${dayIdx}:${currentWeek}`)) return;
    const weekData = loadDayWeek(dayIdx, currentWeek);
    day.exercises.forEach((ex, exIdx) => {
      const exData = weekData[exIdx] || {};
      const filledSets = Object.values(exData).filter(s => s.reps && s.reps !== "").length;
      if (filledSets > 0) muscleGroups[day.tag] += filledSets;
    });
  });

  const workoutsThisWeek = activeDays.filter((_, i) => completedDays.has(`${i}:${currentWeek}`)).length;
  const workoutsTotal    = Array.from(completedDays).length;

  // Current weights — latest logged weight for each anchor lift across all weeks
  const anchorLifts = activeDays.map(day => {
    const anchor = day.exercises.find(e => e.anchor);
    if (!anchor) return null;
    let bestWeight = "";
    // Scan weeks from newest to oldest for most recent logged weight
    for (let w = currentWeek; w >= 0; w--) {
      const wd = loadDayWeek(activeDays.indexOf(day), w);
      for (let s = 0; s < anchor.sets; s++) {
        const wt = (wd[0] || {})[s]?.weight || (wd[0] || {}).weight;
        // Get set 0 weight from exercise index 0
        const exData = wd[0] || {};
        // find first set with weight
        const setWithWeight = Object.values(wd[0] || {}).find(sv => sv.weight && sv.weight !== "");
        if (setWithWeight) { bestWeight = setWithWeight.weight; break; }
      }
      if (bestWeight) break;
    }
    return { name: anchor.name, tag: day.tag, weight: bestWeight };
  }).filter(Boolean);

  // All exercises current weight (first set logged, most recent week)
  const allLifts = [];
  activeDays.forEach((day, dayIdx) => {
    day.exercises.forEach((ex, exIdx) => {
      let weight = "";
      for (let w = currentWeek; w >= 0; w--) {
        const wd = loadDayWeek(dayIdx, w);
        const exData = wd[exIdx] || {};
        const setWithWeight = Object.values(exData).find(sv => sv && sv.weight && sv.weight !== "");
        if (setWithWeight) { weight = setWithWeight.weight; break; }
      }
      allLifts.push({ name: ex.name, tag: day.tag, weight, anchor: ex.anchor });
    });
  });

  const tagColor = TAG_ACCENT;
  const phase = WEEK_PHASE[currentWeek];
  const pc = PHASE_COLOR[phase];

  const statBox = (label, value, color) => (
    <div style={{
      flex:1, background:"var(--bg-card)", border:`1px solid ${color}33`,
      borderRadius:12, padding:"16px 12px", textAlign:"center",
    }}>
      <div style={{fontSize:22, fontWeight:900, color}}>{value}</div>
      <div style={{fontSize:10, color:"var(--text-secondary)", marginTop:4, fontWeight:600, letterSpacing:"0.04em"}}>{label}</div>
    </div>
  );

  return (
    <div style={{padding:"0 16px 24px"}}>
      {/* Week summary stats */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11, fontWeight:700, letterSpacing:"0.04em", color:"var(--accent)", marginBottom:8}}>
          WEEK {currentWeek + 1} SUMMARY · {phase.toUpperCase()}
        </div>
        <div style={{display:"flex", gap:8, marginBottom:8}}>
          {statBox("THIS WEEK", `${workoutsThisWeek}/6`, pc)}
          {statBox("TOTAL SESSIONS", workoutsTotal, "var(--accent)")}
        </div>
        <div style={{display:"flex", gap:8}}>
          {statBox("PUSH SETS", muscleGroups.PUSH, TAG_ACCENT.PUSH)}
          {statBox("PULL SETS", muscleGroups.PULL, TAG_ACCENT.PULL)}
          {statBox("LEG SETS",  muscleGroups.LEGS,  TAG_ACCENT.LEGS)}
        </div>
      </div>

      {/* Lift weights by day */}
      {activeDays.map((day, dayIdx) => {
        const accent = TAG_ACCENT[day.tag];
        const dayLiftsDirect = day.exercises.map((ex, exIdx) => {
          let weight = "";
          for (let w = currentWeek; w >= 0; w--) {
            const wd = loadDayWeek(dayIdx, w);
            const exData = wd[exIdx] || {};
            const sw = Object.values(exData).find(sv => sv && sv.weight && sv.weight !== "");
            if (sw) { weight = sw.weight; break; }
          }
          return { name: ex.name, muscle: ex.muscle, weight, anchor: ex.anchor, sets: ex.sets, reps: ex.reps };
        });
        const anyLogged = dayLiftsDirect.some(l => l.weight);
        const isDayExpanded = expandedDay === dayIdx;
        return (
          <div key={dayIdx} style={{
            background:"var(--bg-card)", border:`1px solid ${anyLogged ? accent+"44" : "var(--border)"}`,
            borderRadius:12, marginBottom:8, overflow:"hidden",
          }}>
            <button onClick={()=>setExpandedDay(isDayExpanded ? null : dayIdx)} style={{
              width:"100%", textAlign:"left",
              background: anyLogged ? accent+"11" : "var(--bg-deep)",
              border:"none", borderBottom: isDayExpanded ? "1px solid #111827" : "none",
              padding:"12px 16px", cursor:"pointer",
              display:"flex", alignItems:"center", gap:8,
            }}>
              <span style={{
                background:accent+"22", color:accent, fontSize:10, fontWeight:700,
                padding:"4px 8px", borderRadius:6, letterSpacing:"0.04em", flexShrink:0,
              }}>{day.tag}</span>
              <span style={{fontSize:13, fontWeight:700, color:"var(--text-primary)", flex:1}}>Day {day.dayNum} — {day.label}</span>
              {completedDays.has(`${dayIdx}:${currentWeek}`) && (
                <span style={{fontSize:12, color:"var(--phase-accum)", flexShrink:0}}>✓</span>
              )}
              <span style={{
                color:"var(--text-dim)", fontSize:20, flexShrink:0,
                transform: isDayExpanded ? "rotate(90deg)" : "none", transition:"transform 0.2s",
              }}>›</span>
            </button>
            {isDayExpanded && (
              <div>
                {dayLiftsDirect.map((lift, i) => (
                  <div key={i} style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"8px 16px", borderBottom: i < dayLiftsDirect.length-1 ? "1px solid var(--bg-surface)" : "none",
                  }}>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{display:"flex", alignItems:"baseline", gap:7, flexWrap:"wrap"}}>
                        <span style={{fontSize:13, color:"var(--text-primary)", fontWeight:600}}>
                          {lift.anchor && "⭐ "}{lift.name}
                        </span>
                        {lift.muscle && (
                          <span style={{fontSize:10, color:"var(--phase-intens)", fontWeight:700, letterSpacing:"0.05em"}}>
                            {lift.muscle.toUpperCase()}
                          </span>
                        )}
                      </div>
                      <span style={{fontSize:11, color:"var(--border-accent)"}}>{lift.sets}×{lift.reps}</span>
                    </div>
                    <div style={{
                      fontSize:14, fontWeight:700, color: lift.weight ? "var(--accent)" : "var(--text-dim)",
                      minWidth:60, textAlign:"right",
                    }}>
                      {lift.weight ? `${lift.weight} lbs` : "—"}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── RESET CONFIRM DIALOGS ────────────────────────────────────────────────────
function ResetDialog({ onConfirmed, onCancel }) {
  const [step, setStep] = useState(1); // 1 = "are you sure", 2 = "confirm/cancel"
  return (
    <div style={{
      position:"fixed", inset:0, zIndex:300,
      background:"rgba(0,0,0,0.85)", backdropFilter:"blur(6px)",
      display:"flex", alignItems:"center", justifyContent:"center", padding:24,
    }}>
      <div style={{
        background:"var(--bg-card)", border:"1px solid var(--danger)",
        borderRadius:20, padding:"30px 24px", maxWidth:340, width:"100%",
        boxShadow:"0 24px 60px rgba(var(--accent-rgb),0.15)",
        animation:"dialogIn 0.2s cubic-bezier(0.34,1.56,0.64,1)",
        textAlign:"center",
      }}>
        {step === 1 ? <>
          <div style={{fontSize:11, fontWeight:800, letterSpacing:"0.06em", color:"var(--danger)", marginBottom:14}}>WARNING</div>
          <div style={{fontSize:17, fontWeight:700, color:"var(--danger)", marginBottom:8}}>
            RESET ENTIRE MESO?
          </div>
          <div style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.7, marginBottom:28}}>
            This will permanently erase all logged weights, reps, session completions, and notes across all 7 weeks. This cannot be undone.
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
            <button onClick={onCancel} className="btn-ghost" style={{
              padding:"16px", borderRadius:12, cursor:"pointer",
              background:"transparent", border:"1px solid var(--border)",
              color:"var(--text-secondary)", fontSize:14, fontWeight:600,
            }}>No</button>
            <button onClick={()=>setStep(2)} className="btn-danger" style={{
              padding:"16px", borderRadius:12, cursor:"pointer",
              background:"var(--danger-bg)", border:"1px solid var(--danger)",
              color:"var(--danger)", fontSize:14, fontWeight:600,
            }}>Yes</button>
          </div>
        </> : <>
          <div style={{fontSize:11, fontWeight:800, letterSpacing:"0.06em", color:"var(--danger)", marginBottom:14}}>FINAL CONFIRM</div>
          <div style={{fontSize:17, fontWeight:700, color:"var(--danger)", marginBottom:8}}>
            Last chance
          </div>
          <div style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.7, marginBottom:28}}>
            Are you absolutely sure? All data will be permanently wiped and you'll start back at Week 1.
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
            <button onClick={onCancel} className="btn-ghost" style={{
              padding:"16px", borderRadius:12, cursor:"pointer",
              background:"transparent", border:"1px solid var(--border)",
              color:"var(--text-secondary)", fontSize:14, fontWeight:600,
            }}>Cancel</button>
            <button onClick={onConfirmed} className="btn-danger" style={{
              padding:"16px", borderRadius:12, cursor:"pointer",
              background:"var(--danger-bg)", border:"1px solid var(--danger)",
              color:"var(--danger)", fontSize:14, fontWeight:600,
            }}>Confirm reset</button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ─── WEEK SECTION (nested days) ───────────────────────────────────────────────
function WeekSection({ weekIdx, currentWeek, onSelectDay, completedDays, isExpanded, onToggle, activeDays, workoutDays }) {
  const phase = WEEK_PHASE[weekIdx];
  const pc = PHASE_COLOR[phase];
  const rir = WEEK_RIR[weekIdx];
  const isCurrent = weekIdx === currentWeek;
  const weekDone = activeDays.filter((_, i) => completedDays.has(`${i}:${weekIdx}`)).length;

  return (
    <div style={{marginBottom:8}}>
      <button onClick={onToggle} className="btn-card" style={{
        width:"100%", textAlign:"left",
        background: isCurrent ? pc+"18" : "var(--bg-surface)",
        border:`1px solid ${isCurrent ? pc : "var(--border)"}`,
        borderRadius: isExpanded ? "12px 12px 0 0" : 12,
        padding:"16px", cursor:"pointer",
        display:"flex", alignItems:"center", gap:12,
        boxShadow: isCurrent ? `0 2px 12px ${pc}22` : "var(--shadow-xs)",
      }}>
        <div style={{
          width:46, height:46, borderRadius:10, flexShrink:0,
          background: pc+"22", display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center",
        }}>
          <span style={{fontSize:15, fontWeight:700, color:pc}}>W{weekIdx+1}</span>
        </div>
        <div style={{flex:1, minWidth:0}}>
          <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
            <span style={{fontSize:15, fontWeight:700, color:"var(--text-primary)"}}>{phase}</span>
            {isCurrent && (
              <span style={{fontSize:10, background:pc+"33", color:pc, padding:"2px 8px", borderRadius:99, fontWeight:700}}>CURRENT</span>
            )}
          </div>
          <div style={{fontSize:12, color:"var(--text-secondary)", marginTop:2}}>{rir} · {weekDone}/{MESO.days} sessions done</div>
        </div>
        <span style={{
          color:"var(--text-dim)", fontSize:22, flexShrink:0,
          transform: isExpanded ? "rotate(90deg)" : "none", transition:"transform 0.2s",
        }}>›</span>
      </button>

      {isExpanded && (
        <div style={{paddingLeft:16, animation:"fadeSlideDown 0.2s ease-out"}}>
        <div style={{
          border:`1px solid ${isCurrent ? pc : "var(--border)"}`,
          borderTop:"none", borderRadius:"0 0 12px 12px", overflow:"hidden",
        }}>
          {activeDays.map((day, i) => {
            const done = completedDays.has(`${i}:${weekIdx}`);
            const accent = TAG_ACCENT[day.tag];
            const dayColor = DAY_COLORS[i] || accent;
            return (
              <button key={i} onClick={()=>onSelectDay(i, weekIdx)} className="btn-row" style={{
                width:"100%", textAlign:"left",
                background: done ? accent+"0d" : "var(--bg-card)",
                border:"none",
                borderBottom: i < activeDays.length-1 ? "1px solid var(--border)" : "none",
                padding:"16px", cursor:"pointer",
                display:"flex", alignItems:"center", gap:12,

// ─── MUSCLE SETS BREAKDOWN ───────────────────────────────────────────────────
// Maps session tag (PUSH/PULL/LEGS/UPPER/LOWER/FULL) to display category
function sessionTagToCategory(sessionTag, exTag) {
  // For UPPER/LOWER/FULL sessions, use the exercise's original PUSH/PULL/LEGS tag
  if (sessionTag === "UPPER" || sessionTag === "LOWER" || sessionTag === "FULL") return exTag;
  return sessionTag;
}

function calcMuscleSetsByTag(activeDays, completedDays, weekFilter) {
  const byTag = { PUSH:{}, PULL:{}, LEGS:{} };
  activeDays.forEach((day, dayIdx) => {
    for (let w = 0; w <= MESO.weeks; w++) {
      if (weekFilter !== null && w !== weekFilter) continue;
      if (!completedDays.has(`${dayIdx}:${w}`)) continue;
      const wd = loadDayWeek(dayIdx, w);
      day.exercises.forEach((ex, exIdx) => {
        const exData = wd[exIdx] || {};
        const filledSets = Object.values(exData).filter(s => s && s.reps && s.reps !== "").length;
        if (filledSets === 0) return;
        const cat = sessionTagToCategory(day.tag, ex.tag);
        if (!byTag[cat]) byTag[cat] = {};
        const muscles = ex.muscles || (ex.muscle ? [ex.muscle] : []);
        muscles.forEach(m => {
          byTag[cat][m] = (byTag[cat][m] || 0) + filledSets;
        });
      });
    }
  });
  return byTag;
}

// ─── PR CARD ──────────────────────────────────────────────────────────────────
function PRCard({ activeDays }) {
  const [open, setOpen] = useState(false);

  // For each exercise across all days, find the HIGHEST weight logged across all sets & all weeks
  const prData = activeDays.map((day, dayIdx) => {
    const lifts = day.exercises.map((ex, exIdx) => {
      let best = 0;
      for (let w = 0; w <= MESO.weeks; w++) {
        const wd = loadDayWeek(dayIdx, w);
        const exData = wd[exIdx] || {};
        Object.values(exData).forEach(sv => {
          if (sv && sv.weight && sv.weight !== "") {
            const n = parseFloat(sv.weight);
            if (!isNaN(n) && n > best) best = n;
          }
        });
      }
      return { name: ex.name, muscle: ex.muscle, anchor: ex.anchor, best };
    });
    return { tag: day.tag, label: day.label, dayNum: day.dayNum, lifts };
  });

  const anyLogged = prData.some(d => d.lifts.some(l => l.best > 0));

  return (
    <div style={{
      background:"var(--bg-card)", border:"1px solid var(--border)",
      borderRadius:14, overflow:"hidden",
    }}>
      <button onClick={() => setOpen(o => !o)} style={{
        width:"100%", background:"transparent", border:"none",
        padding:"16px", cursor:"pointer", textAlign:"left",
        display:"flex", alignItems:"center", gap:12,

        <div style={{
          width:38, height:38, borderRadius:9, flexShrink:0,
          background:"rgba(var(--accent-rgb),0.09)", display:"flex", alignItems:"center", justifyContent:"center",
        }}>
          <span style={{fontSize:10, fontWeight:800, letterSpacing:"0.04em", color:"var(--accent)"}}>PR</span>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:13, fontWeight:700, letterSpacing:"0.04em", color:"var(--text-primary)"}}>Current PRs</div>
          <div style={{fontSize:11, color:"var(--text-muted)", marginTop:2}}>
            {anyLogged ? "Highest weight logged per exercise" : "No weights logged yet"}
          </div>
        </div>
        <span style={{
          color:"var(--text-dim)", fontSize:18, transition:"transform 0.2s",
          display:"inline-block", transform: open ? "rotate(90deg)" : "none",
        }}>›</span>
      </button>

      {open && (
        <div style={{borderTop:"1px solid #111827"}}>
          {prData.map((day, di) => {
            const accent = TAG_ACCENT[day.tag];
            return (
              <div key={di}>
                {/* Day header */}
                <div style={{
                  padding:"8px 16px", background:"var(--bg-deep)",
                  display:"flex", alignItems:"center", gap:8,
                  borderBottom:"1px solid var(--bg-surface)",
                }}>
                  <span style={{
                    background:accent+"22", color:accent,
                    fontSize:9, fontWeight:700, padding:"2px 7px", borderRadius:5, letterSpacing:"0.04em",
                  }}>{day.tag}</span>
                  <span style={{fontSize:12, fontWeight:700, color:"var(--text-muted)", letterSpacing:"0.06em"}}>
                    DAY {day.dayNum} — {day.label.toUpperCase()}
                  </span>
                </div>
                {/* Exercises */}
                {day.lifts.map((lift, li) => (
                  <div key={li} style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"8px 16px",
                    borderBottom: (li < day.lifts.length - 1 || di < prData.length - 1) ? "1px solid #0a0f1e" : "none",
                    background: lift.anchor ? "var(--bg-surface)" : "transparent",
                  }}>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{
                        fontSize:12, color: lift.anchor ? "#c4b5fd" : "var(--text-secondary)",
                        fontWeight: lift.anchor ? 700 : 500,
                        whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                      }}>
                        {lift.anchor && <span style={{color:"#fbbf24", marginRight:4}}>⭐</span>}
                        {lift.name}
                      </div>
                      {lift.muscle && (
                        <div style={{fontSize:10, color:"var(--border-accent)", marginTop:1}}>{lift.muscle.toUpperCase()}</div>
                      )}

                    <div style={{
                      fontSize:13, fontWeight:700,
                      color: lift.best > 0 ? "var(--accent)" : "var(--border-accent)",
                      minWidth:64, textAlign:"right", flexShrink:0,
                    }}>
                      {lift.best > 0 ? `${lift.best} lbs` : "—"}
                    </div>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
