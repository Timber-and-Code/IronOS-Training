<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── STORAGE (localStorage) ───────────────────────────────────────────────────
const store = {
  get: (key) => { try { return localStorage.getItem(key); } catch { return null; } },
  set: (key, val) => { try { localStorage.setItem(key, val); } catch {} },
};

function loadDayWeek(dayIdx, weekIdx) {
  const raw = store.get(`ppl:day${dayIdx}:week${weekIdx}`);
  return raw ? JSON.parse(raw) : {};
}

// Load current week data, falling back to previous week's weights if this week is blank
function loadDayWeekWithCarryover(dayIdx, weekIdx, day) {
  const current = loadDayWeek(dayIdx, weekIdx);
  // If any set in any exercise already has data, use as-is
  const hasData = Object.values(current).some(exData =>
    Object.values(exData).some(s => s && (s.weight || s.reps))
  );
  if (hasData || weekIdx === 0) return current;

  // Nothing logged yet this week — carry forward weights from the most recent prior week
  for (let w = weekIdx - 1; w >= 0; w--) {
    const prev = loadDayWeek(dayIdx, w);
    const prevHasWeights = Object.values(prev).some(exData =>
      Object.values(exData).some(s => s && s.weight)
    );
    if (!prevHasWeights) continue;

    // Copy weights only (not reps) into a fresh data object
    const carried = {};
    day.exercises.forEach((ex, exIdx) => {
      const prevEx = prev[exIdx] || {};
      carried[exIdx] = {};
      for (let s = 0; s < ex.sets; s++) {
        const prevSet = prevEx[s] || {};
        carried[exIdx][s] = { weight: prevSet.weight || "", reps: "" };
      }
    });
    return carried;
  }
  return current;
}
function saveDayWeek(dayIdx, weekIdx, data) {
  store.set(`ppl:day${dayIdx}:week${weekIdx}`, JSON.stringify(data));
}
function loadNotes(dayIdx, weekIdx) {
  return store.get(`ppl:notes:d${dayIdx}:w${weekIdx}`) || "";
}
function saveNotes(dayIdx, weekIdx, text) {
  store.set(`ppl:notes:d${dayIdx}:w${weekIdx}`, text);
}

// Load historical sets for a specific exercise slot (dayIdx + exIdx) across all weeks
function loadExerciseHistory(dayIdx, exIdx) {
  const weeks = MESO ? MESO.weeks : 6;
  const rows = [];
  for (let w = 0; w <= weeks; w++) {
    const raw = store.get(`ppl:day${dayIdx}:week${w}`);
    if (!raw) continue;
    const dayData = JSON.parse(raw);
    const exData = dayData[exIdx];
    if (!exData) continue;
    const sets = Object.entries(exData)
      .map(([si, s]) => ({ setNum: parseInt(si)+1, weight: s?.weight || "", reps: s?.reps || "" }))
      .filter(s => s.weight || s.reps);
    if (sets.length > 0) rows.push({ week: w, sets });
  }
  return rows;
}
function loadCurrentWeek() {
  const v = store.get("ppl:currentWeek");
  return v !== null ? parseInt(v) : 0;
}
function saveCurrentWeek(w) { store.set("ppl:currentWeek", String(w)); }
function loadCompleted() {
  const done = new Set();
  for (let d = 0; d < MESO.days; d++)
    for (let w = 0; w < (MESO ? MESO.weeks : 6); w++)
      if (store.get(`ppl:done:d${d}:w${w}`) === "1") done.add(`${d}:${w}`);
  return done;
}
function markComplete(dayIdx, weekIdx) {
  store.set(`ppl:done:d${dayIdx}:w${weekIdx}`, "1");
}
function loadProfile() {
  const raw = store.get("ppl:profile");
  return raw ? JSON.parse(raw) : null;
}
function saveProfile(profile) {
  store.set("ppl:profile", JSON.stringify(profile));
}
function resetMeso() {
  const weeks = MESO ? MESO.weeks : 6;
  const days = MESO ? MESO.days : 6;
  for (let d = 0; d < days; d++)
    for (let w = 0; w <= weeks; w++) {
      try { localStorage.removeItem(`ppl:day${d}:week${w}`); } catch {}
      try { localStorage.removeItem(`ppl:notes:d${d}:w${w}`); } catch {}
      try { localStorage.removeItem(`ppl:done:d${d}:w${w}`); } catch {}
    }
  saveCurrentWeek(0);
}

// ─── MESO ARCHIVE ─────────────────────────────────────────────────────────────
// Snapshots the current cycle before wipe. Stored as ppl:archive (array, max 10).
function archiveCurrentMeso(profile) {
  if (!MESO || !profile) return;
  const weeks = MESO.weeks;
  const days  = MESO.days;

  // Collect all session data
  const sessions = [];
  let completedCount = 0;
  for (let d = 0; d < days; d++) {
    for (let w = 0; w <= weeks; w++) {
      const raw  = store.get(`ppl:day${d}:week${w}`);
      const done = store.get(`ppl:done:d${d}:w${w}`) === "1";
      if (done) completedCount++;
      if (!raw) continue;
      const data = JSON.parse(raw);
      // Collect exercise overrides for this day
      const exOvs = {};
      for (let ex = 0; ex < 8; ex++) {
        const ov = store.get(`ppl:exov:d${d}:w${w}:ex${ex}`) || store.get(`ppl:exov:d${d}:ex${ex}`);
        if (ov) exOvs[ex] = ov;
      }
      sessions.push({ d, w, data, exOvs, done });
    }
  }

  const record = {
    id: Date.now(),
    archivedAt: new Date().toISOString(),
    profile: { ...profile },
    mesoWeeks: weeks,
    mesoDays: days,
    totalSessions: weeks * days,
    completedSessions: completedCount,
    sessions,
  };

  // Load existing archive, prepend, cap at 10
  let archive = [];
  try { archive = JSON.parse(store.get("ppl:archive") || "[]"); } catch {}
  archive.unshift(record);
  if (archive.length > 10) archive = archive.slice(0, 10);
  store.set("ppl:archive", JSON.stringify(archive));
}

function loadArchive() {
  try { return JSON.parse(store.get("ppl:archive") || "[]"); } catch { return []; }
}

function deleteArchiveEntry(id) {
  const archive = loadArchive().filter(r => r.id !== id);
  store.set("ppl:archive", JSON.stringify(archive));
}

// ─── EXERCISE OVERRIDES ───────────────────────────────────────────────────────
// "this week only" override: ppl:exov:d{dayIdx}:w{weekIdx}:ex{exIdx} = exerciseId
// "entire meso" override:    ppl:exov:d{dayIdx}:ex{exIdx}             = exerciseId
function loadExOverride(dayIdx, weekIdx, exIdx) {
  return store.get(`ppl:exov:d${dayIdx}:w${weekIdx}:ex${exIdx}`)
    || store.get(`ppl:exov:d${dayIdx}:ex${exIdx}`)
    || null;
}
function saveExOverride(dayIdx, weekIdx, exIdx, exId, scope) {
  if (scope === "week") {
    store.set(`ppl:exov:d${dayIdx}:w${weekIdx}:ex${exIdx}`, exId);
  } else {
    store.set(`ppl:exov:d${dayIdx}:ex${exIdx}`, exId);
    // Clear any week-specific overrides so meso override takes effect
    for (let w = 0; w <= (MESO ? MESO.weeks : 6); w++)
      try { localStorage.removeItem(`ppl:exov:d${dayIdx}:w${w}:ex${exIdx}`); } catch {}
  }
}

        [4,"2-3 RIR","Intensification","Transition. +5 lbs anchors. Technique stays tight."],
        [5,"2 RIR","Intensification","+5 lbs across. Push accessories toward failure."],
        [6,"2 RIR","Intensification","Hold or +2.5 lbs. Fatigue management block."],
        [7,"1-2 RIR","Intensification","Final intensification push. High load, controlled failure."],
        [8,"1 RIR","Peak","One rep from failure. PR setup begins."],
        [9,"0-1 RIR","Peak","Near-limit. Lock in the numbers."],
        [10,"0-1 RIR","Peak","Set your stage. Final prep."],
        [11,"0 RIR","Peak","Max effort. PR attempts on all anchors."],
        [null,"N/A","DELOAD","50-60% of peak weight. 2 sets only. Zero failure. Recover."],
      ],
    },
  };
  const cfg = configs[mesoLen] || configs[6];
  // Build progressive overload targets scaled to meso length
  const pw = Array.from({length:mesoLen}, (_,i) => {
    if (i === 0) return "Establish";
    if (i === mesoLen-1) return "PR attempt";
    if (i < Math.ceil(mesoLen*0.4)) return "+ 2.5 lbs";
    return "+5 lbs";
  });
  const pr = Array.from({length:mesoLen}, (_,i) => {
    if (i === 0) return "Establish";
    if (i === mesoLen-1) return "Max reps / PR";
    if (i === Math.floor(mesoLen/2)) return "↑ weight";
    return "+1-2 reps";
  });
  return {
    weeks: mesoLen,
    days: daysPerWeek || 6,
    splitType: splitType || "ppl",
    phases: [...cfg.phases, "Deload"],
    rirs:   [...cfg.rirs,   "N/A — DELOAD"],
    mesoRows: cfg.mesoRows,
    progTargets: { weight: pw, reps: pr },
  };
}

// ─── BACKUP / RESTORE ─────────────────────────────────────────────────────────
// Silently snapshot all ppl: keys into a rolling backup stored in localStorage.
// Keeps the last 3 snapshots. No download, no prompt — fully automatic.
function snapshotData() {
  try {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith("ppl:") && !key.startsWith("ppl:backup:")) {
        data[key] = localStorage.getItem(key);
      }
    }
    const snap = JSON.stringify({ version:1, snappedAt: new Date().toISOString(), data });
    // Rotate: shift backup:1 → backup:2, backup:0 → backup:1, write new → backup:0
    const b2 = localStorage.getItem("ppl:backup:1");
    if (b2) localStorage.setItem("ppl:backup:2", b2);
    const b1 = localStorage.getItem("ppl:backup:0");
    if (b1) localStorage.setItem("ppl:backup:1", b1);
    localStorage.setItem("ppl:backup:0", snap);
  } catch(e) { /* silent */ }
}

// Download the most recent snapshot as a .json file (user-initiated only)
function exportData() {
  try {
    const raw = localStorage.getItem("ppl:backup:0");
    const payload = raw || JSON.stringify({ version:1, snappedAt: new Date().toISOString(), data: (() => {
      const d = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith("ppl:") && !k.startsWith("ppl:backup:")) d[k] = localStorage.getItem(k);
      }
      return d;
    })() });
    const blob = new Blob([payload], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ppl-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
  } catch(e) { alert("Export failed."); }
}

function importData(file, onDone) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      const data = parsed.data || parsed; // support both formats
      Object.entries(data).forEach(([k,v]) => {
        if (k.startsWith("ppl:")) localStorage.setItem(k, v);
      });
      onDone(true);
    } catch {
      onDone(false);
    }
  };
  reader.readAsText(file);
}

// 2:1 ratio — gender-specific quotes appear twice as often as neutral ones
function randomQuote(gender) {
  let pool;
  if (gender === 'f') {
    // 2 parts female-specific + 1 part neutral
    pool = [...QUOTES_FEMALE, ...QUOTES_FEMALE, ...QUOTES];
  } else if (gender === 'm') {
    // 2 parts male-specific + 1 part neutral
    pool = [...QUOTES_MALE, ...QUOTES_MALE, ...QUOTES];
  } else {
    // other/unset — full neutral pool
    pool = QUOTES;
  }
  return pool[Math.floor(Math.random() * pool.length)];
}

  {day:"TUE",dayIdx:1,cardio:null},
  {day:"WED",dayIdx:2,cardio:null},
  {day:"THU",dayIdx:3,cardio:null},
  {day:"FRI",dayIdx:4,cardio:"4x4 #2 PM"},
  {day:"SAT",dayIdx:5,cardio:null},

// ─── PROGRAM GENERATOR ────────────────────────────────────────────────────────
function generateProgram(profile) {
  // AI-built or custom days take priority
  if (profile?.aiDays && profile.aiDays.length > 0) return profile.aiDays;

  const equipment  = profile?.equipment    || ["barbell", "dumbbell", "cable", "machine", "bodyweight", "band"];
  const duration   = profile?.sessionDuration || 60;
  const splitType  = profile?.splitType    || "ppl";
  const numDays    = profile?.workoutDays?.length || profile?.daysPerWeek || 6;
  const dayMuscleConfig = profile?.dayMuscleConfig || {};
  const shortWarmup = duration <= 30;
  const exCount    = duration <= 30 ? 3 : duration <= 45 ? 4 : duration <= 60 ? 5 : duration <= 75 ? 6 : 7;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const experience = profile?.experience || "intermediate";
  const maxDiff = experience === "beginner" ? 1 : experience === "intermediate" ? 2 : 3;

  const available = EXERCISE_DB.filter(e => equipment.includes(e.equipment) && e.diff <= maxDiff);

  function toEx(e, isAnchor) {
    const wu = isAnchor
      ? (shortWarmup ? "2 ramp sets — time is tight, be thorough" : e.warmup)
      : (e.fatigue === "low" ? "—" : "1 feeler set");
    return {
      id: e.id, name: e.name, muscle: e.muscle, muscles: e.muscles,
      equipment: e.equipment, tag: e.tag, anchor: !!isAnchor,
      sets: e.sets, reps: e.reps, rest: e.rest, warmup: wu,
      progression: e.pattern === "isolation" ? "reps" : "weight",
    };
  }

  // Generic day builder — pool filtered externally by caller
  function buildDay(pool, anchorPriority, musclePriority, usedAnchorIds) {
    const compoundPatterns = ["push", "pull", "squat", "hinge"];
    const anchorEligible = pool.filter(e => e.anchor);
    const anchorCandidates = anchorEligible.length > 0
      ? anchorEligible
      : shuffle(pool).sort((a, b) =>
          (compoundPatterns.includes(a.pattern) ? 0 : 1) -
          (compoundPatterns.includes(b.pattern) ? 0 : 1));

    const anchorPool = shuffle(anchorCandidates.filter(e => !usedAnchorIds.has(e.id)));
    const anchor = anchorPool.find(e => anchorPriority.includes(e.pattern))
                || anchorPool[0]
                || shuffle(anchorCandidates)[0];

    const usedIds = new Set([anchor?.id]);
    const usedMuscles = new Set(anchor?.muscles || []);
    const accessories = [];

    for (const muscleTarget of musclePriority) {
      if (accessories.length >= exCount - 1) break;
      const cands = shuffle(pool.filter(e =>
        !e.anchor && !usedIds.has(e.id) &&
        e.muscles.some(m => m === muscleTarget || m.includes(muscleTarget))
      ));
      if (cands[0]) {
        accessories.push(cands[0]);
        usedIds.add(cands[0].id);
        cands[0].muscles.forEach(m => usedMuscles.add(m));
      }
    }

    // Fill remaining slots
    for (const filler of shuffle(pool.filter(e => !usedIds.has(e.id) && !e.anchor))) {
      if (accessories.length >= exCount - 1) break;
      accessories.push(filler);
      usedIds.add(filler.id);
    }
    for (const filler of shuffle(pool.filter(e => !usedIds.has(e.id)))) {
      if (accessories.length >= exCount - 1) break;
      accessories.push(filler);
      usedIds.add(filler.id);
    }
    return { anchor, accessories };
  }

  function makeDay(num, label, tag, muscles, note, anchor, accessories) {
    const exercises = anchor
      ? [toEx(anchor, true), ...accessories.map(a => toEx(a, false))]
      : accessories.map(a => toEx(a, false));
    return { dayNum:num, label, tag, muscles, note, cardio:null, exercises };
  }

  const anchorNotes = {
    push:  { push:"Anchor is your main press — controlled negative, explode up.", hinge:"Hip-hinge focus today — load the stretch, finish tall.", squat:"Drive through the floor, stay tight.", isolation:"Squeeze at the top, slow the negative." },
    pull:  { pull:"Retract the scapula, drive elbows to hips.", hinge:"Push the floor away, keep the bar close.", squat:"Brace your core, drive your knees out.", isolation:"Full stretch at the bottom, squeeze at the top." },
    legs:  { squat:"Brace hard, drive knees out, full depth.", hinge:"Load the hamstrings, keep the spine neutral.", push:"Full depth, controlled descent.", isolation:"Slow the negative, squeeze the contraction." },
    upper: { push:"Main press anchors today — chest and shoulders.", pull:"Primary pull — back thickness and width.", hinge:"Hinge anchor — load the posterior chain.", squat:"Compound anchor — brace and drive.", isolation:"Isolation anchor — squeeze the contraction." },
    lower: { squat:"Squat anchor — brace hard, full depth.", hinge:"Hinge anchor — hamstrings and glutes loaded.", push:"Leg press anchor — full range, control the descent.", isolation:"Isolation anchor — squeeze at peak contraction." },
    full:  { push:"Main press for the day — control the negative.", pull:"Primary pull — retract, drive, squeeze.", squat:"Squat anchor — full depth, knees out.", hinge:"Hinge anchor — load the stretch, neutral spine.", isolation:"Isolation anchor — feel every rep." },
  };

  function dayNote(side, ex) {
    if (!ex) return "Train hard and stay focused.";
    return anchorNotes[side]?.[ex.pattern] || `${ex.name} anchors today — give it everything.`;
  }

  // Helper to extract muscle priorities from dayMuscleConfig
  function dayMusclePriority(dayIdx, defaultPrimary) {
    const dm = dayMuscleConfig[dayIdx];
    if (!dm || (dm.primary.length === 0 && dm.accessory.length === 0)) return defaultPrimary;
    return [...dm.primary, ...dm.accessory];
  }

  // ── PPL SPLITS ──────────────────────────────────────────────────────────────
  if (splitType === "ppl" || !splitType) {
    const pushPool = available.filter(e => e.tag === "PUSH");
    const pullPool = available.filter(e => e.tag === "PULL");
    const legsPool = available.filter(e => e.tag === "LEGS");

    const usedPA = new Set(), usedRA = new Set(), usedLA = new Set();
    const p1 = buildDay(pushPool, ["push"], dayMusclePriority(0,["Chest", "Shoulders", "Triceps"]), usedPA);
    if (p1.anchor) usedPA.add(p1.anchor.id);
    const r1 = buildDay(pullPool, ["pull"], dayMusclePriority(1,["Lats", "Back", "Shoulders", "Biceps", "Upper Traps"]), usedRA);
    if (r1.anchor) usedRA.add(r1.anchor.id);
    const l1 = buildDay(legsPool, ["squat"], dayMusclePriority(2,["Hamstrings", "Quads", "Glutes", "Gastrocnemius"]), usedLA);
    if (l1.anchor) usedLA.add(l1.anchor.id);

    if (numDays <= 3) {
      return [
        makeDay(1,"Push Day","PUSH","Chest · Shoulders · Triceps",dayNote("push",p1.anchor),p1.anchor,p1.accessories),
        makeDay(2,"Pull Day","PULL","Back · Biceps · Rear Delts",dayNote("pull",r1.anchor),r1.anchor,r1.accessories),
        makeDay(3,"Legs Day","LEGS","Quads · Hamstrings · Glutes · Calves",dayNote("legs",l1.anchor),l1.anchor,l1.accessories),
      ];
    }

    const p2 = buildDay(pushPool, ["push"], ["Chest", "Shoulders", "Triceps"], usedPA);
    const r2 = buildDay(pullPool, ["pull"], ["Lats", "Back", "Shoulders", "Biceps", "Teres Major"], usedRA);
    const l2 = buildDay(legsPool, ["hinge"], ["Quads", "Glutes", "Hamstrings", "Soleus"], usedLA);

    if (numDays === 5) {
      return [
        makeDay(1,"Push Day 1","PUSH","Chest · Shoulders · Triceps",dayNote("push",p1.anchor),p1.anchor,p1.accessories),
        makeDay(2,"Pull Day 1","PULL","Back · Biceps · Rear Delts",dayNote("pull",r1.anchor),r1.anchor,r1.accessories),
        makeDay(3,"Legs Day","LEGS","Quads · Hamstrings · Glutes · Calves",dayNote("legs",l1.anchor),l1.anchor,l1.accessories),
        makeDay(4,"Push Day 2","PUSH","Chest · Shoulders · Triceps (Variation)",dayNote("push",p2.anchor),p2.anchor,p2.accessories),
        makeDay(5,"Pull Day 2","PULL","Back · Biceps · Rear Delts (Variation)",dayNote("pull",r2.anchor),r2.anchor,r2.accessories),
      ];
    }

    // 6-day PPL ×2
    return [
      makeDay(1,"Push Day 1","PUSH","Chest · Shoulders · Triceps",dayNote("push",p1.anchor),p1.anchor,p1.accessories),
      makeDay(2,"Pull Day 1","PULL","Back · Biceps · Rear Delts",dayNote("pull",r1.anchor),r1.anchor,r1.accessories),
      makeDay(3,"Legs Day 1","LEGS","Quads · Hamstrings · Glutes · Calves",dayNote("legs",l1.anchor),l1.anchor,l1.accessories),
      makeDay(4,"Push Day 2","PUSH","Chest · Shoulders · Triceps (Variation)",dayNote("push",p2.anchor),p2.anchor,p2.accessories),
      makeDay(5,"Pull Day 2","PULL","Back · Biceps · Rear Delts (Variation)",dayNote("pull",r2.anchor),r2.anchor,r2.accessories),
      makeDay(6,"Legs Day 2","LEGS","Hamstrings · Glutes · Quads (Variation)",dayNote("legs",l2.anchor),l2.anchor,l2.accessories),
    ];
  }

  // ── UPPER / LOWER SPLITS ─────────────────────────────────────────────────────
  if (splitType === "upper_lower") {
    const upperPool = available.filter(e => e.tag === "PUSH" || e.tag === "PULL");
    const lowerPool = available.filter(e => e.tag === "LEGS");
    const pushPool  = available.filter(e => e.tag === "PUSH");
    const pullPool  = available.filter(e => e.tag === "PULL");

    const usedUA = new Set(), usedLA = new Set();
    // Upper A: horizontal push + vertical pull emphasis
    const uaPool = shuffle([
      ...pushPool.filter(e => e.pattern === "push"),
      ...pullPool.filter(e => e.pattern === "pull"),
      ...upperPool.filter(e => e.pattern === "isolation"),
    ]);
    const u1anchor = uaPool.find(e => e.anchor && e.tag === "PUSH") || uaPool.find(e => e.anchor);
    const u1 = buildDay(upperPool, ["push"], ["Chest", "Lats", "Shoulders", "Biceps", "Triceps"], usedUA);
    if (u1.anchor) usedUA.add(u1.anchor.id);

    const l1 = buildDay(lowerPool, ["squat"], ["Hamstrings", "Quads", "Glutes", "Gastrocnemius"], usedLA);
    if (l1.anchor) usedLA.add(l1.anchor.id);

    if (numDays <= 2) {
      return [
        makeDay(1,"Upper Body","UPPER","Chest · Back · Shoulders · Arms",dayNote("upper",u1.anchor),u1.anchor,u1.accessories),
        makeDay(2,"Lower Body","LOWER","Quads · Hamstrings · Glutes · Calves",dayNote("lower",l1.anchor),l1.anchor,l1.accessories),
      ];
    }

    // Upper B: vertical push + horizontal pull emphasis
    const u2 = buildDay(upperPool, ["push"], ["Chest", "Back", "Shoulders", "Biceps", "Long Head Tri"], usedUA);
    if (u2.anchor) usedUA.add(u2.anchor.id);

    const l2 = buildDay(lowerPool, ["hinge"], ["Quads", "Glutes", "Hamstrings", "Soleus"], usedLA);

    // 4-day U/L/U/L
    return [
      makeDay(1,"Upper A","UPPER","Chest · Back · Shoulders · Arms",dayNote("upper",u1.anchor),u1.anchor,u1.accessories),
      makeDay(2,"Lower A","LOWER","Quads · Hamstrings · Glutes · Calves",dayNote("lower",l1.anchor),l1.anchor,l1.accessories),
      makeDay(3,"Upper B","UPPER","Shoulders · Back · Arms (Variation)",dayNote("upper",u2.anchor),u2.anchor,u2.accessories),
      makeDay(4,"Lower B","LOWER","Hamstrings · Glutes · Quads (Variation)",dayNote("lower",l2.anchor),l2.anchor,l2.accessories),
    ];
  }

  // ── FULL BODY SPLITS ─────────────────────────────────────────────────────────
  if (splitType === "full_body") {
    const pushPool = available.filter(e => e.tag === "PUSH");
    const pullPool = available.filter(e => e.tag === "PULL");
    const legsPool = available.filter(e => e.tag === "LEGS");

    const usedPA = new Set(), usedRA = new Set(), usedLA = new Set();

    // Full body day: 1 push compound, 1 pull compound, 1 legs compound, + accessories
    function buildFullBodyDay(pushPriority, pullPriority, legsPriority, dayNum) {
      const pDay = buildDay(pushPool, pushPriority, ["Chest", "Shoulders", "Triceps"], usedPA);
      if (pDay.anchor) usedPA.add(pDay.anchor.id);
      const rDay = buildDay(pullPool, pullPriority, ["Lats", "Back", "Biceps", "Shoulders"], usedRA);
      if (rDay.anchor) usedRA.add(rDay.anchor.id);
      const lDay = buildDay(legsPool, legsPriority, ["Quads", "Hamstrings", "Glutes", "Gastrocnemius"], usedLA);
      if (lDay.anchor) usedLA.add(lDay.anchor.id);

      // Interleave: push anchor, pull anchor, legs anchor, then accessories
      const pushEx  = pDay.anchor ? [toEx(pDay.anchor, true)] : [];
      const pullEx  = rDay.anchor ? [toEx(rDay.anchor, true)] : [];
      const legsEx  = lDay.anchor ? [toEx(lDay.anchor, true)] : [];

      // Accessories: round-robin from each pool
      const allAccessories = [];
      const pAcc = pDay.accessories.slice(0, Math.ceil((exCount - 3) / 3));
      const rAcc = rDay.accessories.slice(0, Math.ceil((exCount - 3) / 3));
      const lAcc = lDay.accessories.slice(0, Math.ceil((exCount - 3) / 3));
      const maxAcc = exCount - 3;
      for (let i = 0; i < maxAcc; i++) {
        const pool = [pAcc, rAcc, lAcc];
        const src = pool[i % 3];
        const ex = src.shift();
        if (ex) allAccessories.push(toEx(ex, false));
      }

      const exercises = [...pushEx, ...pullEx, ...legsEx, ...allAccessories];
      return {
        dayNum,
        label: `Full Body ${dayNum === 1 ? "A" : dayNum === 2 ? "B" : "C"}`,
        tag: "FULL",
        muscles: "Full Body — Push · Pull · Legs",
        note: "Full body session — compound anchors for push, pull, and legs.",
        cardio: null,
        exercises,
      };
    }

    const fb1 = buildFullBodyDay(["push"], ["pull"], ["squat"], 1);
    if (numDays <= 2) {
      const fb2 = buildFullBodyDay(["push"], ["pull"], ["hinge"], 2);
      return [fb1, fb2];
    }
    // 3-day full body
    const fb2 = buildFullBodyDay(["push"], ["pull"], ["hinge"], 2);
    const fb3 = buildFullBodyDay(["push"], ["pull"], ["squat"], 3);
    return [fb1, fb2, fb3];
  }

  // ── PUSH / PULL 4-DAY (no dedicated leg day) ─────────────────────────────────
  if (splitType === "push_pull") {
    const pushPool = available.filter(e => e.tag === "PUSH");
    const pullPool = available.filter(e => e.tag === "PULL");
    const legsPool = available.filter(e => e.tag === "LEGS");
    // Include leg accessories on push/pull days
    const pushPlusLegs = available.filter(e => e.tag === "PUSH" || (e.tag === "LEGS" && e.pattern === "squat"));
    const pullPlusLegs = available.filter(e => e.tag === "PULL" || (e.tag === "LEGS" && e.pattern === "hinge"));

    const usedPA = new Set(), usedRA = new Set();
    const p1 = buildDay(pushPlusLegs, ["push"], ["Chest", "Shoulders", "Quads", "Triceps"], usedPA);
    if (p1.anchor) usedPA.add(p1.anchor.id);
    const r1 = buildDay(pullPlusLegs, ["pull"], ["Lats", "Back", "Hamstrings", "Biceps", "Shoulders"], usedRA);
    if (r1.anchor) usedRA.add(r1.anchor.id);
    const p2 = buildDay(pushPlusLegs, ["push"], ["Chest", "Shoulders", "Quads", "Long Head Tri"], usedPA);
    const r2 = buildDay(pullPlusLegs, ["pull"], ["Lats", "Back", "Hamstrings", "Glutes", "Biceps"], usedRA);

    return [
      makeDay(1,"Push A","PUSH","Chest · Shoulders · Triceps · Quads",dayNote("push",p1.anchor),p1.anchor,p1.accessories),
      makeDay(2,"Pull A","PULL","Back · Biceps · Rear Delts · Hamstrings",dayNote("pull",r1.anchor),r1.anchor,r1.accessories),
      makeDay(3,"Push B","PUSH","Shoulders · Chest · Triceps · Quads (Variation)",dayNote("push",p2.anchor),p2.anchor,p2.accessories),
      makeDay(4,"Pull B","PULL","Back · Biceps · Rear Delts · Hamstrings (Variation)",dayNote("pull",r2.anchor),r2.anchor,r2.accessories),
    ];
  }

  // Fallback — default to 3-day PPL
  return generateProgram({...profile, splitType:"ppl", daysPerWeek:3, workoutDays:[1,3,5]});
}

// ─── CALL IRON OAK AI ─────────────────────────────────────────────────────────
async function callIronOakAI({ split, daysPerWeek, mesoLength, experience, equipment, name, gender, apiKey }) {
  const splitLabels = { ppl:"Push/Pull/Legs", upper_lower:"Upper/Lower", full_body:"Full Body" };
  const expLabels = { beginner:"beginner (under 1 year)", intermediate:"intermediate (1-3 years)", experienced:"experienced (3+ years)" };

  const exerciseNames = EXERCISE_DB.map(e => `${e.id}|${e.name}|${e.tag}|${e.muscle}|${e.anchor?"anchor":"acc"}|sets:${e.sets}|reps:${e.reps}`).join("\n");

  const prompt = `You are an elite personal trainer with 40 years of experience designing mesocycle programs using progressive overload and linear periodization principles. You specialize in hypertrophy and strength development.

Design a complete ${mesoLength}-week mesocycle for a ${expLabels[experience] || experience} trainee named ${name || "the user"} using a ${splitLabels[split] || split} split, training ${daysPerWeek} days per week.

AVAILABLE EXERCISES (id|name|tag|muscle|type|sets|reps):
${exerciseNames}

REQUIREMENTS:
- Experience: ${experience}
- Beginner: simpler movements, diff:1 exercises, 3-4 exercises/day, 60min sessions
- Intermediate: compound-heavy, mix of diff 1-2, 4-5 exercises/day, 75min sessions  
- Experienced: advanced variations, diff 1-3, 5-6 exercises/day, 90min sessions
- Always start each day with 1 anchor (compound) lift
- Select exercises appropriate for equipment: ${equipment.join(", ")}
- Use progressive overload: first week establishes baseline, last week targets PRs
- Balance muscle groups appropriately across the week

Return ONLY valid JSON (no markdown, no explanation) with this exact structure:
{
  "days": [
    {
      "dayNum": 1,
      "label": "Push Day 1",
      "tag": "PUSH",
      "muscles": "Chest · Shoulders · Triceps",
      "note": "Training note for the day. What to focus on, cues.",
      "exercises": [
        {
          "id": "exercise_id_from_list",
          "name": "Exercise Name",
          "muscle": "Primary Muscle",
          "sets": 4,
          "reps": "4-6",
          "rest": "3-4 min",
          "anchor": true,
          "progression": "weight"
        }
      ]
    }
  ],
  "coachNote": "Overall philosophy note for this meso from the coach."
}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4096,
      messages: [{ role: "user", content: prompt }]
    })
  });

  if (!response.ok) throw new Error(`AI API error: ${response.status}`);
  const data = await response.json();
  const text = data.content?.find(b => b.type === "text")?.text || "";
  // Strip any markdown fences
  const clean = text.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  const parsed = JSON.parse(clean);
  // Hydrate exercises: match id to EXERCISE_DB for warmup etc., else use as-is
  const hydrated = parsed.days.map(day => ({
    ...day,
    cardio: null,
    exercises: day.exercises.map(ex => {
      const dbEx = EXERCISE_DB.find(e => e.id === ex.id);
      return {
        id: ex.id,
        name: ex.name || dbEx?.name || ex.id,
        muscle: ex.muscle || dbEx?.muscle || "",
        muscles: dbEx?.muscles || [ex.muscle || ""],
        equipment: dbEx?.equipment || equipment[0] || "barbell",
        tag: day.tag,
        anchor: !!ex.anchor,
        sets: ex.sets || dbEx?.sets || 3,
        reps: ex.reps || dbEx?.reps || "8-12",
        rest: ex.rest || dbEx?.rest || "2 min",
        warmup: ex.anchor ? "Full warm-up protocol" : "1 feeler set",
        progression: ex.progression || "weight",
      };
    }),
  }));
  return { days: hydrated, coachNote: parsed.coachNote || "" };
}

// ─── AUTO PROGRAM SELECTOR ────────────────────────────────────────────────────
// Given experience + priority + equipment, returns a complete profile-compatible
// form object ready to pass straight to onComplete.
function autoSelectProgram({ name, age, gender, weight, goal, theme, startDate, experience, priority, equipment }) {
  // ── Meso length ──────────────────────────────────────────────────────────────
  const mesoLength = experience === "new" ? 6 : experience === "intermediate" ? 8 : 10;

  // ── Days per week ─────────────────────────────────────────────────────────────
  const daysPerWeek = experience === "new" ? 3 : 6;

  // ── Split type ────────────────────────────────────────────────────────────────
  // Always PPL — it's the gold standard and maps cleanly across all day counts
  const splitType = "ppl";

  // ── Workout days ──────────────────────────────────────────────────────────────
  const workoutDays = daysPerWeek === 3 ? [1,3,5] : [1,2,3,4,5,6];

  // ── Session duration ──────────────────────────────────────────────────────────
  const sessionDuration = experience === "new" ? 60 : experience === "intermediate" ? 75 : 90;

  return {
    name, age, gender, weight, theme, startDate,
    // Merge the user's typed goal with the priority signal so it's visible in the profile
    goal: goal || (priority === "size" ? "Build maximum muscle mass this meso." : priority === "strength" ? "Drive strength PRs on all anchor lifts." : "Balanced size and strength development."),
    equipment,
    experience,
    priority,
    splitType,
    daysPerWeek,
    workoutDays,
    mesoLength,
    sessionDuration,
    autoBuilt: true, // flag so we can show "Built by Iron Oak" badge
  };
}

// ─── SETUP PAGE ───────────────────────────────────────────────────────────────
function SetupPage({ onComplete }) {
  const ALL_EQUIPMENT = ["barbell", "dumbbell", "cable", "machine", "bodyweight", "band"];
  const EQUIP_META = {
    barbell:    { label:"BARBELL",     icon:"BB" },
    dumbbell:   { label:"DUMBBELLS",   icon:"DB" },
    cable:      { label:"CABLE",       icon:"CA" },
    machine:    { label:"MACHINES",    icon:"MC" },
    bodyweight: { label:"BODYWEIGHT",  icon:"BW" },
    band:       { label:"BANDS",       icon:"BD" },
  };
  const SPLIT_CONFIG = {
    ppl:         { label:"Push · Pull · Legs", validDays:[3,5,6], defaultDays:{ 3:[1,3,5], 5:[1,2,3,5,6], 6:[1,2,3,4,5,6] }, desc:"Each muscle group hit 1–2×/week. The gold standard for hypertrophy and strength." },
    upper_lower: { label:"Upper / Lower",       validDays:[2,4],   defaultDays:{ 2:[1,4],   4:[1,2,4,5] },                     desc:"Upper body + lower body rotation. 2 sessions per muscle group. Great recovery balance." },
    full_body:   { label:"Full Body",            validDays:[2,3],   defaultDays:{ 2:[1,4],   3:[1,3,5] },                       desc:"Push, pull, and legs every session. High frequency, great for beginners and busy schedules." },
    push_pull:   { label:"Push / Pull",          validDays:[4],     defaultDays:{ 4:[1,2,4,5] },                               desc:"4-day push/pull with legs folded in. No dedicated leg day." },
  };
  // Which splits are compatible with a given day count
  const splitsForDays = (n) => Object.entries(SPLIT_CONFIG).filter(([,c]) => c.validDays.includes(n)).map(([k]) => k);
  const DAY_NAMES = ["Su", "M", "Tu", "W", "Th", "F", "Sa"];
  const todayStr  = new Date().toISOString().split('T')[0];

  const [step, setStep]       = useState(1);
  const [pathMode, setPathMode] = useState(null); // null | "auto" | "manual"
  const [manualMuscleStep, setManualMuscleStep] = useState(false); // show muscle selector
  const [dayMuscles, setDayMuscles] = useState({}); // {dayIndex: {primary:[...], accessory:[...]}}
  const [error, setError]     = useState("");
  const [form, setForm]       = useState(() => ({
    name:"", age:"", gender:"", weight:"", goal:"",
    mesoLength:6, sessionDuration:60,
    equipment: [],
    theme: localStorage.getItem("ppl:theme") || "dark",
    startDate: todayStr,
    splitType: "ppl",
    workoutDays: [1,2,3,4,5,6],
    daysPerWeek: 6,
  }));
  // Auto-builder specific state
  const [autoForm, setAutoForm] = useState({
    experience: null,
    split: null,
    daysPerWeek: null,
    mesoLength: null,
    equipment:  [],
    startDate:  todayStr,
  });
  const [aiLoading, setAiLoading] = useState(false);
  const [aiCoachNote, setAiCoachNote] = useState("");
  const setAuto = (k,v) => setAutoForm(f => ({...f, [k]:v}));
  const toggleAutoEquip = (item) => {
    setAutoForm(f => {
      const has = f.equipment.includes(item);
      if (has && f.equipment.length === 1) return f;
      return {...f, equipment: has ? f.equipment.filter(e=>e!==item) : [...f.equipment, item]};
    });
  };

  const set = (k,v) => setForm(f => ({...f, [k]:v}));

  const setTheme = (t) => {
    document.documentElement.setAttribute("data-theme", t);
    localStorage.setItem("ppl:theme", t);
    set("theme", t);
  };

  const setSplit = (split) => {
    const cfg  = SPLIT_CONFIG[split];
    const best = cfg.validDays[cfg.validDays.length - 1];
    setForm(f => ({...f, splitType:split, workoutDays:cfg.defaultDays[best], daysPerWeek:best}));
  };

  const setDayCount = (n) => {
    const compatible = splitsForDays(n);
    const split = compatible.includes(form.splitType) ? form.splitType : compatible[0] || form.splitType;
    const cfg   = SPLIT_CONFIG[split];
    const days  = cfg?.defaultDays[n] || form.workoutDays;
    setForm(f => ({...f, daysPerWeek:n, workoutDays:days, splitType:split}));
  };

  const toggleEquipment = (item) => {
    setForm(f => {
      const has = f.equipment.includes(item);
      if (has && f.equipment.length === 1) return f;
      return {...f, equipment: has ? f.equipment.filter(e=>e!==item) : [...f.equipment, item]};
    });
  };

  const toggleDay = (dayNum) => {
    setForm(f => {
      const has  = f.workoutDays.includes(dayNum);
      if (has && f.workoutDays.length === 1) return f;
      const next = has ? f.workoutDays.filter(d=>d!==dayNum) : [...f.workoutDays, dayNum].sort((a,b)=>a-b);
      return {...f, workoutDays:next, daysPerWeek:next.length};
    });
  };

  const goNext = () => {
    setError("");
    if (step === 1) {
      if (!form.name.trim()) { setError("Please enter your name."); return; }
      if (!form.gender)      { setError("Please select a gender."); return; }
      setPathMode(null); // reset path choice if going back and forward
    }
    setStep(2); window.scrollTo(0,0);
  };

  const handleAutoSubmit = () => {
    setError("");
    if (!autoForm.split)            { setError("Select a training split."); return; }
    if (!autoForm.daysPerWeek)      { setError("Select how many days per week."); return; }
    if (!autoForm.mesoLength)       { setError("Select a meso length."); return; }
    if (!autoForm.experience)       { setError("Select your experience level."); return; }
    if (autoForm.equipment.length === 0) { setError("Select at least one equipment type."); return; }

    const sessMap = { beginner:60, intermediate:75, experienced:90 };
    const daysMap = {
      ppl:         { 2:[1,4], 3:[1,3,5], 4:[1,2,4,5], 5:[1,2,3,5,6], 6:[1,2,3,4,5,6] },
      upper_lower: { 2:[1,4], 3:[1,3,5], 4:[1,2,4,5], 5:[1,2,3,5,6] },
      full_body:   { 2:[1,4], 3:[1,3,5], 4:[1,2,4,5] },
    };
    const workoutDays = (daysMap[autoForm.split] || daysMap.ppl)[autoForm.daysPerWeek] || [1,2,3,4,5,6];

    const built = {
      name: form.name, age: form.age, gender: form.gender,
      weight: form.weight, theme: form.theme,
      startDate: autoForm.startDate,
      goal: `${autoForm.experience.charAt(0).toUpperCase()+autoForm.experience.slice(1)} ${autoForm.split} program`,
      equipment: autoForm.equipment,
      experience: autoForm.experience,
      priority: "both",
      splitType: autoForm.split,
      daysPerWeek: autoForm.daysPerWeek,
      workoutDays,
      mesoLength: autoForm.mesoLength,
      sessionDuration: sessMap[autoForm.experience] || 60,
      autoBuilt: true,
    };
    onComplete(built);
  };

  const handleSubmit = () => {
    setError("");
    if (form.equipment.length === 0) { setError("Select at least one equipment type."); return; }
    const cfg = SPLIT_CONFIG[form.splitType];
    if (cfg && !cfg.validDays.includes(form.workoutDays.length)) {
      setError(`${cfg.label} needs ${cfg.validDays.join(" or ")} training days — you have ${form.workoutDays.length} selected.`);
      return;
    }
    onComplete(form);
  };

  // ── Shared style atoms ─────────────────────────────────────────────────
  const inputStyle = {
    width:"100%", background:"var(--bg-input)", border:"1px solid var(--border-accent)",
    borderRadius:12, color:"var(--text-primary)", fontSize:16, padding:"16px",
    outline:"none", fontFamily:"inherit", marginTop:8, boxSizing:"border-box",
  };
  const sLabel = { fontSize:11, fontWeight:700, letterSpacing:"0.05em", color:"var(--accent)", display:"block", marginBottom:0 };
  const sec    = { marginBottom:24 };

  // ── Schedule preview (used in step 2) ─────────────────────────────────
  const sessionSeq = () => {
    const n = form.workoutDays.length;
    if (form.splitType === "ppl")
      return n >= 6 ? ["PUSH", "PULL", "LEGS"]
           : n >= 5 ? ["PUSH", "PULL", "LEGS"]
           :          ["PUSH", "PULL", "LEGS"];
    if (form.splitType === "upper_lower")
      return n >= 4 ? ["UPPER", "LOWER"] : ["UPPER", "LOWER"];
    if (form.splitType === "full_body")
      return ["FULL A", "FULL B", "FULL C"].slice(0, n);
    if (form.splitType === "push_pull")
      return ["PUSH A", "PULL A", "PUSH B", "PULL B"].slice(0, n);
    return [];
  };
  const tagColor = (tag) =>
    tag.startsWith("PUSH") ? "var(--tag-push)"
    : tag.startsWith("PULL") ? "var(--tag-pull)"
    : tag.startsWith("LEGS") ? "var(--tag-legs)"
    : tag.startsWith("UPPER") ? "var(--phase-peak)"
    : tag.startsWith("LOWER") ? "var(--accent-blue)"
    : "var(--phase-deload)";

  const mesoEnd = (() => {
    if (!form.startDate) return null;
    const s = new Date(form.startDate + "T00:00:00");
    const e = new Date(s.getTime() + form.mesoLength * 7 * 86400000 - 86400000);
    return e.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
  })();

  const SchedulePreview = () => {
    const seq = sessionSeq();
    return (
      <div style={{background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:14, overflow:"hidden"}}>
        <div style={{padding:"12px 16px", borderBottom:"1px solid var(--border)", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <span style={{fontSize:10, fontWeight:600, letterSpacing:"0.04em", color:"var(--text-muted)"}}>Weekly schedule</span>
          <span style={{fontSize:10, fontWeight:700, color:"var(--accent)"}}>{form.workoutDays.length}×/WEEK</span>
        </div>
        <div style={{display:"flex", padding:"8px"}}>
          {DAY_NAMES.map((d, i) => {
            const idx   = form.workoutDays.indexOf(i);
            const isOn  = idx !== -1;
            const label = isOn ? seq[idx] : null;
            return (
              <div key={i} style={{
                flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4,
                padding:"8px 2px", borderRadius:9, margin:"0 1px",
                background: isOn ? "rgba(var(--accent-rgb),0.07)" : "transparent",
              }}>
                <span style={{fontSize:9, fontWeight:700, color: isOn ? "var(--text-secondary)" : "var(--text-dim)", letterSpacing:"0.06em"}}>{d}</span>
                {isOn
                  ? <span style={{fontSize:7, fontWeight:700, color:tagColor(label), letterSpacing:"0.03em", textAlign:"center", lineHeight:1.3}}>{label}</span>
                  : <span style={{fontSize:8, color:"var(--border-accent)"}}>REST</span>}
              </div>
            );
          })}
        </div>
        {mesoEnd && (
          <div style={{padding:"8px 16px", borderTop:"1px solid var(--border)", display:"flex", justifyContent:"space-between", fontSize:11, color:"var(--text-muted)"}}>
            <span>Start <b style={{color:"var(--text-primary)"}}>{new Date(form.startDate+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</b></span>
            <span>End <b style={{color:"var(--text-primary)"}}>{mesoEnd}</b></span>
          </div>
        )}
      </div>
    );
  };

  // ── Progress header ────────────────────────────────────────────────────
  const Header = () => {
    const isPathSelect = step === 2 && pathMode === null;
    const isAutoInputs = step === 2 && pathMode === "auto";
    const isManual     = step === 2 && pathMode === "manual";
    const progressPct  = step === 1 ? "33%" : isPathSelect ? "55%" : "100%";
    const title = step === 1 ? "About You" : isPathSelect ? "Build Mode" : isAutoInputs ? "Quick Build" : "Your Program";
    const subtitle = step === 1 ? "Step 1 of 2" : isPathSelect ? "Step 2 of 2" : isAutoInputs ? "Iron Oak Auto-Build" : "Manual Setup";

    const handleBack = () => {
      setError("");
      if (manualMuscleStep) { setManualMuscleStep(false); window.scrollTo(0,0); return; }
      if (isAutoInputs || isPathSelect) {
        if (isAutoInputs) setPathMode(null);
        else { setStep(1); setPathMode(null); }
        window.scrollTo(0,0);
      } else {
        setStep(1); window.scrollTo(0,0);
      }
    };

    return (
      <div style={{padding:"20px 20px 0"}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
          <div>
            <div style={{fontSize:10, fontWeight:600, letterSpacing:"0.05em", color:"var(--accent)"}}>
              {subtitle}
            </div>
            <div style={{fontSize:18, fontWeight:700, color:"var(--text-primary)", marginTop:4, letterSpacing:"0.01em"}}>
              {title}
            </div>
          </div>
          {step === 2 && (
            <button onClick={handleBack} style={{
              background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:10,
              padding:"8px 16px", cursor:"pointer", fontSize:12, fontWeight:600,
              color:"var(--text-secondary)", letterSpacing:"0.02em",
            }}>‹ Back</button>

                      {n}
                      <div style={{fontSize:8, fontWeight:700, marginTop:4, opacity:0.7}}>DAYS</div>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Meso length */}
            <div style={sec}>
              <label style={sLabel}>Meso cycle length *</label>
              <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginTop:8}}>
                {[[4,"SHORT"],[6,"STANDARD"],[8,"EXTENDED"],[12,"LONG"]].map(([n,tag]) => (
                  <button key={n} onClick={()=>set("mesoLength",n)} style={{
                    padding:"14px 4px", borderRadius:10, cursor:"pointer", textAlign:"center",
                    fontWeight:700, fontSize:18, letterSpacing:"0.02em",
                    background: form.mesoLength===n ? "rgba(var(--accent-rgb),0.1)" : "var(--bg-card)",
                    border:`1px solid ${form.mesoLength===n ? "var(--accent)" : "var(--border)"}`,
                    color: form.mesoLength===n ? "var(--accent)" : "var(--text-muted)",
                    transition:"all 0.15s",
                  }}>
                    {n}
                    <div style={{fontSize:9,fontWeight:700,marginTop:4,opacity:0.8,letterSpacing:"0.04em"}}>{tag}</div>
                  </button>
                ))}
              </div>
              <div style={{fontSize:11, color:"var(--text-muted)", marginTop:8}}>
                {form.mesoLength===4 && "Sharp, focused push. Great for a specific block."}
                {form.mesoLength===6 && "Standard — the sweet spot for most trainees."}
                {form.mesoLength===8 && "Extended accumulation before peaking. More volume base."}
                {form.mesoLength===12 && "Full periodization — max accumulation + long peak. Commitment required."}
              </div>
            </div>

            {/* Equipment */}
            <div style={sec}>
              <label style={sLabel}>Available equipment *</label>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginTop:8}}>
                {ALL_EQUIPMENT.map(val => {
                  const sel = form.equipment.includes(val);
                  return (
                    <button key={val} onClick={()=>toggleEquipment(val)} className="btn-toggle" style={{
                      padding:"16px 8px", borderRadius:12, cursor:"pointer", textAlign:"center",
                      background: sel ? "rgba(var(--accent-rgb),0.1)" : "var(--bg-card)",
                      border:`1px solid ${sel ? "var(--accent)" : "var(--border)"}`,
                      color: sel ? "var(--accent)" : "var(--text-muted)",
                    }}>
                      <div style={{fontSize:12, fontWeight:800, letterSpacing:"0.06em", marginBottom:6, color: sel ? "var(--accent)" : "var(--text-dim)"}}>{EQUIP_META[val].icon}</div>
                      <div style={{fontSize:9, fontWeight:700, letterSpacing:"0.04em"}}>{EQUIP_META[val].label}</div>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Which days */}
            <div style={sec}>
              <label style={sLabel}>Which days?</label>
              <div style={{fontSize:11, color:"var(--text-muted)", marginTop:4, marginBottom:8}}>Tap to customise</div>
              <div style={{display:"flex", gap:4}}>
                {[["Su",0],["M",1],["Tu",2],["W",3],["Th",4],["F",5],["Sa",6]].map(([lbl,num]) => {
                  const sel = form.workoutDays.includes(num);
                  return (
                    <button key={num} onClick={()=>toggleDay(num)} className="btn-toggle" style={{
                      flex:1, padding:"12px 0", borderRadius:9, cursor:"pointer",
                      fontWeight:700, fontSize:11, letterSpacing:"0.02em",
                      background: sel ? "rgba(var(--accent-rgb),0.15)" : "var(--bg-card)",
                      border:`1px solid ${sel ? "var(--accent)" : "var(--border)"}`,
                      color: sel ? "var(--accent)" : "var(--text-muted)",
                    }}>{lbl}</button>
                  );
                })}
              </div>
            </div>

            {/* Start date */}
            <div style={sec}>
              <label style={sLabel}>Start date *</label>
              <input type="date" value={form.startDate}
                onChange={e=>set("startDate",e.target.value)}
                style={{...inputStyle, colorScheme:form.theme==="light"?"light":"dark"}}
              />
              {mesoEnd && (
                <div style={{fontSize:11, color:"var(--text-muted)", marginTop:8}}>
                  Ends <b style={{color:"var(--text-primary)"}}>{mesoEnd}</b> · {form.mesoLength} weeks
                </div>
              )}
            </div>

            {/* Error */}
            {error && <div style={{background:"var(--danger-bg)", border:"1px solid var(--danger)", borderRadius:10, padding:"12px 16px", marginBottom:16, fontSize:13, color:"var(--danger)"}}>{error}</div>}

            <button onClick={() => {
              setError("");
              if (form.equipment.length === 0) { setError("Select at least one equipment type."); return; }
              const splitDays = {full_body:[2,3,4], upper_lower:[2,3,4,5], ppl:[3,5,6]}[form.splitType];
              if (splitDays && !splitDays.includes(form.workoutDays.length)) {
                setError(`This split needs ${splitDays.join(" or ")} training days.`); return;
              }
              setManualMuscleStep(true);
              window.scrollTo(0,0);
            }} className="btn-primary" style={{
              width:"100%", padding:"20px", borderRadius:14, cursor:"pointer", background:"var(--btn-primary-bg)",
              border:"1px solid var(--btn-primary-border)",
              color:"var(--btn-primary-text)", fontSize:16, fontWeight:800, letterSpacing:"0.04em",
              boxShadow:"0 4px 24px rgba(var(--accent-rgb),0.35)",
            }}>Set Muscle Targets →</button>
          </div>
        )}

        {/* ─── MANUAL: MUSCLE SELECTION PER DAY ─── */}
        {step === 2 && pathMode === "manual" && manualMuscleStep && (() => {
          const MUSCLE_GROUPS = {
            PUSH: ["Chest", "Shoulders", "Triceps"],
            PULL: ["Lats", "Back", "Traps", "Shoulders", "Biceps"],
            LEGS: ["Quads", "Hamstrings", "Glutes", "Calves", "Adductors"],
            CORE: ["Abs", "Obliques", "Lower Back"],
          };
          const ALL_MUSCLES = [...MUSCLE_GROUPS.PUSH,...MUSCLE_GROUPS.PULL,...MUSCLE_GROUPS.LEGS,...MUSCLE_GROUPS.CORE];

          // Build day labels based on split + day count
          const splitDayLabels = {
            ppl: {
              3: [["Push Day", "PUSH", "Chest · Shoulders · Triceps"],["Pull Day", "PULL", "Back · Biceps · Rear Delts"],["Legs Day", "LEGS", "Quads · Hamstrings · Glutes"]],
              5: [["Push Day 1", "PUSH"],["Pull Day 1", "PULL"],["Legs Day", "LEGS"],["Push Day 2", "PUSH"],["Pull Day 2", "PULL"]],
              6: [["Push 1", "PUSH"],["Pull 1", "PULL"],["Legs 1", "LEGS"],["Push 2", "PUSH"],["Pull 2", "PULL"],["Legs 2", "LEGS"]],
            },
            upper_lower: {
              2: [["Upper Body", "UPPER"],["Lower Body", "LOWER"]],
              4: [["Upper A", "UPPER"],["Lower A", "LOWER"],["Upper B", "UPPER"],["Lower B", "LOWER"]],
            },
            full_body: {
              2: [["Full Body A", "FULL"],["Full Body B", "FULL"]],
              3: [["Full Body A", "FULL"],["Full Body B", "FULL"],["Full Body C", "FULL"]],
            },
          };

          const numDays = form.workoutDays.length;
          const dayTemplates = (splitDayLabels[form.splitType]?.[numDays]) ||
            Array.from({length:numDays},(_,i)=>[`Day ${i+1}`,form.splitType==="ppl"?"PUSH":"FULL",""]);

          const getMusclePools = (dayTag) => {
            if (dayTag === "PUSH") return [...MUSCLE_GROUPS.PUSH];
            if (dayTag === "PULL") return [...MUSCLE_GROUPS.PULL];
            if (dayTag === "LEGS") return [...MUSCLE_GROUPS.LEGS];
            return ALL_MUSCLES; // upper, full, etc.
          };

          const toggleDayMuscle = (dayIdx, muscle, isAccessory) => {
            setDayMuscles(prev => {
              const day = prev[dayIdx] || { primary: [], accessory: [] };
              const key = isAccessory ? "accessory" : "primary";
              const has = day[key].includes(muscle);
              const newArr = has ? day[key].filter(m=>m!==muscle) : [...day[key], muscle];
              // If adding to primary, remove from accessory and vice versa
              const otherKey = isAccessory ? "primary" : "accessory";
              const newOther = day[otherKey].filter(m=>m!==muscle);
              return { ...prev, [dayIdx]: { ...day, [key]: newArr, [otherKey]: newOther } };
            });
          };

          const tagColors = {PUSH:"var(--tag-push)",PULL:"var(--tag-pull)",LEGS:"var(--tag-legs)",UPPER:"var(--phase-peak)",LOWER:"var(--accent-blue)",FULL:"var(--phase-deload)"};

          return (
            <div style={{padding:"24px 20px 40px"}}>
              <div style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.6, marginBottom:20}}>
                Select <strong style={{color:"var(--accent)"}}>primary</strong> and <strong style={{color:"var(--text-secondary)"}}>accessory</strong> muscles for each training day. Iron Oak will pick the best exercises matching your choices.
              </div>

              {dayTemplates.map(([dayLabel, dayTag], dayIdx) => {
                const dm = dayMuscles[dayIdx] || { primary: [], accessory: [] };
                const musclePool = getMusclePools(dayTag);
                const accent = tagColors[dayTag] || "var(--accent)";
                return (
                  <div key={dayIdx} style={{
                    background:"var(--bg-card)", border:`1px solid var(--border)`,
                    borderRadius:14, overflow:"hidden", marginBottom:12,
                    borderLeft:`3px solid ${accent}`,
                  }}>
                    <div style={{
                      padding:"12px 16px", borderBottom:"1px solid var(--border-subtle)",
                      display:"flex", alignItems:"center", gap:10,
                      background:"var(--bg-surface)",
                    }}>
                      <span style={{
                        fontSize:9, fontWeight:800, letterSpacing:"0.06em", padding:"3px 8px",
                        borderRadius:6, background:accent+"22", color:accent,
                      }}>{dayTag}</span>
                      <span style={{fontSize:13, fontWeight:700, color:"var(--text-primary)"}}>{dayLabel}</span>
                    </div>
                    <div style={{padding:"14px 16px"}}>
                      <div style={{fontSize:10, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-muted)", marginBottom:10}}>
                        SELECT MUSCLES — TAP PRIMARY ONCE, TAP AGAIN FOR ACCESSORY
                      </div>
                      <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                        {musclePool.map(muscle => {
                          const isPrimary = dm.primary.includes(muscle);
                          const isAcc = dm.accessory.includes(muscle);
                          return (
                            <button
                              key={muscle}
                              onClick={() => {
                                if (!isPrimary && !isAcc) toggleDayMuscle(dayIdx, muscle, false);
                                else if (isPrimary) toggleDayMuscle(dayIdx, muscle, true);
                                else toggleDayMuscle(dayIdx, muscle, false); // was acc, clear it
                              }}
                              style={{
                                padding:"7px 12px", borderRadius:99, cursor:"pointer",
                                fontSize:11, fontWeight:700, letterSpacing:"0.03em",
                                background: isPrimary ? accent+"33" : isAcc ? "rgba(var(--accent-rgb),0.08)" : "var(--bg-surface)",
                                border:`1px solid ${isPrimary ? accent : isAcc ? "rgba(var(--accent-rgb),0.3)" : "var(--border)"}`,
                                color: isPrimary ? accent : isAcc ? "var(--text-secondary)" : "var(--text-muted)",
                                transition:"all 0.12s",
                              }}
                            >
                              {isPrimary ? "● " : isAcc ? "◌ " : ""}{muscle}
                            </button>
                          );
                        })}
                      </div>
                      {(dm.primary.length > 0 || dm.accessory.length > 0) && (
                        <div style={{marginTop:10, fontSize:11, color:"var(--text-muted)", lineHeight:1.6}}>
                          {dm.primary.length > 0 && <span><strong style={{color:accent}}>Primary:</strong> {dm.primary.join(", ")} </span>}
                          {dm.accessory.length > 0 && <span><strong style={{color:"var(--text-secondary)"}}>Accessory:</strong> {dm.accessory.join(", ")}</span>}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}

              <div style={{
                background:"rgba(var(--accent-rgb),0.06)", border:"1px solid rgba(var(--accent-rgb),0.2)",
                borderRadius:12, padding:"14px 16px", marginBottom:20, marginTop:8,
              }}>
                <div style={{fontSize:10, fontWeight:700, color:"var(--accent)", letterSpacing:"0.05em", marginBottom:6}}>HOW IT WORKS</div>
                <div style={{fontSize:11, color:"var(--text-secondary)", lineHeight:1.6}}>
                  Tap once to mark a muscle as <strong style={{color:"var(--accent)"}}>primary</strong> (●) — Iron Oak will anchor the session around it.
                  Tap again for <strong>accessory</strong> (◌) — extra volume added where recovery allows.
                  Tap a third time to deselect.
                </div>
              </div>

              {error && <div style={{background:"var(--danger-bg)", border:"1px solid var(--danger)", borderRadius:10, padding:"12px 16px", marginBottom:16, fontSize:13, color:"var(--danger)"}}>{error}</div>}

              <div style={{display:"grid", gridTemplateColumns:"1fr 2fr", gap:10}}>
                <button onClick={()=>{setManualMuscleStep(false); window.scrollTo(0,0);}} className="btn-ghost" style={{
                  padding:"18px", borderRadius:14, cursor:"pointer",
                  background:"var(--bg-card)", border:"1px solid var(--border)",
                  color:"var(--text-secondary)", fontSize:14, fontWeight:700,
                }}>‹ Back</button>
                <button onClick={() => {
                  setError("");
                  if (form.equipment.length === 0) { setError("Select at least one equipment type."); return; }
                  // Build dayMuscles into profile
                  const profile = {
                    ...form,
                    dayMuscleConfig: dayMuscles,
                    manualBuilt: true,
                  };
                  onComplete(profile);
                }} className="btn-primary" style={{
                  padding:"18px", borderRadius:14, cursor:"pointer", background:"var(--btn-primary-bg)",
                  border:"1px solid var(--btn-primary-border)",
                  color:"var(--btn-primary-text)", fontSize:16, fontWeight:800, letterSpacing:"0.04em",
                  boxShadow:"0 4px 24px rgba(var(--accent-rgb),0.3)",
                }}>Start Training →</button>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

// ─── READY DIALOG ─────────────────────────────────────────────────────────────
function ReadyDialog({ dayLabel, userName, isDone, isLocked, onYes, onNo }) {
  const greetings = [
    "Time to earn it.",
    "No shortcuts. No excuses.",
    "The bar is waiting.",
    "This is where it happens.",
    "Show up and show out.",
    "Another day, another W.",
    "Champions are built in sessions like this.",
    "Lock in. Let's work.",
  ];
  const [msg] = useState(() => greetings[Math.floor(Math.random() * greetings.length)]);

  // Locked — prior days not complete
  if (isLocked) {
    return (
      <div style={{
        position:"fixed", inset:0, zIndex:250,
        background:"rgba(0,0,0,0.85)", backdropFilter:"blur(6px)",
        display:"flex", alignItems:"center", justifyContent:"center", padding:24,
      }}>
        <div style={{
          background:"var(--bg-card)",
          border:"1px solid var(--text-dim)", borderRadius:20,
          padding:"32px 24px", maxWidth:340, width:"100%",
          boxShadow:"var(--shadow-xl)",
          animation:"dialogIn 0.2s cubic-bezier(0.34,1.56,0.64,1)",
          textAlign:"center",
        }}>
          <div style={{
            width:48, height:48, borderRadius:12, background:"var(--bg-inset)",
            border:"1px solid var(--border)", display:"flex", alignItems:"center",
            justifyContent:"center", margin:"0 auto 16px",
          }}>
            <span style={{fontSize:11, fontWeight:800, letterSpacing:"0.04em", color:"var(--text-dim)"}}>LOCK</span>
          </div>
          <div style={{fontSize:11, fontWeight:700, letterSpacing:"0.04em", color:"var(--text-muted)", marginBottom:8}}>
            {dayLabel.toUpperCase()}
          </div>
          <div style={{fontSize:20, fontWeight:700, color:"var(--text-primary)", marginBottom:8, lineHeight:1.3}}>
            Finish previous days first.
          </div>
          <div style={{fontSize:13, color:"var(--text-secondary)", marginBottom:28, lineHeight:1.6}}>
            Complete all prior sessions this week before unlocking this day. You can still review it below.
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
            <button onClick={onNo} className="btn-ghost" style={{
              padding:"16px", borderRadius:12, cursor:"pointer",
              background:"transparent", border:"1px solid var(--border)",
              color:"var(--text-muted)", fontSize:14, fontWeight:600,
            }}>Go back</button>
            <button onClick={onYes} className="btn-ghost" style={{
              padding:"16px", borderRadius:12, cursor:"pointer",
              background:"var(--bg-card)", border:"1px solid var(--text-dim)",
              color:"var(--text-secondary)", fontSize:14, fontWeight:600,
            }}>Review</button>
          </div>
        </div>
      </div>
    );
  }

  if (isDone) {
    return (
      <div style={{
        position:"fixed", inset:0, zIndex:250,
        background:"rgba(0,0,0,0.85)", backdropFilter:"blur(6px)",
        display:"flex", alignItems:"center", justifyContent:"center", padding:24,
      }}>
        <div style={{
          background:"var(--bg-card)",
          border:"1px solid var(--success-bg)", borderRadius:20,
          padding:"32px 24px", maxWidth:340, width:"100%",
          boxShadow:"var(--shadow-xl)",
          animation:"dialogIn 0.2s cubic-bezier(0.34,1.56,0.64,1)",
          textAlign:"center",
        }}>
          <div style={{
            width:48, height:48, borderRadius:12, background:"var(--success-bg)",
            border:"1px solid var(--success)", display:"flex", alignItems:"center",
            justifyContent:"center", margin:"0 auto 16px",
          }}>
            <span style={{fontSize:13, fontWeight:800, letterSpacing:"0.04em", color:"var(--success)"}}>DONE</span>
          </div>
          <div style={{fontSize:11, fontWeight:700, letterSpacing:"0.04em", color:"var(--phase-accum)", marginBottom:8}}>
            {dayLabel.toUpperCase()}
          </div>
          <div style={{fontSize:20, fontWeight:700, color:"var(--text-primary)", marginBottom:8, lineHeight:1.3}}>
            This session is already complete.
          </div>
          <div style={{fontSize:13, color:"var(--text-secondary)", marginBottom:28, lineHeight:1.6}}>
            Would you like to review your logged weights? You can still update your session notes, but weights and reps are locked.
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
            <button onClick={onNo} className="btn-ghost" style={{
              padding:"16px", borderRadius:12, cursor:"pointer",
              background:"transparent", border:"1px solid var(--border)",
              color:"var(--text-muted)", fontSize:14, fontWeight:600,
            }}>Go back</button>
            <button onClick={onYes} className="btn-primary" style={{
              padding:"16px", borderRadius:12, cursor:"pointer",
              background:"var(--success-bg)", border:"1px solid var(--success-bg)",
              color:"var(--phase-accum)", fontSize:14, fontWeight:600,
            }}>Review</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{
      position:"fixed", inset:0, zIndex:250,
      background:"rgba(0,0,0,0.85)", backdropFilter:"blur(6px)",
      display:"flex", alignItems:"center", justifyContent:"center", padding:24,
    }}>
      <div style={{
        background:"var(--bg-card)",
        border:"1px solid var(--border-accent)", borderRadius:20,
        padding:"32px 24px", maxWidth:340, width:"100%",
        boxShadow:"var(--shadow-xl)",
        animation:"dialogIn 0.2s cubic-bezier(0.34,1.56,0.64,1)",
        textAlign:"center",
      }}>
        <div style={{
          width:48, height:48, borderRadius:12, background:"rgba(var(--accent-rgb),0.12)",
          border:"1px solid rgba(var(--accent-rgb),0.3)", display:"flex", alignItems:"center",
          justifyContent:"center", margin:"0 auto 16px",
        }}>
          <span style={{fontSize:11, fontWeight:800, letterSpacing:"0.04em", color:"var(--accent)"}}>GO</span>
        </div>
        <div style={{fontSize:11, fontWeight:700, letterSpacing:"0.04em", color:"var(--accent)", marginBottom:8}}>
          {dayLabel.toUpperCase()}
        </div>
        <div style={{fontSize:20, fontWeight:700, color:"var(--text-primary)", marginBottom:8, lineHeight:1.3}}>
          Are you ready to get after it{userName ? `, ${userName}` : ""}?
        </div>
        <div style={{fontSize:13, color:"var(--accent)", marginBottom:28, lineHeight:1.6}}>
          {msg}
        </div>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
          <button onClick={onNo} className="btn-ghost" style={{
            padding:"16px", borderRadius:12, cursor:"pointer",
            background:"transparent", border:"1px solid var(--border)",
            color:"var(--text-muted)", fontSize:14, fontWeight:600,
          }}>Not yet</button>
          <button onClick={onYes} className="btn-primary" style={{
            padding:"16px", borderRadius:12, cursor:"pointer",
            background:"linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%)",
            border:"1px solid var(--btn-primary-border)",
            color:"#fff", fontSize:14, fontWeight:700,
            boxShadow:"0 4px 16px rgba(59,130,246,0.3)",
          }}>Let's go!</button>
        </div>
      </div>
    </div>
  );
}

          color:"var(--text-primary)", fontSize:16, fontWeight:700,
          letterSpacing:"0.03em",
          boxShadow:"0 4px 20px rgba(59,130,246,0.35)",
          WebkitAppearance:"none",
          touchAction:"manipulation",

function SwapModal({ exercise, dayTag, profile, onSwap, onClose }) {
  const [scope, setScope] = useState(null); // "week" | "meso"
  const [selected, setSelected] = useState(null);

  // Build eligible list: same tag, same anchor status — no equipment restriction
  const isAnchor = exercise.anchor;

  // For UPPER/LOWER/FULL days, exercises have PUSH/PULL/LEGS tags — match on exercise tag, not day tag
  const matchTag = (dayTag === "UPPER" || dayTag === "LOWER" || dayTag === "FULL")
    ? exercise.tag
    : dayTag;

  const eligible = EXERCISE_DB.filter(e =>
    e.tag === matchTag &&
    e.id !== exercise.id &&
    (isAnchor ? e.anchor === true : e.anchor !== true)
  );

  // Group by muscle
  const groups = {};
  eligible.forEach(e => {
    const g = e.muscle || e.tag;
    if (!groups[g]) groups[g] = [];
    groups[g].push(e);
  });

  const eqIcon = {barbell:"BB",dumbbell:"DB",cable:"CA",machine:"MC",bodyweight:"BW",band:"BD"};

  return (
    <div style={{
      position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:200,

              </div>
              {isAnchor && (
                <div style={{fontSize:11, color:"var(--phase-intens)", marginTop:4}}>Anchor slot — showing anchor exercises only</div>
              )}
            </div>
            <button onClick={onClose} style={{background:"none", border:"none", color:"var(--text-muted)", fontSize:22, cursor:"pointer", lineHeight:1}}>×</button>
