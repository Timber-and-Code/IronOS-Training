                  <input type="number" inputMode="numeric" placeholder="—"
                    value={setData.reps}
                    onChange={e=> { if(!readOnly){ handleRepsChange(s, e.target.value); const el=e.target; el.classList.remove("pulse"); void el.offsetWidth; el.classList.add("pulse"); }}}
                    onBlur={e=> !readOnly && handleRepsBlur(s, e.target.value)}
                    readOnly={readOnly}
                    className="num-input"
                    style={{
                      background:"transparent",
                      border:"none",
                      color: isLogged ? "var(--text-muted)" : "var(--phase-accum)", fontSize:20, fontWeight:700, padding:"8px 4px",
                      textAlign:"center", width:"100%", outline:"none",
                      opacity: 1,

                  {/* Set checkmark button */}
                  <button
                    onClick={() => !readOnly && handleSetCheckmark(s)}

                    style={{

        <button
          onClick={e => { e.stopPropagation(); setNoteOpen(o => !o); }}

  );

// ─── CARDIO INTERVAL TIMER ────────────────────────────────────────────────────
// Guided interval timer for HIIT protocols. Mirrors rest timer architecture.
// zIndex 225 — sits above rest timer (220) since they never coexist.
function CardioIntervalTimer({ protocol, onComplete, onDismiss }) {
  const { intervals, label } = protocol;
  const { workSecs, restSecs, rounds } = intervals;

  const [phase, setPhase]         = React.useState("work"); // "work" | "rest" | "done"
  const [round, setRound]         = React.useState(1);
  const [remaining, setRemaining] = React.useState(workSecs);
  const [minimized, setMinimized] = React.useState(false);
  const intervalRef               = React.useRef(null);

  const WORK_COLOR = "#ef4444";
  const REST_COLOR = "#48bb78";
  const DONE_COLOR = "var(--phase-accum)";

  const ringColor = phase === "done" ? DONE_COLOR : phase === "work" ? WORK_COLOR : REST_COLOR;
  const total     = phase === "work" ? workSecs : phase === "rest" ? restSecs : 1;
  const pct       = phase === "done" ? 1 : remaining / total;
  const R         = 72;
  const CIRC      = 2 * Math.PI * R;
  const dash      = CIRC * pct;
  const gap       = CIRC - dash;
  const mins      = Math.floor(remaining / 60);
  const secs      = remaining % 60;
  const timeStr   = mins > 0
    ? `${mins}:${String(secs).padStart(2, "0")}`
    : `${String(secs).padStart(2, "0")}`;

  // ── Tick ────────────────────────────────────────────────────────────────────
  React.useEffect(() => {
    if (phase === "done") { clearInterval(intervalRef.current); return; }
    intervalRef.current = setInterval(() => {
      setRemaining(prev => {
        if (prev <= 1) {
          // Transition
          if (phase === "work") {
            haptic("light");
            setPhase("rest");
            return restSecs;
          } else {
            // rest phase ended
            if (round >= rounds) {
              haptic("success");
              setPhase("done");
              return 0;
            } else {
              haptic("light");
              setRound(r => r + 1);
              setPhase("work");
              return workSecs;
            }
          }
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [phase, round]);

  const handleSkip = () => {
    clearInterval(intervalRef.current);
    if (phase === "work") {
      if (round >= rounds) { setPhase("done"); setRemaining(0); }
      else { setPhase("rest"); setRemaining(restSecs); }
    } else {
      setRound(r => r + 1);
      setPhase("work");
      setRemaining(workSecs);
    }
  };

  const handleDone = () => {
    clearInterval(intervalRef.current);
    onComplete();
  };

  // ── MINIMIZED BAR ──────────────────────────────────────────────────────────
  if (minimized) {
    const barPct = phase === "done" ? 1 : 1 - (remaining / total);
    return (
      <div
        onClick={() => setMinimized(false)}
        style={{
          position: "fixed", bottom: 64, left: 0, right: 0, zIndex: 225,
          background: ringColor,
          borderTop: `3px solid ${ringColor}`,
          boxShadow: "0 -4px 20px rgba(0,0,0,0.5)",
          cursor: "pointer", userSelect: "none",
        }}
      >
        <div style={{
          position: "absolute", top: 0, right: 0, bottom: 0,
          width: `${barPct * 100}%`,
          background: "rgba(0,0,0,0.28)",
          transition: "width 1s linear",
        }} />
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", position: "relative", zIndex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ fontSize: 24, fontWeight: 900, color: "rgba(0,0,0,0.75)", fontVariantNumeric: "tabular-nums", minWidth: 54, lineHeight: 1 }}>
              {phase === "done" ? "DONE!" : timeStr}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "rgba(0,0,0,0.75)", lineHeight: 1 }}>
                {phase === "done" ? "All rounds complete" : phase === "work" ? "WORK" : "REST"}
              </div>
              <div style={{ fontSize: 12, color: "rgba(0,0,0,0.55)", lineHeight: 1 }}>
                {phase === "done" ? label : `Round ${round} of ${rounds}`}
              </div>
            </div>
          </div>
          <div style={{
            fontSize: 12, fontWeight: 800, letterSpacing: "0.05em",
            color: "rgba(0,0,0,0.65)",
            background: "rgba(0,0,0,0.15)",
            border: "1px solid rgba(0,0,0,0.2)",
            borderRadius: 6, padding: "7px 12px", whiteSpace: "nowrap",
          }}>
            {phase === "done" ? "LOG IT ↑" : "EXPAND ↑"}
          </div>
        </div>
      </div>
    );
  }

  // ── FULL MODAL ──────────────────────────────────────────────────────────────
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 225,
      background: "rgba(0,0,0,0.88)",
      backdropFilter: "blur(4px)",
      display: "flex", alignItems: "center", justifyContent: "center",
      padding: 24,
    }}>
      <div style={{
        background: "var(--bg-card)",
        border: `1px solid ${ringColor}44`,
        borderRadius: 16,
        boxShadow: "0 24px 64px rgba(0,0,0,0.7)",
        width: "100%", maxWidth: 340,
        padding: "36px 28px 28px",
        display: "flex", flexDirection: "column", alignItems: "center", gap: 0,
        position: "relative",
      }}>
        {/* Minimize */}
        {phase !== "done" && (
          <button
            onClick={() => setMinimized(true)}
            style={{
              position: "absolute", top: 12, right: 12,
              background: "var(--bg-inset)", border: "1px solid var(--border)",
              borderRadius: 6, padding: "4px 8px", cursor: "pointer",
              fontSize: 12, fontWeight: 700, color: "var(--text-muted)",
              letterSpacing: "0.04em",
            }}
          >MINIMIZE ↓</button>
        )}

        {/* Phase / title label */}
        <div style={{
          fontSize: 12, fontWeight: 800, letterSpacing: "0.12em",
          color: phase === "done" ? DONE_COLOR : ringColor,
          marginBottom: 20, transition: "color 0.3s",
        }}>
          {phase === "done" ? "ALL ROUNDS COMPLETE" : phase === "work" ? "WORK" : "REST"}
        </div>

        {/* Ring */}
        <div style={{ position: "relative", width: 168, height: 168, marginBottom: 16 }}>
          <svg width="168" height="168" style={{ transform: "rotate(-90deg)" }}>
            <circle cx="84" cy="84" r={R} fill="none" stroke="var(--bg-inset)" strokeWidth="8" />
            <circle cx="84" cy="84" r={R} fill="none" stroke={ringColor} strokeWidth="8"
              strokeLinecap="round"
              strokeDasharray={`${dash} ${gap}`}
              style={{ transition: "stroke-dasharray 1s linear, stroke 0.4s" }}
            />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            {phase === "done" ? (
              <div style={{ fontSize: 48, fontWeight: 900, color: DONE_COLOR, lineHeight: 1 }}>✓</div>
            ) : (
              <>
                <div style={{ fontSize: 54, fontWeight: 900, color: "var(--text-primary)", lineHeight: 1, letterSpacing: "-0.03em" }}>{timeStr}</div>
                <div style={{ fontSize: 12, color: "var(--text-muted)", fontWeight: 600, marginTop: 4 }}>{mins > 0 ? "min" : "sec"}</div>
              </>
            )}
          </div>
        </div>

        {/* Round counter */}
        <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 6 }}>
          {phase === "done" ? label : `Round ${round} of ${rounds}`}
        </div>

        {/* Round pip indicators */}
        <div style={{ display: "flex", gap: 6, marginBottom: 28 }}>
          {Array.from({ length: rounds }, (_, i) => (
            <div key={i} style={{
              width: 8, height: 8, borderRadius: "50%",
              background: i < round - 1 ? DONE_COLOR
                : i === round - 1 && phase !== "done" ? ringColor
                : i < round ? DONE_COLOR
                : "var(--bg-inset)",
              border: `1px solid ${i === round - 1 && phase !== "done" ? ringColor : "transparent"}`,
              transition: "background 0.3s",
            }} />
          ))}
        </div>

        {/* Action buttons */}
        {phase === "done" ? (
          <button onClick={handleDone} className="btn-primary" style={{
            width: "100%", padding: "16px", fontSize: 14, fontWeight: 800,
            borderRadius: 10, cursor: "pointer", letterSpacing: "0.04em",
            background: DONE_COLOR, border: `1px solid ${DONE_COLOR}`, color: "#000",
          }}>LOG SESSION ✓</button>
        ) : (
          <div style={{ display: "flex", gap: 10, width: "100%" }}>
            <button onClick={onDismiss} style={{
              flex: 1, padding: "14px", fontSize: 13, fontWeight: 700,
              borderRadius: 10, cursor: "pointer",
              background: "var(--bg-inset)", border: "1px solid var(--border)",
              color: "var(--text-muted)", letterSpacing: "0.04em",
            }}>STOP</button>
            <button onClick={handleSkip} style={{
              flex: 2, padding: "14px", fontSize: 13, fontWeight: 800,
              borderRadius: 10, cursor: "pointer",
              background: `${ringColor}22`, border: `1px solid ${ringColor}55`,
              color: ringColor, letterSpacing: "0.04em",
            }}>SKIP {phase === "work" ? "TO REST →" : "TO WORK →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── CARDIO SESSION VIEW ───────────────────────────────────────────────────────
// Standalone cardio session — mirrors DayView/ExtraDayView architecture.
// Opened from home tab (planned cardio card) or unplanned "Add Cardio" CTA.
// Storage key: ppl:cardio:session:YYYY-MM-DD
function CardioSessionView({ dateStr, plannedProtocolId, onBack, profile }) {
  const CARDIO_COLOR = TAG_ACCENT["CARDIO"];

  // ── Derived helpers ─────────────────────────────────────────────────────────
  const todayStr = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  };

  const displayDate = (() => {
    try {
      const [y, m, d] = dateStr.split("-").map(Number);
      return new Date(y, m - 1, d).toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });
    } catch { return dateStr; }
  })();

  // ── Session state ────────────────────────────────────────────────────────────
  const [session, setSession] = React.useState(() => {
    const saved = loadCardioSession(dateStr);
    if (saved) return saved;
    // Initialize from planned protocol if provided
    const proto = plannedProtocolId ? CARDIO_WORKOUTS.find(w => w.id === plannedProtocolId) : null;
    return {
      protocolId:  proto ? proto.id : null,
      type:        proto ? proto.defaultType : "",
      duration:    proto ? String(proto.defaultDuration) : "",
      intensity:   proto ? proto.defaultIntensity : "",
      completed:   false,
      startedAt:   null,
      completedAt: null,
    };
  });

  const [showTimer, setShowTimer]       = React.useState(false);
  const [started, setStarted]           = React.useState(() => !!loadCardioSession(dateStr)?.startedAt);
  const [elapsedSecs, setElapsedSecs]   = React.useState(0);
  const [showComplete, setShowComplete] = React.useState(false);
  const startRef                        = React.useRef(null);
  const elapsedRef                      = React.useRef(null);

  // ── Restore start time ───────────────────────────────────────────────────────
  React.useEffect(() => {
    const saved = loadCardioSession(dateStr);
    if (saved?.startedAt) startRef.current = saved.startedAt;
  }, []);

  // ── Elapsed timer ────────────────────────────────────────────────────────────
  React.useEffect(() => {
    if (!started || session.completed) return;
    const tick = () => {
      if (startRef.current) setElapsedSecs(Math.floor((Date.now() - startRef.current) / 1000));
    };
    tick();
    elapsedRef.current = setInterval(tick, 1000);
    return () => clearInterval(elapsedRef.current);
  }, [started, session.completed]);

  const formatElapsed = (s) => {
    const m = Math.floor(s / 60), sec = s % 60;
    return `${m}:${String(sec).padStart(2,"0")}`;
  };

  // ── Persist session ──────────────────────────────────────────────────────────
  const save = (updates) => {
    const next = { ...session, ...updates };
    setSession(next);
    saveCardioSession(dateStr, next);
  };

  // ── Protocol selection ───────────────────────────────────────────────────────
  const handleSelectProtocol = (proto) => {
    if (session.protocolId === proto.id) {
      save({ protocolId: null, type: "", duration: "", intensity: "" });
    } else {
      save({ protocolId: proto.id, type: proto.defaultType, duration: String(proto.defaultDuration), intensity: proto.defaultIntensity });
    }
  };

  // ── Begin session ────────────────────────────────────────────────────────────
  const handleStart = () => {
    const now = Date.now();
    startRef.current = now;
    haptic("medium");
    save({ startedAt: now });
    setStarted(true);
  };

  // ── Timer complete ────────────────────────────────────────────────────────────
  const handleTimerComplete = () => {
    setShowTimer(false);
    haptic("success");
    setShowComplete(true);
  };

  // ── Complete session ─────────────────────────────────────────────────────────
  const handleComplete = () => {
    const now = Date.now();
    haptic("success");
    save({ completed: true, completedAt: now });
    setShowComplete(false);
    // Navigate home automatically
    setTimeout(() => onBack(), 400);
  };

  const selectedProto = session.protocolId ? CARDIO_WORKOUTS.find(w => w.id === session.protocolId) : null;
  const logged        = session.type || session.duration || session.intensity;

  const CATEGORIES = ["HIIT", "VO2 MAX", "LACTATE THRESHOLD", "LISS", "MISS", "CIRCUIT"];
  const TYPES      = ["Run","Bike","Row","Swim","Walk","HIIT","Other"];
  const INTENSITIES = [
    { label:"Easy",     color:"#48bb78", sub:"Conversational" },
    { label:"Moderate", color:"#fbbf24", sub:"Challenging" },
    { label:"Hard",     color:"#ef4444", sub:"Near max" },
  ];

  const chipStyle = (active, color) => ({
    padding:"5px 12px", borderRadius:20, fontSize:12, fontWeight:700,
    letterSpacing:"0.04em", cursor:"pointer", border:"none",
    background: active ? color+"28" : "var(--bg-deep)",
    color: active ? color : "var(--text-muted)",
    outline: active ? `1px solid ${color}55` : "1px solid transparent",
    transition:"all 0.14s", whiteSpace:"nowrap",
  });

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg-root)", color:"var(--text-primary)", fontFamily:"'Inter',system-ui,sans-serif", paddingBottom:80 }}>

      {/* ── Header ─────────────────────────────────────────────────────────── */}
      <div style={{
        position:"sticky", top:0, zIndex:50,
        background:"var(--bg-root)", borderBottom:"1px solid var(--border)",
        padding:"12px 16px", display:"flex", alignItems:"center", gap:12,
      }}>
        <button onClick={onBack} style={{
          background:"none", border:"1px solid var(--border)", borderRadius:8,
          padding:"6px 12px", cursor:"pointer", fontSize:13, fontWeight:700,
          color:"var(--text-secondary)",
        }}>← Back</button>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14, fontWeight:800, color:"var(--text-primary)", lineHeight:1 }}>
            {selectedProto ? selectedProto.label : "Cardio Session"}
          </div>
          <div style={{ fontSize:12, color:"var(--text-muted)", marginTop:2 }}>{displayDate}</div>
        </div>
        {/* Elapsed timer — visible once started */}
        {started && !session.completed && (
          <div style={{
            fontSize:13, fontWeight:800, fontVariantNumeric:"tabular-nums",
            color: CARDIO_COLOR, background:`${CARDIO_COLOR}15`,
            border:`1px solid ${CARDIO_COLOR}44`,
            borderRadius:6, padding:"4px 10px",
          }}>{formatElapsed(elapsedSecs)}</div>
        )}
        {session.completed && (
          <div style={{
            fontSize:12, fontWeight:800, letterSpacing:"0.06em",
            color:"#48bb78", background:"#48bb7820",
            border:"1px solid #48bb7855",
            borderRadius:6, padding:"4px 10px",
          }}>DONE ✓</div>
        )}
      </div>

      {/* ── Workout Selector ────────────────────────────────────────────────── */}
      {!session.completed && (
        <div style={{ padding:"16px 16px 0" }}>
          <div style={{
            background:"var(--bg-card)", border:`1px solid ${CARDIO_COLOR}44`,
            borderRadius:10, overflow:"hidden",
          }}>
            <div style={{
              padding:"12px 16px", background:`${CARDIO_COLOR}0d`,
              borderBottom:"1px solid var(--border)",
              display:"flex", alignItems:"center", gap:8,
            }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={CARDIO_COLOR} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
              </svg>
              <span style={{ fontSize:12, fontWeight:800, letterSpacing:"0.08em", color:CARDIO_COLOR }}>SELECT WORKOUT</span>
            </div>
            <div style={{ padding:"14px 16px", display:"flex", flexDirection:"column", gap:14 }}>
              {CATEGORIES.map(cat => {
                const protos = CARDIO_WORKOUTS.filter(w => w.category === cat);
                return (
                  <div key={cat}>
                    <div style={{ fontSize:11, fontWeight:800, letterSpacing:"0.1em", color:"var(--text-muted)", marginBottom:8 }}>{cat}</div>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      {protos.map(proto => {
                        const active = session.protocolId === proto.id;
                        return (
                          <button key={proto.id} onClick={() => !session.completed && handleSelectProtocol(proto)}
                            style={chipStyle(active, CARDIO_COLOR)}>
                            {proto.label}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            {/* Protocol description */}
            {selectedProto && (
              <div style={{
                margin:"0 16px 14px",
                padding:"10px 12px", borderRadius:7,
                background:"var(--bg-inset)", border:"1px solid var(--border)",
                fontSize:12, color:"var(--text-secondary)", lineHeight:1.5,
              }}>
                {selectedProto.description}
                {selectedProto.intervals && (
                  <div style={{ marginTop:6, display:"flex", gap:8, flexWrap:"wrap" }}>
                    {[
                      { label:"WORK", value:`${selectedProto.intervals.workSecs}s`, color:"#ef4444" },
                      { label:"REST", value:`${selectedProto.intervals.restSecs}s`, color:"#48bb78" },
                      { label:"ROUNDS", value:String(selectedProto.intervals.rounds), color:CARDIO_COLOR },
                    ].map(({ label, value, color }) => (
                      <span key={label} style={{
                        fontSize:11, fontWeight:800, letterSpacing:"0.06em",
                        color, background:`${color}18`,
                        border:`1px solid ${color}44`,
                        borderRadius:4, padding:"2px 7px",
                      }}>{label} {value}</span>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Log: Type / Duration / Intensity ─────────────────────────────────── */}
      <div style={{ padding:"12px 16px 0" }}>
        <div style={{
          background:"var(--bg-card)", border:`1px solid ${session.completed ? "#48bb7844" : "var(--border)"}`,
          borderRadius:10, overflow:"hidden",
        }}>
          <div style={{
            padding:"12px 16px", background: session.completed ? "#48bb7810" : "var(--bg-inset)",
            borderBottom:"1px solid var(--border)",
            display:"flex", alignItems:"center", gap:8,
          }}>
            <span style={{ fontSize:12, fontWeight:800, letterSpacing:"0.08em", color: session.completed ? "#48bb78" : "var(--text-secondary)" }}>
              {session.completed ? "SESSION LOGGED" : "LOG"}
            </span>
          </div>
          <div style={{ padding:"14px 16px", display:"flex", flexDirection:"column", gap:14 }}>
            {/* Type */}
            <div>
              <div style={{ fontSize:12, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-secondary)", marginBottom:8 }}>TYPE</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {TYPES.map(t => (
                  <button key={t} disabled={session.completed}
                    onClick={() => save({ type: session.type === t ? "" : t })}
                    style={chipStyle(session.type === t, CARDIO_COLOR)}>
                    {t.toUpperCase()}
                  </button>
                ))}
              </div>
            </div>
            {/* Duration */}
            <div>
              <div style={{ fontSize:12, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-secondary)", marginBottom:8 }}>DURATION</div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <input
                  type="number" min="1" max="300"
                  value={session.duration}
                  disabled={session.completed}
                  onChange={e => save({ duration: e.target.value })}
                  placeholder="—"
                  style={{
                    width:80, padding:"8px 12px", borderRadius:6, fontSize:20, fontWeight:700,
                    textAlign:"center", background:"var(--bg-deep)",
                    border:`1px solid ${session.duration ? CARDIO_COLOR+"55" : "var(--border)"}`,
                    color:"var(--text-primary)", outline:"none",
                    opacity: session.completed ? 0.6 : 1,
                  }}
                />
                <span style={{ fontSize:13, color:"var(--text-secondary)", fontWeight:600 }}>minutes</span>
              </div>
            </div>
            {/* Intensity */}
            <div>
              <div style={{ fontSize:12, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-secondary)", marginBottom:8 }}>INTENSITY</div>
              <div style={{ display:"flex", gap:8 }}>
                {INTENSITIES.map(({ label, color, sub }) => {
                  const sel = session.intensity === label;
                  return (
                    <button key={label} disabled={session.completed}
                      onClick={() => save({ intensity: session.intensity === label ? "" : label })}
                      style={{
                        flex:1, padding:"10px 6px", borderRadius:7,
                        cursor: session.completed ? "default" : "pointer",
                        textAlign:"center", border:"none",
                        background: sel ? color+"22" : "var(--bg-deep)",
                        outline: sel ? `1px solid ${color}55` : "1px solid var(--border)",
                        transition:"all 0.14s",
                      }}>
                      <div style={{ fontSize:12, fontWeight:800, color: sel ? color : "var(--text-secondary)", letterSpacing:"0.03em" }}>{label.toUpperCase()}</div>
                      <div style={{ fontSize:12, color: sel ? color : "var(--text-muted)", marginTop:3, lineHeight:1.3 }}>{sub}</div>
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ── Action Buttons ───────────────────────────────────────────────────── */}
      {!session.completed && (
        <div style={{ padding:"16px" }}>
          {!started ? (
            /* Start session */
            <button onClick={handleStart} className="btn-primary" style={{
              width:"100%", padding:"18px", fontSize:15, fontWeight:800,
              borderRadius:10, cursor:"pointer", letterSpacing:"0.04em",
            }}>
              {selectedProto?.intervals ? `▶ Start ${selectedProto.label}` : "▶ Start Session"}
            </button>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {/* Guided timer button — only for HIIT protocols */}
              {selectedProto?.intervals && (
                <button onClick={() => setShowTimer(true)} style={{
                  width:"100%", padding:"16px", fontSize:14, fontWeight:800,
                  borderRadius:10, cursor:"pointer", letterSpacing:"0.04em",
                  background:`${CARDIO_COLOR}18`,
                  border:`1px solid ${CARDIO_COLOR}55`,
                  color: CARDIO_COLOR,
                }}>
                  ▶ Open Interval Timer
                </button>
              )}
              {/* Complete */}
              <button onClick={() => setShowComplete(true)} style={{
                width:"100%", padding:"16px", fontSize:14, fontWeight:800,
                borderRadius:10, cursor:"pointer", letterSpacing:"0.04em",
                background:"#48bb7822", border:"1px solid #48bb7855", color:"#48bb78",
              }}>
                Complete Session ✓
              </button>
            </div>
          )}
        </div>
      )}

      {/* ── Complete confirmation ────────────────────────────────────────────── */}
      {showComplete && (
        <div style={{
          position:"fixed", inset:0, zIndex:200,
          background:"rgba(0,0,0,0.8)", backdropFilter:"blur(4px)",
          display:"flex", alignItems:"center", justifyContent:"center", padding:24,
        }}>
          <div style={{
            background:"var(--bg-card)", border:"1px solid #48bb7855",
            borderRadius:14, padding:"28px 24px",
            width:"100%", maxWidth:340,
          }}>
            <div style={{ fontSize:32, textAlign:"center", marginBottom:12 }}>🏃</div>
            <div style={{ fontSize:17, fontWeight:800, textAlign:"center", marginBottom:6 }}>Session complete?</div>
            <div style={{ fontSize:13, color:"var(--text-secondary)", textAlign:"center", marginBottom:20, lineHeight:1.5 }}>
              {[session.type, session.duration ? session.duration+" min" : null, session.intensity].filter(Boolean).join(" · ") || "No details logged yet"}
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => setShowComplete(false)} style={{
                flex:1, padding:"14px", fontSize:13, fontWeight:700, borderRadius:10, cursor:"pointer",
                background:"var(--bg-inset)", border:"1px solid var(--border)", color:"var(--text-muted)",
              }}>Not yet</button>
              <button onClick={handleComplete} style={{
                flex:2, padding:"14px", fontSize:13, fontWeight:800, borderRadius:10, cursor:"pointer",
                background:"#48bb78", border:"1px solid #48bb78", color:"#000",
              }}>Done ✓</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Interval Timer overlay ────────────────────────────────────────────── */}
      {showTimer && selectedProto?.intervals && (
        <CardioIntervalTimer
          protocol={selectedProto}
          onComplete={handleTimerComplete}
          onDismiss={() => setShowTimer(false)}
        />
      )}
    </div>
  );
}

// ─── EXTRA DAY VIEW ────────────────────────────────────────────────────────────
// Standalone workout view for ad-hoc sessions added from the calendar.
// Uses dateStr as the storage key instead of dayIdx:weekIdx.
function ExtraDayView({ dateStr, onBack, profile, onProfileUpdate, activeDays }) {
  const extraKey    = `ppl:extra:${dateStr}`;
  const doneKey     = `ppl:extra:done:${dateStr}`;
  const startKey    = `ppl:extra:start:${dateStr}`;
  const strengthKey = `ppl:extra:end:${dateStr}`;
  const dataKey     = `ppl:extra:data:${dateStr}`;

  // ── State ────────────────────────────────────────────────────────────────────
  const [exercises, setExercises] = React.useState(() => {
    try { return JSON.parse(store.get(extraKey) || "null")?.exercises || []; } catch { return []; }
  });
  const [day, setDay] = React.useState(() => {
    try { return JSON.parse(store.get(extraKey) || "null"); } catch { return null; }
  });
  const [completedDone, setCompletedDone] = React.useState(() => !!store.get(doneKey));
  const [weekData, setWeekData] = React.useState(() => {
    try { return JSON.parse(store.get(dataKey) || "{}"); } catch { return {}; }
  });
  const [doneExercises, setDoneExercises] = React.useState(new Set());
  const [expandedIdx, setExpandedIdx]     = React.useState(null);
  const [editMode, setEditMode]           = React.useState(false);
  const [showLeavePrompt, setShowLeavePrompt]         = React.useState(false);
  const [showPostStrengthPrompt, setShowPostStrengthPrompt] = React.useState(false);
  const [showWorkoutModal, setShowWorkoutModal]       = React.useState(false);
  const [workoutStats, setWorkoutStats]               = React.useState(null);
  const [swapTarget, setSwapTarget]                   = React.useState(null);
  const [showAddExercise, setShowAddExercise]         = React.useState(false);
  const [workoutStarted, setWorkoutStarted] = React.useState(() => !!store.get(startKey) && !store.get(doneKey));
  const [elapsedSecs, setElapsedSecs]       = React.useState(0);
  const [showBwCheckin, setShowBwCheckin]   = React.useState(false);
  const [bwCheckinInput, setBwCheckinInput] = React.useState(() => {
    const log = loadBwLog(); return log.length > 0 ? String(log[0].weight) : (profile?.weight ? String(profile.weight) : "");
  });
  const [exNotes, setExNotes] = React.useState(() => loadExtraExNotes(dateStr));
  const [notes, setNotes] = React.useState(() => store.get(`ppl:extra:notes:${dateStr}`) || "");
  const [showNoteReview, setShowNoteReview] = React.useState(false);

  const handleNoteChange = (val) => {
    setNotes(val);
    store.set(`ppl:extra:notes:${dateStr}`, val);
  };

  const sessionStartRef = React.useRef(null);
  const strengthEndRef  = React.useRef(null);
  const elapsedRef      = React.useRef(null);

  // ── Restore timestamps from localStorage ────────────────────────────────────
  React.useEffect(() => {
    const s = store.get(startKey);
    if (s) sessionStartRef.current = parseInt(s, 10);
    const e = store.get(strengthKey);
    if (e) strengthEndRef.current = parseInt(e, 10);
  }, []);

  // ── Pre-populate carryover weights for new sessions ──────────────────────────
  React.useEffect(() => {
    if (completedDone) return; // don't overwrite logged data
    const existing = JSON.parse(store.get(dataKey) || "{}");
    let changed = false;
    const next = { ...existing };
    exercises.forEach((ex, i) => {
      if (!(next[i])) {
        const cw = getCarryoverWeight(ex.id);
        if (cw) {
          next[i] = { 0: { weight: cw, reps: "" } };
          changed = true;
        }
      }
    });
    if (changed) {
      store.set(dataKey, JSON.stringify(next));
      setWeekData(next);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // ── Live elapsed timer ───────────────────────────────────────────────────────
  React.useEffect(() => {
    if (!workoutStarted || completedDone) return;
    const tick = () => {
      if (sessionStartRef.current)
        setElapsedSecs(Math.floor((Date.now() - sessionStartRef.current) / 1000));
    };
    tick();
    elapsedRef.current = setInterval(tick, 1000);
    return () => clearInterval(elapsedRef.current);
  }, [workoutStarted, completedDone]);

  const formatElapsed = (s) => {
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    return h > 0
      ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
      : `${m}:${String(sec).padStart(2,'0')}`;
  };

  // ── Persist exercise list changes back to localStorage ──────────────────────
  const persistExercises = (exList) => {
    const current = JSON.parse(store.get(extraKey) || "{}");
    store.set(extraKey, JSON.stringify({ ...current, exercises: exList }));
  };

  // ── Find last logged weight for an exercise by ID across all meso data ──────
  const getCarryoverWeight = (exId) => {
    if (!activeDays) return "";
    const weeks = MESO ? MESO.weeks : 6;
    for (let w = weeks; w >= 0; w--) {
      for (let d = 0; d < activeDays.length; d++) {
        const idx = activeDays[d].exercises.findIndex(e => e.id === exId);
        if (idx < 0) continue;
        try {
          const raw = store.get(`ppl:day${d}:week${w}`);
          if (!raw) continue;
          const dayData = JSON.parse(raw);
          const w0 = (dayData[idx] || {})[0]?.weight;
          if (w0) return w0;
        } catch {}
      }
    }
    return "";
  };

  // ── Begin workout ────────────────────────────────────────────────────────────
  const beginWorkout = () => {
    const now = Date.now();
    sessionStartRef.current = now;
    store.set(startKey, String(now));
    setWorkoutStarted(true);
    if (!bwPromptShownThisWeek()) setShowBwCheckin(true);
  };

  // ── Handlers ─────────────────────────────────────────────────────────────────
  const handleUpdateSet = (exIdx, setIdx, field, value) => {
    setWeekData(prev => {
      const next = {
        ...prev,
        [exIdx]: {
          ...(prev[exIdx] || {}),
          [setIdx]: { ...((prev[exIdx] || {})[setIdx] || {}), [field]: value }
        }
      };
      store.set(dataKey, JSON.stringify(next));
      return next;
    });
    // Un-done the exercise if user edits it
    setDoneExercises(prev => {
      if (prev.has(exIdx)) { const n = new Set(prev); n.delete(exIdx); return n; }
      return prev;
    });
  };

  const handleWeightAutoFill = (exIdx, weight) => {
    handleUpdateSet(exIdx, 0, "weight", weight);
  };

  const handleLastSetFilled = (exIdx) => {
    setDoneExercises(prev => {
      const next = new Set([...prev, exIdx]);
      if (next.size === exercises.length) {
        strengthEndRef.current = Date.now();
        store.set(strengthKey, String(strengthEndRef.current));
        setShowPostStrengthPrompt(true);
      }
      return next;
    });
  };

  const handleSetLogged = () => {};

  const handleSwap = (newDbEx) => {
    if (swapTarget === null) return;
    const { exIdx } = swapTarget;
    const oldEx = exercises[exIdx];
    const newEx = {
      id: newDbEx.id, name: newDbEx.name, muscle: newDbEx.muscle, muscles: newDbEx.muscles,
      equipment: newDbEx.equipment, tag: newDbEx.tag, anchor: oldEx.anchor,
      sets: newDbEx.sets, reps: newDbEx.reps, rest: newDbEx.rest,
      warmup: oldEx.anchor ? newDbEx.warmup : (newDbEx.warmup || "1 feeler set"),
      progression: newDbEx.pattern === "isolation" ? "reps" : "weight",
      description: newDbEx.description || "", videoUrl: newDbEx.videoUrl || "", bw: !!newDbEx.bw,
    };
    setExercises(prev => { const n = prev.map((ex, i) => i === exIdx ? newEx : ex); persistExercises(n); return n; });
    setSwapTarget(null);
  };

  const handleAddExercise = (dbEx) => {
    const newEx = {
      id: dbEx.id, name: dbEx.name, muscle: dbEx.muscle, muscles: dbEx.muscles,
      equipment: dbEx.equipment, tag: dbEx.tag, anchor: false,
      sets: dbEx.sets, reps: dbEx.reps, rest: dbEx.rest, warmup: "1 feeler set",
      progression: dbEx.pattern === "isolation" ? "reps" : "weight",
      description: dbEx.description || "", videoUrl: dbEx.videoUrl || "", bw: !!dbEx.bw,
    };
    setExercises(prev => { const n = [...prev, newEx]; persistExercises(n); return n; });
    setShowAddExercise(false);
  };

  // ── Complete ─────────────────────────────────────────────────────────────────
  const doComplete = () => {
    setShowPostStrengthPrompt(false);
    clearInterval(elapsedRef.current);
    store.set(doneKey, "1");
    setCompletedDone(true);

    let durationMins = null;
    if (sessionStartRef.current) {
      const endTime = strengthEndRef.current || Date.now();
      durationMins = Math.round((endTime - sessionStartRef.current) / 60000);
      if (durationMins <= 0 || durationMins >= 300) durationMins = null;
      store.set(startKey, "");
      store.set(strengthKey, "");
    }

    let totalSets = 0, totalReps = 0, totalVolume = 0;
    exercises.forEach((ex, exIdx) => {
      const exData = weekData[exIdx] || {};
      for (let s = 0; s < ex.sets; s++) {
        const sd = exData[s] || {};
        if (!sd.reps || sd.reps === "") continue;
        totalSets++;
        const reps = parseInt(sd.reps) || 0;
        totalReps += reps;
        const weight = parseFloat(sd.weight) || 0;
        if (weight > 0) totalVolume += weight * reps;
        else if (ex.bw) {
          const bw = parseFloat(profile?.weight) || 0;
          if (bw > 0) totalVolume += bw * reps;
        }
      }
    });

    const sessionPRs = detectSessionPRs(exercises, weekData, "extra", { activeDays, currentDateStr: dateStr });
    haptic(sessionPRs.length > 0 ? "victory" : "complete");
    setWorkoutStats({ sets: totalSets, reps: totalReps, volume: Math.round(totalVolume), exercises: exercises.length, duration: durationMins, prs: sessionPRs });
    setShowWorkoutModal(true);
  };

  // ── Guard ────────────────────────────────────────────────────────────────────
  if (!day) return (
    <div style={{padding:24, color:"var(--text-secondary)"}}>
      Session not found.{" "}
      <button onClick={onBack} style={{color:"var(--accent)", background:"none", border:"none", cursor:"pointer"}}>Go back</button>
    </div>
  );

  const accent = TAG_ACCENT[day.tag] || "var(--accent)";
  const readOnly = (completedDone && !editMode) || (!workoutStarted && !completedDone);

  return (
    <div style={{paddingBottom:100}}>

      {/* ── REST TIMER (reuse same state-free pattern — ExtraDayView doesn't use it yet) */}

      {/* ── SWAP MODAL ── */}
      {swapTarget !== null && (
        <SwapModal
          exercise={exercises[swapTarget.exIdx]}
          dayTag={day.tag}
          profile={profile}
          onSwap={handleSwap}
          onClose={() => setSwapTarget(null)}
        />
      )}

      {/* ── ADD EXERCISE MODAL ── */}
      {showAddExercise && (
        <AddExerciseModal
          dayTag={day.tag}
          profile={profile}
          currentExerciseIds={exercises.map(e => e.id)}
          onAdd={handleAddExercise}
          onClose={() => setShowAddExercise(false)}
        />
      )}

      {/* ── BW WEEKLY CHECK-IN ── */}
      {showBwCheckin && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:290,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"var(--bg-card)",border:"1px solid var(--border-accent)",borderRadius:12,padding:"28px 24px",maxWidth:320,width:"100%",boxShadow:"var(--shadow-xl)"}}>
            <div style={{fontSize:12,fontWeight:800,letterSpacing:"0.12em",color:"var(--text-muted)",marginBottom:10}}>WEEKLY CHECK-IN</div>
            <div style={{fontSize:17,fontWeight:800,color:"var(--text-primary)",marginBottom:6}}>Log your bodyweight</div>
            <div style={{fontSize:12,color:"var(--text-secondary)",lineHeight:1.6,marginBottom:20}}>
              Tracking weekly bodyweight alongside your lifts gives you the full picture of how your training is working.
            </div>
            <input type="number" inputMode="decimal" value={bwCheckinInput} onChange={e=>setBwCheckinInput(e.target.value)}
              placeholder="lbs" autoFocus style={{width:"100%",background:"var(--bg-inset)",border:"1px solid var(--border-accent)",borderRadius:8,padding:"14px",fontSize:28,fontWeight:900,color:"var(--accent)",textAlign:"center",marginBottom:16,outline:"none",boxSizing:"border-box"}}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <button onClick={()=>{markBwPromptShown();setShowBwCheckin(false);}} style={{padding:"14px",borderRadius:8,cursor:"pointer",background:"transparent",border:"1px solid var(--border)",color:"var(--text-muted)",fontSize:13,fontWeight:700}}>Skip</button>
              <button onClick={()=>{
                const val=parseFloat(bwCheckinInput);
                if(!isNaN(val)&&val>0){addBwEntry(val);onProfileUpdate&&onProfileUpdate({weight:String(val)});}
                markBwPromptShown();setShowBwCheckin(false);
              }} className="btn-primary" style={{padding:"14px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:800}}>Log It</button>
            </div>
          </div>
        </div>
      )}

      {/* ── LEAVE PROMPT ── */}
      {showLeavePrompt && (
        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", zIndex:300, backdropFilter:"blur(6px)", display:"flex", alignItems:"center", justifyContent:"center", padding:24}}>
          <div style={{background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:12, padding:"32px 24px", maxWidth:340, width:"100%", textAlign:"center"}}>
            <div style={{fontSize:32, marginBottom:16}}>💪</div>
            <div style={{fontSize:13, color:"var(--text-secondary)", marginBottom:24, lineHeight:1.5}}>
              Your session is saved. Come back and finish — your timer picks up where you left off.
            </div>
            <div style={{display:"flex", flexDirection:"column", gap:10}}>
              <button onClick={() => setShowLeavePrompt(false)} style={{padding:"15px", borderRadius:8, cursor:"pointer", background:"var(--btn-primary-bg)", border:"1px solid var(--btn-primary-border)", color:"var(--btn-primary-text)", fontSize:14, fontWeight:700}}>Keep Going</button>
              <button onClick={() => { setShowLeavePrompt(false); onBack(); }} style={{padding:"13px", borderRadius:8, cursor:"pointer", background:"transparent", border:"1px solid var(--border)", color:"var(--text-muted)", fontSize:13}}>Leave Workout</button>
            </div>
          </div>
        </div>
      )}

      {/* ── ALL SETS DONE PROMPT ── */}
      {showPostStrengthPrompt && (
        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.82)", zIndex:210, display:"flex", alignItems:"center", justifyContent:"center", padding:24}}>
          <div style={{background:"var(--bg-card)", border:"1px solid var(--phase-accum)", borderRadius:12, padding:"32px 24px", maxWidth:340, width:"100%", textAlign:"center"}}>
            <div style={{fontSize:28, marginBottom:12}}>💪</div>
            <div style={{fontSize:16, fontWeight:800, color:"var(--text-primary)", marginBottom:8}}>All Sets Done</div>
            <div style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.6, marginBottom:28}}>Ready to wrap this session?</div>
            <div style={{display:"flex", flexDirection:"column", gap:10}}>
              <button onClick={() => { setShowPostStrengthPrompt(false); setShowNoteReview(true); }} style={{padding:"16px", borderRadius:8, cursor:"pointer", background:"var(--btn-primary-bg)", border:"1px solid var(--btn-primary-border)", color:"var(--btn-primary-text)", fontSize:14, fontWeight:700}}>Finish Session</button>
              <button onClick={() => setShowPostStrengthPrompt(false)} style={{padding:"14px", borderRadius:8, cursor:"pointer", background:"var(--bg-surface)", border:"1px solid var(--border)", color:"var(--text-secondary)", fontSize:13}}>Keep Going</button>
            </div>
          </div>
        </div>
      )}

      {/* ── BEGIN WORKOUT OVERLAY ── */}
      {!workoutStarted && !completedDone && (
        <div style={{position:"fixed", inset:0, zIndex:260, background:"rgba(0,0,0,0.88)", backdropFilter:"blur(6px)", display:"flex", alignItems:"center", justifyContent:"center", padding:24}}>
          <div onClick={e => e.stopPropagation()} style={{background:"var(--bg-card)", border:`1px solid ${accent}55`, borderRadius:8, padding:"32px 24px", maxWidth:340, width:"100%", boxShadow:"var(--shadow-xl)", textAlign:"center", animation:"dialogIn 0.2s cubic-bezier(0.34,1.56,0.64,1)"}}>
            <div style={{display:"inline-block", marginBottom:20, fontSize:12, fontWeight:800, letterSpacing:"0.07em", color:accent, background:accent+"18", padding:"5px 12px", borderRadius:4}}>EXTRA SESSION</div>
            <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.04em", color:"var(--text-muted)", marginBottom:6}}>
              {new Date(dateStr + "T00:00:00").toLocaleDateString("en-US", { weekday:"long", month:"short", day:"numeric" }).toUpperCase()}
            </div>
            <div style={{fontSize:26, fontWeight:900, color:"var(--text-primary)", lineHeight:1, marginBottom:6}}>{day.label}</div>
            <div style={{fontSize:13, color:"var(--text-dim)", marginBottom:24}}>{day.muscles}</div>
            <div style={{background:"var(--bg-inset)", borderRadius:6, padding:"12px 14px", marginBottom:24, textAlign:"left"}}>
              <div style={{fontSize:12, fontWeight:800, letterSpacing:"0.06em", color:"var(--text-muted)", marginBottom:8}}>{exercises.length} EXERCISES</div>
              {exercises.slice(0,4).map((ex, i) => (
                <div key={i} style={{fontSize:12, color:"var(--text-secondary)", paddingBottom:4, borderBottom: i < Math.min(exercises.length,4)-1 ? "1px solid var(--border)" : "none", marginBottom: i < Math.min(exercises.length,4)-1 ? 4 : 0}}>
                  {ex.name} <span style={{color:"var(--text-muted)"}}>· {ex.sets}×{ex.reps}</span>
                </div>
              ))}
              {exercises.length > 4 && <div style={{fontSize:12, color:"var(--text-muted)", marginTop:4}}>+{exercises.length - 4} more</div>}
            </div>
            <button onClick={beginWorkout} style={{width:"100%", padding:"16px", borderRadius:6, cursor:"pointer", background:"var(--btn-primary-bg)", border:"1px solid var(--btn-primary-border)", color:"var(--btn-primary-text)", fontSize:14, fontWeight:700, letterSpacing:"0.04em", marginBottom:10}}>
              Begin Workout
            </button>
            <button onClick={onBack} style={{width:"100%", padding:"12px", borderRadius:6, cursor:"pointer", background:"transparent", border:"none", color:"var(--text-muted)", fontSize:13}}>
              Go Back
            </button>
          </div>
        </div>
      )}

      {/* ── COMPLETION MODAL ── */}
      {showWorkoutModal && workoutStats && (
        <WorkoutCompleteModal
          dayLabel={day.label}
          gender={profile?.gender}
          stats={workoutStats}
          weekIdx={(() => {
            const cd = loadCompleted();
            const ad = activeDays;
            for (let w = 0; w < MESO.weeks; w++) {
              if (!ad.every((_, i) => cd.has(`${i}:${w}`))) return w;
            }
            return MESO.weeks;
          })()}
          onOk={() => { setShowWorkoutModal(false); onBack(); }}
        />
      )}

      {/* ── HEADER ── */}
      <div style={{background:"var(--bg-surface)", borderBottom:"1px solid var(--border)", padding:"16px", boxShadow:"var(--shadow-sm)"}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12}}>
          <button onClick={() => workoutStarted && !completedDone ? setShowLeavePrompt(true) : onBack()} style={{
            background:"var(--bg-card)", border:"1px solid var(--phase-intens)44",
            borderRadius:6, color:"var(--phase-intens)", fontSize:13, fontWeight:700,
            cursor:"pointer", padding:"7px 14px 7px 10px",
            display:"inline-flex", alignItems:"center", gap:6, letterSpacing:"0.02em",
          }}>
            <span style={{fontSize:18, lineHeight:1, marginTop:-1}}>‹</span><span>Back</span>
          </button>
          <div style={{display:"flex", alignItems:"center", gap:8}}>
            {workoutStarted && !completedDone && (
              <div style={{display:"flex", alignItems:"center", gap:5, background:"var(--bg-inset)", border:"1px solid var(--border)", borderRadius:6, padding:"5px 10px", fontSize:13, fontWeight:800, color:"var(--accent)", fontVariantNumeric:"tabular-nums", letterSpacing:"0.04em"}}>
                <span style={{fontSize:12}}>⏱</span>{formatElapsed(elapsedSecs)}
              </div>
            )}
            {completedDone && (
              <button onClick={() => setEditMode(e => !e)} style={{
                background: editMode ? "var(--accent)22" : "var(--bg-card)",
                border:`1px solid ${editMode ? "var(--accent)" : "var(--border)"}`,
                borderRadius:6, color: editMode ? "var(--accent)" : "var(--text-secondary)",
                fontSize:12, fontWeight:700, cursor:"pointer", padding:"6px 12px", letterSpacing:"0.03em",
              }}>{editMode ? "✓ Done Editing" : "✎ Edit Workout"}</button>
            )}
          </div>
        </div>
        <div style={{display:"flex", alignItems:"center", flexWrap:"wrap", gap:8, marginBottom:8}}>
          <span style={{fontSize:12, fontWeight:800, letterSpacing:"0.06em", padding:"3px 10px", borderRadius:4, background:accent+"22", color:accent, border:`1px solid ${accent}55`}}>{day.tag}</span>
          <span style={{fontSize:12, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)"}}>EXTRA SESSION</span>
          {completedDone && <span style={{fontSize:12, fontWeight:800, padding:"3px 10px", borderRadius:4, background:"var(--phase-accum)22", color:"var(--phase-accum)", border:"1px solid var(--phase-accum)55"}}>✓ Done</span>}
        </div>
        <div style={{fontSize:21, fontWeight:700, color:"var(--text-primary)"}}>{day.label}</div>
        <div style={{fontSize:13, color:"var(--text-secondary)", marginTop:4}}>{day.muscles}</div>
      </div>

      {/* ── EXERCISE CARDS ── */}
      <div style={{padding:"12px 0 0"}}>
        {exercises.map((ex, i) => (
          <div key={ex.id ? `${ex.id}-${i}` : i} style={{borderBottom:"1px solid rgba(91,155,213,0.1)"}}>
            <ExerciseCard
              exercise={ex}
              exIdx={i}
              dayIdx={0}
              weekIdx={0}
              weekData={weekData}
              onUpdateSet={handleUpdateSet}
              onWeightAutoFill={handleWeightAutoFill}
              onLastSetFilled={handleLastSetFilled}
              expanded={expandedIdx === i}
              onToggle={() => setExpandedIdx(expandedIdx === i ? null : i)}
              done={doneExercises.has(i)}
              readOnly={readOnly}
              onSwapClick={!readOnly ? () => setSwapTarget({ exIdx: i }) : null}
              onSetLogged={handleSetLogged}
              bodyweight={parseFloat(profile?.weight || 0)}
              note={exNotes[i] || ""}
              onNoteChange={val => {
                const next = { ...exNotes, [i]: val };
                setExNotes(next);
                saveExtraExNotes(dateStr, next);
              }}
            />
          </div>
        ))}
      </div>

      {/* ── ADD EXERCISE ── */}
      {workoutStarted && !completedDone && (
        <div style={{padding:"12px 16px"}}>
          <button onClick={() => setShowAddExercise(true)} style={{
            width:"100%", padding:"14px", borderRadius:8, cursor:"pointer",
            background:"var(--bg-surface)", border:"1px dashed var(--border)",
            color:"var(--text-muted)", fontSize:13, fontWeight:600,
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
          }}>
            <span style={{fontSize:18, lineHeight:1}}>+</span> Add Exercise
          </button>
        </div>
      )}

      {/* ── COMPLETE BUTTON ── */}
      {workoutStarted && !completedDone && (
        <div style={{padding:"8px 16px 16px"}}>
          <button onClick={() => setShowNoteReview(true)} className="btn-primary" style={{width:"100%", padding:"16px", borderRadius:8, cursor:"pointer", fontSize:14, fontWeight:700, letterSpacing:"0.04em"}}>
            Complete Workout
          </button>
        </div>
      )}

      {/* ── NOTE REVIEW STEP ── */}
      {showNoteReview && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",zIndex:220,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:"14px 14px 0 0",width:"100%",maxWidth:480,padding:"24px 20px 36px",maxHeight:"80vh",overflowY:"auto"}}>
            <div style={{fontSize:12,fontWeight:800,letterSpacing:"0.12em",color:"var(--text-muted)",marginBottom:10}}>SESSION NOTES</div>
            <div style={{fontSize:16,fontWeight:800,color:"var(--text-primary)",marginBottom:18}}>Anything to log before you go?</div>
            {exercises.map((ex, i) => (
              <div key={i} style={{marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:700,color:"var(--text-secondary)",letterSpacing:"0.04em",marginBottom:4}}>{ex.name}</div>
                <textarea
                  value={exNotes[i] || ""}
                  onChange={e => {
                    const updated = { ...exNotes, [i]: e.target.value };
                    setExNotes(updated);
                    saveExtraExNotes(dateStr, updated);
                  }}
                  placeholder="Notes for this exercise…"
                  rows={2}
                  style={{width:"100%",background:"var(--bg-inset)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text-secondary)",fontSize:12,padding:"8px 10px",resize:"none",outline:"none",lineHeight:1.5,boxSizing:"border-box",fontFamily:"inherit"}}
                />
              </div>
            ))}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:700,color:"var(--text-secondary)",letterSpacing:"0.04em",marginBottom:4}}>SESSION NOTE</div>
              <textarea
                value={notes}
                onChange={e => handleNoteChange(e.target.value)}
                placeholder="Overall feel, PRs, anything for next time…"
                rows={3}
                style={{width:"100%",background:"var(--bg-inset)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text-secondary)",fontSize:12,padding:"8px 10px",resize:"none",outline:"none",lineHeight:1.5,boxSizing:"border-box",fontFamily:"inherit"}}
              />
            </div>
            <button onClick={() => { setShowNoteReview(false); doComplete(); }} className="btn-primary"
              style={{width:"100%",padding:"16px",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:700,letterSpacing:"0.04em"}}>
              Finish Session ✓
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function DayView({ dayIdx, weekIdx, onBack, onComplete, onNextDay, completedDays, profile, activeDays, onProfileUpdate,
  restTimer, restTimerMinimized, setRestTimerMinimized, startRestTimer, dismissRestTimer }) {
  const day = activeDays[dayIdx];

  // Guard: if the day slot doesn't exist (profile/MESO mismatch after restore), bail gracefully
  if (!day) {
    return (
      <div style={{ minHeight:"100vh", background:"var(--bg-root)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32, gap:16 }}>
        <div style={{ fontSize:32 }}>⚠️</div>
        <div style={{ fontSize:16, fontWeight:700, color:"var(--text-primary)", textAlign:"center" }}>Session unavailable</div>
        <div style={{ fontSize:13, color:"var(--text-secondary)", textAlign:"center", lineHeight:1.6 }}>
          Day {dayIdx + 1} doesn't exist in the current program ({activeDays.length} days configured).
          This usually means a backup was restored with a different program structure.
        </div>
        <button onClick={onBack} className="btn-primary" style={{ padding:"12px 28px", borderRadius:6, fontSize:14, fontWeight:700, marginTop:8 }}>← Go Back</button>
      </div>
    );
  }

  const accent = TAG_ACCENT[day.tag];
  const pc = PHASE_COLOR[WEEK_PHASE[weekIdx]] || PHASE_COLOR["Accumulation"];
  const isDone = completedDays.has(`${dayIdx}:${weekIdx}`);
  const isCardioDay = day.tag === "CARDIO";

  // Days are never locked — users can log any day in any order
  const isLocked = false;

  // BW confirm modal — fires once per session per BW exercise
  const [bwConfirmed, setBwConfirmed] = React.useState(new Set());
  const [bwModal, setBwModal] = React.useState(null); // { exIdx, exName, bwValue }
  const [bwInput, setBwInput] = React.useState("");

  const handleExpandToggle = (i) => {
    const ex = day.exercises[i];
    // If BW exercise, not yet confirmed this session, and not read-only
    if (ex.bw && !bwConfirmed.has(i) && !isDone && !isLocked) {
      setBwInput(String(profile?.weight || ""));
      setBwModal({ exIdx: i, exName: ex.name });
    }
    setExpandedIdx(expandedIdx === i ? null : i);
  };

  const handleBwConfirm = () => {
    if (!bwModal) return;
    const val = parseFloat(bwInput);
    if (!isNaN(val) && val > 0 && val !== parseFloat(profile?.weight || 0)) {
      onProfileUpdate && onProfileUpdate({ weight: bwInput });
    }
    setBwConfirmed(prev => new Set([...prev, bwModal.exIdx]));
    setBwModal(null);
  };

  const [weekData, setWeekData]           = useState(() => loadDayWeekWithCarryover(dayIdx, weekIdx, day));
  const [notes, setNotes]                 = useState(() => loadNotes(dayIdx, weekIdx));
  const [expandedIdx, setExpandedIdx]     = useState(0);
  const [doneExercises, setDoneExercises] = useState(() => {
    // Rehydrate: an exercise is considered done if every set has reps logged
    const saved = loadDayWeekWithCarryover(dayIdx, weekIdx, day);
    const restored = new Set();
    day.exercises.forEach((ex, i) => {
      const exData = saved[i] || {};
      let allFilled = true;
      for (let s = 0; s < ex.sets; s++) {
        const sd = exData[s] || {};
        if (!sd.reps || sd.reps === "") { allFilled = false; break; }
      }
      if (allFilled) restored.add(i);
    });
    return restored;
  });
  const [dialog, setDialog]               = useState(null);
  const [showWorkoutModal, setShowWorkoutModal] = useState(false);
  const [workoutStats, setWorkoutStats]         = useState(null);
  const [completionWeekIdx, setCompletionWeekIdx] = useState(null); // snapshot weekIdx at completion time
  const [showReadyDialog, setShowReadyDialog]   = useState(false);
  const [showMesoOverlay, setShowMesoOverlay]   = useState(() => !isDone && !isLocked);
  const [editMode, setEditMode]                 = useState(false);
  const [showLeavePrompt, setShowLeavePrompt]   = useState(false);
  const leaveQuoteRef = React.useRef(null);
  React.useEffect(() => {
    if (showLeavePrompt && !leaveQuoteRef.current) {
      leaveQuoteRef.current = randomQuote("neutral");
    }
    if (!showLeavePrompt) leaveQuoteRef.current = null;
  }, [showLeavePrompt]);

  // Session duration tracking — timer starts explicitly on "Begin Workout", not on mount
  const sessionStartRef = React.useRef(null);
  const strengthEndRef  = React.useRef(null);
  const [workoutStarted, setWorkoutStarted] = useState(() => {
    const saved = store.get(`ppl:sessionStart:d${dayIdx}:w${weekIdx}`);
    return !!saved && !isDone && !isLocked;
  });
  const [elapsedSecs, setElapsedSecs] = useState(0);
  const elapsedIntervalRef = React.useRef(null);

  // On mount: restore sessionStart and strengthEnd from localStorage if workout was begun
  React.useEffect(() => {
    const savedStart = store.get(`ppl:sessionStart:d${dayIdx}:w${weekIdx}`);
    if (savedStart && !isDone && !isLocked) {
      sessionStartRef.current = parseInt(savedStart, 10);
      const savedEnd = store.get(`ppl:strengthEnd:d${dayIdx}:w${weekIdx}`);
      if (savedEnd) strengthEndRef.current = parseInt(savedEnd, 10);
    }
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Elapsed timer — runs while workout is active and not complete
  React.useEffect(() => {
    if (!workoutStarted || isDone) return;
    const tick = () => {
      if (sessionStartRef.current) {
        setElapsedSecs(Math.floor((Date.now() - sessionStartRef.current) / 1000));
      }
    };
    tick();
    elapsedIntervalRef.current = setInterval(tick, 1000);
    return () => clearInterval(elapsedIntervalRef.current);
  }, [workoutStarted, isDone]);

  // Format elapsed seconds as M:SS or H:MM:SS
  const formatElapsed = (secs) => {
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${m}:${String(s).padStart(2,'0')}`;
  };

  // Begin workout — stamps localStorage, starts timer, dismisses overlay
  const beginWorkout = () => {
    const now = Date.now();
    sessionStartRef.current = now;
    store.set(`ppl:sessionStart:d${dayIdx}:w${weekIdx}`, String(now));
    setWorkoutStarted(true);
    setShowMesoOverlay(false);
    if (!bwPromptShownThisWeek()) setShowBwCheckin(true);
  };

  const [showPostStrengthPrompt, setShowPostStrengthPrompt] = useState(false);
  // BW check-in — triggered from beginWorkout(), not at mount
  const [showBwCheckin, setShowBwCheckin] = useState(false);
  const [bwCheckinInput, setBwCheckinInput] = useState(() => {
    const log = loadBwLog(); return log.length > 0 ? String(log[0].weight) : (profile?.weight ? String(profile.weight) : "");
  });
  // Per-exercise notes
  const [exNotes, setExNotes] = useState(() => loadExNotes(dayIdx, weekIdx));
  // Previous week's notes for this same session — shown as a callout at session start
  const [prevNotesDismissed, setPrevNotesDismissed] = useState(false);

  // Build resolved exercises by applying any saved overrides
  // MUST be declared before prevWeekNotes useMemo — Babel hoists var to undefined otherwise
  const [exercises, setExercises] = useState(() => {
    return (day.exercises || []).map((ex, i) => {
      const ovId = loadExOverride(dayIdx, weekIdx, i);
      if (!ovId) return ex;
      const dbEx = EXERCISE_DB.find(e => e.id === ovId);
      if (!dbEx) return ex;
      const wu = ex.anchor
        ? (profile?.sessionDuration <= 30 ? "2 ramp sets — time is tight, be thorough" : dbEx.warmup)
        : (dbEx.warmup || "1 feeler set");
      return {
        id: dbEx.id, name: dbEx.name, muscle: dbEx.muscle, equipment: dbEx.equipment,
        tag: dbEx.tag, anchor: ex.anchor, sets: dbEx.sets, reps: dbEx.reps,
        rest: dbEx.rest, warmup: wu,
        progression: dbEx.pattern === "isolation" ? "reps" : "weight",
        description: dbEx.description || "",
        videoUrl: dbEx.videoUrl || "",
      };
    });
  });

  const prevWeekNotes = useMemo(() => {
    if (weekIdx === 0) return null; // no prior week
    const prevW = weekIdx - 1;
    const sessionNote = loadNotes(dayIdx, prevW);
    const exN = loadExNotes(dayIdx, prevW);
    const exEntries = exercises
      .map((ex, i) => ({ name: ex.name, note: (exN[i] || "").trim() }))
      .filter(e => e.note);
    if (!sessionNote.trim() && exEntries.length === 0) return null;
    return { sessionNote: sessionNote.trim(), exEntries, week: prevW };
  }, [dayIdx, weekIdx]);
  const [showUnfinishedPrompt, setShowUnfinishedPrompt] = useState(false);
  const [swapTarget, setSwapTarget]             = useState(null); // {exIdx}
  const [showAddExercise, setShowAddExercise]   = useState(false);
  const dialogShownRef = React.useRef(new Set());

  // ── Rest timer (state lives in App, received as props) ──────────────────────
  const [pendingRest, setPendingRest] = useState(null); // { exIdx, setIdx, partnerIdx, restStr, exName }

  // Superset-aware set logger: defers rest until both exercises in pair have logged the same set
  const handleSetLogged = React.useCallback((restStr, exName, setIdx, isLastSet = false) => {
    // Find if this exercise is part of a superset pair
    const exIdx = exercises.findIndex(e => e.name === exName);

    // On the last set of an exercise, use the next exercise's rest period
    // so the timer guides the transition between exercises
    let effectiveRestStr = restStr;
    if (isLastSet && exIdx !== -1) {
      const nextEx = exercises[exIdx + 1];
      if (nextEx && nextEx.rest) {
        effectiveRestStr = nextEx.rest;
      } else if (!nextEx) {
        // Final exercise of the session — short rest, they're done
        effectiveRestStr = "90 sec";
      }
    }

    if (exIdx === -1) { startRestTimer(effectiveRestStr, exName, dayIdx, weekIdx); return; }

    const ex = exercises[exIdx];
    const isPrimary = ex.supersetWith != null;
    const isSecondary = !isPrimary && exercises.some(e => e.supersetWith === exIdx);

    if (!isPrimary && !isSecondary) {
      startRestTimer(effectiveRestStr, exName, dayIdx, weekIdx);
      return;
    }

    const partnerIdx = isPrimary ? ex.supersetWith : exercises.findIndex(e => e.supersetWith === exIdx);

    if (pendingRest && pendingRest.partnerIdx === exIdx && pendingRest.setIdx === setIdx) {
      startRestTimer(pendingRest.restStr || effectiveRestStr, exName, dayIdx, weekIdx);
      setPendingRest(null);
    } else {
      setPendingRest({ exIdx, setIdx, partnerIdx, restStr: effectiveRestStr, exName });
    }
  }, [exercises, pendingRest, startRestTimer]);

  // Timer lives in App — no local interval to clean up on unmount

  const handleSwap = (newDbEx, scope) => {
    const { exIdx } = swapTarget;
    const oldEx = exercises[exIdx];
    const wu = oldEx.anchor
      ? (profile?.sessionDuration <= 30 ? "2 ramp sets — time is tight, be thorough" : newDbEx.warmup)
      : (newDbEx.warmup || "1 feeler set");
    const newEx = {
      id: newDbEx.id, name: newDbEx.name, muscle: newDbEx.muscle, equipment: newDbEx.equipment,
      tag: newDbEx.tag, anchor: oldEx.anchor, sets: newDbEx.sets, reps: newDbEx.reps,
      rest: newDbEx.rest, warmup: wu,
      progression: newDbEx.pattern === "isolation" ? "reps" : "weight",
      description: newDbEx.description || "",
      videoUrl: newDbEx.videoUrl || "",
    };
    saveExOverride(dayIdx, weekIdx, exIdx, newDbEx.id, scope);
    setExercises(prev => prev.map((ex, i) => i === exIdx ? newEx : ex));
    setSwapTarget(null);
  };

  const handleAddExercise = (dbEx, scope) => {
    const newEx = {
      id: dbEx.id, name: dbEx.name, muscle: dbEx.muscle, muscles: dbEx.muscles,
      equipment: dbEx.equipment, tag: dbEx.tag, anchor: false,
      sets: dbEx.sets, reps: dbEx.reps, rest: dbEx.rest, warmup: "1 feeler set",
      progression: dbEx.pattern === "isolation" ? "reps" : "weight",
      description: dbEx.description || "",
      videoUrl: dbEx.videoUrl || "",
      bw: !!dbEx.bw,
      addedMidMeso: true,
    };
    if (scope === "meso") {
      // Persist to profile — propagates to all remaining weeks via activeDays useMemo
      const updated = { ...profile };
      const prev = (updated.addedDayExercises || {});
      const dayList = [...(prev[dayIdx] || [])];
      if (!dayList.includes(dbEx.id)) dayList.push(dbEx.id);
      updated.addedDayExercises = { ...prev, [dayIdx]: dayList };
      saveProfile(updated);
      onProfileUpdate && onProfileUpdate({ addedDayExercises: updated.addedDayExercises });
    }
    // Always update local state so it appears immediately this session regardless of scope
    setExercises(prev => [...prev, newEx]);
    setShowAddExercise(false);
  };

  const handleUpdateSet = useCallback((exIdx, setIdx, field, value) => {
    // If user edits data for a done exercise, un-done it so they can re-complete
    setDoneExercises(prev => {
      if (prev.has(exIdx)) {
        const next = new Set(prev);
        next.delete(exIdx);
        return next;
      }
      return prev;
    });
    // Allow dialog to fire again for this exercise after an edit
    dialogShownRef.current.delete(exIdx);

    setWeekData(prev => {
      const next = {
        ...prev,
        [exIdx]: {
          ...(prev[exIdx] || {}),
          [setIdx]: {...((prev[exIdx] || {})[setIdx] || {}), [field]: value}
        }
      };
      saveDayWeek(dayIdx, weekIdx, next);
      return next;
    });
  }, [dayIdx, weekIdx]);

  const handleWeightAutoFill = useCallback((exIdx, weight, numSets) => {
    setWeekData(prev => {
      const exData = prev[exIdx] || {};
      const next = { ...prev, [exIdx]: { ...exData } };
      for (let s = 1; s < numSets; s++) {
        const setData = exData[s] || {};
        // Only skip if the user has already logged reps for this set (i.e. actually worked it)
        // Pre-populated/suggested weights don't count — always overwrite those
        const alreadyWorked = setData.reps && setData.reps !== "";
        if (!alreadyWorked) {
          next[exIdx][s] = { ...setData, weight };
        }
      }
      saveDayWeek(dayIdx, weekIdx, next);
      return next;
    });
  }, [dayIdx, weekIdx]);

  const handleLastSetFilled = useCallback((exIdx, exName, restStr) => {
    // Don't fire if already done or already shown since last edit
    if (doneExercises.has(exIdx) || dialogShownRef.current.has(exIdx)) return;
    dialogShownRef.current.add(exIdx);
    setDialog({ exIdx, exName, restStr, isLastSet: true });
  }, [doneExercises]);

  const handleDialogYes = (rpe) => {
    const { exIdx, restStr, isLastSet } = dialog;
    // Save RPE to the last set of this exercise
    if (rpe) {
      const ex = exercises[exIdx];
      const lastSet = ex.sets - 1;
      setWeekData(prev => {
        const next = {
          ...prev,
          [exIdx]: {
            ...(prev[exIdx] || {}),
            [lastSet]: { ...((prev[exIdx] || {})[lastSet] || {}), rpe }
          }
        };
        saveDayWeek(dayIdx, weekIdx, next);
        return next;
      });
    }
    setDialog(null);
    haptic("done");
    const newDone = new Set([...doneExercises, exIdx]);
    setDoneExercises(newDone);
    const nextIdx = exIdx + 1;
    if (nextIdx < exercises.length && !newDone.has(nextIdx)) {
      setExpandedIdx(nextIdx);
      setTimeout(() => {
        const el = document.getElementById(`ex-${nextIdx}`);
        if (el) el.scrollIntoView({ behavior:"smooth", block:"start" });
      }, 120);
    }
    // Fire the rest timer now — deferred from last-set checkmark
    // Never fire after the last set of an exercise is confirmed done
    // (transitioning between exercises doesn't warrant a rest prompt)
    // Only fire the strength-done prompt when every exercise is confirmed
    if (newDone.size === exercises.length) {
      strengthEndRef.current = Date.now();
      store.set(`ppl:strengthEnd:d${dayIdx}:w${weekIdx}`, String(strengthEndRef.current));
      setExpandedIdx(null);
      setShowPostStrengthPrompt(true);
    }
  };

  const handleDialogNo = () => {
    const { exIdx } = dialog;
    const ex = exercises[exIdx];
    const lastSetIdx = ex.sets - 1;
    // Clear the last set's reps so the user can re-log it — and allow the dialog to re-fire
    setWeekData(prev => {
      const exData = prev[exIdx] || {};
      const lastSet = exData[lastSetIdx] || {};
      const next = {
        ...prev,
        [exIdx]: {
          ...exData,
          [lastSetIdx]: { ...lastSet, reps: "" },
        }
      };
      saveDayWeek(dayIdx, weekIdx, next);
      return next;
    });
    dialogShownRef.current.delete(exIdx);
    setDialog(null);
  };

  const handleAddSet = () => {
    const { exIdx } = dialog;
    const ex = exercises[exIdx];
    const currentSets = ex.sets;
    const newSetIdx = currentSets; // 0-indexed, so next slot = current count
    // Copy weight from the last logged set
    const lastSetData = (weekData[exIdx] || {})[currentSets - 1] || {};
    const copiedWeight = lastSetData.weight || "";
    // Add the new set slot to weekData with copied weight, blank reps
    setWeekData(prev => {
      const next = {
        ...prev,
        [exIdx]: {
          ...(prev[exIdx] || {}),
          [newSetIdx]: { weight: copiedWeight, reps: "" },
        }
      };
      saveDayWeek(dayIdx, weekIdx, next);
      return next;
    });
    // Increment the sets count on the exercise object
    setExercises(prev => prev.map((e, i) =>
      i === exIdx ? { ...e, sets: e.sets + 1 } : e
    ));
    // Allow the dialog to re-fire when the new set is filled
    dialogShownRef.current.delete(exIdx);
    setDialog(null);
  };

  const handleNoteChange = (val) => {
    setNotes(val);
    saveNotes(dayIdx, weekIdx, val);
  };

  const [showNoteReview, setShowNoteReview] = useState(false);

  const handleComplete = () => {
    const allExDone = doneExercises.size === exercises.length;
    if (!allExDone) {
      setShowUnfinishedPrompt(true);
      return;
    }
    // Show note review step before finalising
    setShowNoteReview(true);
  };

  const doComplete = () => {
    setShowUnfinishedPrompt(false);
    markComplete(dayIdx, weekIdx);
    onComplete(dayIdx, weekIdx);

    // Stop elapsed timer
    clearInterval(elapsedIntervalRef.current);

    // Compute and save session duration — use strength end time if stamped, else now
    let durationMins = null;
    if (sessionStartRef.current) {
      const endTime = strengthEndRef.current || Date.now();
      durationMins = Math.round((endTime - sessionStartRef.current) / 60000);
      if (durationMins > 0 && durationMins < 300) { // sanity: ignore >5hr sessions
        saveSessionDuration(dayIdx, weekIdx, durationMins);
      } else {
        durationMins = null;
      }
      // Clean up persisted stamps
      store.set(`ppl:strengthEnd:d${dayIdx}:w${weekIdx}`, "");
      store.set(`ppl:sessionStart:d${dayIdx}:w${weekIdx}`, "");
    }

    // Compute session stats from current weekData
    let totalSets = 0, totalReps = 0, totalVolume = 0;
    exercises.forEach((ex, exIdx) => {
      const exData = weekData[exIdx] || {};
      for (let s = 0; s < ex.sets; s++) {
        const sd = exData[s] || {};
        if (!sd.reps || sd.reps === "") continue;
        totalSets++;
        const reps = parseInt(sd.reps) || 0;
        totalReps += reps;
        const weight = parseFloat(sd.weight) || 0;
        if (weight > 0) totalVolume += weight * reps;
        else if (ex.bw) {
          const bw = parseFloat(profile?.bodyweight) || 0;
          if (bw > 0) totalVolume += bw * reps;
        }
      }
    });

    const sessionPRs = detectSessionPRs(exercises, weekData, "meso", { dayIdx, weekIdx });
    haptic(sessionPRs.length > 0 ? "victory" : "complete");

    // Compute anchor lift week-over-week comparison
    const anchorComparison = [];
    if (weekIdx > 0) {
      const prevRaw = store.get(`ppl:day${dayIdx}:week${weekIdx - 1}`);
      const prevWeekData = prevRaw ? (() => { try { return JSON.parse(prevRaw); } catch { return {}; } })() : {};
      exercises.forEach((ex, exIdx) => {
        if (!ex.anchor) return;
        // Best weight today
        const todayData = weekData[exIdx] || {};
        let todayBest = 0;
        Object.values(todayData).forEach(s => {
          if (!s || !s.weight) return;
          const w = parseFloat(s.weight);
          if (w > todayBest) todayBest = w;
        });
        // Best weight last week
        const prevData = prevWeekData[exIdx] || {};
        let prevBest = 0;
        Object.values(prevData).forEach(s => {
          if (!s || !s.weight) return;
          const w = parseFloat(s.weight);
          if (w > prevBest) prevBest = w;
        });
        if (todayBest > 0 && prevBest > 0) {
          anchorComparison.push({
            name: ex.name,
            today: todayBest,
            prev: prevBest,
            delta: parseFloat((todayBest - prevBest).toFixed(1)),
          });
        }
      });
    }

    setWorkoutStats({ sets: totalSets, reps: totalReps, volume: Math.round(totalVolume), exercises: exercises.length, duration: durationMins, prs: sessionPRs, anchorComparison });
    setCompletionWeekIdx(weekIdx); // snapshot before onComplete may advance currentWeek
    setShowWorkoutModal(true);
  };

  return (
    <div style={{paddingBottom:100}}>

      {/* ── BW WEEKLY CHECK-IN ── */}
      {showBwCheckin && (
        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:290, display:"flex", alignItems:"center", justifyContent:"center", padding:24}}>
          <div style={{background:"var(--bg-card)", border:"1px solid var(--border-accent)", borderRadius:12, padding:"28px 24px", maxWidth:320, width:"100%", boxShadow:"var(--shadow-xl)"}}>
            <div style={{fontSize:12, fontWeight:800, letterSpacing:"0.12em", color:"var(--text-muted)", marginBottom:10}}>WEEKLY CHECK-IN</div>
            <div style={{fontSize:17, fontWeight:800, color:"var(--text-primary)", marginBottom:6}}>Log your bodyweight</div>
            <div style={{fontSize:12, color:"var(--text-secondary)", lineHeight:1.6, marginBottom:20}}>
              Tracking weekly bodyweight alongside your lifts gives you the full picture of how your training is working.
            </div>
            <input
              type="number" inputMode="decimal"
              value={bwCheckinInput}
              onChange={e => setBwCheckinInput(e.target.value)}
              placeholder="lbs"
              autoFocus
              style={{
                width:"100%", background:"var(--bg-inset)", border:"1px solid var(--border-accent)",
                borderRadius:8, padding:"14px", fontSize:28, fontWeight:900,
                color:"var(--accent)", textAlign:"center", marginBottom:16,
                outline:"none", boxSizing:"border-box",
              }}
            />
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
              <button onClick={() => { markBwPromptShown(); setShowBwCheckin(false); }} style={{
                padding:"14px", borderRadius:8, cursor:"pointer",
                background:"transparent", border:"1px solid var(--border)",
                color:"var(--text-muted)", fontSize:13, fontWeight:700,
              }}>Skip</button>
              <button onClick={() => {
                const val = parseFloat(bwCheckinInput);
                if (!isNaN(val) && val > 0) {
                  addBwEntry(val);
