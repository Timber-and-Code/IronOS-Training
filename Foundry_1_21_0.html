function App() {
  const [profile, setProfile]             = useState(loadProfile);
  const [view, setView]                   = useState("home");
  const [selectedDay, setSelectedDay]     = useState(null);
  const [currentWeek, setCurrentWeek]     = useState(loadCurrentWeek);
  const [completedDays, setCompletedDays] = useState(loadCompleted);
  const [onboarded, setOnboarded]         = useState(() => !!store.get("ppl:onboarded"));
  const [weekCompleteModal, setWeekCompleteModal] = useState(null); // { weekIdx, sessions, totalSessions, sets, isFinal }
  const [openWeekly, setOpenWeekly]       = useState(false);
  const [showSetup, setShowSetup]         = useState(false);
  const [selectedExtraDate, setSelectedExtraDate] = useState(null);
  const [selectedCardioDate, setSelectedCardioDate] = useState(null);
  const [selectedCardioProtocol, setSelectedCardioProtocol] = useState(null);
  const [showTour, setShowTour] = useState(false);

  // ── Global rest timer (persists across tab navigation) ──────────────────────
  const [restTimer, setRestTimer]               = useState(null); // { remaining, total, exName } | null
  const [restTimerMinimized, setRestTimerMinimized] = useState(false);
  const restIntervalRef  = React.useRef(null);
  const restEndTimeRef   = React.useRef(null);
  const timerDayRef      = React.useRef(null); // { dayIdx, weekIdx } — for navigate-back

  const fireTimerComplete = React.useCallback(() => {
    try { haptic("done"); } catch {}
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; osc.type = 'sine';
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.6);
    } catch {}
  }, []);

  const startRestTimer = React.useCallback((restStr, exName, dayIdx, weekIdx) => {
    const secs = parseRestSeconds(restStr);
    if (restIntervalRef.current) clearInterval(restIntervalRef.current);
    const endTime = Date.now() + secs * 1000;
    restEndTimeRef.current = endTime;
    if (dayIdx !== undefined) timerDayRef.current = { dayIdx, weekIdx };
    setRestTimerMinimized(false);
    setRestTimer({ remaining: secs, total: secs, exName });
    restIntervalRef.current = setInterval(() => {
      const remaining = Math.max(0, Math.ceil((restEndTimeRef.current - Date.now()) / 1000));
      setRestTimer(prev => {
        if (!prev) { clearInterval(restIntervalRef.current); return null; }
        if (remaining <= 0) {
          clearInterval(restIntervalRef.current);
          fireTimerComplete();
          return { ...prev, remaining: 0 };
        }
        return { ...prev, remaining };
      });
    }, 500);
  }, [fireTimerComplete]);

  // Re-sync when page becomes visible again (screen unlock / tab switch back)
  React.useEffect(() => {
    const onVisible = () => {
      if (document.visibilityState === 'visible' && restEndTimeRef.current) {
        const remaining = Math.max(0, Math.ceil((restEndTimeRef.current - Date.now()) / 1000));
        setRestTimer(prev => {
          if (!prev) return null;
          if (remaining <= 0) {
            if (restIntervalRef.current) clearInterval(restIntervalRef.current);
            fireTimerComplete();
            return { ...prev, remaining: 0 };
          }
          return { ...prev, remaining };
        });
      }
    };
    document.addEventListener('visibilitychange', onVisible);
    return () => document.removeEventListener('visibilitychange', onVisible);
  }, [fireTimerComplete]);

  const dismissRestTimer = React.useCallback(() => {
    if (restIntervalRef.current) clearInterval(restIntervalRef.current);
    restEndTimeRef.current = null;
    timerDayRef.current = null;
    setRestTimer(null);
    setRestTimerMinimized(false);
  }, []);

  // Request persistent storage on mount (silent — prevents browser auto-cleanup)
  useEffect(() => {
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist();
    }
  }, []);

  // Listen for cardio open requests fired from DayView post-strength prompt
  useEffect(() => {
    const handler = (e) => {
      const { dateStr, protocolId } = e.detail || {};
      if (dateStr) {
        setSelectedCardioDate(dateStr);
        setSelectedCardioProtocol(protocolId || null);
        setView("cardio");
      }
    };
    window.addEventListener("foundry:openCardio", handler);
    return () => window.removeEventListener("foundry:openCardio", handler);
  }, []);

  // Show tour once after first program is generated
  useEffect(() => {
    if (store.get("ppl:show_tour") === "1" && !store.get("ppl:toured")) {
      store.remove ? store.remove("ppl:show_tour") : localStorage.removeItem("ppl:show_tour");
      // Small delay so home screen renders first
      setTimeout(() => setShowTour(true), 800);
    }
  }, []);

  // Show onboarding if no profile and not yet onboarded
  if (!profile && !onboarded) {
    return <OnboardingFlow onDone={() => setOnboarded(true)} />;
  }

  // No profile but onboarded — show Explore with setup CTA (between mesos or explore-first)
  if (!profile && !showSetup) {
    return <NoMesoShell onSetup={() => setShowSetup(true)} onStartProgram={newProfile => { saveProfile(newProfile); window.location.reload(); }} />;
  }

  // Show setup if no profile (either first time or triggered from NoMesoShell)
  if (!profile) {
    return <SetupPage onComplete={p => {
      saveProfile(p);
      // Mark tour to show after reload if not already toured
      if (!store.get("ppl:toured")) store.set("ppl:show_tour", "1");
      window.location.reload();
    }} />;
  }

  const handleComplete = (dayIdx, weekIdx) => {
    markComplete(dayIdx, weekIdx);
    const newCompleted = new Set([...completedDays, `${dayIdx}:${weekIdx}`]);
    setCompletedDays(newCompleted);

    // Check if entire week is now done
    const weekFinished = Array.from({length: MESO.days}, (_, d) => d)
      .every(d => newCompleted.has(`${d}:${weekIdx}`));
    if (weekFinished) {
      snapshotData();
      // Count total sets logged this week for modal
      let totalSets = 0;
      const prog = generateProgram(loadProfile()).slice(0, MESO.days);
      prog.forEach((day, d) => {
        const raw = store.get(`ppl:day${d}:week${weekIdx}`);
        if (!raw) return;
        try {
          const wd = JSON.parse(raw);
          day.exercises.forEach((_, exIdx) => {
            const exData = wd[exIdx] || {};
            totalSets += Object.values(exData).filter(s => s && s.reps && s.reps !== "").length;
          });
        } catch {}
      });
      const isFinal = weekIdx === MESO.weeks; // deload week

      // Compute total volume and PR count for the modal
      let totalVolume = 0;
      let prCount = 0;
      const bw = parseFloat(loadProfile()?.weight || 0);
      prog.forEach((day, d) => {
        const raw = store.get(`ppl:day${d}:week${weekIdx}`);
        if (!raw) return;
        try {
          const wd = JSON.parse(raw);
          day.exercises.forEach((ex, exIdx) => {
            const exData = wd[exIdx] || {};
            let thisBest = 0;
            Object.values(exData).forEach(s => {
              if (!s || !s.reps) return;
              const w = parseFloat(s.weight || 0);
              const r = parseInt(s.reps);
              if (!r) return;
              const eff = ex.bw ? (bw + w) : w;
              totalVolume += eff * r;
              if (eff * r > thisBest) thisBest = eff * r;
            });
            // Compare to prior weeks
            let priorBest = 0;
            for (let pw = 0; pw < weekIdx; pw++) {
              const pr = store.get(`ppl:day${d}:week${pw}`);
              if (!pr) continue;
              try {
                const pwd = JSON.parse(pr);
                Object.values(pwd[exIdx] || {}).forEach(s => {
                  if (!s || !s.reps) return;
                  const w = parseFloat(s.weight || 0);
                  const r = parseInt(s.reps);
                  const eff = ex.bw ? (bw + w) : w;
                  if (eff * r > priorBest) priorBest = eff * r;
                });
              } catch {}
            }
            if (thisBest > priorBest && priorBest > 0) prCount++;
          });
        } catch {}
      });

      // ── Full meso retrospective data (isFinal only) ──────────────────────────
      let mesoAnchorGains = [];
      let mesoTotalVolume = 0;
      let mesoTotalPRs = 0;
      let mesoCompletedSessions = 0;
      const mesoTotalSessions = MESO.weeks * MESO.days; // excl. deload

      if (isFinal) {
        // Count completed sessions across all non-deload weeks
        for (let w = 0; w < MESO.weeks; w++) {
          for (let d = 0; d < MESO.days; d++) {
            if (newCompleted.has(`${d}:${w}`)) mesoCompletedSessions++;
          }
        }

        // Compute total meso volume and total PRs
        for (let w = 0; w <= MESO.weeks; w++) {
          prog.forEach((day, d) => {
            const raw = store.get(`ppl:day${d}:week${w}`);
            if (!raw) return;
            try {
              const wd = JSON.parse(raw);
              day.exercises.forEach((ex, exIdx) => {
                const exData = wd[exIdx] || {};
                let thisBest = 0;
                Object.values(exData).forEach(s => {
                  if (!s || !s.reps) return;
                  const weight = parseFloat(s.weight || 0);
                  const reps = parseInt(s.reps);
                  if (!reps) return;
                  const eff = ex.bw ? (bw + weight) : weight;
                  mesoTotalVolume += eff * reps;
                  if (eff * reps > thisBest) thisBest = eff * reps;
                });
                if (w > 0) {
                  let priorBest = 0;
                  for (let pw = 0; pw < w; pw++) {
                    const pr = store.get(`ppl:day${d}:week${pw}`);
                    if (!pr) continue;
                    try {
                      const pwd = JSON.parse(pr);
                      Object.values(pwd[exIdx] || {}).forEach(s => {
                        if (!s || !s.reps) return;
                        const weight = parseFloat(s.weight || 0);
                        const reps = parseInt(s.reps);
                        const eff = ex.bw ? (bw + weight) : weight;
                        if (eff * reps > priorBest) priorBest = eff * reps;
                      });
                    } catch {}
                  }
                  if (thisBest > priorBest && priorBest > 0) mesoTotalPRs++;
                }
              });
            } catch {}
          });
        }

        // Anchor lift progression: W1 best weight → peak week best weight
        prog.forEach((day, d) => {
          day.exercises.forEach((ex, exIdx) => {
            if (!ex.anchor) return;
            // Find best weight in week 0 (first session)
            const w1Raw = store.get(`ppl:day${d}:week0`);
            let w1Best = 0;
            if (w1Raw) {
              try {
                const w1d = JSON.parse(w1Raw);
                Object.values(w1d[exIdx] || {}).forEach(s => {
                  if (!s || !s.weight) return;
                  const w = parseFloat(s.weight);
                  if (w > w1Best) w1Best = w;
                });
              } catch {}
            }
            // Find best weight across all non-deload weeks
            let peakBest = 0;
            let peakWeek = 0;
            for (let w = 0; w < MESO.weeks; w++) {
              const raw = store.get(`ppl:day${d}:week${w}`);
              if (!raw) continue;
              try {
                const wd = JSON.parse(raw);
                Object.values(wd[exIdx] || {}).forEach(s => {
                  if (!s || !s.weight) return;
                  const weight = parseFloat(s.weight);
                  if (weight > peakBest) { peakBest = weight; peakWeek = w; }
                });
              } catch {}
            }
            // Get override name if any
            const ovId = store.get(`ppl:exov:d${d}:ex${exIdx}`);
            const dbEx = ovId ? (typeof EXERCISE_DB !== 'undefined' ? EXERCISE_DB.find(e => e.id === ovId) : null) : null;
            const exName = dbEx ? dbEx.name : ex.name;

            if (w1Best > 0 && peakBest > 0) {
              mesoAnchorGains.push({
                name: exName,
                start: w1Best,
                peak: peakBest,
                delta: parseFloat((peakBest - w1Best).toFixed(1)),
                peakWeek: peakWeek + 1,
              });
            }
          });
        });
        // Deduplicate by name (same anchor may appear across days)
        const seen = new Set();
        mesoAnchorGains = mesoAnchorGains.filter(g => {
          if (seen.has(g.name)) return false;
          seen.add(g.name);
          return true;
        });
      }

      setWeekCompleteModal({
        weekIdx,
        sessions: MESO.days,
        totalSessions: MESO.days,
        sets: totalSets,
        volume: Math.round(totalVolume),
        prs: prCount,
        isFinal,
        // Retrospective fields (isFinal only)
        anchorGains: mesoAnchorGains,
        mesoTotalVolume: Math.round(mesoTotalVolume),
        mesoTotalPRs,
        mesoCompletedSessions,
        mesoTotalSessions,
      });
      // Advance to next week so schedule auto-opens it
      const nextWeek = weekIdx + 1;
      if (nextWeek <= MESO.weeks) {
        setCurrentWeek(nextWeek);
        saveCurrentWeek(nextWeek);
      }
    }
  };

  const handleReset = () => {
    archiveCurrentMeso(profile);
    resetMeso();
    // Clear profile so setup page shows again (user can pick new meso length)
    // Page reload ensures MESO config recomputes from scratch
    localStorage.removeItem("ppl:profile");
    window.location.reload();
  };

  const handleNextDay = (dayIdx, weekIdx) => {
    const nextDayIdx = dayIdx + 1;
    if (nextDayIdx <= MESO.days - 1) {
      setSelectedDay(nextDayIdx);
    } else {
      const nextWeek = weekIdx + 1;
      if (nextWeek <= MESO.weeks - 1) {
        setCurrentWeek(nextWeek);
        saveCurrentWeek(nextWeek);
        setSelectedDay(0);
      } else {
        setView("home");
      }
    }
  };

  // Compute active days from profile — always reflects current equipment/duration selection
  const activeDays = useMemo(() => {
    if (!profile) return [];
    const days = generateProgram(profile).slice(0, MESO.days);
    // Append any exercises added mid-meso via the Add Exercise feature
    const added = profile.addedDayExercises || {};
    return days.map((day, dayIdx) => {
      const extraIds = added[dayIdx] || [];
      if (extraIds.length === 0) return day;
      const extraExs = extraIds
        .map(id => EXERCISE_DB.find(e => e.id === id))
        .filter(Boolean)
        .map(e => ({
          id: e.id, name: e.name, muscle: e.muscle, muscles: e.muscles,
          equipment: e.equipment, tag: e.tag, anchor: false,
          sets: e.sets, reps: e.reps, rest: e.rest, warmup: "1 feeler set",
          progression: e.pattern === "isolation" ? "reps" : "weight",
          description: e.description || "",
          videoUrl: e.videoUrl || "",
          bw: !!e.bw,
          addedMidMeso: true,
        }));
      return { ...day, exercises: [...day.exercises, ...extraExs] };
    });
  }, [profile]);

  const phase = WEEK_PHASE[currentWeek];
  const pc    = PHASE_COLOR[phase];

  // Compute activeWeek from completedDays — advances automatically as sessions are completed
  const activeWeek = (() => {
    for (let w = 0; w < MESO.weeks; w++) {
      const allDone = activeDays.every((_, i) => completedDays.has(`${i}:${w}`));
      if (!allDone) return w;
    }
    return MESO.weeks;
  })();

  return (
    <div style={{minHeight:"100vh", background:"var(--bg-root)", color:"var(--text-primary)", fontFamily:"'Inter',system-ui,sans-serif", maxWidth:480, margin:"0 auto"}}>
      {/* Header */}
      <div style={{position:"sticky", top:0, zIndex:50}}>
        <FoundryBanner subtitle={`${profile.name ? profile.name.toUpperCase() + " · " : ""}${MESO.weeks}WK ${(MESO.splitType||"ppl").toUpperCase().replace(/_/g," ")} · WEEK ${activeWeek+1}`} />
      </div>

      {/* ── Week Complete Modal ── */}
      {weekCompleteModal && (
        <div style={{
          position:"fixed", inset:0, zIndex:200,
          background:"rgba(0,0,0,0.92)", backdropFilter:"blur(8px)",
          display:"flex", alignItems:"center", justifyContent:"center",
          padding:"20px", overflowY:"auto",
        }}>
          {weekCompleteModal.isFinal ? (
            /* ── MESO RETROSPECTIVE ── */
            <div style={{
              background:"var(--bg-card)", border:"1px solid var(--phase-peak)55",
              borderRadius:12, padding:"28px 24px 24px",
              width:"100%", maxWidth:400,
              boxShadow:`0 32px 80px rgba(0,0,0,0.85)`,
              animation:"modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1)",
              margin:"auto",
            }}>
              {/* Header */}
              <div style={{textAlign:"center", marginBottom:22}}>
                <div style={{
                  width:60, height:60, borderRadius:"50%",
                  background:"var(--phase-peak)22", border:"2px solid var(--phase-peak)88",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  margin:"0 auto 14px", fontSize:26,
                }}>🏆</div>
                <div style={{fontSize:11, fontWeight:800, letterSpacing:"0.14em", color:"var(--text-muted)", marginBottom:8}}>
                  MESO COMPLETE
                </div>
                <div style={{fontSize:22, fontWeight:900, color:"var(--text-primary)", letterSpacing:"-0.01em", marginBottom:6}}>
                  {MESO.weeks} Weeks. Done.
                </div>
                <div style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.5}}>
                  {weekCompleteModal.mesoCompletedSessions}/{weekCompleteModal.mesoTotalSessions} sessions completed
                </div>
              </div>

              {/* Anchor lift gains */}
              {weekCompleteModal.anchorGains?.length > 0 && (
                <div style={{
                  background:"var(--bg-deep)", borderRadius:10,
                  border:"1px solid var(--border)", marginBottom:10,
                  overflow:"hidden",
                }}>
                  <div style={{
                    padding:"10px 14px",
                    borderBottom:"1px solid var(--border-subtle)",
                    background:"var(--phase-peak)0d",
                  }}>
                    <div style={{fontSize:11, fontWeight:800, letterSpacing:"0.08em", color:"var(--phase-peak)"}}>
                      STRENGTH GAINED
                    </div>
                  </div>
                  <div style={{padding:"6px 0"}}>
                    {weekCompleteModal.anchorGains.map((g, i) => (
                      <div key={i} style={{
                        display:"flex", alignItems:"center", justifyContent:"space-between",
                        padding:"10px 14px",
                        borderBottom: i < weekCompleteModal.anchorGains.length - 1 ? "1px solid var(--border-subtle)" : "none",
                      }}>
                        <div style={{flex:1, minWidth:0}}>
                          <div style={{fontSize:13, fontWeight:700, color:"var(--text-primary)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>
                            {g.name}
                          </div>
                          <div style={{fontSize:11, color:"var(--text-muted)", marginTop:2}}>
                            {g.start} lbs → {g.peak} lbs
                          </div>
                        </div>
                        <div style={{
                          fontSize:13, fontWeight:800, flexShrink:0, marginLeft:12,
                          color: g.delta > 0 ? "var(--phase-accum)" : "var(--text-muted)",
                        }}>
                          {g.delta > 0 ? `+${g.delta}` : g.delta === 0 ? "—" : g.delta} lbs
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Meso stats */}
              <div style={{
                display:"grid", gridTemplateColumns:"1fr 1fr 1fr",
                gap:8, marginBottom:18,
              }}>
                {[
                  { label:"SESSIONS", value: `${weekCompleteModal.mesoCompletedSessions}/${weekCompleteModal.mesoTotalSessions}` },
                  { label:"TOTAL PRs", value: weekCompleteModal.mesoTotalPRs },
                  { label:"VOLUME", value: weekCompleteModal.mesoTotalVolume >= 1000 ? `${(weekCompleteModal.mesoTotalVolume/1000).toFixed(0)}k` : weekCompleteModal.mesoTotalVolume, unit:"lbs" },
                ].map(({ label, value, unit }) => (
                  <div key={label} style={{
                    background:"var(--bg-deep)", borderRadius:8,
                    border:"1px solid var(--border)",
                    padding:"10px 6px", textAlign:"center",
                  }}>
                    <div style={{fontSize:11, fontWeight:800, letterSpacing:"0.08em", color:"var(--text-muted)", marginBottom:5}}>{label}</div>
                    <div style={{fontSize:18, fontWeight:900, color:"var(--phase-peak)", lineHeight:1}}>{value}</div>
                    {unit && <div style={{fontSize:10, color:"var(--text-muted)", marginTop:3}}>{unit}</div>}
                  </div>
                ))}
              </div>

              {/* CTAs */}
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                <button
                  onClick={() => { setWeekCompleteModal(null); handleReset(); }}
                  className="btn-primary"
                  style={{
                    width:"100%", padding:"15px", fontSize:14, fontWeight:800,
                    borderRadius:8, letterSpacing:"0.04em",
                    background:"var(--phase-peak)", border:"1px solid var(--phase-peak)",
                    color:"#000",
                  }}
                >Start Next Meso →</button>
                <button
                  onClick={() => { setWeekCompleteModal(null); }}
                  style={{
                    width:"100%", padding:"12px", fontSize:13, fontWeight:600,
                    borderRadius:8, cursor:"pointer",
                    border:"1px solid var(--border)", background:"transparent",
                    color:"var(--text-secondary)",
                  }}
                >Close</button>
              </div>
            </div>
          ) : (
            /* ── WEEK COMPLETE (non-final) ── */
            <div style={{
              background:"var(--bg-card)", border:"1px solid var(--border)",
              borderRadius:12, padding:"28px 24px",
              width:"100%", maxWidth:380,
              boxShadow:"var(--shadow-xl)",
            }}>
              {/* Header */}
              <div style={{textAlign:"center", marginBottom:20}}>
                <div style={{fontSize:28, marginBottom:8}}>🗓️</div>
                <div style={{fontSize:22, fontWeight:800, color:"var(--text-primary)", letterSpacing:"-0.01em"}}>
                  {`Week ${weekCompleteModal.weekIdx + 1} Done`}
                </div>
                <div style={{fontSize:13, color:"var(--text-secondary)", marginTop:6, lineHeight:1.5}}>
                  {`${weekCompleteModal.sessions} sessions completed`}
                </div>
              </div>

              {/* Stat row */}
              <div style={{
                display:"grid", gridTemplateColumns:"1fr 1fr 1fr",
                gap:8, marginBottom:22,
              }}>
                {[
                  { label:"SETS", value: weekCompleteModal.sets },
                  { label:"VOLUME", value: weekCompleteModal.volume >= 1000 ? `${(weekCompleteModal.volume/1000).toFixed(1)}k` : weekCompleteModal.volume, unit:"lbs" },
                  { label:"PRs", value: weekCompleteModal.prs || 0 },
                ].map(({ label, value, unit }) => (
                  <div key={label} style={{
                    background:"var(--bg-inset)", borderRadius:8, padding:"12px 8px",
                    textAlign:"center",
                  }}>
                    <div style={{fontSize:18, fontWeight:800, color:"var(--phase-intens)", lineHeight:1}}>{value}</div>
                    {unit && <div style={{fontSize:12, color:"var(--text-dim)", marginTop:1}}>{unit}</div>}
                    <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.08em", color:"var(--text-muted)", marginTop:4}}>{label}</div>
                  </div>
                ))}
              </div>

              {/* Buttons */}
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                <button
                  onClick={() => {
                    setWeekCompleteModal(null);
                    setOpenWeekly(true);
                    setView("home");
                  }}
                  className="btn-primary"
                  style={{width:"100%", padding:"14px", fontSize:14, fontWeight:700, borderRadius:8}}
                >View Week Summary →</button>
                <button
                  onClick={() => setWeekCompleteModal(null)}
                  style={{width:"100%", padding:"12px", fontSize:13, fontWeight:600, borderRadius:8, cursor:"pointer", border:"1px solid var(--border)", background:"transparent", color:"var(--text-secondary)"}}
                >Continue Training</button>
              </div>
            </div>
          )}
        </div>
      )}

      {view==="home" && (
        <HomeView
          currentWeek={currentWeek}
          setCurrentWeek={setCurrentWeek}
          onSelectDay={i=>{setSelectedDay(i); setView("day");}}
          onSelectDayWeek={(dayIdx, weekIdx) => { setCurrentWeek(weekIdx); setSelectedDay(dayIdx); setView("day"); }}
          onOpenExtra={(dateStr) => { setSelectedExtraDate(dateStr); setView("extra"); }}
          onOpenCardio={(dateStr, protocolId) => { setSelectedCardioDate(dateStr); setSelectedCardioProtocol(protocolId || null); setView("cardio"); }}
          completedDays={completedDays}
          profile={profile}
          activeDays={activeDays}
          onReset={handleReset}
          openWeekly={openWeekly}
          onOpenWeeklyHandled={() => setOpenWeekly(false)}
          onProfileUpdate={(updates) => {
            const updated = {...profile, ...updates};
            setProfile(updated);
            saveProfile(updated);
          }}
        />
      )}
      {view==="day" && selectedDay!==null && (
        <DayView
          dayIdx={selectedDay}
          weekIdx={currentWeek}
          onBack={()=>{ window.scrollTo(0,0); setView("home"); }}
          onComplete={handleComplete}
          onNextDay={handleNextDay}
          completedDays={completedDays}
          profile={profile}
          activeDays={activeDays}
          onProfileUpdate={(updates) => {
            const updated = {...profile, ...updates};
            setProfile(updated);
            saveProfile(updated);
          }}
          restTimer={restTimer}
          restTimerMinimized={restTimerMinimized}
          setRestTimerMinimized={setRestTimerMinimized}
          startRestTimer={startRestTimer}
          dismissRestTimer={dismissRestTimer}
        />
      )}
      {view==="extra" && selectedExtraDate && (
        <ExtraDayView
          dateStr={selectedExtraDate}
          profile={profile}
          activeDays={activeDays}
          onBack={() => { window.scrollTo(0,0); setView("home"); setSelectedExtraDate(null); }}
          onProfileUpdate={(updates) => {
            const updated = {...profile, ...updates};
            setProfile(updated);
            saveProfile(updated);
          }}
        />
      )}
      {view==="cardio" && selectedCardioDate && (
        <CardioSessionView
          dateStr={selectedCardioDate}
          plannedProtocolId={selectedCardioProtocol}
          profile={profile}
          onBack={() => {
            window.scrollTo(0,0);
            setView("home");
            setSelectedCardioDate(null);
            setSelectedCardioProtocol(null);
          }}
        />
      )}
      {showTour && (
        <TourOverlay onDone={() => setShowTour(false)} />
      )}

      {/* ── GLOBAL MINIMIZED TIMER BAR — floats over all views ── */}
      {restTimer && restTimerMinimized && (() => {
        const { remaining, total, exName } = restTimer;
        const pct     = total > 0 ? remaining / total : 0;
        const done    = remaining === 0;
        const mins    = Math.floor(remaining / 60);
        const secs    = remaining % 60;
        const timeStr = mins > 0
          ? `${mins}:${String(secs).padStart(2, '0')}`
          : `${String(secs).padStart(2, '0')}`;
        // Green until final ~15% of timer, then red
        const barColor = done ? 'var(--phase-accum)' : pct > 0.15 ? '#2dd4a8' : '#a03333';
        const barPct   = total > 0 ? (1 - pct) : 1; // elapsed fraction for dark overlay
        const handleTap = () => {
          if (done) {
            dismissRestTimer();
            return;
          }
          // Navigate back to DayView and expand full modal
          const ref = timerDayRef.current;
          if (ref) {
            setCurrentWeek(ref.weekIdx);
            setSelectedDay(ref.dayIdx);
            setView("day");
          }
          setRestTimerMinimized(false);
        };
        return (
          <div
            onClick={handleTap}
            style={{
              position:'fixed', bottom:64, left:0, right:0, zIndex:500,
              background: barColor,
              borderTop:`3px solid ${barColor}`,
              boxShadow:'0 -4px 20px rgba(0,0,0,0.5)',
              cursor:'pointer', userSelect:'none',
              maxWidth:480, margin:'0 auto',
            }}
          >
            {/* Elapsed dark overlay */}
            <div style={{
              position:'absolute', top:0, left:0, bottom:0,
              width:`${barPct * 100}%`,
              background:'rgba(0,0,0,0.22)',
              transition:'width 1s linear',
            }}/>
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 16px', position:'relative', zIndex:1}}>
              <div style={{display:'flex', alignItems:'center', gap:12}}>
                <div style={{
                  fontSize:24, fontWeight:900,
                  color:'rgba(0,0,0,0.8)',
                  fontVariantNumeric:'tabular-nums', minWidth:54, lineHeight:1,
                }}>
                  {done ? 'GO!' : timeStr}
                </div>
                <div style={{display:'flex', flexDirection:'column', gap:2}}>
                  <div style={{fontSize:13, fontWeight:700, color:'rgba(0,0,0,0.75)', lineHeight:1}}>
                    {done ? 'Rest complete' : 'Resting'}
                  </div>
                  <div style={{fontSize:12, color:'rgba(0,0,0,0.6)', lineHeight:1}}>
                    {exName}
                  </div>
                </div>
              </div>
              <div style={{
                fontSize:12, fontWeight:800, letterSpacing:'0.05em',
                color:'rgba(0,0,0,0.7)',
                background:'rgba(0,0,0,0.15)',
                border:'1px solid rgba(0,0,0,0.2)',
                borderRadius:6, padding:'7px 12px',
                whiteSpace:'nowrap',
              }}>
                {done ? 'DISMISS ✓' : 'RETURN ↑'}
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ─── ERROR BOUNDARY ───────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    this.setState({ info });
  }
  render() {
    if (!this.state.hasError) return this.props.children;
    const errMsg  = this.state.error?.message || String(this.state.error);
    const errStack = this.state.error?.stack || "";
    const compStack = this.state.info?.componentStack || "";
    return (
      <div style={{
        minHeight:"100vh", background:"var(--bg-root)", color:"var(--text-primary)",
        fontFamily:"'Inter',system-ui,sans-serif", maxWidth:480, margin:"0 auto",
        padding:24, display:"flex", flexDirection:"column", gap:16,
      }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, paddingTop:16 }}>
          <span style={{ fontSize:28 }}>💥</span>
          <div>
            <div style={{ fontSize:17, fontWeight:800 }}>Something went wrong</div>
            <div style={{ fontSize:12, color:"var(--text-secondary)", marginTop:2 }}>The Foundry hit an unexpected error</div>
          </div>
        </div>

        {/* Error message */}
        <div style={{
          background:"var(--bg-card)", border:"1px solid var(--border)",
          borderRadius:8, padding:"14px 16px",
        }}>
          <div style={{ fontSize:12, fontWeight:700, letterSpacing:"0.06em", color:"var(--phase-peak,#f5a623)", marginBottom:8 }}>ERROR</div>
          <div style={{ fontSize:13, fontWeight:600, color:"var(--text-primary)", wordBreak:"break-word", fontFamily:"monospace" }}>{errMsg}</div>
        </div>

        {/* Stack trace */}
        {errStack && (
          <div style={{
            background:"var(--bg-inset)", border:"1px solid var(--border)",
            borderRadius:8, padding:"14px 16px", maxHeight:220, overflowY:"auto",
          }}>
            <div style={{ fontSize:12, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)", marginBottom:8 }}>STACK TRACE</div>
            <pre style={{ fontSize:12, color:"var(--text-secondary)", margin:0, whiteSpace:"pre-wrap", wordBreak:"break-word", fontFamily:"monospace", lineHeight:1.5 }}>{errStack}</pre>
          </div>
        )}

        {/* Component stack */}
        {compStack && (
          <div style={{
            background:"var(--bg-inset)", border:"1px solid var(--border)",
            borderRadius:8, padding:"14px 16px", maxHeight:160, overflowY:"auto",
          }}>
            <div style={{ fontSize:12, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)", marginBottom:8 }}>COMPONENT STACK</div>
            <pre style={{ fontSize:12, color:"var(--text-secondary)", margin:0, whiteSpace:"pre-wrap", wordBreak:"break-word", fontFamily:"monospace", lineHeight:1.5 }}>{compStack}</pre>
          </div>
        )}

        <div style={{ display:"flex", gap:10, marginTop:4 }}>
          <button
            onClick={() => window.location.reload()}
            className="btn-primary"
            style={{ flex:1, padding:"13px", borderRadius:6, fontSize:14, fontWeight:700 }}
          >
            Reload App
          </button>
          <button
            onClick={() => this.setState({ hasError:false, error:null, info:null })}
            style={{
              flex:1, padding:"13px", borderRadius:6, fontSize:14, fontWeight:700,
              background:"var(--bg-card)", border:"1px solid var(--border)",
              color:"var(--text-primary)", cursor:"pointer",
            }}
          >
            Try Again
          </button>
        </div>
        <div style={{ fontSize:12, color:"var(--text-muted)", textAlign:"center", lineHeight:1.6 }}>
          Screenshot this screen and send it to James for debugging.
        </div>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary>
    <App />
  </ErrorBoundary>
);
</script>
</body>
</html>
