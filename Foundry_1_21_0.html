                  // Also update profile weight
                  onProfileUpdate && onProfileUpdate({ weight: String(val) });
                }
                markBwPromptShown();
                setShowBwCheckin(false);
              }} className="btn-primary" style={{
                padding:"14px", borderRadius:8, cursor:"pointer",
                background:"var(--btn-primary-bg)", border:"1px solid var(--btn-primary-border)",
                color:"var(--btn-primary-text)", fontSize:13, fontWeight:800,
              }}>Log It</button>
            </div>
          </div>
        </div>
      )}

      {/* ── BW CONFIRM MODAL ── */}
      {bwModal && (
        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:300, display:"flex", alignItems:"flex-end", justifyContent:"center"}}
          onClick={() => { setBwConfirmed(prev => new Set([...prev, bwModal.exIdx])); setBwModal(null); }}>
          <div onClick={e => e.stopPropagation()} style={{background:"var(--bg-card)", borderRadius:"12px 12px 0 0", border:"1px solid var(--border)", borderBottom:"none", width:"100%", maxWidth:480, padding:"24px 20px 32px"}}>
            <div style={{fontSize:12, fontWeight:800, color:"var(--accent)", letterSpacing:"0.08em", marginBottom:6}}>BODYWEIGHT CHECK</div>
            <div style={{fontSize:15, fontWeight:700, color:"var(--text-primary)", marginBottom:4}}>{bwModal.exName}</div>
            <div style={{fontSize:13, color:"var(--text-secondary)", marginBottom:20}}>Confirm your bodyweight before logging. If it changed, update it here — your logs will use the new number going forward.</div>
            <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:20}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12, color:"var(--text-muted)", fontWeight:600, marginBottom:6, letterSpacing:"0.05em"}}>BODYWEIGHT (lbs)</div>
                <input
                  type="number" inputMode="decimal"
                  value={bwInput}
                  onChange={e => setBwInput(e.target.value)}
                  autoFocus
                  style={{width:"100%", background:"var(--bg-inset)", border:"1px solid var(--border-accent)", borderRadius:8, padding:"12px 14px", fontSize:24, fontWeight:800, color:"var(--accent)", textAlign:"center", outline:"none", boxSizing:"border-box"}}
                />
              </div>
            </div>
            <button onClick={handleBwConfirm} style={{width:"100%", background:"var(--accent)", border:"none", borderRadius:8, padding:"14px", fontSize:14, fontWeight:800, color:"#000", cursor:"pointer", letterSpacing:"0.04em"}}>
              CONFIRM
            </button>
          </div>
        </div>
      )}


      {/* ── REST TIMER (full modal only — minimized bar is rendered at App level) ── */}
      {restTimer && !restTimerMinimized && (() => {
        const { remaining, total, exName } = restTimer;
        const pct = total > 0 ? remaining / total : 0;
        const done = remaining === 0;
        const mins = Math.floor(remaining / 60);
        const secs = remaining % 60;
        const timeStr = mins > 0
          ? `${mins}:${String(secs).padStart(2, '0')}`
          : `${String(secs).padStart(2, '0')}`;
        const ringColor = done
          ? 'var(--phase-accum)'
          : pct > 0.15 ? 'var(--phase-accum)'
          : '#a03333';
        const R = 72; const CIRC = 2 * Math.PI * R;
        const dash = CIRC * pct;
        const gap  = CIRC - dash;

        // ── FULL MODAL ──
        return (
          <div style={{
            position:'fixed', inset:0, zIndex:220,
            background:'rgba(0,0,0,0.82)',
            backdropFilter:'blur(4px)',
            display:'flex', alignItems:'center', justifyContent:'center',
            padding:24,
          }}>
            <div style={{
              background:'var(--bg-card)',
              border:`1px solid var(--border)`,
              borderRadius:16,
              boxShadow:'0 24px 64px rgba(0,0,0,0.7)',
              width:'100%', maxWidth:340,
              padding:'36px 28px 28px',
              display:'flex', flexDirection:'column', alignItems:'center', gap:0,
              position:'relative',
            }}>
              <button
                onClick={e => { e.stopPropagation(); setRestTimerMinimized(true); }}
                style={{
                  position:'absolute', top:12, right:12,
                  background:'var(--bg-inset)', border:'1px solid var(--border)',
                  borderRadius:6, padding:'4px 8px', cursor:'pointer',
                  fontSize:12, fontWeight:700, color:'var(--text-muted)',
                  letterSpacing:'0.04em',
                }}
              >MINIMIZE ↓</button>
              <div style={{
                fontSize:12, fontWeight:800, letterSpacing:'0.12em',
                color: done ? 'var(--phase-accum)' : 'var(--text-muted)',
                marginBottom:20, transition:'color 0.3s',
              }}>
                {done ? 'REST COMPLETE' : 'REST PERIOD'}
              </div>
              <div style={{position:'relative', width:168, height:168, marginBottom:20}}>
                <svg width="168" height="168" style={{transform:'rotate(-90deg)'}}>
                  <circle cx="84" cy="84" r={R} fill="none" stroke="var(--bg-inset)" strokeWidth="8"/>
                  <circle cx="84" cy="84" r={R} fill="none" stroke={ringColor} strokeWidth="8"
                    strokeLinecap="round"
                    strokeDasharray={`${dash} ${gap}`}
                    style={{transition:'stroke-dasharray 1s linear, stroke 0.5s'}}
                  />
                </svg>
                <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
                  {done ? (
                    <div style={{fontSize:52, fontWeight:900, color:'var(--phase-accum)', lineHeight:1}}>GO</div>
                  ) : (
                    <>
                      <div style={{fontSize:54, fontWeight:900, color:'var(--text-primary)', lineHeight:1, letterSpacing:'-0.03em'}}>{timeStr}</div>
                      <div style={{fontSize:12, color:'var(--text-muted)', fontWeight:600, marginTop:4}}>{mins > 0 ? 'min' : 'sec'}</div>
                    </>
                  )}
                </div>
              </div>
              <div style={{fontSize:13, fontWeight:600, color:'var(--text-secondary)', textAlign:'center', marginBottom:28, maxWidth:260, lineHeight:1.4}}>
                {exName}
              </div>
              <button onClick={dismissRestTimer} className="btn-primary" style={{
                width:'100%', padding:'16px', fontSize:14, fontWeight:800, borderRadius:10, cursor:'pointer',
                background: done ? 'var(--phase-accum)' : 'var(--btn-primary-bg)',
                border:`1px solid ${done ? 'var(--phase-accum)' : 'var(--btn-primary-border)'}`,
                color: done ? '#000' : 'var(--btn-primary-text)',
                letterSpacing:'0.04em', transition:'background 0.3s, color 0.3s, border-color 0.3s',
              }}>

                    exIdx={a}
                    dayIdx={dayIdx}
                    weekIdx={weekIdx}
                    weekData={weekData}
                    onUpdateSet={handleUpdateSet}
                    onWeightAutoFill={handleWeightAutoFill}
                    onLastSetFilled={handleLastSetFilled}

                    onSwapClick={(!isDone || editMode) && !isLocked ? () => setSwapTarget({exIdx: a}) : null}

                    note={exNotes[a] || ""}
                    onNoteChange={val => {
                      const next = { ...exNotes, [a]: val };
                      setExNotes(next);
                      saveExNotes(dayIdx, weekIdx, next);
                    }}
                  />
                </div>
                {/* Connector */}
                <div style={{
                  display:"flex", alignItems:"center", gap:8, padding:"4px 16px",
                  background:"rgba(91,155,213,0.05)",
                }}>
                  <div style={{flex:1, height:1, background:"rgba(91,155,213,0.2)"}}/>
                  <span style={{fontSize:12, color:"var(--phase-intens)", fontWeight:700, letterSpacing:"0.06em"}}>↕ then</span>
                  <div style={{flex:1, height:1, background:"rgba(91,155,213,0.2)"}}/>
                </div>
                {/* Exercise B */}
                <div id={`ex-${b}`}>
                  <ExerciseCard
                    exercise={exercises[b]}
                    exIdx={b}
                    dayIdx={dayIdx}
                    weekIdx={weekIdx}
                    weekData={weekData}
                    onUpdateSet={handleUpdateSet}
                    onWeightAutoFill={handleWeightAutoFill}
                    onLastSetFilled={handleLastSetFilled}
                    expanded={expandedIdx === b}
                    onToggle={() => handleExpandToggle(b)}
                    done={doneExercises.has(b)}
                    readOnly={(isDone && !editMode) || isLocked}
                    onSwapClick={(!isDone || editMode) && !isLocked ? () => setSwapTarget({exIdx: b}) : null}
                    onSetLogged={handleSetLogged}
                    bodyweight={parseFloat(profile?.weight || 0)}
                    note={exNotes[b] || ""}
                    onNoteChange={val => {
                      const next = { ...exNotes, [b]: val };
                      setExNotes(next);
                      saveExNotes(dayIdx, weekIdx, next);
                    }}
                  />
                </div>
              </div>
            );
          });
        })()}
      </div>
      )} {/* end !isCardioDay exercises */}

      {/* Add Exercise button — only on active (not done, not locked) lifting days, or in edit mode */}
      {!isCardioDay && (!isDone || editMode) && !isLocked && (
        <div style={{margin:"12px 16px 0"}}>
          <button onClick={() => setShowAddExercise(true)} style={{
            width:"100%", padding:"13px 16px", borderRadius:6, cursor:"pointer",
            background:"transparent",
            border:"1px dashed var(--border-accent)",
            color:"var(--accent)", fontSize:13, fontWeight:700,
            letterSpacing:"0.04em", display:"flex", alignItems:"center",
            justifyContent:"center", gap:8,
            transition:"background 0.15s, border-color 0.15s",
          }}>
            <span style={{fontSize:18, lineHeight:1}}>+</span>
            ADD EXERCISE
          </button>
        </div>
      )}

      <div style={{margin:"16px 16px 0"}}>
        <div style={{
          background:"var(--bg-card)",
          border:"1px solid var(--border)",
          borderRadius:8,
          overflow:"hidden",
          boxShadow:"var(--shadow-xs)",
        }}>
          <div style={{
            padding:"8px 16px", borderBottom:"1px solid var(--border)",
            background:"var(--bg-deep)",
            display:"flex", alignItems:"center", justifyContent:"space-between",
          }}>
            <span style={{fontSize:12, fontWeight:700, letterSpacing:"0.04em", color:"var(--text-secondary)"}}>Session notes</span>
            {isDone && <span style={{fontSize:12, color:"var(--success)", fontWeight:600}}>✎ editable</span>}
          </div>
          <textarea
            value={notes}
            onChange={e => !isLocked && handleNoteChange(e.target.value)}
            readOnly={isLocked}
            placeholder="How'd it feel? Any PRs? Notes for next session..."
            style={{
              display:"block", width:"100%", minHeight:96,
              background: isLocked ? "var(--bg-deep)" : "var(--bg-card)",
              border:"none",
              color:"var(--text-secondary)", fontSize:14, padding:"16px", resize:"vertical",
              outline:"none", lineHeight:1.6,
              opacity: isLocked ? 0.5 : 1,
            }}
          />
        </div>
      </div>

      {/* Complete button / locked / done banner */}
      <div style={{margin:"16px 16px 0"}}>
        {isDone ? (
          <div style={{
            width:"100%", padding:"16px", borderRadius:8,
            background:"var(--success-bg)", border:"1px solid var(--success-bg)",
            color:"var(--phase-accum)", fontSize:15, fontWeight:700,
            textAlign:"center", letterSpacing:"0.04em", lineHeight:1.5,
          }}>
            ✓ Session Complete — Review Only
            <div style={{fontSize:12, color:"var(--success)", marginTop:4, fontWeight:400}}>
              Changes are not allowed for completed sessions
            </div>
          </div>
        ) : isLocked ? (
          <div style={{
            width:"100%", padding:"16px", borderRadius:8,
            background:"var(--bg-surface)", border:"1px solid var(--text-dim)",
            color:"var(--text-muted)", fontSize:15, fontWeight:700,
            textAlign:"center", letterSpacing:"0.04em", lineHeight:1.5,
          }}>
            LOCKED — Complete Previous Days First
            <div style={{fontSize:12, color:"var(--text-dim)", marginTop:4, fontWeight:400}}>
              Finish all prior sessions this week to unlock this day
            </div>
          </div>
        ) : (() => {
          const allDone = isCardioDay || doneExercises.size === exercises.length;
          return (
            <button
              onClick={handleComplete}
              style={{
                width:"100%", padding:"16px", borderRadius:8,
                background: allDone ? accent : "var(--bg-surface)",
                border:`1px solid ${allDone ? accent : "var(--border)"}`,
                color: allDone ? "var(--text-primary)" : "var(--text-muted)",
                fontSize:16, fontWeight:700,
                cursor:"pointer",
                letterSpacing:"0.05em",
                transition:"all 0.2s",
              }}
            >
              {allDone
                ? "Mark Session Complete ✓"
                : isCardioDay ? "Mark Cardio Session Complete ✓"
                : `Complete All Exercises — ${doneExercises.size}/${exercises.length} done`}
            </button>
          );
        })()}
      </div>
    </div>
  );
}

// ─── PROGRESS VIEW ────────────────────────────────────────────────────────────
function ProgressView({ currentWeek, completedDays, activeDays }) {
  const [expandedDay, setExpandedDay] = useState(null);
  // Tally sets per muscle group across completed sessions in current week
  const muscleGroups = { PUSH: 0, PULL: 0, LEGS: 0 };
  activeDays.forEach((day, dayIdx) => {
    if (!completedDays.has(`${dayIdx}:${currentWeek}`)) return;
    const weekData = loadDayWeek(dayIdx, currentWeek);
    day.exercises.forEach((ex, exIdx) => {
      const exData = weekData[exIdx] || {};
      const filledSets = Object.values(exData).filter(s => s.reps && s.reps !== "").length;
      if (filledSets > 0) muscleGroups[day.tag] += filledSets;
    });
  });

  const workoutsThisWeek = activeDays.filter((_, i) => completedDays.has(`${i}:${currentWeek}`)).length;
  const workoutsTotal    = Array.from(completedDays).length;

  // BW log
  const bwLog = React.useMemo(() => loadBwLog().slice(0, 12).reverse(), []);

  // Session durations — all completed lifting sessions
  const sessionDurations = React.useMemo(() => {
    const all = [];
    for (let w = 0; w <= (MESO?.weeks || 6); w++) {
      for (let d = 0; d < (MESO?.days || 6); d++) {
        const dur = loadSessionDuration(d, w);
        if (dur !== null) all.push({ week: w, day: d, duration: dur });
      }
    }
    return all;
  }, []);
  const avgDuration = sessionDurations.length > 0
    ? Math.round(sessionDurations.reduce((s, x) => s + x.duration, 0) / sessionDurations.length)
    : null;

  // Current weights — latest logged weight for each anchor lift across all weeks
  const anchorLifts = activeDays.map(day => {
    const anchor = day.exercises.find(e => e.anchor);
    if (!anchor) return null;
    let bestWeight = "";
    for (let w = currentWeek; w >= 0; w--) {
      const wd = loadDayWeek(activeDays.indexOf(day), w);
      const exData = wd[0] || {};
      const setWithWeight = Object.values(wd[0] || {}).find(sv => sv.weight && sv.weight !== "");
      if (setWithWeight) { bestWeight = setWithWeight.weight; break; }
    }
    return { name: anchor.name, tag: day.tag, weight: bestWeight };
  }).filter(Boolean);

  const tagColor = TAG_ACCENT;
  const phase = WEEK_PHASE[currentWeek];
  const pc = PHASE_COLOR[phase];

  const statBox = (label, value, color) => (
    <div style={{
      flex:1, background:"var(--bg-card)", border:`1px solid ${color}33`,
      borderRadius:8, padding:"16px 12px", textAlign:"center",
    }}>
      <div style={{fontSize:22, fontWeight:900, color}}>{value}</div>
      <div style={{fontSize:12, color:"var(--text-secondary)", marginTop:4, fontWeight:600, letterSpacing:"0.04em"}}>{label}</div>
    </div>
  );

  // Mini sparkline for BW — expanded with goal weight + history
  const BwChart = () => {
    const [showHistory, setShowHistory] = React.useState(false);
    const [editingGoal, setEditingGoal] = React.useState(false);
    const [goalInput, setGoalInput] = React.useState(() => store.get("ppl:bwGoal") || "");
    const [goalWeight, setGoalWeight] = React.useState(() => {
      const v = parseFloat(store.get("ppl:bwGoal")); return isNaN(v) ? null : v;
    });

    if (bwLog.length === 0) return null;

    const latest = bwLog[bwLog.length - 1];
    const trend = bwLog.length >= 2 ? latest.weight - bwLog[0].weight : null;
    const hasChart = bwLog.length >= 2;

    // Chart geometry
    const W = 280, H = 60, PX = 8, PY = 8;
    let chartMin, chartMax;
    if (hasChart) {
      const weights = bwLog.map(e => e.weight);
      if (goalWeight !== null) weights.push(goalWeight);
      chartMin = Math.min(...weights);
      chartMax = Math.max(...weights);
    }
    const range = (chartMax - chartMin) || 1;
    const toX = i => PX + (i / (bwLog.length - 1)) * (W - PX * 2);
    const toY = v => H - PY - ((v - chartMin) / range) * (H - PY * 2);
    const pts = hasChart ? bwLog.map((e, i) => `${toX(i)},${toY(e.weight)}`).join(" L ") : "";

    const goalReached = goalWeight !== null && (
      goalWeight < latest.weight ? latest.weight <= goalWeight + 2 : latest.weight >= goalWeight - 2
    );
    const towardsGoal = goalWeight !== null && trend !== null && (
      (goalWeight < bwLog[0].weight && trend < 0) || (goalWeight > bwLog[0].weight && trend > 0)
    );

    const saveGoal = () => {
      const v = parseFloat(goalInput);
      if (!isNaN(v) && v > 50 && v < 600) {
        store.set("ppl:bwGoal", String(v));
        setGoalWeight(v);
        // Fire victory haptic if goal already reached at time of setting
        const curW = bwLog[bwLog.length - 1]?.weight;
        if (curW !== undefined) {
          const reached = v < curW ? curW <= v + 2 : curW >= v - 2;
          if (reached) haptic("victory");
        }
      } else if (goalInput === "") {
        store.set("ppl:bwGoal", "");
        setGoalWeight(null);
      }
      setEditingGoal(false);
    };

    return (
      <div style={{background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:8, marginBottom:12, overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"14px 16px 0", display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div style={{fontSize:12, fontWeight:800, letterSpacing:"0.06em", color:"var(--text-muted)"}}>BODYWEIGHT TREND</div>
          <div style={{display:"flex", alignItems:"center", gap:10}}>
            {trend !== null && (
              <span style={{fontSize:12, fontWeight:700, color: trend < 0 ? "var(--phase-accum)" : trend > 0 ? "var(--danger)" : "var(--text-muted)"}}>
                {trend > 0 ? "+" : ""}{trend.toFixed(1)} lbs
              </span>
            )}
            <span style={{fontSize:18, fontWeight:900, color:"var(--text-primary)"}}>{latest.weight}</span>
            <span style={{fontSize:12, color:"var(--text-muted)"}}>lbs</span>
          </div>
        </div>

        {/* Chart or single-entry display */}
        <div style={{padding:"10px 16px 0"}}>
          {hasChart ? (
            <>
              <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{display:"block", height:H}}>
                <path d={`M ${pts} L ${toX(bwLog.length-1)},${H} L ${toX(0)},${H} Z`} fill="rgba(47,79,111,0.15)" />
                <polyline points={pts} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
                {/* Goal weight dashed line */}
                {goalWeight !== null && (
                  <>
                    <line
                      x1={PX} y1={toY(goalWeight)} x2={W - PX} y2={toY(goalWeight)}
                      stroke="#c9a227" strokeWidth="1.5" strokeDasharray="4,3" opacity="0.8"
                    />
                    <text x={W - PX - 2} y={toY(goalWeight) - 4} fontSize="8" fill="#c9a227" textAnchor="end" fontWeight="700">
                      GOAL {goalWeight}
                    </text>
                  </>
                )}
                <circle cx={toX(bwLog.length-1)} cy={toY(latest.weight)} r="4" fill="var(--accent)" />
              </svg>
              <div style={{display:"flex", justifyContent:"space-between", marginTop:3}}>
                <span style={{fontSize:12, color:"var(--text-dim)"}}>{bwLog[0]?.date?.slice(5)}</span>
                <span style={{fontSize:12, color:"var(--text-dim)"}}>{latest.date?.slice(5)}</span>
              </div>
            </>
          ) : (
            <div style={{padding:"6px 0 10px", fontSize:12, color:"var(--text-muted)"}}>
              Log at least 2 weeks to see your trend chart.
            </div>
          )}
        </div>

        {/* Goal weight row */}
        <div style={{padding:"10px 16px", borderTop:"1px solid var(--border-subtle)", display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div style={{fontSize:12, fontWeight:700, color:"var(--text-muted)", letterSpacing:"0.03em"}}>
            {goalWeight !== null ? (
              <span>
                GOAL: <span style={{color:"#c9a227", fontWeight:800}}>{goalWeight} lbs</span>
                {goalReached && <span style={{marginLeft:6, color:"var(--phase-accum)"}}>✓ Reached!</span>}
                {!goalReached && towardsGoal && <span style={{marginLeft:6, color:"var(--text-muted)"}}>↓ On track</span>}
              </span>
            ) : (
              <span style={{color:"var(--text-dim)"}}>No goal set</span>
            )}
          </div>
          {editingGoal ? (
            <div style={{display:"flex", gap:6, alignItems:"center"}}>
              <input
                type="number" inputMode="decimal" value={goalInput}
                onChange={e => setGoalInput(e.target.value)}
                placeholder="lbs"
                autoFocus
                style={{
                  width:72, background:"var(--bg-inset)", border:"1px solid var(--accent)",
                  borderRadius:6, padding:"5px 8px", fontSize:13, fontWeight:700,
                  color:"var(--accent)", outline:"none", textAlign:"center",
                }}
                onKeyDown={e => { if (e.key === "Enter") saveGoal(); if (e.key === "Escape") setEditingGoal(false); }}
              />
              <button onClick={saveGoal} style={{fontSize:12, fontWeight:800, color:"var(--phase-accum)", background:"none", border:"none", cursor:"pointer", padding:"4px 6px"}}>Save</button>
              <button onClick={() => setEditingGoal(false)} style={{fontSize:12, color:"var(--text-muted)", background:"none", border:"none", cursor:"pointer", padding:"4px 6px"}}>✕</button>
            </div>
          ) : (
            <button onClick={() => { setGoalInput(goalWeight !== null ? String(goalWeight) : ""); setEditingGoal(true); }} style={{
              fontSize:12, fontWeight:700, color:"var(--accent)",
              background:"none", border:"1px solid var(--border)", borderRadius:5,
              cursor:"pointer", padding:"4px 10px",
            }}>
              {goalWeight !== null ? "Edit" : "+ Set Goal"}
            </button>
          )}
        </div>

        {/* History toggle */}
        <button
          onClick={() => setShowHistory(v => !v)}
          style={{
            width:"100%", padding:"9px 16px", background:"var(--bg-deep)",
            border:"none", borderTop:"1px solid var(--border-subtle)",
            color:"var(--text-muted)", fontSize:12, fontWeight:700,
            letterSpacing:"0.04em", cursor:"pointer", textAlign:"left",
            display:"flex", alignItems:"center", justifyContent:"space-between",
          }}
        >
          <span>HISTORY ({bwLog.length} {bwLog.length === 1 ? "entry" : "entries"})</span>
          <span style={{fontSize:13}}>{showHistory ? "▲" : "▼"}</span>
        </button>

        {showHistory && (
          <div style={{maxHeight:220, overflowY:"auto", WebkitOverflowScrolling:"touch"}}>
            {[...bwLog].reverse().map((entry, i, arr) => {
              const prev = arr[i + 1];
              const delta = prev ? entry.weight - prev.weight : null;
              return (
                <div key={entry.date} style={{
                  display:"flex", alignItems:"center", justifyContent:"space-between",
                  padding:"9px 16px",
                  borderBottom: i < arr.length - 1 ? "1px solid var(--border-subtle)" : "none",
                  background: i === 0 ? "var(--bg-inset)" : "transparent",
                }}>
                  <div>
                    <span style={{fontSize:12, fontWeight:700, color: i === 0 ? "var(--text-primary)" : "var(--text-secondary)"}}>
                      {entry.date}
                    </span>
                    {i === 0 && <span style={{fontSize:12, fontWeight:800, letterSpacing:"0.07em", color:"var(--accent)", marginLeft:8}}>LATEST</span>}
                  </div>
                  <div style={{display:"flex", alignItems:"baseline", gap:8}}>
                    {delta !== null && (
                      <span style={{fontSize:12, fontWeight:700, color: delta < 0 ? "var(--phase-accum)" : delta > 0 ? "var(--danger)" : "var(--text-muted)"}}>
                        {delta > 0 ? "+" : ""}{delta.toFixed(1)}
                      </span>
                    )}
                    <span style={{fontSize:14, fontWeight:800, color:"var(--text-primary)"}}>{entry.weight}</span>
                    <span style={{fontSize:12, color:"var(--text-muted)"}}>lbs</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  // Session duration chart
  const DurationChart = () => {
    if (sessionDurations.length < 1) return null;
    return (
      <div style={{background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:8, padding:"14px 16px", marginBottom:12}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10}}>
          <div style={{fontSize:12, fontWeight:800, letterSpacing:"0.06em", color:"var(--text-muted)"}}>LIFTING DURATION</div>
          <div style={{textAlign:"right"}}>
            {avgDuration !== null && (
              <>
                <span style={{fontSize:18, fontWeight:900, color:"var(--text-primary)"}}>{avgDuration}</span>
                <span style={{fontSize:12, color:"var(--text-muted)", marginLeft:3}}>min avg</span>
              </>
            )}
          </div>
        </div>
        <div style={{display:"flex", alignItems:"flex-end", gap:4, height:40}}>
          {sessionDurations.slice(-12).map((s, i) => {
            const maxD = Math.max(...sessionDurations.map(x => x.duration));
            const h = maxD > 0 ? Math.max(4, Math.round((s.duration / maxD) * 36)) : 4;
            const isCur = s.week === currentWeek;
            return (
              <div key={i} style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2}}>
                <div style={{
                  width:"100%", borderRadius:"3px 3px 0 0",
                  height:h, background: isCur ? "var(--accent)" : "var(--border-accent)",
                  transition:"height 0.3s",
                }} title={`W${s.week+1} D${s.day+1}: ${s.duration}min`} />
                <span style={{fontSize:7, color:"var(--text-dim)", lineHeight:1}}>{s.duration}m</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  return (
    <div style={{padding:"0 16px 24px"}}>
      {/* Week summary stats */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.04em", color:"var(--accent)", marginBottom:8}}>
          WEEK {currentWeek + 1} SUMMARY · {phase.toUpperCase()}
        </div>
        <div style={{display:"flex", gap:8, marginBottom:8}}>
          {statBox("THIS WEEK", `${workoutsThisWeek}/6`, pc)}
          {statBox("TOTAL SESSIONS", workoutsTotal, "var(--accent)")}
        </div>
        <div style={{display:"flex", gap:8}}>
          {statBox("PUSH SETS", muscleGroups.PUSH, TAG_ACCENT.PUSH)}
          {statBox("PULL SETS", muscleGroups.PULL, TAG_ACCENT.PULL)}
          {statBox("LEG SETS",  muscleGroups.LEGS,  TAG_ACCENT.LEGS)}
        </div>
      </div>

      {/* Bodyweight trend */}
      <BwChart />

      {/* Session duration */}
      <DurationChart />

      {/* e1RM card — anchor lifts only */}
      {(() => {
        const anchors = [];
        activeDays.forEach((day, dayIdx) => {
          day.exercises.forEach((ex, exIdx) => {
            if (!ex.anchor) return;
            const pts = loadSparklineData(dayIdx, exIdx);
            if (!pts.length) return;
            const best = pts.reduce((a, b) => (b.e1rm > a.e1rm ? b : a), pts[0]);
            const latest = pts[pts.length - 1];
            // Fatigue signal: stalling = e1RM didn't improve for 2+ consecutive logged weeks
            let isStalling = false;
            if (pts.length >= 3) {
              const p1 = pts[pts.length - 1].e1rm;
              const p2 = pts[pts.length - 2].e1rm;
              const p3 = pts[pts.length - 3].e1rm;
              isStalling = p1 <= p2 && p2 <= p3;
            }
            anchors.push({
              name: ex.name, tag: day.tag,
              e1rm: latest.e1rm,
              allTimeBest: best.e1rm,
              isPR: latest.e1rm >= best.e1rm && pts.length > 1,
              load75: Math.round(latest.e1rm * 0.75),
              load85: Math.round(latest.e1rm * 0.85),
              isStalling,
            });
          });
        });
        if (!anchors.length) return null;
        return (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.04em", color:"var(--accent)", marginBottom:8}}>
              ESTIMATED 1RM
            </div>
            <div style={{background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:8, overflow:"hidden"}}>
              {anchors.map((a, i) => {
                const ac = TAG_ACCENT[a.tag] || "var(--accent)";
                return (
                  <div key={i} style={{
                    padding:"12px 16px",
                    borderBottom: i < anchors.length - 1 ? "1px solid var(--border-subtle)" : "none",
                    display:"flex", alignItems:"center", gap:12,
                  }}>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:3}}>
                        <span style={{fontSize:13, fontWeight:700, color:"var(--text-primary)"}}>⭐ {a.name}</span>
                        {a.isPR && <span style={{fontSize:12, fontWeight:800, color:"#c9a227", background:"#c9a22722", border:"1px solid #c9a22744", borderRadius:4, padding:"1px 5px", letterSpacing:"0.06em"}}>PR</span>}
                        {a.isStalling && !a.isPR && <span style={{fontSize:12, fontWeight:800, color:"#f87171", background:"#f8717122", border:"1px solid #f8717144", borderRadius:4, padding:"1px 5px", letterSpacing:"0.06em"}}>STALLING</span>}
                      </div>
                      <div style={{display:"flex", gap:10}}>
                        <span style={{fontSize:12, color:"var(--text-muted)"}}>
                          75% <span style={{color:"var(--text-secondary)", fontWeight:700}}>{a.load75} lbs</span>
                        </span>
                        <span style={{fontSize:12, color:"var(--text-muted)"}}>
                          85% <span style={{color:"var(--text-secondary)", fontWeight:700}}>{a.load85} lbs</span>
                        </span>
                      </div>
                      {a.isStalling && !a.isPR && (
                        <div style={{fontSize:12, color:"#f87171", marginTop:5, lineHeight:1.4}}>
                          No progress in 2+ weeks — consider a deload or swapping the variation.
                        </div>
                      )}
                    </div>
                    <div style={{textAlign:"right", flexShrink:0}}>
                      <div style={{fontSize:22, fontWeight:900, color: a.isPR ? "#c9a227" : a.isStalling ? "#f87171" : ac, letterSpacing:"-0.02em", lineHeight:1}}>
                        {a.e1rm}
                      </div>
                      <div style={{fontSize:12, color:"var(--text-muted)", marginTop:2}}>lbs (Epley)</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:12, color:"var(--text-dim)", marginTop:6, paddingLeft:2}}>
              Based on best logged set this meso. 75% and 85% loading suggestions shown.
            </div>
          </div>
        );
      })()}

      {/* Lift weights by day */}
      <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.04em", color:"var(--accent)", marginBottom:8}}>
        CURRENT WEIGHTS
      </div>
      {activeDays.map((day, dayIdx) => {
        const accent = TAG_ACCENT[day.tag];
        const dayLiftsDirect = day.exercises.map((ex, exIdx) => {
          let weight = "";
          for (let w = currentWeek; w >= 0; w--) {
            const wd = loadDayWeek(dayIdx, w);
            const exData = wd[exIdx] || {};
            const sw = Object.values(exData).find(sv => sv && sv.weight && sv.weight !== "");
            if (sw) { weight = sw.weight; break; }
          }
          return { name: ex.name, muscle: ex.muscle, weight, anchor: ex.anchor, sets: ex.sets, reps: ex.reps };
        });
        const anyLogged = dayLiftsDirect.some(l => l.weight);
        const isDayExpanded = expandedDay === dayIdx;
        return (
          <div key={dayIdx} style={{
            background:"var(--bg-card)", border:`1px solid ${anyLogged ? accent+"44" : "var(--border)"}`,
            borderRadius:8, marginBottom:8, overflow:"hidden",
          }}>
            <button onClick={()=>setExpandedDay(isDayExpanded ? null : dayIdx)} style={{
              width:"100%", textAlign:"left",
              background: anyLogged ? accent+"11" : "var(--bg-deep)",
              border:"none", borderBottom: isDayExpanded ? "1px solid var(--border)" : "none",
              padding:"12px 16px", cursor:"pointer",
              display:"flex", alignItems:"center", gap:8,
            }}>
              <span style={{
                background:accent+"22", color:accent, fontSize:12, fontWeight:700,
                padding:"4px 8px", borderRadius:6, letterSpacing:"0.04em", flexShrink:0,
              }}>{day.tag}</span>
              <span style={{fontSize:13, fontWeight:700, color:"var(--text-primary)", flex:1}}>Day {day.dayNum} — {day.label}</span>
              {completedDays.has(`${dayIdx}:${currentWeek}`) && (
                <span style={{fontSize:12, color:"var(--phase-accum)", flexShrink:0}}>✓</span>
              )}
              <span style={{
                color:"var(--text-dim)", fontSize:20, flexShrink:0,
                transform: isDayExpanded ? "rotate(90deg)" : "none", transition:"transform 0.2s",
              }}>›</span>
            </button>
            {isDayExpanded && (
              <div>
                {dayLiftsDirect.map((lift, i) => (
                  <div key={i} style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"8px 16px", borderBottom: i < dayLiftsDirect.length-1 ? "1px solid var(--bg-surface)" : "none",
                  }}>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{display:"flex", alignItems:"baseline", gap:7, flexWrap:"wrap"}}>
                        <span style={{fontSize:13, color:"var(--text-primary)", fontWeight:600}}>
                          {lift.anchor && "⭐ "}{lift.name}
                        </span>
                        {lift.muscle && (
                          <span style={{fontSize:12, color:"var(--phase-intens)", fontWeight:700, letterSpacing:"0.05em"}}>
                            {lift.muscle.toUpperCase()}
                          </span>
                        )}
                      </div>
                      <span style={{fontSize:12, color:"var(--border-accent)"}}>{lift.sets}×{lift.reps}</span>
                    </div>
                    <div style={{
                      fontSize:14, fontWeight:700, color: lift.weight ? "var(--accent)" : "var(--text-dim)",
                      minWidth:60, textAlign:"right",
                    }}>
                      {lift.weight ? `${lift.weight} lbs` : "—"}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── WEEK SECTION (nested days) ───────────────────────────────────────────────
function WeekSection({ weekIdx, currentWeek, onSelectDay, completedDays, isExpanded, onToggle, activeDays, workoutDays, onSkipToggle }) {
  const phase = WEEK_PHASE[weekIdx];
  const pc = PHASE_COLOR[phase];
  const rir = WEEK_RIR[weekIdx];
  const isCurrent = weekIdx === currentWeek;
  const weekDone = activeDays.filter((_, i) => completedDays.has(`${i}:${weekIdx}`)).length;
  // Track skip state locally so toggle re-renders immediately
  const [skips, setSkips] = React.useState(() => {
    const s = {};
    activeDays.forEach((_, i) => { s[i] = isSkipped(i, weekIdx); });
    return s;
  });

  const handleSkip = (e, dayI) => {
    e.stopPropagation();
    const next = !skips[dayI];
    setSkipped(dayI, weekIdx, next);
    setSkips(prev => ({ ...prev, [dayI]: next }));
    onSkipToggle && onSkipToggle();
  };

  return (
    <div style={{marginBottom:8}}>
      <button onClick={onToggle} className="btn-card" style={{
        width:"100%", textAlign:"left",
        background: isCurrent ? pc+"18" : pc+"0a",
        border:`1px solid ${isCurrent ? pc : pc+"55"}`,
        borderRadius: isExpanded ? "8px 8px 0 0" : 8,
        padding:"16px", cursor:"pointer",
        display:"flex", alignItems:"center", gap:12,
        boxShadow: isCurrent ? `0 2px 12px ${pc}22` : "var(--shadow-xs)",
      }}>
        <div style={{
          width:46, height:46, borderRadius:6, flexShrink:0,
          background: pc+"22", display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center",
        }}>
          <span style={{fontSize:15, fontWeight:700, color:pc}}>W{weekIdx+1}</span>
        </div>
        <div style={{flex:1, minWidth:0}}>
          <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
            <span style={{fontSize:15, fontWeight:700, color:"var(--text-primary)"}}>{phase}</span>
            {isCurrent && (
              <span style={{fontSize:12, background:pc+"33", color:pc, padding:"2px 8px", borderRadius:99, fontWeight:700}}>CURRENT</span>
            )}
            {phase === "Deload" && (
              <span style={{fontSize:12, background:"var(--phase-deload)22", color:"var(--phase-deload)", padding:"2px 8px", borderRadius:99, fontWeight:700, border:"1px solid var(--phase-deload)44"}}>🌀 RECOVERY WEEK</span>
            )}
          </div>
          <div style={{fontSize:12, color:"var(--text-secondary)", marginTop:2}}>
            {phase === "Deload"
              ? `Drop weight ~40–50% · Active recovery · ${weekDone}/${MESO.days} sessions done`
              : `${rir} · ${weekDone}/${MESO.days} sessions done`
            }
          </div>
        </div>
        <span style={{
          color:"var(--text-dim)", fontSize:22, flexShrink:0,
          transform: isExpanded ? "rotate(90deg)" : "none", transition:"transform 0.2s",
        }}>›</span>
      </button>

      {isExpanded && (
        <div style={{animation:"fadeSlideDown 0.2s ease-out"}}>
        <div style={{
          border:`1px solid ${pc}55`,
          borderTop:"none", borderRadius:"0 0 8px 8px", overflow:"hidden",
        }}>
          {activeDays.map((day, i) => {
            const done = completedDays.has(`${i}:${weekIdx}`);
            const skipped = skips[i];
            // Can skip: future weeks only, not done, not deload
            const canSkip = weekIdx > currentWeek && !done && phase !== "Deload";
            const accent = TAG_ACCENT[day.tag];
            const dayColor = DAY_COLORS[i] || accent;
            return (
              <button key={i} onClick={() => !skipped && onSelectDay(i, weekIdx)} className="btn-row" style={{
                width:"100%", textAlign:"left",
                background: skipped ? "var(--bg-deep)" : done ? accent+"0d" : "var(--bg-card)",
                border:"none",
                borderBottom: i < activeDays.length-1 ? `1px solid ${pc}22` : "none",
                borderLeft: `3px solid ${skipped ? "var(--border)" : pc+(done ? "cc" : "55")}`,
                padding:"14px 16px", cursor: skipped ? "default" : "pointer",
                display:"flex", alignItems:"center", gap:12,
                opacity: skipped ? 0.5 : 1,
              }}>
                <div style={{
                  width:38, height:38, borderRadius:6, flexShrink:0,
                  background:dayColor+"22", display:"flex", alignItems:"center", justifyContent:"center",
                }}>
                  <span style={{fontSize:12, fontWeight:700, color:dayColor, letterSpacing:"0.02em"}}>
                    {workoutDays[i] !== undefined ? DAY_NAMES[workoutDays[i]] : `D${i+1}`}
                  </span>
                </div>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{display:"flex", alignItems:"center", gap:8}}>
                    <span style={{fontSize:15, fontWeight:700, color: done || skipped ? "var(--text-muted)" : "var(--text-primary)"}}>Day {day.dayNum} — {day.label}</span>
                    {skipped && <span style={{fontSize:12, fontWeight:800, letterSpacing:"0.07em", padding:"2px 7px", borderRadius:4, background:"var(--border)", color:"var(--text-muted)"}}>SKIPPED</span>}

                  {(() => {
                    const clog = loadCardioLog(i, weekIdx);

                    const cardioColor = TAG_ACCENT["CARDIO"];

                      flexShrink:0, padding:"5px 10px", borderRadius:6, cursor:"pointer",

                ) : done ? (
                  <span style={{fontSize:18, color:"var(--phase-accum)", flexShrink:0}}>✓</span>
                ) : (
                  <span style={{color:"var(--text-dim)", fontSize:20, flexShrink:0}}>›</span>
                )}
              </button>
            );
          })}
        </div>
        </div>
      )}
    </div>
  );
}

// ─── MUSCLE SETS BREAKDOWN ───────────────────────────────────────────────────
// Maps session tag (PUSH/PULL/LEGS/UPPER/LOWER/FULL) to display category
function sessionTagToCategory(sessionTag, exTag) {
  // For UPPER/LOWER/FULL sessions, use the exercise's original PUSH/PULL/LEGS tag
  if (sessionTag === "UPPER" || sessionTag === "LOWER" || sessionTag === "FULL") return exTag;
  return sessionTag;
}


// Flatten {PUSH:{Chest:12}, PULL:{Lats:10}} -> {Chest:12, Lats:10}
function flattenMuscleSets(byTag) {
  const result = {};
  Object.values(byTag).forEach(muscleMap => {
    Object.entries(muscleMap || {}).forEach(([muscle, sets]) => {
      result[muscle] = (result[muscle] || 0) + sets;
    });
  });
  return result;
}

function getLandmarkStatus(sets, lm) {
  if (!lm) return null;
  if (sets < lm.mev)      return { label:"MV",  fill:"#2563a8", color:"#5ba8ff", bg:"rgba(37,99,168,0.12)", border:"rgba(37,99,168,0.3)" };
  if (sets < lm.mavLow)   return { label:"Building", fill:"#c9a227", color:"#d4a83a", bg:"rgba(201,162,39,0.12)", border:"rgba(201,162,39,0.3)" };
  if (sets <= lm.mavHigh) return { label:"Optimal",  fill:"#2dd4a8", color:"var(--phase-accum)", bg:"rgba(45,212,168,0.12)", border:"rgba(45,212,168,0.3)" };
  if (sets <= lm.mrv)     return { label:"High",     fill:"#c9a227", color:"#d4a83a", bg:"rgba(201,162,39,0.12)", border:"rgba(201,162,39,0.3)" };
  return                         { label:"Exceeded", fill:"#c0392b", color:"#e07070", bg:"rgba(192,57,43,0.12)", border:"rgba(192,57,43,0.3)" };
}

function VolumeLandmarksCard({ byTag, title }) {
  const muscleSets = flattenMuscleSets(byTag);
  const entries = Object.entries(muscleSets)
    .filter(([m, s]) => s > 0 && VOLUME_LANDMARKS[m])
    .sort((a, b) => {
      const sa = getLandmarkStatus(a[1], VOLUME_LANDMARKS[a[0]]);
      const sb = getLandmarkStatus(b[1], VOLUME_LANDMARKS[b[0]]);
      const priority = s => s.label === "Exceeded" ? 0 : s.label === "MV" ? 1 : s.label === "High" ? 2 : 3;
      return priority(sa) - priority(sb) || b[1] - a[1];
    });
  if (entries.length === 0) return null;

  // Zone band opacities — same in dark and light, colors shift via status.fill
  const BAND_DANGER = "rgba(192,57,43,0.20)";
  const BAND_WARN   = "rgba(201,162,39,0.22)";
  const BAND_OPT    = "rgba(45,212,168,0.25)";
  const TICK        = "rgba(255,255,255,0.22)";
  const lblOpt      = "var(--phase-accum)";

  return (
    <div style={{background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:8, overflow:"hidden", boxShadow:"var(--shadow-sm)"}}>
      {/* Header + legend */}
      <div style={{padding:"14px 16px 12px", borderBottom:"1px solid var(--border-subtle)"}}>
        <div style={{fontSize:15, fontWeight:700, color:"var(--text-primary)", marginBottom:10}}>{title || "Volume check"}</div>
        <div style={{display:"flex", gap:14, flexWrap:"wrap"}}>
          {[
            ["#2563a8", "MV"],
            ["#c9a227", "Building"],
            ["#2dd4a8", "Optimal"],
            ["#c9a227", "High"],
            ["#c0392b", "Exceeded"],
          ].map(([c, label], i) => (
            <div key={i} style={{display:"flex", alignItems:"center", gap:5}}>
              <div style={{width:10, height:10, borderRadius:2, background:c, opacity:0.75, flexShrink:0}}/>
              <span style={{fontSize:12, color:"var(--text-secondary)"}}>{label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Muscle rows */}
      <div style={{padding:"0 16px 6px"}}>
        {entries.map(([muscle, sets], idx) => {
          const lm     = VOLUME_LANDMARKS[muscle];
          const status = getLandmarkStatus(sets, lm);
          const scale  = lm.mrv + 5;
          const mevPct  = (lm.mev     / scale) * 100;
          const mavLPct = (lm.mavLow  / scale) * 100;
          const mavHPct = (lm.mavHigh / scale) * 100;
          const mrvPct  = (lm.mrv     / scale) * 100;
          const fillPct = Math.min((sets / scale) * 100, 99);
          const isLast  = idx === entries.length - 1;
          const optMid  = (mavLPct + mavHPct) / 2;

          return (
            <div key={muscle} style={{
              padding:"11px 0",
              borderBottom: isLast ? "none" : "1px solid var(--border-subtle)",
            }}>
              {/* Name row */}
              <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:7}}>
                <div style={{fontSize:13, fontWeight:700, color:"var(--text-primary)", flex:1, minWidth:0}}>{muscle}</div>
                <div style={{fontSize:15, fontWeight:800, color:status.color, minWidth:20, textAlign:"right", lineHeight:1}}>{sets}</div>
                <div style={{
                  fontSize:12, fontWeight:700, letterSpacing:"0.03em",
                  color:status.color,
                  background:status.bg,
                  border:`1px solid ${status.border}`,
                  padding:"3px 9px", borderRadius:4,
                  minWidth:64, textAlign:"center", flexShrink:0,

  );

function calcMuscleSetsByTag(activeDays, completedDays, weekFilter) {
  const byTag = { PUSH:{}, PULL:{}, LEGS:{} };
  activeDays.forEach((day, dayIdx) => {
    for (let w = 0; w <= MESO.weeks; w++) {
      if (weekFilter !== null && w !== weekFilter) continue;
      if (!completedDays.has(`${dayIdx}:${w}`)) continue;
      const wd = loadDayWeek(dayIdx, w);
      day.exercises.forEach((ex, exIdx) => {
        const exData = wd[exIdx] || {};
        const filledSets = Object.values(exData).filter(s => s && s.reps && s.reps !== "").length;
        if (filledSets === 0) return;
        const cat = sessionTagToCategory(day.tag, ex.tag);
        if (!byTag[cat]) byTag[cat] = {};
        // Use primary muscle only — ex.muscles includes secondaries which causes double-counting
        // Lats merged into Back. Abductors folded into Glutes. Adductors excluded (no landmark).
        let primaryMuscle = ex.muscle || (ex.muscles && ex.muscles[0]);
        if (primaryMuscle === "Lats")       primaryMuscle = "Back";
        if (primaryMuscle === "Abductors")  primaryMuscle = "Glutes";
        if (primaryMuscle === "Adductors")  return; // excluded from volume tracking
        if (primaryMuscle) {
          byTag[cat][primaryMuscle] = (byTag[cat][primaryMuscle] || 0) + filledSets;
        }
      });
    }
  });
  return byTag;
}

// Compact inline muscle rows — used inside the This Week card
function WeekMuscleRows({ byTag, openTag, setOpenTag, activeDays, completedDays, weekFilter }) {
  const displayTags = Object.keys(byTag).filter(t => TAG_ACCENT[t]);
  const tags = displayTags.length > 0 ? displayTags : ["PUSH", "PULL", "LEGS"];

  // Compute actual sets performed per tag (not muscle-distributed)
  const actualSetsByTag = { PUSH:0, PULL:0, LEGS:0 };
  if (activeDays && completedDays) {
    activeDays.forEach((day, dayIdx) => {
      for (let w = 0; w <= MESO.weeks; w++) {
        if (weekFilter !== null && weekFilter !== undefined && w !== weekFilter) continue;
        if (!completedDays.has(`${dayIdx}:${w}`)) continue;
        const wd = loadDayWeek(dayIdx, w);
        const count = Object.values(wd).reduce((t, exData) =>
          t + Object.values(exData || {}).filter(s => s && s.reps && s.reps !== "").length, 0);
        if (actualSetsByTag[day.tag] !== undefined) actualSetsByTag[day.tag] += count;
      }
    });
  }
  return (
    <div style={{marginTop:14, borderTop:"1px solid var(--border)", paddingTop:12}}>
      <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.04em", color:"var(--text-muted)", marginBottom:8}}>Sets by muscle</div>
      {tags.map(tag => {

        const entries = Object.entries(byTag[tag] || {}).sort((a,b) => b[1]-a[1]);
        const total = entries.reduce((s,[,v]) => s+v, 0);
        const maxSets = entries.length > 0 ? entries[0][1] : 1;
        const isOpen = openTag === tag;
        return (
          <div key={tag}>
            <button onClick={() => setOpenTag(isOpen ? null : tag)} style={{

              padding:"8px 0", cursor:"pointer",
              display:"flex", alignItems:"center", gap:8, textAlign:"left",

              <div style={{width:50, height:3, background:"var(--bg-inset)", borderRadius:2, flexShrink:0, overflow:"hidden"}}>
                <div style={{height:"100%", width:`${Math.min((total/40)*100,100)}%`, background:acc, borderRadius:2}} />

              <span style={{color:"var(--text-dim)", fontSize:14, flexShrink:0, display:"inline-block", transform: isOpen ? "rotate(90deg)" : "none", transition:"transform 0.2s"}}>›</span>
            </button>

  const [form, setForm] = useState({
    name:   saved.name   || "",
    weight: saved.weight || "",
    gender: saved.gender || "",

  const [birthMonth, setBirthMonth] = useState(savedBd[1] ? parseInt(savedBd[1]).toString() : "");
  const [birthDay,   setBirthDay]   = useState(savedBd[2] ? parseInt(savedBd[2]).toString() : "");
  const [didSave, setDidSave] = useState(false);

  const handleSave = () => {
    let age = saved.age || "";
    let birthdate = saved.birthdate || "";
    if (birthMonth && birthDay && birthYear) {
      birthdate = `${birthYear}-${String(birthMonth).padStart(2,'0')}-${String(birthDay).padStart(2,'0')}`;
      const bd  = new Date(parseInt(birthYear), parseInt(birthMonth) - 1, parseInt(birthDay));
      const now = new Date();
      age = String(now.getFullYear() - bd.getFullYear() -
        (now < new Date(now.getFullYear(), bd.getMonth(), bd.getDate()) ? 1 : 0));
    }
    const updated = { ...saved, ...form, age, birthdate };
    store.set("ppl:profile", JSON.stringify(updated));
    setDidSave(true);
    setTimeout(() => setDidSave(false), 2000);

        <span style={{fontSize:12, fontWeight:600, letterSpacing:"0.05em", color:"var(--text-secondary)"}}>PROFILE</span>

      <div style={{padding:"20px 16px", display:"flex", flexDirection:"column", gap:16}}>

        <div style={{background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:8, padding:"20px", display:"flex", flexDirection:"column", gap:16}}>

          <div>

            <input type="text" placeholder="First name" value={form.name}

          <div>

// Converts SAMPLE_PROGRAMS day objects (exercise name strings) into fully-formed
// day objects matching the aiDays shape that generateProgram returns as-is.
function buildAiDaysFromSample(prog) {
  return prog.days.map(day => {
    const exercises = day.exercises.map((name, ei) => {
      const dbEx = EXERCISE_DB.find(e => e.name === name);
      if (!dbEx) {
        // Graceful fallback for any name mismatch — build a minimal object
        return {
          id: name.toLowerCase().replace(/\s+/g, "_"),
          name, muscle: day.tag, muscles: [day.tag],
          equipment: "barbell", tag: day.tag,
          anchor: ei === 0,
          sets: 3, reps: "8-12", rest: "2-3 min",
          warmup: ei === 0 ? "Full protocol" : "1 feeler set",
          progression: "weight", description: "", videoUrl: "", bw: false,
        };
      }
      const isAnchor = ei === 0;
      return {
        id: dbEx.id, name: dbEx.name,
        muscle: dbEx.muscle, muscles: dbEx.muscles,
        equipment: dbEx.equipment, tag: dbEx.tag,
        anchor: isAnchor,
        sets: dbEx.sets, reps: dbEx.reps, rest: dbEx.rest,
        warmup: isAnchor
          ? (dbEx.warmup || "Full protocol")
          : (dbEx.warmup || "1 feeler set"),
        progression: dbEx.pattern === "isolation" ? "reps" : "weight",
        description: dbEx.description || "",
        videoUrl: dbEx.videoUrl || "",
        bw: !!dbEx.bw,
      };
    });
    return { label: day.label, tag: day.tag, exercises };
  });
}

            <div style={{ fontSize:12, fontWeight:700, color: confirmed ? "var(--phase-peak,#dc5050)" : "var(--text-secondary)", lineHeight:1.5 }}>

  );

  const [recoveryTip] = useState(() => RECOVERY_TIPS[Math.floor(Math.random() * RECOVERY_TIPS.length)]);

  useEffect(() => { window.scrollTo(0, 0); }, []);
  useEffect(() => { setShowNextSession(false); }, [activeWeek]);

  // If parent requests weekly tab, navigate there once
  useEffect(() => {
    if (openWeekly) {
      setTab("weekly");
      window.scrollTo(0, 0);
      if (onOpenWeeklyHandled) onOpenWeeklyHandled();
    }
  }, [openWeekly]);

  const goTo   = (key) => { setTab(key); window.scrollTo(0,0); };
  const goBack = ()    => { setTab("landing"); window.scrollTo(0,0); };

  // Detect any in-progress (started but not completed) session
  const hasActiveWorkout = useMemo(() => {
    // Regular meso sessions
    for (let w = 0; w <= MESO.weeks; w++) {
      for (let d = 0; d < MESO.days; d++) {
        const start = store.get(`ppl:sessionStart:d${d}:w${w}`);
        const done  = store.get(`ppl:done:d${d}:w${w}`);
        if (start && done !== "1") return true;
      }
    }
    // Extra sessions — check last 14 days
    for (let i = 0; i < 14; i++) {
      const dt = new Date(); dt.setDate(dt.getDate() - i);
      const dateStr = dt.toISOString().slice(0, 10);
      const start = store.get(`ppl:extra:start:${dateStr}`);
      const done  = store.get(`ppl:extra:done:${dateStr}`);
      if (start && done !== "1") return true;

    return false;
