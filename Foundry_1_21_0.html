      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="3"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
        <path d="M8 14l2.5 2.5L15 13"/>
      </svg>
    ),
    datamgmt: (color) => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
      </svg>
    ),
  };

  const SubHeader = ({ label }) => (
    <div style={{display:"flex", alignItems:"center", gap:12, padding:"16px 16px 12px", background:"var(--bg-deep)", borderBottom:"1px solid var(--border)"}}>
      <button onClick={goBack} className="btn-ghost" style={{
        background:"transparent", border:"none", cursor:"pointer",
        color:"var(--accent)", fontSize:20, lineHeight:1, padding:"2px 4px",
        display:"flex", alignItems:"center",
      }}>‹</button>
      <span style={{fontSize:12, fontWeight:600, letterSpacing:"0.05em", color:"var(--text-secondary)"}}>{label}</span>
    </div>
  );

  // ── Landing data ──
  // "current week" = first week that is not fully completed
  const activeWeek = useMemo(() => {
    for (let w = 0; w < MESO.weeks; w++) {
      const allDone = activeDays.every((_, i) => completedDays.has(`${i}:${w}`));
      if (!allDone) return w;
    }
    return MESO.weeks; // deload
  }, [completedDays, activeDays]);

  // Calendar week — what week the schedule says we're in based on today's date vs startDate
  const calendarWeek = useMemo(() => {
    const startDate = profile?.startDate ? new Date(profile.startDate + "T00:00:00") : null;
    if (!startDate || activeDays.length === 0) return activeWeek;
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
    let lastWk = 0;
    let sessionCount = 0;
    let cursor = new Date(startDate);
    const total = (MESO.weeks + 1) * activeDays.length;
    for (let d = 0; d < 400 && sessionCount < total; d++) {
      const wkIdx = Math.floor(sessionCount / activeDays.length);
      const curWkDays = getWorkoutDaysForWeek(profile, wkIdx);
      const key = cursor.toISOString().slice(0, 10);
      if (curWkDays.includes(cursor.getDay())) {
        if (key <= todayStr) lastWk = wkIdx;
        sessionCount++;
      }
      cursor.setDate(cursor.getDate() + 1);
    }
    return lastWk;
  }, [profile, activeDays, activeWeek]);

  // displayWeek — what to show on screen. Never jumps ahead of the calendar.
  const displayWeek = Math.min(activeWeek, calendarWeek);

  const phase = WEEK_PHASE[Math.min(displayWeek, MESO.weeks - 1)] || "Deload";
  const pc    = PHASE_COLOR[phase];
  const rir   = WEEK_RIR[Math.min(displayWeek, MESO.weeks - 1)] || "N/A";

  // Week summary for displayWeek
  const weekDone  = activeDays.filter((_, i) => completedDays.has(`${i}:${displayWeek}`)).length;
  const weekTotal = activeDays.length;
  const weekPct   = weekTotal > 0 ? Math.round((weekDone / weekTotal) * 100) : 0;
  const weekMuscles = { PUSH:0, PULL:0, LEGS:0 };
  activeDays.forEach((day, dayIdx) => {
    if (!completedDays.has(`${dayIdx}:${displayWeek}`)) return;
    const wd = loadDayWeek(dayIdx, displayWeek);
    day.exercises.forEach((ex, exIdx) => {
      const filled = Object.values(wd[exIdx] || {}).filter(s => s && s.reps && s.reps !== "").length;
      if (filled > 0) weekMuscles[day.tag] += filled;
    });
  });

  // Meso summary
  const totalSessions = MESO.weeks * MESO.days;
  const doneSessions  = completedDays.size;
  const mesoPct = totalSessions > 0 ? Math.round((doneSessions / totalSessions) * 100) : 0;

  // Progress bar component — animates from 0 on mount
  const ProgressBar = ({ pct: p, color }) => {
    const [width, setWidth] = React.useState(0);
    React.useEffect(() => {
      const t = requestAnimationFrame(() => setWidth(p));
      return () => cancelAnimationFrame(t);
    }, [p]);
    return (
      <div style={{height:4, background:"var(--bg-inset)", borderRadius:2, overflow:"hidden", marginTop:6}}>
        <div style={{height:"100%", width:`${width}%`, background:color, borderRadius:2, transition:"width 0.6s cubic-bezier(0.22,1,0.36,1)"}} />
      </div>
    );
  };

  return (
    <div style={{paddingBottom:140}}>
      {showReset && (
        <ResetDialog
          onCancel={() => setShowReset(false)}
          onConfirmed={() => { setShowReset(false); onReset(); }}
        />
      )}
      {/* ── ADD WORKOUT MODAL ── */}
      {addWorkoutModal && (() => {
        const { dateStr } = addWorkoutModal;
        const splitType = profile?.splitType || "ppl";
        const dateLabel = new Date(dateStr + "T00:00:00").toLocaleDateString("en-US", { weekday:"long", month:"short", day:"numeric" });

        // What day type options to show based on split
        const dayTypeOptions =
          splitType === "ppl" ? [
            { id:"push",  label:"Push",      desc:"Chest · Shoulders · Triceps" },
            { id:"pull",  label:"Pull",      desc:"Back · Biceps · Rear Delts" },
            { id:"legs",  label:"Legs",      desc:"Quads · Hamstrings · Glutes" },
            { id:"fullbody", label:"Full Body", desc:"Full compound session" },
          ] : splitType === "upper_lower" ? [
            { id:"upper", label:"Upper Body", desc:"Chest · Back · Shoulders · Arms" },
            { id:"lower", label:"Lower Body", desc:"Quads · Hamstrings · Glutes" },
            { id:"fullbody", label:"Full Body", desc:"Full compound session" },
          ] : [
            { id:"fullbody", label:"Full Body", desc:"Full compound session" },
            { id:"push",  label:"Push Focus", desc:"Chest · Shoulders · Triceps" },
            { id:"pull",  label:"Pull Focus",  desc:"Back · Biceps · Rear Delts" },
            { id:"legs",  label:"Legs Focus",  desc:"Quads · Hamstrings · Glutes" },
          ];

        const closeModal = () => {
          setAddWorkoutModal(null);
          setAddWorkoutStep("type");
          setAddWorkoutType(null);
          setAddWorkoutDayType(null);
        };

        const handleFoundryBuild = (dayTypeId) => {
          const day = generateExtraWorkout(dayTypeId, profile);
          store.set(`ppl:extra:${dateStr}`, JSON.stringify(day));
          closeModal();
          onOpenExtra(dateStr);
        };

        return (
          <div style={{
            position:"fixed", inset:0, background:"rgba(0,0,0,0.82)", zIndex:500,
            backdropFilter:"blur(6px)",
            display:"flex", alignItems:"center", justifyContent:"center", padding:24,
          }}>
            <div style={{
              background:"var(--bg-card)", border:"1px solid var(--border)",
              borderRadius:12, padding:"28px 24px", maxWidth:340, width:"100%",
              boxShadow:"var(--shadow-xl)",
              animation:"dialogIn 0.2s cubic-bezier(0.34,1.56,0.64,1)",
            }}>
              {/* Header */}
              <div style={{fontSize:12, fontWeight:800, letterSpacing:"0.1em", color:"var(--text-muted)", marginBottom:4}}>ADD WORKOUT</div>
              <div style={{fontSize:16, fontWeight:800, color:"var(--text-primary)", marginBottom:4}}>{dateLabel}</div>

              {addWorkoutStep === "type" && (
                <>
                  <div style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.5, marginBottom:22}}>
                    How do you want to set up this session?
                  </div>
                  <div style={{display:"flex", flexDirection:"column", gap:10}}>
                    <button
                      onClick={() => {
                        setAddWorkoutType("foundry");
                        setAddWorkoutStep("daytype");
                      }}
                      style={{
                        padding:"16px", borderRadius:8, cursor:"pointer", textAlign:"left",
                        background:"var(--accent)11", border:"1px solid var(--accent)55",
                        color:"var(--text-primary)",
                      }}
                    >
                      <div style={{fontSize:14, fontWeight:800, color:"var(--accent)", marginBottom:2}}>⚡ Foundry Build</div>
                      <div style={{fontSize:12, color:"var(--text-secondary)"}}>Auto-generate a workout based on your equipment and level</div>
                    </button>
                    <button
                      onClick={() => {
                        store.set(`ppl:extra:${dateStr}`, JSON.stringify({ isExtra:true, isManual:true, label:"Manual Session", exercises:[], dateStr }));
                        closeModal();
                        onOpenExtra(dateStr);
                      }}
                      style={{
                        padding:"16px", borderRadius:8, cursor:"pointer", textAlign:"left",
                        background:"var(--bg-surface)", border:"1px solid var(--border)",
                        color:"var(--text-primary)",
                      }}
                    >
                      <div style={{fontSize:14, fontWeight:800, marginBottom:2}}>✏️ Manual</div>
                      <div style={{fontSize:12, color:"var(--text-secondary)"}}>Log a workout your own way — freeform notes</div>
                    </button>
                  </div>
                  <button onClick={closeModal} style={{
                    width:"100%", marginTop:12, padding:"12px", borderRadius:8, cursor:"pointer",
                    background:"transparent", border:"none", color:"var(--text-muted)", fontSize:13,
                  }}>Cancel</button>
                </>
              )}

              {addWorkoutStep === "daytype" && (
                <>
                  <div style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.5, marginBottom:18}}>
                    What kind of session?
                  </div>
                  <div style={{display:"flex", flexDirection:"column", gap:8}}>
                    {dayTypeOptions.map(opt => (
                      <button
                        key={opt.id}
                        onClick={() => handleFoundryBuild(opt.id)}
                        style={{
                          padding:"13px 16px", borderRadius:8, cursor:"pointer", textAlign:"left",
                          background:"var(--bg-surface)", border:"1px solid var(--border)",
                          color:"var(--text-primary)",
                          display:"flex", alignItems:"center", justifyContent:"space-between",
                        }}
                      >
                        <div>
                          <div style={{fontSize:13, fontWeight:800}}>{opt.label}</div>
                          <div style={{fontSize:12, color:"var(--text-muted)", marginTop:2}}>{opt.desc}</div>
                        </div>
                        <span style={{fontSize:16, color:"var(--text-muted)"}}>›</span>
                      </button>
                    ))}
                  </div>
                  <button onClick={() => setAddWorkoutStep("type")} style={{
                    width:"100%", marginTop:12, padding:"12px", borderRadius:8, cursor:"pointer",
                    background:"transparent", border:"none", color:"var(--text-muted)", fontSize:13,
                  }}>← Back</button>
                </>
              )}
            </div>
          </div>
        );
      })()}

      {/* ── LANDING ── */}
      {tab === "landing" && (() => {
        // Find next incomplete day this week
        const nextDayIdx = activeDays.findIndex((_, i) => !completedDays.has(`${i}:${activeWeek}`));
        const nextDay = nextDayIdx >= 0 ? activeDays[nextDayIdx] : null;
        const nextDayAccent = nextDay ? TAG_ACCENT[nextDay.tag] : "var(--accent)";

        // Cardio plan for today
        const todayCardioStr = (() => {
          const d = new Date();
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        })();
        const todayDow = new Date().getDay(); // 0=Sun
        const cardioSchedule = profile?.cardioSchedule || [];
        const todayCardioSlot = cardioSchedule.find(s => s.dayOfWeek === todayDow) || null;
        const todayCardioSession = loadCardioSession(todayCardioStr);
        const CARDIO_COLOR = TAG_ACCENT["CARDIO"];

        // no navItems array needed — layout is hand-crafted below

        return (
          <div style={{padding:"16px 16px 0", display:"flex", flexDirection:"column", gap:12}}>

            {/* ── DASHBOARD ── */}
            <div style={{display:"flex", flexDirection:"column", gap:10}}>

              {/* ─ TOP ROW: Meso ring + week status ─ */}
              <div style={{display:"flex", gap:10}}>

                {/* Meso progress ring — tappable to go to Progress */}
                <button onClick={() => goTo("progress")} style={{
                  background:"var(--bg-card)", border:"1px solid var(--border)",
                  borderRadius:8, padding:"14px 16px",
                  display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                  gap:6, flexShrink:0, width:104, boxShadow:"var(--shadow-sm)",
                  cursor:"pointer",
                  transition:"border-color 0.15s, transform 0.12s",
                }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = pc; e.currentTarget.style.transform = "translateY(-1px)"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.transform = "none"; }}
                  onMouseDown={e => e.currentTarget.style.transform = "scale(0.97)"}
                  onMouseUp={e => e.currentTarget.style.transform = "translateY(-1px)"}
                >
                  {(() => {
                    const r = 26, circ = 2 * Math.PI * r;
                    const dash = circ * (mesoPct / 100);
                    return (
                      <svg width="64" height="64" viewBox="0 0 64 64" style={{overflow:"visible"}}>
                        <circle cx="32" cy="32" r={r} fill="none" stroke="var(--bg-inset)" strokeWidth="5"/>
                        <circle cx="32" cy="32" r={r} fill="none" stroke={pc} strokeWidth="5"
                          strokeDasharray={`${dash} ${circ}`}
                          strokeDashoffset={circ * 0.25}
                          strokeLinecap="round"
                          style={{transition:"stroke-dasharray 0.7s cubic-bezier(0.22,1,0.36,1)"}}
                        />
                        <text x="32" y="35" textAnchor="middle" fontSize="13" fontWeight="800"
                          fill="var(--text-primary)" fontFamily="inherit">{mesoPct}%</text>
                      </svg>
                    );
                  })()}
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.05em", color:"var(--text-muted)"}}>MESO PROGRESS</div>
                    <div style={{fontSize:12, color:"var(--text-secondary)", fontWeight:500}}>{doneSessions}/{totalSessions}</div>
                  </div>
                </button>

                {/* Current week card */}
                <div style={{
                  flex:1, background:"var(--bg-card)", border:`1px solid ${pc}55`,
                  borderRadius:8, padding:"14px 14px", boxShadow:`0 2px 10px ${pc}18`,
                  display:"flex", flexDirection:"column", gap:8,
                }}>
                  {/* Phase + week */}
                  <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                    <div style={{display:"flex", alignItems:"center", gap:6}}>
                      <div style={{
                        fontSize:15, fontWeight:700, letterSpacing:"0.06em",
                        color:pc, background:pc+"18", padding:"3px 7px", borderRadius:4,
                      }}>{phase.toUpperCase()}</div>
                      <div style={{fontSize:12, color:"var(--text-secondary)", fontWeight:600, letterSpacing:"0.04em"}}>WK {displayWeek+1}/{MESO.weeks}</div>
                    </div>
                    {phase !== "Accumulation" && (
                      <div style={{fontSize:12, color:"var(--text-secondary)", fontWeight:600}}>{rir}</div>
                    )}
                  </div>

                  {/* Day pills */}
                  <div style={{display:"flex", gap:4, flexWrap:"wrap"}}>
                    {activeDays.map((day, i) => {
                      const done = completedDays.has(`${i}:${displayWeek}`);
                      const isNext = !done && activeDays.slice(0, i).every((_, j) => completedDays.has(`${j}:${displayWeek}`));
                      const tc = TAG_ACCENT[day.tag];
                      return (
                        <button key={i} onClick={(e) => { e.stopPropagation(); goBack(); onSelectDayWeek(i, activeWeek); }}
                          style={{
                            flex:1, minWidth:0, padding:"6px 4px",
                            borderRadius:5, border:`1px solid`,
                            borderColor: done ? tc+"60" : isNext ? tc : pc+"55",
                            background: done ? tc+"1a" : isNext ? tc+"12" : pc+"08",
                            cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:2,
                          }}>
                          <div style={{
                            fontSize:12, fontWeight:800, letterSpacing:"0.04em",
                            color: done ? tc : isNext ? tc : "var(--text-muted)",
                          }}>{{PUSH:"PU",PULL:"PL",LEGS:"LE",UPPER:"UP",LOWER:"LO",FULL:"FB"}[day.tag]||day.tag.slice(0,2)}</div>
                          <div style={{fontSize:12, lineHeight:1}}>
                            {done ? <span style={{color:tc}}>✓</span> : isNext ? <span style={{color:tc, fontSize:12}}>●</span> : <span style={{color:"var(--text-muted)", fontSize:12}}>·</span>}
                          </div>
                        </button>
                      );
                    })}
                  </div>

                  {/* Week progress bar */}
                  <div style={{display:"flex", alignItems:"center", gap:6}}>
                    <div style={{flex:1, height:5, background:"var(--border)", borderRadius:3, overflow:"hidden"}}>
                      <div style={{height:"100%", width:`${weekPct}%`, background:pc, borderRadius:3, transition:"width 0.5s ease"}} />
                    </div>
                    <div style={{fontSize:12, color:"var(--text-secondary)", fontWeight:600, flexShrink:0}}>{weekDone}/{weekTotal}</div>
                  </div>
                </div>
              </div>

              {/* ─ TODAY card ─ */}
              {(() => {
                // Build sessionDateMap from startDate — same logic as Schedule tab
                const todayDateStr3 = todayCardioStr;
                const startDate = profile?.startDate ? new Date(profile.startDate + "T00:00:00") : null;
                const sessionDateMap = {};
                if (startDate && activeDays.length > 0) {
                  const total = (MESO.weeks + 1) * activeDays.length;
                  let sc = 0, cursor = new Date(startDate);
                  for (let d = 0; d < 400 && sc < total; d++) {
                    const wkIdx = Math.floor(sc / activeDays.length);
                    if (getWorkoutDaysForWeek(profile, wkIdx).includes(cursor.getDay())) {
                      sessionDateMap[cursor.toISOString().slice(0,10)] = `${sc % activeDays.length}:${wkIdx}`;
                      sc++;
                    }
                    cursor.setDate(cursor.getDate() + 1);
                  }
                }

                // What does the calendar say about today?
                const calendarEntry    = sessionDateMap[todayDateStr3];
                const isCalendarWorkoutDay = calendarEntry != null;
                const calDayIdx  = isCalendarWorkoutDay ? parseInt(calendarEntry.split(':')[0]) : -1;
                const calWeekIdx = isCalendarWorkoutDay ? parseInt(calendarEntry.split(':')[1]) : -1;

                // Is today's scheduled session already done?
                const calendarSessionDone = isCalendarWorkoutDay && completedDays.has(calendarEntry);

                // All sessions in displayWeek done? (between-weeks rest state)
                const displayWeekAllDone = activeDays.every((_, i) => completedDays.has(`${i}:${displayWeek}`));

                // Rest if: not a workout day, OR today's session already done, OR week done with no session today
                const isRestState = !isCalendarWorkoutDay || calendarSessionDone || displayWeekAllDone;
                const isRestDay   = !isCalendarWorkoutDay && !todayCardioSlot;

                // Session details for lifting card
                const todayMesoDay    = isCalendarWorkoutDay ? activeDays[calDayIdx] : null;
                const showDayWeek     = isCalendarWorkoutDay ? calWeekIdx : activeWeek;
                const showDay         = (!isRestState && todayMesoDay) ? todayMesoDay : nextDay;
                const showDayIdx      = (!isRestState && todayMesoDay) ? calDayIdx : nextDayIdx;
                const showDayAccent   = showDay ? TAG_ACCENT[showDay.tag] : nextDayAccent;
                const isToday         = isCalendarWorkoutDay && !calendarSessionDone;

                const preview = showDay?.exercises || [];
                const lastWeekData = (() => {
                  for (let w = (isToday ? calWeekIdx : activeWeek) - 1; w >= 0; w--) {
                    const raw = store.get(`ppl:day${showDayIdx}:week${w}`);
                    if (raw) try { return JSON.parse(raw); } catch {}
                  }
                  return {};
                })();

                // ── REST / RECOVERY state ────────────────────────────────────
                if (isRestState || isRestDay) {
                  if (displayWeekAllDone && !nextDay) {
                    return (
                      <div data-tour="today-card" style={{background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:8, padding:"16px 20px", display:"flex", alignItems:"center", gap:12, boxShadow:"var(--shadow-sm)"}}>
                        <div style={{width:36, height:36, borderRadius:6, background:"rgba(var(--accent-rgb),0.1)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18}}>🏆</div>
                        <div>
                          <div style={{fontSize:14, fontWeight:700, color:"var(--phase-accum)"}}>Week complete!</div>
                          <div style={{fontSize:12, color:"var(--text-secondary)"}}>Rest. Recover. Return stronger.</div>
                        </div>
                      </div>
                    );
                  }
                  if (isRestDay && !calendarSessionDone && !displayWeekAllDone) {
                    return (
                    <div style={{
                      background:"var(--bg-card)", border:"1px solid var(--border)",
                      borderRadius:8, overflow:"hidden", boxShadow:"var(--shadow-sm)",
                    }}>
                      <div style={{
                        padding:"12px 16px",
                        background:"var(--bg-inset)",
                        borderBottom:"1px solid var(--border)",
                        display:"flex", alignItems:"center", justifyContent:"space-between",
                      }}>
                        <div style={{fontSize:12, fontWeight:800, letterSpacing:"0.08em", color:"var(--text-muted)"}}>TODAY</div>
                        <div style={{fontSize:12, fontWeight:700, color:"var(--text-secondary)"}}>Rest Day</div>
                      </div>
                      {nextDay && (
                        <button onClick={(e) => { e.stopPropagation(); goBack(); setCurrentWeek(activeWeek); onSelectDay(nextDayIdx); }}
                          style={{
                            width:"100%", background:"transparent", border:"none", cursor:"pointer",
                            padding:"12px 16px", display:"flex", alignItems:"center", justifyContent:"space-between",
                          }}>
                          <div style={{textAlign:"left"}}>
                            <div style={{fontSize:12, color:"var(--text-muted)", fontWeight:600, marginBottom:2}}>NEXT SESSION</div>
                            <div style={{fontSize:14, fontWeight:700, color:"var(--text-primary)"}}>{nextDay.label}</div>
                          </div>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                            <polyline points="9 18 15 12 9 6"/>
                          </svg>
                        </button>
                      )}
                    </div>
                    );
                  }

                // ── Recovery card — session done today OR between weeks ───────
                const tip = recoveryTip;
                const cardioPending = todayCardioSlot && !todayCardioSession?.completed;
                const nextDayForCollapse = nextDay;
                const nextDayIdxForCollapse = nextDayIdx;
                const doneLabel = calendarSessionDone ? (activeDays[calDayIdx]?.label || "") : (activeDays[activeDays.length - 1]?.label || "");
                return (
                  <div style={{display:"flex", flexDirection:"column", gap:8}}>
                    <div style={{background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:8, overflow:"hidden", boxShadow:"var(--shadow-sm)"}}>
                      <div style={{padding:"12px 16px", background:"var(--phase-accum)0d", borderBottom:"1px solid var(--phase-accum)22", display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                        <div style={{display:"flex", alignItems:"center", gap:8}}>
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--phase-accum)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                          <span style={{fontSize:12, fontWeight:800, letterSpacing:"0.08em", color:"var(--phase-accum)"}}>{calendarSessionDone ? "TODAY · DONE" : "REST DAY"}</span>
                        </div>
                        {doneLabel && <span style={{fontSize:12, color:"var(--text-muted)", fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:140}}>{doneLabel}</span>}
                      </div>
                      {cardioPending && (() => {
                        const proto = CARDIO_WORKOUTS.find(w => w.id === todayCardioSlot.protocol);
                        return (

                        : -6;
                      // Meso end: startDate + (weeks+1)*7 days approx
                      const totalDays = ((MESO.weeks || 6) + 1) * 7 + 30;
                      const endD = startD ? new Date(startD.getTime() + totalDays * 86400000) : null;
                      const maxOffset = endD
                        ? (endD.getFullYear() - today.getFullYear()) * 12 + (endD.getMonth() - today.getMonth())

        };

        // Find yesterday's session tag to target mobility

// ─── WEEKLY SUMMARY ───────────────────────────────────────────────────────────
function WeeklySummary({ activeDays, completedDays, goBack, profile }) {
  // Default to the most recently completed or current active week
  const defaultWeek = React.useMemo(() => {
    for (let w = MESO.weeks - 1; w >= 0; w--) {
      const allDone = activeDays.every((_, i) => completedDays.has(`${i}:${w}`));
      if (allDone) return w;
    }
    // Fall back to first incomplete week (active week)
    for (let w = 0; w < MESO.weeks; w++) {
      const anyDone = activeDays.some((_, i) => completedDays.has(`${i}:${w}`));
      if (anyDone) return w;
    }
    return 0;
  }, [activeDays, completedDays]);

  const [week, setWeek] = React.useState(defaultWeek);
  const [expandedDay, setExpandedDay] = React.useState(null);

  const phase    = WEEK_PHASE[Math.min(week, MESO.weeks - 1)] || "Deload";
  const pc       = PHASE_COLOR[phase];
  const rir      = WEEK_RIR[Math.min(week, MESO.weeks - 1)] || "N/A";
  const weekDone = activeDays.filter((_, i) => completedDays.has(`${i}:${week}`)).length;
  const weekTotal = activeDays.length;
  const compliance = weekTotal > 0 ? Math.round((weekDone / weekTotal) * 100) : 0;

  // Volume by tag for selected week
  const byTag = calcMuscleSetsByTag(activeDays, completedDays, week);
  // Count actual sets directly — NOT from byTag which distributes across muscles and double-counts
  const totalSets = activeDays.reduce((total, day, dayIdx) => {
    if (!completedDays.has(`${dayIdx}:${week}`)) return total;
    const wd = loadDayWeek(dayIdx, week);
    return total + Object.values(wd).reduce((t, exData) =>
      t + Object.values(exData || {}).filter(s => s && s.reps && s.reps !== "").length, 0);
  }, 0);

  // PRs hit this week: exercises where this week's best weight×reps > any prior week's best
  const prsHit = React.useMemo(() => {
    const bw = parseFloat(profile?.weight || 0);
    const hits = [];
    activeDays.forEach((day, dayIdx) => {
      if (!completedDays.has(`${dayIdx}:${week}`)) return;
      const thisWeekData = loadDayWeek(dayIdx, week);

      day.exercises.forEach((baseEx, exIdx) => {
        // Resolve exercise name (check override)
        const ovId = store.get(`ppl:exov:d${dayIdx}:w${week}:ex${exIdx}`)
                  || store.get(`ppl:exov:d${dayIdx}:ex${exIdx}`);
        const dbEx = ovId ? EXERCISE_DB.find(e => e.id === ovId) : null;
        const exName = dbEx ? dbEx.name : baseEx.name;
        const isBw = dbEx ? !!dbEx.bw : !!baseEx.bw;

        // This week best weight×reps
        const thisExData = thisWeekData[exIdx] || {};
        let thisBest = 0, thisWeight = 0, thisReps = 0;
        Object.values(thisExData).forEach(s => {
          if (!s || !s.reps || s.warmup) return;
          const added = parseFloat(s.weight || 0);
          const effectiveWt = isBw ? (bw + added) : added;
          const rp = parseInt(s.reps);
          if (!effectiveWt || !rp) return;
          const score = effectiveWt * rp;
          if (score > thisBest) { thisBest = score; thisWeight = effectiveWt; thisReps = rp; }
        });
        if (!thisBest) return;

        // Prior best weight×reps (all weeks before this one)
        let priorBest = 0;
        for (let w = 0; w < week; w++) {
          const wd = loadDayWeek(dayIdx, w);
          const ed = wd[exIdx] || {};
          Object.values(ed).forEach(s => {
            if (!s || !s.reps || s.warmup) return;
            const added = parseFloat(s.weight || 0);
            const effectiveWt = isBw ? (bw + added) : added;
            const rp = parseInt(s.reps);
            if (!effectiveWt || !rp) return;
            const score = effectiveWt * rp;
            if (score > priorBest) priorBest = score;
          });
        }

        // Only flag as PR if there's a prior entry to beat
        if (thisBest > priorBest && priorBest > 0) {
          hits.push({ name: exName, tag: day.tag, weight: thisWeight, reps: thisReps, isBw });
        }
      });
    });
    return hits.sort((a, b) => (b.weight * b.reps) - (a.weight * a.reps));
  }, [week, activeDays, completedDays]);

  // Session breakdown for selected week
  const sessions = activeDays.map((day, dayIdx) => {
    const done    = completedDays.has(`${dayIdx}:${week}`);
    const wd      = loadDayWeek(dayIdx, week);
    const notes   = loadNotes(dayIdx, week);
    const setCount = done ? Object.values(wd).reduce((total, exData) =>
      total + Object.values(exData || {}).filter(s => s && s.reps && s.reps !== "").length, 0) : 0;
    return { day, dayIdx, done, setCount, notes };
  });

                    </div>
                    <div style={{textAlign:"right", flexShrink:0, marginLeft:12}}>
                      <div style={{fontSize:13, fontWeight:800, color:"var(--phase-accum)"}}>🏆</div>
                      <div style={{fontSize:12, color:"var(--phase-accum)", fontWeight:700}}>new best</div>

        {totalSets > 0 && (
          <VolumeLandmarksCard byTag={byTag} title="Volume Check" />

        {/* ── SESSION BREAKDOWN ── */}

          background:"var(--bg-card)", border:"1px solid var(--border)",
          borderRadius:8, overflow:"hidden", boxShadow:"var(--shadow-sm)",

            <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)"}}>SESSION LOG</div>
          </div>
          {sessions.map(({ day, dayIdx, done, setCount, notes }, si) => {
            const tc = TAG_ACCENT[day.tag];
            const isOpen = expandedDay === dayIdx;
            return (
              <div key={dayIdx} style={{borderBottom: si < sessions.length - 1 ? "1px solid var(--border-subtle)" : "none"}}>

                    width:"100%", background:"transparent", border:"none", cursor:"pointer",
                    padding:"12px 16px", display:"flex", alignItems:"center", gap:12,
                    textAlign:"left",

                  {/* Status dot */}
                  <div style={{
                    width:32, height:32, borderRadius:6, flexShrink:0,
                    background: done ? tc+"1a" : "var(--bg-inset)",
                    border:`1px solid ${done ? tc+"44" : "var(--border-subtle)"}`,
                    display:"flex", alignItems:"center", justifyContent:"center",
                  }}>
                    {done
                      ? <span style={{color:tc, fontSize:14}}>✓</span>
                      : <span style={{color:"var(--text-dim)", fontSize:12}}>—</span>}
                  </div>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:12, fontWeight:700, color: done ? "var(--text-primary)" : "var(--text-dim)"}}>
                      {day.label}
                    </div>
                    <div style={{fontSize:12, color:"var(--text-muted)", marginTop:1}}>
                      {done ? `${setCount} sets logged` : "Not completed"}
                      {notes && " · has notes"}
                    </div>
                  </div>
                  {done && (
                    <span style={{
                      color:"var(--text-dim)", fontSize:16, transition:"transform 0.2s",
                      display:"inline-block", transform: isOpen ? "rotate(90deg)" : "none",
                    }}>›</span>
                  )}
                </button>

                {/* Expanded: exercise summary + notes */}
                {isOpen && done && (() => {
                  const wd = loadDayWeek(dayIdx, week);
                  return (
                    <div style={{padding:"0 16px 12px", display:"flex", flexDirection:"column", gap:6}}>
                      {day.exercises.map((baseEx, exIdx) => {
                        const exData = wd[exIdx] || {};
                        const sets = Object.values(exData).filter(s => s && (s.weight || s.reps));
                        if (!sets.length) return null;
                        const ovId = store.get(`ppl:exov:d${dayIdx}:w${week}:ex${exIdx}`)
                                  || store.get(`ppl:exov:d${dayIdx}:ex${exIdx}`);
                        const dbEx = ovId ? EXERCISE_DB.find(e => e.id === ovId) : null;
                        const exName = dbEx ? dbEx.name : baseEx.name;
                        const best = sets.reduce((b, s) => {
                          const wt = parseFloat(s.weight || 0), rp = parseInt(s.reps || 0);
                          return wt > b ? wt : b;
                        }, 0);
                        return (
                          <div key={exIdx} style={{
                            display:"flex", alignItems:"center", justifyContent:"space-between",
                            padding:"7px 10px",
                            background:"var(--bg-inset)", borderRadius:6,
                            border:"1px solid var(--border-subtle)",
                          }}>
                            <div style={{flex:1, minWidth:0}}>
                              <div style={{
                                fontSize:12, fontWeight:600, color:"var(--text-primary)",
                                whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                              }}>{exName}</div>
                              <div style={{fontSize:12, color:"var(--text-muted)", marginTop:1}}>
                                {sets.length} sets · top {best} lbs
                              </div>
                            </div>
                          </div>
                        );
                      }).filter(Boolean)}
                      {notes && (
                        <div style={{
                          marginTop:2, padding:"8px 10px",
                          background:"var(--bg-inset)", borderRadius:6,
                          border:"1px solid var(--border-subtle)",
                          fontSize:12, color:"var(--text-secondary)", lineHeight:1.5,
                          fontStyle:"italic",
                        }}>
                          📝 {notes}
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            );
          })}
        </div>

        {/* Empty state */}
        {weekDone === 0 && (
          <div style={{padding:"20px", textAlign:"center", color:"var(--text-muted)", fontSize:12}}>
            No sessions logged for Week {week + 1} yet.
          </div>
        )}

        <div style={{height:8}} />
      </div>
    </div>
  );
}

// ─── MESO HISTORY ─────────────────────────────────────────────────────────────
function MesoHistory({ goBack, goTo }) {
  const [archive, setArchive] = React.useState(loadArchive);
  const [expanded, setExpanded] = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);

  const handleDelete = (id) => {
    deleteArchiveEntry(id);
    setArchive(loadArchive());
    setExpanded(null);
    setConfirmDelete(null);
  };

  // For a given record, compute per-exercise best sets
  const computeRecordPRs = (record) => {
    // Build exercise name map: {d}-{ex} -> name
    const exNames = {};
    // Use profile to regenerate day structure
    let days = [];
    try {
      days = generateProgram(record.profile).slice(0, record.mesoDays);
    } catch {}

    const prMap = {}; // key: `${d}-${ex}` -> {name, tag, bestWeight, bestReps, bestScore}

    record.sessions.forEach(({ d, w, data, exOvs }) => {
      if (!data) return;
      Object.entries(data).forEach(([exIdxStr, exData]) => {
        const exIdx = parseInt(exIdxStr);
        const key = `${d}-${exIdx}`;

        // Resolve name
        if (!prMap[key]) {
          let name = days[d]?.exercises?.[exIdx]?.name || `Day ${d+1} Ex ${exIdx+1}`;
          let tag  = days[d]?.tag || "PUSH";
          const ovId = exOvs?.[exIdx];
          if (ovId) {
            const dbEx = EXERCISE_DB.find(e => e.id === ovId);
            if (dbEx) { name = dbEx.name; tag = dbEx.tag; }
          }
          prMap[key] = { name, tag, bestWeight: 0, bestReps: 0, bestScore: 0 };
        }

        // Find best set this session
        Object.values(exData).forEach(s => {
          if (!s || !s.reps) return;
          const added = parseFloat(s.weight || 0);
          // Resolve bw flag from exercise in generated program or DB
          const baseEx = days[d]?.exercises?.[exIdx];
          const ovId = prMap[key]?._ovId;
          const dbEx = EXERCISE_DB.find(e => e.id === (ovId || baseEx?.id));
          const isBw = dbEx ? !!dbEx.bw : !!baseEx?.bw;
          const bwVal = parseFloat(record.profile?.weight || 0);
          const wt = isBw ? (bwVal + added) : added;
          const rp = parseInt(s.reps);
          if (!wt || !rp) return;
          const score = wt * rp;
          if (score > prMap[key].bestScore) {
            prMap[key].bestScore = score;
            prMap[key].bestWeight = wt;
            prMap[key].bestReps = rp;
            prMap[key].isBw = isBw;
            prMap[key].bwVal = bwVal;
          }
        });
      });
    });

    return Object.values(prMap)
      .filter(p => p.bestScore > 0)
      .sort((a, b) => b.bestScore - a.bestScore);
  };

  const formatDate = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  };

  const splitLabel = (profile) => {
    const s = profile?.splitType || "ppl";
    return s.toUpperCase().replace(/_/g, " ");
  };

  const tagColor = { PUSH: "#3a5878", PULL: "#2e6f73", LEGS: "#4a5a6a" };

  return (
    <div style={{animation:"tabFadeIn 0.15s ease-out"}}>
      {/* Header */}
      <div style={{display:"flex", alignItems:"center", gap:12, padding:"16px 16px 12px", background:"var(--bg-deep)", borderBottom:"1px solid var(--border)"}}>
        <button onClick={goBack} className="btn-ghost" style={{
          background:"transparent", border:"none", cursor:"pointer",
          color:"var(--accent)", fontSize:20, lineHeight:1, padding:"2px 4px",
          display:"flex", alignItems:"center",
        }}>‹</button>
        <span style={{fontSize:17, fontWeight:700, letterSpacing:"0.01em", color:"var(--text-primary)"}}>Meso History</span>
        <span style={{
          marginLeft:"auto", fontSize:12, fontWeight:700, letterSpacing:"0.05em",
          color:"var(--text-muted)", background:"var(--bg-inset)",
          padding:"3px 8px", borderRadius:99,
        }}>{archive.length} / 10</span>
        {/* Data Management shortcut */}
        <button onClick={() => goTo("datamgmt")} title="Data Management" style={{
          background:"var(--bg-inset)", border:"1px solid var(--border)",
          borderRadius:6, width:30, height:30, cursor:"pointer",
          display:"flex", alignItems:"center", justifyContent:"center",
          flexShrink:0, color:"var(--text-muted)",
          transition:"border-color 0.15s, color 0.15s",
        }}
          onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--accent)"; e.currentTarget.style.color = "var(--accent)"; }}
          onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--border)"; e.currentTarget.style.color = "var(--text-muted)"; }}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
        </button>
      </div>

      {/* Empty state */}
      {archive.length === 0 && (
        <div style={{padding:"60px 20px", textAlign:"center", color:"var(--text-dim)"}}>
          <div style={{fontSize:36, marginBottom:14}}>📦</div>

                                </div>
                                <div style={{fontSize:12, color:"var(--text-muted)", paddingLeft:12}}>
                                  Best: {pr.isBw ? `BW+${(pr.bestWeight - pr.bwVal).toFixed(0)} (${pr.bestWeight} eff.)` : pr.bestWeight} × {pr.bestReps} reps
                                </div>
                              </div>
                              <div style={{textAlign:"right", flexShrink:0, marginLeft:12}}>
                                <div style={{fontSize:13, fontWeight:800, color:"var(--text-primary)"}}>{pr.isBw ? `BW+${(pr.bestWeight - pr.bwVal).toFixed(0)}` : pr.bestWeight} × {pr.bestReps}</div>
                                <div style={{fontSize:12, color:"var(--text-dim)"}}>best set</div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </>
                  )}

                  {/* Delete button */}
                  {confirmDelete === record.id ? (
                    <div style={{padding:"12px 16px", borderTop:"1px solid var(--border-subtle)", background:"var(--bg-deep)"}}>
                      <div style={{fontSize:12, color:"var(--text-secondary)", marginBottom:10, textAlign:"center"}}>
                        Delete this archived cycle?
                      </div>
                      <div style={{display:"flex", gap:8}}>
                        <button onClick={() => setConfirmDelete(null)} style={{
                          flex:1, padding:"8px", borderRadius:8,
                          border:"1px solid var(--border)", background:"transparent",
                          color:"var(--text-secondary)", fontSize:12, fontWeight:600, cursor:"pointer",
                        }}>Cancel</button>
                        <button onClick={() => handleDelete(record.id)} style={{
                          flex:1, padding:"8px", borderRadius:8,
                          border:"1px solid var(--danger)", background:"rgba(var(--danger-rgb,180,50,50),0.12)",
                          color:"var(--danger)", fontSize:12, fontWeight:700, cursor:"pointer",
                        }}>Delete</button>
                      </div>
                    </div>
                  ) : (
                    <div style={{padding:"0 16px 12px"}}>
                      <button onClick={() => setConfirmDelete(record.id)} style={{
                        width:"100%", padding:"8px", borderRadius:8,
                        border:"1px solid var(--border)", background:"transparent",
                        color:"var(--text-muted)", fontSize:12, fontWeight:600, cursor:"pointer",
                        letterSpacing:"0.03em",
                      }}>Delete archive</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── PR TRACKER ───────────────────────────────────────────────────────────────
function PRTracker({ activeDays, goBack, embedded = false, profile }) {
  const [filter, setFilter] = React.useState("ALL");
  const [anchorsOnly, setAnchorsOnly] = React.useState(true);
  const [detailPr, setDetailPr] = React.useState(null);
  const bw = parseFloat(profile?.weight || 0);

  const prs = React.useMemo(() => {
    const results = [];
    activeDays.forEach((day, dayIdx) => {
      day.exercises.forEach((baseEx, exIdx) => {
        let bestWeight = 0, bestReps = 0, bestWeek = -1, bestScore = 0;
        let bestAdded = 0;
        const history = [];

        const ovId = (() => {
          for (let w = (MESO ? MESO.weeks : 6); w >= 0; w--) {
            const id = store.get(`ppl:exov:d${dayIdx}:w${w}:ex${exIdx}`)
                    || store.get(`ppl:exov:d${dayIdx}:ex${exIdx}`);
            if (id) return id;
          }
          return null;
        })();
        const dbEx = ovId ? EXERCISE_DB.find(e => e.id === ovId) : EXERCISE_DB.find(e => e.id === baseEx.id);
        const isBw = dbEx ? !!dbEx.bw : !!baseEx.bw;

        for (let w = 0; w <= (MESO ? MESO.weeks : 6); w++) {
          const raw = store.get(`ppl:day${dayIdx}:week${w}`);
          if (!raw) continue;
          const dayData = JSON.parse(raw);
          const exData = dayData[exIdx];
          if (!exData) continue;
          const sets = Object.values(exData).filter(s => s && s.reps && parseInt(s.reps) > 0 && !s.warmup);
          if (!sets.length) continue;
          let weekBestScore = 0, weekBestWeight = 0, weekBestReps = 0, weekBestAdded = 0;
          sets.forEach(s => {
            const added = parseFloat(s.weight || 0);
            const effectiveWt = isBw ? (bw + added) : added;
            if (!effectiveWt) return;
            const rp = parseInt(s.reps);
            const score = effectiveWt * rp;
            if (score > weekBestScore) { weekBestScore = score; weekBestWeight = effectiveWt; weekBestReps = rp; weekBestAdded = added; }
          });
          if (!weekBestScore) continue;
          history.push({ week: w + 1, weight: weekBestWeight, reps: weekBestReps, score: weekBestScore });
          if (weekBestScore > bestScore) { bestScore = weekBestScore; bestWeight = weekBestWeight; bestReps = weekBestReps; bestWeek = w + 1; bestAdded = weekBestAdded; }
        }

        if (bestWeek < 0) return;
        let exName = baseEx.name, exTag = day.tag;
        if (ovId) { const r = EXERCISE_DB.find(e => e.id === ovId); if (r) { exName = r.name; exTag = r.tag; } }
        results.push({ key:`${dayIdx}-${exIdx}`, name:exName, tag:exTag, muscle:baseEx.muscle||"", anchor:!!baseEx.anchor, bestWeight, bestReps, bestWeek, bestScore, bestAdded, isBw, history });
      });
    });
    results.sort((a, b) => b.bestScore - a.bestScore);
    return results;
  }, [activeDays, bw]);

  const tags = ["ALL", "PUSH", "PULL", "LEGS"];
  const filtered = (filter === "ALL" ? prs : prs.filter(p => p.tag === filter))
    .filter(p => !anchorsOnly || p.anchor);
  const hasAnchors = prs.some(p => p.anchor);
  const tagColor = { PUSH:"var(--push-accent,#3a5878)", PULL:"var(--pull-accent,#2e6f73)", LEGS:"var(--legs-accent,#4a5a6a)" };
  const TAG_LABEL = { PUSH:"Push", PULL:"Pull", LEGS:"Legs" };

  return (
    <div style={embedded ? {} : {animation:"tabFadeIn 0.15s ease-out"}}>
      {!embedded && (
        <div style={{display:"flex", alignItems:"center", gap:12, padding:"16px 16px 12px", background:"var(--bg-deep)", borderBottom:"1px solid var(--border)"}}>
          <button onClick={goBack} className="btn-ghost" style={{background:"transparent", border:"none", cursor:"pointer", color:"var(--accent)", fontSize:20, lineHeight:1, padding:"2px 4px", display:"flex", alignItems:"center"}}>‹</button>
          <span style={{fontSize:12, fontWeight:600, letterSpacing:"0.05em", color:"var(--text-secondary)"}}>PR TRACKER</span>
        </div>
      )}

      {embedded && (
        <div style={{fontSize:15, fontWeight:700, color:"var(--text-primary)", marginBottom:10, marginTop:4}}>PR Tracker</div>
      )}

      {/* Controls row */}
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding: embedded ? "4px 0 8px" : "14px 16px 8px", gap:8}}>
        <div style={{display:"flex", gap:6, overflowX:"auto"}}>
          {tags.map(t => (
            <button key={t} onClick={() => setFilter(t)} style={{
              flexShrink:0, padding:"5px 12px", borderRadius:20, border:"1px solid",
              borderColor: filter === t ? "var(--accent)" : "var(--border)",
              background: filter === t ? "rgba(var(--accent-rgb),0.12)" : "transparent",
              color: filter === t ? "var(--accent)" : "var(--text-secondary)",
              fontSize:12, fontWeight:700, letterSpacing:"0.05em", cursor:"pointer",
            }}>{t === "ALL" ? "All" : TAG_LABEL[t]}</button>
          ))}
        </div>
        {hasAnchors && (
          <button onClick={() => setAnchorsOnly(p => !p)} style={{
            flexShrink:0, padding:"5px 10px", borderRadius:20, border:"1px solid",
            borderColor: anchorsOnly ? "var(--phase-peak)" : "var(--border)",
            background: anchorsOnly ? "var(--phase-peak)18" : "transparent",
            color: anchorsOnly ? "var(--phase-peak)" : "var(--text-secondary)",
            fontSize:11, fontWeight:700, letterSpacing:"0.04em", cursor:"pointer",
            whiteSpace:"nowrap",
          }}>{anchorsOnly ? "Anchors" : "All lifts"}</button>
        )}
      </div>

      {/* Compact PR list */}
      <div style={{padding: embedded ? "0" : "0 16px", display:"flex", flexDirection:"column", gap:0}}>
        {filtered.length === 0 && (
          <div style={{padding:"32px 20px", textAlign:"center", color:"var(--text-dim)", fontSize:13}}>
            <div style={{fontWeight:600, marginBottom:4}}>{anchorsOnly ? "No anchor lifts logged yet" : "No data yet"}</div>
            {anchorsOnly && <button onClick={() => setAnchorsOnly(false)} style={{fontSize:12, color:"var(--accent)", background:"none", border:"none", cursor:"pointer", marginTop:4}}>Show all lifts</button>}
          </div>
        )}
        {filtered.map((pr, idx) => {
          const tc = tagColor[pr.tag] || "var(--accent)";
          const trendUp   = pr.history.length >= 2 && pr.history[pr.history.length-1].score > pr.history[0].score;
          const trendFlat = pr.history.length >= 2 && pr.history[pr.history.length-1].score === pr.history[0].score;
          const trendColor = trendFlat ? "var(--text-muted)" : trendUp ? "var(--phase-accum)" : "var(--danger)";
          const trendArrow = trendFlat ? "→" : trendUp ? "↑" : "↓";
          const bestDisplay = pr.isBw ? `BW+${pr.bestAdded} × ${pr.bestReps}` : `${pr.bestWeight} × ${pr.bestReps}`;
          return (
            <button key={pr.key} onClick={() => setDetailPr(pr)} style={{
              display:"flex", alignItems:"center", width:"100%",
              padding:"11px 14px",
              background:"var(--bg-card)", border:"none",
              borderBottom: idx < filtered.length - 1 ? "1px solid var(--border-subtle)" : "none",
              borderRadius: idx === 0 ? "8px 8px 0 0" : idx === filtered.length - 1 ? "0 0 8px 8px" : 0,
              cursor:"pointer", textAlign:"left",
              boxShadow: idx === 0 ? "var(--shadow-sm)" : "none",
            }}
            onMouseEnter={e => e.currentTarget.style.background = "var(--bg-surface)"}
            onMouseLeave={e => e.currentTarget.style.background = "var(--bg-card)"}
            >
              {/* Name */}
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:13, fontWeight:700, color:"var(--text-primary)", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"}}>{pr.name}</div>
              </div>
              {/* Best + trend */}
              <div style={{display:"flex", alignItems:"center", gap:6, flexShrink:0, marginLeft:10}}>
                <div style={{fontSize:13, fontWeight:800, color:"var(--text-primary)", whiteSpace:"nowrap"}}>{bestDisplay}</div>
                <div style={{fontSize:15, color:trendColor, fontWeight:700, width:14, textAlign:"center"}}>{trendArrow}</div>
              </div>
            </button>
          );
        })}
      </div>

      {/* ── DETAIL SHEET ── */}
      {detailPr && (() => {
        const pr = detailPr;
        const tc = tagColor[pr.tag] || "var(--accent)";
        const trendUp   = pr.history.length >= 2 && pr.history[pr.history.length-1].score > pr.history[0].score;
        const trendFlat = pr.history.length >= 2 && pr.history[pr.history.length-1].score === pr.history[0].score;
        const trendColor = trendFlat ? "var(--text-muted)" : trendUp ? "var(--phase-accum)" : "var(--danger)";
        const trendArrow = trendFlat ? "→" : trendUp ? "↑" : "↓";
        const maxS = pr.history.length > 0 ? Math.max(...pr.history.map(h => h.score)) : 1;
        const minS = pr.history.length > 0 ? Math.min(...pr.history.map(h => h.score)) : 0;
        const range = maxS - minS || 1;

        return (
          <div
            onClick={() => setDetailPr(null)}
            style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:300,
              display:"flex", alignItems:"flex-end", justifyContent:"center"}}
          >
            <div
              onClick={e => e.stopPropagation()}
              style={{
                background:"var(--bg-card)", borderRadius:"14px 14px 0 0",
                border:"1px solid var(--border)", borderBottom:"none",
                width:"100%", maxWidth:480,
                paddingBottom:"env(safe-area-inset-bottom, 0px)",
                animation:"slideUp 0.22s cubic-bezier(0.34,1.1,0.64,1)",
              }}
            >
              {/* Drag handle */}
              <div style={{display:"flex", justifyContent:"center", padding:"12px 0 4px"}}>
                <div style={{width:36, height:4, borderRadius:2, background:"var(--border)"}}/>
              </div>

              {/* Header */}
              <div style={{padding:"12px 20px 16px", borderBottom:"1px solid var(--border)"}}>
                <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12}}>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:6}}>
                      <span style={{
                        fontSize:12, fontWeight:700, letterSpacing:"0.05em",
                        color:tc, background:tc+"1a", padding:"2px 7px", borderRadius:3, flexShrink:0,
                      }}>{pr.tag}</span>
                      {pr.muscle && <span style={{fontSize:12, color:"var(--text-muted)"}}>{pr.muscle}</span>}
                    </div>
                    <div style={{fontSize:17, fontWeight:800, color:"var(--text-primary)", lineHeight:1.2}}>{pr.name}</div>
                  </div>
                  <button onClick={() => setDetailPr(null)} style={{
                    background:"transparent", border:"none", cursor:"pointer",
                    color:"var(--text-muted)", fontSize:22, lineHeight:1, padding:"2px 4px", flexShrink:0,
                  }}>×</button>
                </div>
              </div>

              {/* Stats */}
              <div style={{display:"flex", borderBottom:"1px solid var(--border)"}}>
                {[
                  { label:"BEST SET",  value: pr.isBw ? `BW+${pr.bestAdded} × ${pr.bestReps}` : `${pr.bestWeight} × ${pr.bestReps}`, sub: pr.isBw ? `${pr.bestWeight} lbs effective` : "reps" },
                  { label:"PEAK WEEK", value:`Week ${pr.bestWeek}`, sub:"" },
                  { label:"TREND",     value: trendArrow, sub: trendUp ? "improving" : trendFlat ? "holding" : "declining", color: trendColor },
                ].map((stat, i) => (
                  <div key={i} style={{
                    flex:1, padding:"14px 12px", textAlign:"center",
                    borderRight: i < 2 ? "1px solid var(--border-subtle)" : "none",
                  }}>
                    <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)", marginBottom:4}}>{stat.label}</div>
                    <div style={{fontSize:18, fontWeight:900, color: stat.color || "var(--text-primary)", lineHeight:1}}>{stat.value}</div>
                    {stat.sub && <div style={{fontSize:12, color:"var(--text-muted)", marginTop:3}}>{stat.sub}</div>}
                  </div>
                ))}
              </div>

              {/* Volume trend chart */}
              <div style={{padding:"18px 20px 24px"}}>
                <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.06em", color:"var(--text-muted)", marginBottom:4}}>VOLUME TREND</div>
                <div style={{fontSize:12, color:"var(--text-secondary)", marginBottom:14, lineHeight:1.5}}>
                  {pr.isBw ? "Effective weight × reps" : "Weight × reps"} per week — taller bar = more total output
                </div>
                {pr.history.length > 1 ? (
                  <div style={{display:"flex", alignItems:"flex-end", gap:5, height:60}}>
                    {pr.history.map((h, hi) => {
                      const heightPct = 15 + ((h.score - minS) / range) * 85;
                      const isMax = h.score === maxS;
                      return (
                        <div key={hi} style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4}}>
                          <div style={{
                            width:"100%", height:`${heightPct}%`, borderRadius:"3px 3px 0 0",
                            background: isMax ? tc : tc+"55",
                            minHeight:4, transition:"height 0.3s ease",
                          }}/>
                          <div style={{fontSize:12, color: isMax ? "var(--text-primary)" : "var(--text-muted)", fontWeight: isMax ? 800 : 600}}>W{h.week}</div>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div style={{fontSize:12, color:"var(--text-muted)", textAlign:"center", padding:"16px 0"}}>
                    Complete more weeks to see your trend
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ─── TOUR OVERLAY ─────────────────────────────────────────────────────────────
// 4-stop sequential spotlight shown once after first program is generated.
// Stored in ppl:toured — never shown again.
function TourOverlay({ onDone }) {
  const [step, setStep] = React.useState(0);
  const [pos, setPos]   = React.useState(null);

  const STEPS = [
    {
      selector: "[data-tour='today-card']",
      title: "Today's session",
      body: "Your workout for today. Tap to start lifting or log cardio.",
    },
    {
      selector: "[data-tour='cardio-card']",
      title: "Cardio lives here",
      body: "Separate from lifting. Log a session or follow your cardio plan.",
    },
    {
      selector: "[data-tour='nav-schedule']",
      title: "Your full meso",
      body: "Every week, every session. Skip days, edit your schedule.",
    },
    {
      selector: "[data-tour='nav-progress']",
      title: "Track your progress",
      body: "Volume landmarks, PRs, and sparklines. Watch the numbers move.",
    },
  ];

  React.useEffect(() => {
    const el = document.querySelector(STEPS[step].selector);
    if (!el) {
      // Element not found — skip this step rather than stalling
      if (step < STEPS.length - 1) setStep(s => s + 1);
      else { store.set("ppl:toured","1"); onDone(); }
      return;
    }
    const rect = el.getBoundingClientRect();
    setPos({ top: rect.top, left: rect.left, width: rect.width, height: rect.height });
  }, [step]);

  const advance = () => {
    if (step < STEPS.length - 1) setStep(s => s + 1);
    else { store.set("ppl:toured","1"); onDone(); }
  };

  const dismiss = () => { store.set("ppl:toured","1"); onDone(); };

  const current = STEPS[step];

  return (
    <div
      onClick={advance}
      style={{
        position:"fixed", inset:0, zIndex:300,
        background:"transparent",
        cursor:"pointer",
      }}
    >
      {/* Spotlight cutout — box-shadow fills everything outside the target */}
      {pos && (
        <div style={{
          position:"fixed",
          top: pos.top - 6,
          left: pos.left - 6,
          width: pos.width + 12,
          height: pos.height + 12,
          borderRadius:10,
          border:"2px solid var(--accent-blue)",
          boxShadow:"0 0 0 9999px rgba(0,0,0,0.72)",
          pointerEvents:"none",
          zIndex:301,
        }}/>
      )}

      {/* Tooltip — always pinned to bottom above nav */}
      <div
        onClick={e => e.stopPropagation()}
        style={{
          position:"fixed",
          bottom:80, left:16, right:16,
          maxWidth:440, margin:"0 auto",
          background:"var(--bg-card)",
          border:"1px solid var(--border-accent)",
          borderRadius:12,
          padding:"16px 18px",
          boxShadow:"0 8px 32px rgba(0,0,0,0.5)",
          zIndex:303,
          cursor:"default",
        }}
      >
        {/* Step dots */}
        <div style={{display:"flex", gap:4, marginBottom:10}}>
          {STEPS.map((_,i) => (
            <div key={i} style={{
              width: i === step ? 18 : 5, height:5, borderRadius:3,
              background: i <= step ? "var(--accent-blue)" : "var(--border-accent)",
              transition:"all 0.25s ease",
            }}/>
          ))}
        </div>
        <div style={{fontSize:15, fontWeight:800, color:"var(--text-primary)", marginBottom:4}}>{current.title}</div>
        <div style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.55, marginBottom:14}}>{current.body}</div>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <button onClick={dismiss} style={{
            background:"none", border:"none", cursor:"pointer",
            fontSize:12, color:"var(--text-muted)", padding:0,
          }}>Skip tour</button>
          <button onClick={advance} className="btn-primary" style={{
            padding:"10px 22px", fontSize:13, fontWeight:700, borderRadius:8, cursor:"pointer",
          }}>
            {step < STEPS.length - 1 ? "Next →" : "Done ✓"}
          </button>
        </div>
        <div style={{fontSize:11, color:"var(--text-dim)", textAlign:"center", marginTop:10}}>
          Tap anywhere to advance
        </div>
      </div>
    </div>
  );
}

function OnboardingProgressScreen() {
  const weeks   = ["W1","W2","W3","W4","W5","W6","W7","W8"];
  const weights = [135, 135, 140, 145, 150, 155, 160, 165];
  const maxW = Math.max(...weights);
  const minW = Math.min(...weights);
  const [animated, setAnimated] = React.useState(false);

  React.useEffect(() => {
    const t = setTimeout(() => setAnimated(true), 120);
    return () => clearTimeout(t);
  }, []);

  return (
    <div style={{
      display:"flex", flexDirection:"column",
      justifyContent:"center", height:"100%", paddingTop:48, paddingBottom:24,
    }}>
      <div style={{
        fontSize:12, fontWeight:700, letterSpacing:"0.14em",
        color:"var(--text-muted)", marginBottom:16, textTransform:"uppercase",
      }}>How it works</div>

      <h2 style={{
        fontSize:30, fontWeight:900, lineHeight:1.1,
        color:"var(--text-primary)", marginBottom:8,
        letterSpacing:"-0.02em",
      }}>
        Weights go up.<br/>
        <span style={{color:"var(--phase-accum)"}}>Every week.</span>
      </h2>
      <p style={{
        fontSize:14, color:"var(--text-secondary)", lineHeight:1.55, marginBottom:32,
      }}>
        The Foundry reads your numbers from last week and tells you exactly what to lift this week. No spreadsheets. No guesswork.
      </p>

      {/* Animated bar chart */}
      <div style={{
        background:"var(--bg-card)", border:"1px solid var(--border)",
        borderRadius:10, padding:"20px 16px 14px", marginBottom:24,
      }}>
        <div style={{
          fontSize:11, fontWeight:700, letterSpacing:"0.08em",
          color:"var(--text-muted)", marginBottom:16,
        }}>BARBELL BACK SQUAT — 8-WEEK MESO</div>
        <div style={{display:"flex", alignItems:"flex-end", gap:6, height:80}}>
          {weights.map((w, i) => {
            const pct  = (w - minW) / (maxW - minW);
            const barH = animated ? Math.max(20, 20 + pct * 56) : 4;
            const isLast = i === weights.length - 1;
            const color = isLast ? "var(--phase-peak)"
              : i >= 5 ? "var(--phase-intens)"
              : i >= 2 ? "var(--phase-accum)"
              : "var(--text-muted)";
            return (
              <div key={i} style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4}}>
                {isLast && (
                  <div style={{
                    fontSize:10, fontWeight:800, color:"var(--phase-peak)",
                    letterSpacing:"0.04em", marginBottom:2,
                  }}>PR</div>
                )}
                <div style={{
                  width:"100%", borderRadius:3,
                  background: isLast ? "var(--phase-peak)" : i >= 5 ? "var(--phase-intens)" : i >= 2 ? "var(--phase-accum)" : "var(--bg-surface)",
                  border:`1px solid ${color}`,
                  height: barH,
                  transition:`height 0.5s cubic-bezier(0.34,1.56,0.64,1) ${i * 45}ms`,
                  opacity: animated ? 1 : 0,
                }}/>
                <div style={{fontSize:10, color: isLast ? "var(--phase-peak)" : "var(--text-muted)", fontWeight: isLast ? 700 : 400}}>{w}</div>
                <div style={{fontSize:10, color:"var(--text-dim)"}}>{weeks[i]}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Progression mechanics */}

function OnboardingFlow({ onDone }) {
  const [screen, setScreen] = React.useState(0);
  const [animDir, setAnimDir] = React.useState(1);
  const [animating, setAnimating] = React.useState(false);
  const TOTAL = 3;

  const goTo = (idx, dir = 1) => {
    if (animating) return;
    setAnimDir(dir);
    setAnimating(true);
    setTimeout(() => { setScreen(idx); setAnimating(false); }, 220);
  };

  const advance = () => {
    if (screen < TOTAL - 1) {
      goTo(screen + 1, 1);
    } else {
      store.set("ppl:onboarded", "1");
      onDone();
    }
  };

  const skip = () => { store.set("ppl:onboarded", "1"); onDone(); };

  // Touch swipe
  const touchStart = React.useRef(null);
  const handleTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const handleTouchEnd = (e) => {
    if (touchStart.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    touchStart.current = null;
    if (Math.abs(dx) < 50) return;
    if (dx < 0 && screen < TOTAL - 1) goTo(screen + 1, 1);
    if (dx > 0 && screen > 0) goTo(screen - 1, -1);
  };

  const slideStyle = {
    transition: animating ? "none" : "opacity 0.22s ease, transform 0.22s ease",
