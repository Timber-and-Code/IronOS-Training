// ─── DAY VIEW ─────────────────────────────────────────────────────────────────
function DayView({ dayIdx, weekIdx, onBack, onComplete, onNextDay, completedDays, profile, activeDays }) {
  const day = activeDays[dayIdx];
  const accent = TAG_ACCENT[day.tag];
  const pc = PHASE_COLOR[WEEK_PHASE[weekIdx]];
  const isDone = completedDays.has(`${dayIdx}:${weekIdx}`);

  // Day is locked (view-only, no input) if any prior day this week is incomplete
  const isLocked = !isDone && Array.from({length: dayIdx}, (_, d) => d)
    .some(d => !completedDays.has(`${d}:${weekIdx}`));

  const [weekData, setWeekData]           = useState(() => loadDayWeekWithCarryover(dayIdx, weekIdx, day));
  const [notes, setNotes]                 = useState(() => loadNotes(dayIdx, weekIdx));
  const [expandedIdx, setExpandedIdx]     = useState(0);
  const [doneExercises, setDoneExercises] = useState(new Set());
  const [dialog, setDialog]               = useState(null);
  const [showWorkoutModal, setShowWorkoutModal] = useState(false);
  const [showReadyDialog, setShowReadyDialog]   = useState(true);
  const [showUnfinishedPrompt, setShowUnfinishedPrompt] = useState(false);
  const [swapTarget, setSwapTarget]             = useState(null); // {exIdx}
  const dialogShownRef = React.useRef(new Set());

  // Build resolved exercises by applying any saved overrides
  const [exercises, setExercises] = useState(() => {
    return day.exercises.map((ex, i) => {
      const ovId = loadExOverride(dayIdx, weekIdx, i);
      if (!ovId) return ex;
      const dbEx = EXERCISE_DB.find(e => e.id === ovId);
      if (!dbEx) return ex;
      const wu = ex.anchor
        ? (profile?.sessionDuration <= 30 ? "2 ramp sets — time is tight, be thorough" : dbEx.warmup)
        : (dbEx.fatigue === "low" ? "—" : "1 feeler set");
      return {
        id: dbEx.id, name: dbEx.name, muscle: dbEx.muscle, equipment: dbEx.equipment,
        tag: dbEx.tag, anchor: ex.anchor, sets: dbEx.sets, reps: dbEx.reps,
        rest: dbEx.rest, warmup: wu,
        progression: dbEx.pattern === "isolation" ? "reps" : "weight",
      };
    });
  });

  const handleSwap = (newDbEx, scope) => {
    const { exIdx } = swapTarget;
    const oldEx = exercises[exIdx];
    const wu = oldEx.anchor
      ? (profile?.sessionDuration <= 30 ? "2 ramp sets — time is tight, be thorough" : newDbEx.warmup)
      : (newDbEx.fatigue === "low" ? "—" : "1 feeler set");
    const newEx = {
      id: newDbEx.id, name: newDbEx.name, muscle: newDbEx.muscle, equipment: newDbEx.equipment,
      tag: newDbEx.tag, anchor: oldEx.anchor, sets: newDbEx.sets, reps: newDbEx.reps,
      rest: newDbEx.rest, warmup: wu,
      progression: newDbEx.pattern === "isolation" ? "reps" : "weight",
    };
    saveExOverride(dayIdx, weekIdx, exIdx, newDbEx.id, scope);
    setExercises(prev => prev.map((ex, i) => i === exIdx ? newEx : ex));
    setSwapTarget(null);
  };

  const handleUpdateSet = useCallback((exIdx, setIdx, field, value) => {
    // If user edits data for a done exercise, un-done it so they can re-complete
    setDoneExercises(prev => {
      if (prev.has(exIdx)) {
        const next = new Set(prev);
        next.delete(exIdx);
        return next;
      }
      return prev;
    });
    // Allow dialog to fire again for this exercise after an edit
    dialogShownRef.current.delete(exIdx);

    setWeekData(prev => {
      const next = {
        ...prev,
        [exIdx]: {
          ...(prev[exIdx] || {}),
          [setIdx]: {...((prev[exIdx] || {})[setIdx] || {}), [field]: value}
        }
      };
      saveDayWeek(dayIdx, weekIdx, next);
      return next;
    });
  }, [dayIdx, weekIdx]);

  const handleWeightAutoFill = useCallback((exIdx, weight, numSets) => {
    setWeekData(prev => {
      const exData = prev[exIdx] || {};
      const next = { ...prev, [exIdx]: { ...exData } };
      for (let s = 1; s < numSets; s++) {
        const existing = (exData[s] || {}).weight;
        if (!existing || existing === "") {
          next[exIdx][s] = { ...(exData[s] || {}), weight };
        }
      }
      saveDayWeek(dayIdx, weekIdx, next);
      return next;
    });
  }, [dayIdx, weekIdx]);

  const handleLastSetFilled = useCallback((exIdx, exName) => {
    // Don't fire if already done or already shown since last edit
    if (doneExercises.has(exIdx) || dialogShownRef.current.has(exIdx)) return;
    dialogShownRef.current.add(exIdx);
    setDialog({ exIdx, exName });
  }, [doneExercises]);

  const handleDialogYes = () => {
    const { exIdx } = dialog;
    setDialog(null);
    setDoneExercises(prev => new Set([...prev, exIdx]));
    const nextIdx = exIdx + 1;
    if (nextIdx < exercises.length) {
      setExpandedIdx(nextIdx);
      setTimeout(() => {
        const el = document.getElementById(`ex-${nextIdx}`);
        if (el) el.scrollIntoView({ behavior:"smooth", block:"start" });
      }, 120);
    } else {
      setExpandedIdx(null);
    }
  };

  const handleDialogNo = () => setDialog(null);

  const handleNoteChange = (val) => {
    setNotes(val);
    saveNotes(dayIdx, weekIdx, val);
  };

  const handleComplete = () => {
    const allExDone = doneExercises.size === exercises.length;
    if (!allExDone) {
      setShowUnfinishedPrompt(true);
      return;
    }
    doComplete();
  };

  const doComplete = () => {
    setShowUnfinishedPrompt(false);
    markComplete(dayIdx, weekIdx);
    onComplete(dayIdx, weekIdx);
    setShowWorkoutModal(true);
  };

  return (
    <div style={{paddingBottom:100}}>
      {showReadyDialog && (
        <ReadyDialog
          dayLabel={day.label}
          userName={profile?.name || ""}
          isDone={isDone}
          isLocked={isLocked}
          onYes={() => setShowReadyDialog(false)}
          onNo={onBack}
        />
      )}
      {showWorkoutModal && (
        <WorkoutCompleteModal
          dayLabel={day.label}
          gender={profile?.gender}
          onOk={() => { setShowWorkoutModal(false); window.scrollTo(0,0); onBack(); window.scrollTo(0,0); }}
        />
      )}
      {dialog && (
        <CompleteDialog exerciseName={dialog.exName} onYes={handleDialogYes} onNo={handleDialogNo} />
      )}
      {showUnfinishedPrompt && (
        <div style={{
          position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:200,
          display:"flex", alignItems:"center", justifyContent:"center", padding:"24px",
        }}>
          <div style={{
            background:"var(--bg-card)", border:"1px solid var(--border)",
            borderRadius:20, padding:"28px 24px", maxWidth:340, width:"100%",
          }}>
            <div style={{fontSize:24, textAlign:"center", marginBottom:14}}>⚠️</div>
            <div style={{fontSize:15, fontWeight:900, letterSpacing:"0.06em", color:"var(--text-primary)", textAlign:"center", marginBottom:8}}>
              NOT QUITE DONE
            </div>
            <div style={{fontSize:13, color:"var(--text-secondary)", textAlign:"center", lineHeight:1.6, marginBottom:24}}>
              Looks like this workout isn't finished yet. Do you still want to mark it complete?
            </div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
              <button onClick={() => setShowUnfinishedPrompt(false)} style={{
                padding:"14px", borderRadius:12, cursor:"pointer",
                background:"var(--bg-surface)", border:"1px solid var(--border)",
                color:"var(--text-secondary)", fontSize:13, fontWeight:700,
              }}>Keep Going</button>
              <button onClick={doComplete} style={{
                padding:"14px", borderRadius:12, cursor:"pointer",
                background:"var(--btn-primary-bg)", border:"1px solid var(--btn-primary-border)",
                color:"var(--btn-primary-text)", fontSize:13, fontWeight:700,
              }}>Mark Complete</button>
            </div>
          </div>
        </div>
      )}
      {swapTarget !== null && (
        <SwapModal
          exercise={exercises[swapTarget.exIdx]}
          dayTag={day.tag}
          profile={profile}
          onSwap={handleSwap}
          onClose={() => setSwapTarget(null)}
        />
      )}

      {/* Day header */}
      <div style={{background:"var(--bg-surface)", borderBottom:"1px solid var(--border)", padding:"14px 16px"}}>
        <button onClick={onBack} style={{background:"none", border:"none", color:"var(--accent)", fontSize:15, cursor:"pointer", padding:"0 0 12px", display:"flex", alignItems:"center", gap:6}}>
          ‹ Back
        </button>
        <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8}}>
          <div style={{flex:1}}>
            <div style={{display:"flex", alignItems:"center", flexWrap:"wrap", gap:6, marginBottom:8}}>
              {pill(accent, day.tag)}
              {pill(pc, `W${weekIdx+1} · ${WEEK_RIR[weekIdx]}`)}
              {isDone && pill("var(--phase-accum)", "✓ Done")}
            </div>
            <div style={{fontSize:21, fontWeight:800, color:"var(--text-primary)"}}>{day.label}</div>
            <div style={{fontSize:13, color:"var(--text-secondary)", marginTop:3}}>{day.muscles}</div>
          </div>
        </div>
        {day.cardio && (
          <div style={{marginTop:12, padding:"10px 12px", background:"var(--border)", borderRadius:10, display:"flex", alignItems:"center", gap:8}}>
            <span>🏃</span>
            <span style={{fontSize:13, color:"var(--accent)", fontWeight:700}}>{day.cardio} · Norwegian 4x4 — PM session</span>
          </div>
        )}
        <div style={{marginTop:10, padding:"10px 14px", background:"var(--bg-root)", borderRadius:10, borderLeft:`3px solid ${accent}`}}>
          <span style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.6}}>{day.note}</span>
        </div>
      </div>

      {/* Exercises */}
      <div style={{margin:"16px 16px 0", background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:12, overflow:"hidden"}}>
        <div style={{padding:"12px 16px", borderBottom:"1px solid var(--border)", background:"var(--bg-deep)", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <span style={{fontSize:12, fontWeight:700, letterSpacing:"0.12em", color:"var(--accent)"}}>EXERCISES</span>
          <span style={{fontSize:12, color:"var(--text-dim)"}}>{doneExercises.size}/{exercises.length} done</span>
        </div>
        {exercises.map((ex, i) => (
          <div key={i} id={`ex-${i}`}>
            <ExerciseCard
              exercise={ex}
              exIdx={i}
              weekIdx={weekIdx}
              weekData={weekData}
              onUpdateSet={handleUpdateSet}
              onWeightAutoFill={handleWeightAutoFill}
              onLastSetFilled={handleLastSetFilled}
              expanded={expandedIdx === i}
              onToggle={() => setExpandedIdx(expandedIdx === i ? null : i)}
              done={doneExercises.has(i)}
              readOnly={isDone || isLocked}
              onSwapClick={!isDone && !isLocked ? () => setSwapTarget({exIdx: i}) : null}
            />
          </div>
        ))}
      </div>
      <div style={{margin:"16px 16px 0"}}>
        <div style={{fontSize:12, fontWeight:700, letterSpacing:"0.12em", color:"var(--text-secondary)", marginBottom:8, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          SESSION NOTES
          {isDone && <span style={{fontSize:11, color:"var(--success)", fontWeight:600, letterSpacing:"0.04em"}}>✎ editable</span>}
        </div>
        <textarea
          value={notes}
          onChange={e => !isLocked && handleNoteChange(e.target.value)}
          readOnly={isLocked}
          placeholder="How'd it feel? Any PRs? Notes for next session..."
          style={{
            width:"100%", minHeight:100,
            background: isLocked ? "var(--bg-deep)" : "var(--bg-card)",
            border:"1px solid var(--border)", borderRadius:10,
            color:"var(--text-secondary)", fontSize:14, padding:"14px", resize:"vertical",
            outline:"none", lineHeight:1.6,
            opacity: isLocked ? 0.5 : 1,
          }}
        />
      </div>

      {/* Complete button / locked / done banner */}
      <div style={{margin:"16px 16px 0"}}>
        {isDone ? (
          <div style={{
            width:"100%", padding:"18px", borderRadius:12,
            background:"var(--success-bg)", border:"1px solid var(--success-bg)",
            color:"var(--phase-accum)", fontSize:15, fontWeight:700,
            textAlign:"center", letterSpacing:"0.04em", lineHeight:1.5,
          }}>
            ✓ Session Complete — Review Only
            <div style={{fontSize:12, color:"var(--success)", marginTop:4, fontWeight:400}}>
              Changes are not allowed for completed sessions
            </div>
          </div>
        ) : isLocked ? (
          <div style={{
            width:"100%", padding:"18px", borderRadius:12,
            background:"var(--bg-surface)", border:"1px solid var(--text-dim)",
            color:"var(--text-muted)", fontSize:15, fontWeight:700,
            textAlign:"center", letterSpacing:"0.04em", lineHeight:1.5,
          }}>
            🔒 Complete Previous Days First
            <div style={{fontSize:12, color:"var(--text-dim)", marginTop:4, fontWeight:400}}>
              Finish all prior sessions this week to unlock this day
            </div>
          </div>
        ) : (() => {
          const allDone = doneExercises.size === exercises.length;
          return (
            <button
              onClick={handleComplete}
              style={{
                width:"100%", padding:"18px", borderRadius:12,
                background: allDone ? accent : "var(--bg-surface)",
                border:`1px solid ${allDone ? accent : "var(--border)"}`,
                color: allDone ? "var(--text-primary)" : "var(--text-muted)",
                fontSize:16, fontWeight:800,
                cursor:"pointer",
                letterSpacing:"0.05em",
                transition:"all 0.2s",
              }}
            >
              {allDone
                ? "Mark Session Complete ✓"
                : `Complete All Exercises — ${doneExercises.size}/${exercises.length} done`}
            </button>
          );
        })()}
      </div>
    </div>
  );
}

// ─── PROGRESS VIEW ────────────────────────────────────────────────────────────
function ProgressView({ currentWeek, completedDays, activeDays }) {
  const [expandedDay, setExpandedDay] = useState(null);
  // Tally sets per muscle group across completed sessions in current week
  const muscleGroups = { PUSH: 0, PULL: 0, LEGS: 0 };
  activeDays.forEach((day, dayIdx) => {
    if (!completedDays.has(`${dayIdx}:${currentWeek}`)) return;
    const weekData = loadDayWeek(dayIdx, currentWeek);
    day.exercises.forEach((ex, exIdx) => {
      const exData = weekData[exIdx] || {};
      const filledSets = Object.values(exData).filter(s => s.reps && s.reps !== "").length;
      if (filledSets > 0) muscleGroups[day.tag] += filledSets;
    });
  });

  const workoutsThisWeek = activeDays.filter((_, i) => completedDays.has(`${i}:${currentWeek}`)).length;
  const workoutsTotal    = Array.from(completedDays).length;

  // Current weights — latest logged weight for each anchor lift across all weeks
  const anchorLifts = activeDays.map(day => {
    const anchor = day.exercises.find(e => e.anchor);
    if (!anchor) return null;
    let bestWeight = "";
    // Scan weeks from newest to oldest for most recent logged weight
    for (let w = currentWeek; w >= 0; w--) {
      const wd = loadDayWeek(activeDays.indexOf(day), w);
      for (let s = 0; s < anchor.sets; s++) {
        const wt = (wd[0] || {})[s]?.weight || (wd[0] || {}).weight;
        // Get set 0 weight from exercise index 0
        const exData = wd[0] || {};
        // find first set with weight
        const setWithWeight = Object.values(wd[0] || {}).find(sv => sv.weight && sv.weight !== "");
        if (setWithWeight) { bestWeight = setWithWeight.weight; break; }
      }
      if (bestWeight) break;
    }
    return { name: anchor.name, tag: day.tag, weight: bestWeight };
  }).filter(Boolean);

  // All exercises current weight (first set logged, most recent week)
  const allLifts = [];
  activeDays.forEach((day, dayIdx) => {
    day.exercises.forEach((ex, exIdx) => {
      let weight = "";
      for (let w = currentWeek; w >= 0; w--) {
        const wd = loadDayWeek(dayIdx, w);
        const exData = wd[exIdx] || {};
        const setWithWeight = Object.values(exData).find(sv => sv && sv.weight && sv.weight !== "");
        if (setWithWeight) { weight = setWithWeight.weight; break; }
      }
      allLifts.push({ name: ex.name, tag: day.tag, weight, anchor: ex.anchor });
    });
  });

  const tagColor = TAG_ACCENT;
  const phase = WEEK_PHASE[currentWeek];
  const pc = PHASE_COLOR[phase];

  const statBox = (label, value, color) => (
    <div style={{
      flex:1, background:"var(--bg-card)", border:`1px solid ${color}33`,
      borderRadius:12, padding:"14px 12px", textAlign:"center",
    }}>
      <div style={{fontSize:22, fontWeight:900, color}}>{value}</div>
      <div style={{fontSize:10, color:"var(--text-secondary)", marginTop:4, fontWeight:700, letterSpacing:"0.08em"}}>{label}</div>
    </div>
  );

  return (
    <div style={{padding:"0 16px 24px"}}>
      {/* Week summary stats */}
      <div style={{marginBottom:16}}>
        <div style={{fontSize:11, fontWeight:700, letterSpacing:"0.12em", color:"var(--accent)", marginBottom:10}}>
          WEEK {currentWeek + 1} SUMMARY · {phase.toUpperCase()}
        </div>
        <div style={{display:"flex", gap:10, marginBottom:10}}>
          {statBox("THIS WEEK", `${workoutsThisWeek}/6`, pc)}
          {statBox("TOTAL SESSIONS", workoutsTotal, "var(--accent)")}
        </div>
        <div style={{display:"flex", gap:10}}>
          {statBox("PUSH SETS", muscleGroups.PUSH, TAG_ACCENT.PUSH)}
          {statBox("PULL SETS", muscleGroups.PULL, TAG_ACCENT.PULL)}
          {statBox("LEG SETS",  muscleGroups.LEGS,  TAG_ACCENT.LEGS)}
        </div>
      </div>

      {/* Lift weights by day */}
      {activeDays.map((day, dayIdx) => {
        const accent = TAG_ACCENT[day.tag];
        const dayLiftsDirect = day.exercises.map((ex, exIdx) => {
          let weight = "";
          for (let w = currentWeek; w >= 0; w--) {
            const wd = loadDayWeek(dayIdx, w);
            const exData = wd[exIdx] || {};
            const sw = Object.values(exData).find(sv => sv && sv.weight && sv.weight !== "");
            if (sw) { weight = sw.weight; break; }
          }
          return { name: ex.name, muscle: ex.muscle, weight, anchor: ex.anchor, sets: ex.sets, reps: ex.reps };
        });
        const anyLogged = dayLiftsDirect.some(l => l.weight);
        const isDayExpanded = expandedDay === dayIdx;
        return (
          <div key={dayIdx} style={{
            background:"var(--bg-card)", border:`1px solid ${anyLogged ? accent+"44" : "var(--border)"}`,
            borderRadius:12, marginBottom:10, overflow:"hidden",
          }}>
            <button onClick={()=>setExpandedDay(isDayExpanded ? null : dayIdx)} style={{
              width:"100%", textAlign:"left",
              background: anyLogged ? accent+"11" : "var(--bg-deep)",
              border:"none", borderBottom: isDayExpanded ? "1px solid #111827" : "none",
              padding:"12px 14px", cursor:"pointer",
              display:"flex", alignItems:"center", gap:10,
            }}>
              <span style={{
                background:accent+"22", color:accent, fontSize:10, fontWeight:800,
                padding:"3px 8px", borderRadius:6, letterSpacing:"0.06em", flexShrink:0,
              }}>{day.tag}</span>
              <span style={{fontSize:13, fontWeight:700, color:"var(--text-primary)", flex:1}}>Day {day.dayNum} — {day.label}</span>
              {completedDays.has(`${dayIdx}:${currentWeek}`) && (
                <span style={{fontSize:12, color:"var(--phase-accum)", flexShrink:0}}>✓</span>
              )}
              <span style={{
                color:"var(--text-dim)", fontSize:20, flexShrink:0,
                transform: isDayExpanded ? "rotate(90deg)" : "none", transition:"transform 0.2s",
              }}>›</span>
            </button>
            {isDayExpanded && (
              <div>
                {dayLiftsDirect.map((lift, i) => (
                  <div key={i} style={{
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    padding:"10px 14px", borderBottom: i < dayLiftsDirect.length-1 ? "1px solid var(--bg-surface)" : "none",
                  }}>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{display:"flex", alignItems:"baseline", gap:7, flexWrap:"wrap"}}>
                        <span style={{fontSize:13, color:"var(--text-primary)", fontWeight:600}}>
                          {lift.anchor && "⭐ "}{lift.name}
                        </span>
                        {lift.muscle && (
                          <span style={{fontSize:10, color:"#f59e0b", fontWeight:700, letterSpacing:"0.05em"}}>
                            {lift.muscle.toUpperCase()}
                          </span>
                        )}
                      </div>
                      <span style={{fontSize:11, color:"var(--border-accent)"}}>{lift.sets}×{lift.reps}</span>
                    </div>
                    <div style={{
                      fontSize:14, fontWeight:800, color: lift.weight ? "var(--accent)" : "var(--text-dim)",
                      minWidth:60, textAlign:"right",
                    }}>
                      {lift.weight ? `${lift.weight} lbs` : "—"}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── RESET CONFIRM DIALOGS ────────────────────────────────────────────────────
function ResetDialog({ onConfirmed, onCancel }) {
  const [step, setStep] = useState(1); // 1 = "are you sure", 2 = "confirm/cancel"
  return (
    <div style={{
      position:"fixed", inset:0, zIndex:300,
      background:"rgba(0,0,0,0.85)", backdropFilter:"blur(6px)",
      display:"flex", alignItems:"center", justifyContent:"center", padding:24,
    }}>
      <div style={{
        background:"var(--bg-card)", border:"1px solid var(--danger)",
        borderRadius:20, padding:"30px 24px", maxWidth:340, width:"100%",
        boxShadow:"0 24px 60px rgba(239,68,68,0.2)",
        animation:"dialogIn 0.2s cubic-bezier(0.34,1.56,0.64,1)",
        textAlign:"center",
      }}>
        {step === 1 ? <>
          <div style={{fontSize:36, marginBottom:14}}>⚠️</div>
          <div style={{fontSize:18, fontWeight:900, color:"var(--danger)", marginBottom:10}}>
            RESET ENTIRE MESO?
          </div>
          <div style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.7, marginBottom:28}}>
            This will permanently erase all logged weights, reps, session completions, and notes across all 7 weeks. This cannot be undone.
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
            <button onClick={onCancel} style={{
              padding:"15px", borderRadius:12, cursor:"pointer",
              background:"transparent", border:"1px solid var(--border)",
              color:"var(--text-secondary)", fontSize:15, fontWeight:700,
            }}>NO</button>
            <button onClick={()=>setStep(2)} style={{
              padding:"15px", borderRadius:12, cursor:"pointer",
              background:"var(--danger-bg)", border:"1px solid var(--danger)",
              color:"var(--danger)", fontSize:15, fontWeight:800,
            }}>YES</button>
          </div>
        </> : <>
          <div style={{fontSize:36, marginBottom:14}}>🔴</div>
          <div style={{fontSize:18, fontWeight:900, color:"var(--danger)", marginBottom:10}}>
            LAST CHANCE
          </div>
          <div style={{fontSize:13, color:"var(--text-secondary)", lineHeight:1.7, marginBottom:28}}>
            Are you absolutely sure? All data will be permanently wiped and you'll start back at Week 1.
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
            <button onClick={onCancel} style={{
              padding:"15px", borderRadius:12, cursor:"pointer",
              background:"transparent", border:"1px solid var(--border)",
              color:"var(--text-secondary)", fontSize:15, fontWeight:700,
            }}>CANCEL</button>
            <button onClick={onConfirmed} style={{
              padding:"15px", borderRadius:12, cursor:"pointer",
              background:"var(--danger-bg)", border:"1px solid var(--danger)",
              color:"var(--danger)", fontSize:15, fontWeight:800,
            }}>CONFIRM RESET</button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ─── WEEK SECTION (nested days) ───────────────────────────────────────────────
function WeekSection({ weekIdx, currentWeek, onSelectDay, completedDays, isExpanded, onToggle, activeDays, workoutDays }) {
  const phase = WEEK_PHASE[weekIdx];
  const pc = PHASE_COLOR[phase];
  const rir = WEEK_RIR[weekIdx];
  const isCurrent = weekIdx === currentWeek;
  const weekDone = activeDays.filter((_, i) => completedDays.has(`${i}:${weekIdx}`)).length;

  return (
    <div style={{marginBottom:8}}>
      <button onClick={onToggle} style={{
        width:"100%", textAlign:"left",
        background: isCurrent ? pc+"18" : "var(--bg-surface)",
        border:`1px solid ${isCurrent ? pc : "var(--border)"}`,
        borderRadius: isExpanded ? "12px 12px 0 0" : 12,
        padding:"14px 16px", cursor:"pointer",
        display:"flex", alignItems:"center", gap:12, transition:"all 0.15s",
      }}>
        <div style={{
          width:46, height:46, borderRadius:10, flexShrink:0,
          background: pc+"22", display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center",
        }}>
          <span style={{fontSize:16, fontWeight:800, color:pc}}>W{weekIdx+1}</span>
        </div>
        <div style={{flex:1, minWidth:0}}>
          <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
            <span style={{fontSize:15, fontWeight:700, color:"var(--text-primary)"}}>{phase}</span>
            {isCurrent && (
              <span style={{fontSize:10, background:pc+"33", color:pc, padding:"2px 8px", borderRadius:99, fontWeight:700}}>CURRENT</span>
            )}
          </div>
          <div style={{fontSize:12, color:"var(--text-secondary)", marginTop:2}}>{rir} · {weekDone}/{MESO.days} sessions done</div>
        </div>
        <span style={{
          color:"var(--text-dim)", fontSize:22, flexShrink:0,
          transform: isExpanded ? "rotate(90deg)" : "none", transition:"transform 0.2s",
        }}>›</span>
      </button>

      {isExpanded && (
        <div style={{paddingLeft:16}}>
        <div style={{
          border:`1px solid ${isCurrent ? pc : "var(--border)"}`,
          borderTop:"none", borderRadius:"0 0 12px 12px", overflow:"hidden",
        }}>
          {activeDays.map((day, i) => {
            const done = completedDays.has(`${i}:${weekIdx}`);
            const accent = TAG_ACCENT[day.tag];
            const dayColor = DAY_COLORS[i] || accent;
            return (
              <button key={i} onClick={()=>onSelectDay(i, weekIdx)} style={{
                width:"100%", textAlign:"left",
                background: done ? accent+"0d" : "var(--bg-card)",
                border:"none",
                borderBottom: i < activeDays.length-1 ? "1px solid #111827" : "none",
                padding:"14px 16px", cursor:"pointer",
                display:"flex", alignItems:"center", gap:12, transition:"background 0.15s",
              }}>
                <div style={{
                  width:38, height:38, borderRadius:8, flexShrink:0,
                  background:dayColor+"22", display:"flex", alignItems:"center", justifyContent:"center",
                }}>
                  <span style={{fontSize:11, fontWeight:800, color:dayColor, letterSpacing:"0.02em"}}>
                    {workoutDays[i] !== undefined ? DAY_NAMES[workoutDays[i]] : `D${i+1}`}
                  </span>
                </div>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:14, fontWeight:700, color: done ? "var(--text-muted)" : "var(--text-primary)"}}>Day {day.dayNum} — {day.label}</div>
                  <div style={{fontSize:11, color:"var(--text-secondary)", marginTop:2}}>{day.muscles}</div>
                  {day.cardio && <div style={{fontSize:11, color:"var(--accent)", marginTop:1}}>+ {day.cardio}</div>}
                </div>
                {done
                  ? <span style={{fontSize:18, color:"var(--phase-accum)", flexShrink:0}}>✓</span>
                  : <span style={{color:"var(--text-dim)", fontSize:20, flexShrink:0}}>›</span>
                }
              </button>
            );
          })}
        </div>
        </div>
      )}
    </div>
  );
}

// ─── DELOAD SECTION (week 7) ──────────────────────────────────────────────────
function DeloadSection({ currentWeek, completedDays, isExpanded, onToggle, activeDays, workoutDays }) {
  const pc = PHASE_COLOR["Deload"];
  const isCurrent = currentWeek === 6;
  const weekDone = activeDays.filter((_, i) => completedDays.has(`${i}:${MESO.weeks}`)).length;
  return (
    <div style={{marginBottom:8}}>
      <button onClick={onToggle} style={{
        width:"100%", textAlign:"left",
        background: isCurrent ? pc+"18" : "var(--bg-surface)",
        border:`1px solid ${isCurrent ? pc : "var(--border)"}`,
        borderRadius: isExpanded ? "12px 12px 0 0" : 12,
        padding:"14px 16px", cursor:"pointer",
        display:"flex", alignItems:"center", gap:12,
      }}>
        <div style={{
          width:46, height:46, borderRadius:10, flexShrink:0,
          background:pc+"22", display:"flex", flexDirection:"column",
          alignItems:"center", justifyContent:"center",
        }}>
          <span style={{fontSize:14, fontWeight:800, color:pc}}>W{MESO.weeks + 1}</span>
        </div>
        <div style={{flex:1, minWidth:0}}>

// ─── MUSCLE SETS BREAKDOWN ───────────────────────────────────────────────────
// Maps session tag (PUSH/PULL/LEGS/UPPER/LOWER/FULL) to display category
function sessionTagToCategory(sessionTag, exTag) {
  // For UPPER/LOWER/FULL sessions, use the exercise's original PUSH/PULL/LEGS tag
  if (sessionTag === "UPPER" || sessionTag === "LOWER" || sessionTag === "FULL") return exTag;
  return sessionTag;
}

function calcMuscleSetsByTag(activeDays, completedDays, weekFilter) {
  const byTag = { PUSH:{}, PULL:{}, LEGS:{} };
  activeDays.forEach((day, dayIdx) => {
    for (let w = 0; w <= MESO.weeks; w++) {
      if (weekFilter !== null && w !== weekFilter) continue;
      if (!completedDays.has(`${dayIdx}:${w}`)) continue;
      const wd = loadDayWeek(dayIdx, w);
      day.exercises.forEach((ex, exIdx) => {
        const exData = wd[exIdx] || {};
        const filledSets = Object.values(exData).filter(s => s && s.reps && s.reps !== "").length;
        if (filledSets === 0) return;
        const cat = sessionTagToCategory(day.tag, ex.tag);
        if (!byTag[cat]) byTag[cat] = {};
        const muscles = ex.muscles || (ex.muscle ? [ex.muscle] : []);
        muscles.forEach(m => {
          byTag[cat][m] = (byTag[cat][m] || 0) + filledSets;
        });
      });
    }
  });
  return byTag;
}

// ─── PR CARD ──────────────────────────────────────────────────────────────────
function PRCard({ activeDays }) {
  const [open, setOpen] = useState(false);

  // For each exercise across all days, find the HIGHEST weight logged across all sets & all weeks
  const prData = activeDays.map((day, dayIdx) => {
    const lifts = day.exercises.map((ex, exIdx) => {
      let best = 0;
      for (let w = 0; w <= MESO.weeks; w++) {
        const wd = loadDayWeek(dayIdx, w);
        const exData = wd[exIdx] || {};
        Object.values(exData).forEach(sv => {
          if (sv && sv.weight && sv.weight !== "") {
            const n = parseFloat(sv.weight);
            if (!isNaN(n) && n > best) best = n;
          }
        });
      }
      return { name: ex.name, muscle: ex.muscle, anchor: ex.anchor, best };
    });
    return { tag: day.tag, label: day.label, dayNum: day.dayNum, lifts };
  });

  const anyLogged = prData.some(d => d.lifts.some(l => l.best > 0));

          color:"var(--text-dim)", fontSize:18, transition:"transform 0.2s",

  }, [completedDays, activeDays]);

  const phase = WEEK_PHASE[Math.min(activeWeek, MESO.weeks - 1)] || "Deload";

  const rir   = WEEK_RIR[Math.min(activeWeek, MESO.weeks - 1)] || "N/A";

          onCancel={() => setShowReset(false)}
          onConfirmed={() => { setShowReset(false); onReset(); }}

      {/* ── LANDING ── */}
      {tab === "landing" && (
        <div style={{padding:"16px 16px 0", display:"flex", flexDirection:"column", gap:14}}>
          {[
            { key:"schedule",  icon:"📅", label:"SCHEDULE",          sub:"Week-by-week training plan",          color:"var(--accent-blue)" },
            { key:"overview",  icon:"📊", label:"MESO OVERVIEW",     sub:"Mesocycle phases & session breakdown", color:"#a78bfa" },
            {
              key:"progress",  icon:"📈", label:"PROGRESS",
              sub:`Week ${activeWeek + 1} · ${weekDone}/${weekTotal} sessions · ${rir}`,
              color:"var(--phase-accum)",
            },
            { key:"warmup",    icon:"🔥", label:"WARM-UP PROTOCOL",  sub:"Anchor lift warm-up guide",           color:"#f59e0b" },
            { key:"datamgmt",  icon:"💾", label:"DATA MANAGEMENT",   sub:"Export, import & reset your meso",    color:"var(--accent)" },
          ].map(({ key, icon, label, sub, color: cardColor }) => (
            <button key={key} onClick={() => goTo(key)} style={{
              width:"100%", background:"var(--bg-card)",
              border:"1px solid var(--border)",
              borderRadius:14, padding:"16px 18px",
              display:"flex", alignItems:"center", gap:14,
              cursor:"pointer", textAlign:"left",
              transition:"border-color 0.15s, background 0.15s",
            }}
              onMouseEnter={e => e.currentTarget.style.borderColor = cardColor}
              onMouseLeave={e => e.currentTarget.style.borderColor = "var(--border)"}
            >
              <div style={{
                width:38, height:38, borderRadius:9, flexShrink:0,
                background:`rgba(var(--accent-rgb),0.08)`,
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:20,
              }}>{icon}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13, fontWeight:900, letterSpacing:"0.08em", color:cardColor, marginBottom:2}}>{label}</div>
                <div style={{fontSize:11, color:"var(--text-secondary)"}}>{sub}</div>
              </div>
              <div style={{color:"var(--text-dim)", fontSize:18}}>›</div>
            </button>
          ))}

          {/* ── Theme Toggle Card ── */}
          <ThemeToggleCard />

          <div style={{height:8}} />
        </div>
      )}

      {/* ── PROGRESS sub-page ── */}
      {tab === "progress" && (
        <ProgressPage
          activeWeek={activeWeek}
          phase={phase}
          pc={pc}
          rir={rir}
          weekDone={weekDone}
          weekTotal={weekTotal}
          weekPct={weekPct}
          weekMuscles={weekMuscles}
          mesoPct={mesoPct}
          doneSessions={doneSessions}
          totalSessions={totalSessions}
          completedDays={completedDays}
          activeDays={activeDays}
          goBack={goBack}
        />
      )}

            {/* ── SCHEDULE ── */}
      {tab === "schedule" && (
        <div>
          <SubHeader label="SCHEDULE" />
          <div style={{padding:"0 16px"}}>
            {Array.from({length: MESO.weeks}, (_,w) => (
              <WeekSection
                key={w} weekIdx={w} currentWeek={currentWeek}
                onSelectDay={(dayIdx, weekIdx) => {
                  setCurrentWeek(weekIdx);
                  saveCurrentWeek(weekIdx);
                  onSelectDay(dayIdx);
                }}
                completedDays={completedDays}
                isExpanded={expandedWeek === w}
                onToggle={() => setExpandedWeek(expandedWeek === w ? null : w)}
                activeDays={activeDays}
                workoutDays={profile?.workoutDays || []}
              />
            ))}
            <DeloadSection
              currentWeek={currentWeek}
              completedDays={completedDays}
              isExpanded={expandedWeek === MESO.weeks}
              onToggle={() => setExpandedWeek(expandedWeek === MESO.weeks ? null : MESO.weeks)}
              activeDays={activeDays}
              workoutDays={profile?.workoutDays || []}
            />
          </div>
        </div>
      )}

      {/* ── MESO OVERVIEW ── */}
      {tab === "overview" && (
        <div>
          <SubHeader label="MESO OVERVIEW" />
          <MesoOverview />
        </div>
      )}

      {/* ── DATA MANAGEMENT ── */}
      {tab === "datamgmt" && (
        <div>
          <SubHeader label="DATA MANAGEMENT" />
          <div style={{padding:"20px 16px", display:"flex", flexDirection:"column", gap:12}}>
            <div style={{
              background:"var(--bg-card)", border:"1px solid var(--border)",
              borderRadius:14, overflow:"hidden",
            }}>
              <button onClick={exportData} style={{
                width:"100%", padding:"18px 18px", cursor:"pointer", background:"transparent",
                border:"none", borderBottom:"1px solid var(--border)",
                display:"flex", alignItems:"center", gap:14, textAlign:"left",
              }}>
                <div style={{width:38,height:38,borderRadius:9,background:"rgba(var(--accent-rgb),0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>⬇</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:900,letterSpacing:"0.08em",color:"var(--accent)"}}>EXPORT BACKUP</div>
                  <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>Download all your workout data as JSON</div>
                </div>
                <div style={{color:"var(--text-dim)",fontSize:18}}>›</div>
              </button>
              <label style={{
                width:"100%", padding:"18px 18px", cursor:"pointer", background:"transparent",
                borderBottom:"1px solid var(--border)",
                display:"flex", alignItems:"center", gap:14, boxSizing:"border-box",
              }}>
                <div style={{width:38,height:38,borderRadius:9,background:"rgba(var(--accent-rgb),0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>⬆</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:900,letterSpacing:"0.08em",color:"var(--accent)"}}>IMPORT BACKUP</div>
                  <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>Restore from a previously exported file</div>
                </div>
                <div style={{color:"var(--text-dim)",fontSize:18}}>›</div>
                <input type="file" accept=".json" style={{display:"none"}} onChange={e => {
                  const file = e.target.files?.[0];
                  if (!file) return;
                  importData(file, (ok) => {
                    if (ok) { alert("Data restored! Reloading..."); window.location.reload(); }
                    else { alert("Import failed — invalid backup file."); }
                  });
                }} />
              </label>
              <button onClick={()=>setShowReset(true)} style={{
                width:"100%", padding:"18px 18px", cursor:"pointer", background:"transparent",
                border:"none", display:"flex", alignItems:"center", gap:14, textAlign:"left",
              }}>
                <div style={{width:38,height:38,borderRadius:9,background:"rgba(224,32,32,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>⚠️</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:900,letterSpacing:"0.08em",color:"var(--danger)"}}>RESET MESO CYCLE</div>
                  <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>Erase all progress and start fresh</div>
                </div>
                <div style={{color:"var(--text-dim)",fontSize:18}}>›</div>
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── WARM-UP ── */}
      {tab === "warmup" && (
        <div>
          <SubHeader label="WARM-UP PROTOCOL" />
          <WarmupCard />
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [profile, setProfile]             = useState(loadProfile);
  const [view, setView]                   = useState("home");
  const [selectedDay, setSelectedDay]     = useState(null);
  const [currentWeek, setCurrentWeek]     = useState(loadCurrentWeek);
  const [completedDays, setCompletedDays] = useState(loadCompleted);

  // Request persistent storage on mount (silent — prevents browser auto-cleanup)
  useEffect(() => {
    if (navigator.storage && navigator.storage.persist) {
      navigator.storage.persist();
    }
  }, []);

  // Show setup if no profile
  if (!profile) {
    return <SetupPage onComplete={p => {
      saveProfile(p);
      // Reload so MESO recomputes from new mesoLength
      window.location.reload();
    }} />;
  }

  const handleComplete = (dayIdx, weekIdx) => {
    markComplete(dayIdx, weekIdx);
    const newCompleted = new Set([...completedDays, `${dayIdx}:${weekIdx}`]);
    setCompletedDays(newCompleted);

    // Check if entire week is now done
    const weekFinished = Array.from({length: MESO.days}, (_, d) => d)
      .every(d => newCompleted.has(`${d}:${weekIdx}`));
    if (weekFinished) {
      snapshotData();
      // Advance to next week so schedule auto-opens it
      const nextWeek = weekIdx + 1;
      if (nextWeek <= MESO.weeks) {
        setCurrentWeek(nextWeek);
        saveCurrentWeek(nextWeek);
      }
    }
  };

  const handleReset = () => {
    resetMeso();
    // Clear profile so setup page shows again (user can pick new meso length)
    // Page reload ensures MESO config recomputes from scratch
    localStorage.removeItem("ppl:profile");
    window.location.reload();
  };

  const handleNextDay = (dayIdx, weekIdx) => {
    const nextDayIdx = dayIdx + 1;
    if (nextDayIdx <= MESO.days - 1) {
      setSelectedDay(nextDayIdx);
    } else {
      const nextWeek = weekIdx + 1;
      if (nextWeek <= MESO.weeks - 1) {
        setCurrentWeek(nextWeek);
        saveCurrentWeek(nextWeek);
        setSelectedDay(0);
      } else {
        setView("home");
      }
    }
  };

  // Compute active days from profile — always reflects current equipment/duration selection
  const activeDays = useMemo(() => {
    if (!profile) return [];
    return generateProgram(profile).slice(0, MESO.days);
  }, [profile]);

  const phase = WEEK_PHASE[currentWeek];
  const pc    = PHASE_COLOR[phase];

  return (
    <div style={{minHeight:"100vh", background:"var(--bg-root)", color:"var(--text-primary)", fontFamily:"'DM Sans','Segoe UI',system-ui,sans-serif", maxWidth:480, margin:"0 auto"}}>
      {/* Header */}
      <div style={{background:"var(--bg-surface)", borderBottom:"1px solid var(--border)", padding:"16px 20px 12px", position:"sticky", top:0, zIndex:50}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <div>
            <div style={{fontSize:22, fontWeight:900, letterSpacing:"0.04em", color:"var(--accent)", lineHeight:1.1}}>IronOS Training</div>
            <div style={{fontSize:11, color:"var(--text-muted)", letterSpacing:"0.08em", marginTop:4, fontWeight:600}}>
              {profile.name ? `${profile.name.toUpperCase()} · ` : ""}{MESO.weeks}WK · {MESO.days}×/WK · {(MESO.splitType||"ppl").toUpperCase().replace(/_/g," ")}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:13, fontWeight:800, color:pc, letterSpacing:"0.12em"}}>WEEK {currentWeek+1}</div>
          </div>
        </div>
      </div>

      {view==="home" && (
        <HomeView
          currentWeek={currentWeek}
          setCurrentWeek={setCurrentWeek}
          onSelectDay={i=>{setSelectedDay(i); setView("day");}}
          completedDays={completedDays}
          profile={profile}
          activeDays={activeDays}
          onReset={handleReset}
        />
      )}
      {view==="day" && selectedDay!==null && (
        <DayView
          dayIdx={selectedDay}
          weekIdx={currentWeek}
          onBack={()=>{ window.scrollTo(0,0); setView("home"); }}
          onComplete={handleComplete}
          onNextDay={handleNextDay}
          completedDays={completedDays}
          profile={profile}
          activeDays={activeDays}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
