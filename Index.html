<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ─── STORAGE (localStorage) ───────────────────────────────────────────────────
const store = {
  get: (key) => { try { return localStorage.getItem(key); } catch { return null; } },
  set: (key, val) => { try { localStorage.setItem(key, val); } catch {} },
};

function loadDayWeek(dayIdx, weekIdx) {
  const raw = store.get(`ppl:day${dayIdx}:week${weekIdx}`);
  return raw ? JSON.parse(raw) : {};
}

// Load current week data, falling back to previous week's weights if this week is blank
function loadDayWeekWithCarryover(dayIdx, weekIdx, day) {
  const current = loadDayWeek(dayIdx, weekIdx);
  // If any set in any exercise already has data, use as-is
  const hasData = Object.values(current).some(exData =>
    Object.values(exData).some(s => s && (s.weight || s.reps))
  );
  if (hasData || weekIdx === 0) return current;

  // Nothing logged yet this week — carry forward weights from the most recent prior week
  for (let w = weekIdx - 1; w >= 0; w--) {
    const prev = loadDayWeek(dayIdx, w);
    const prevHasWeights = Object.values(prev).some(exData =>
      Object.values(exData).some(s => s && s.weight)
    );
    if (!prevHasWeights) continue;

    // Copy weights only (not reps) into a fresh data object
    const carried = {};
    day.exercises.forEach((ex, exIdx) => {
      const prevEx = prev[exIdx] || {};
      carried[exIdx] = {};
      for (let s = 0; s < ex.sets; s++) {
        const prevSet = prevEx[s] || {};
        carried[exIdx][s] = { weight: prevSet.weight || "", reps: "" };
      }
    });
    return carried;
  }
  return current;
}
function saveDayWeek(dayIdx, weekIdx, data) {
  store.set(`ppl:day${dayIdx}:week${weekIdx}`, JSON.stringify(data));
}
function loadNotes(dayIdx, weekIdx) {
  return store.get(`ppl:notes:d${dayIdx}:w${weekIdx}`) || "";
}
function saveNotes(dayIdx, weekIdx, text) {
  store.set(`ppl:notes:d${dayIdx}:w${weekIdx}`, text);
}
function loadCurrentWeek() {
  const v = store.get("ppl:currentWeek");
  return v !== null ? parseInt(v) : 0;
}
function saveCurrentWeek(w) { store.set("ppl:currentWeek", String(w)); }
function loadCompleted() {
  const done = new Set();
  for (let d = 0; d < MESO.days; d++)
    for (let w = 0; w < (MESO ? MESO.weeks : 6); w++)
      if (store.get(`ppl:done:d${d}:w${w}`) === "1") done.add(`${d}:${w}`);
  return done;
}
function markComplete(dayIdx, weekIdx) {
  store.set(`ppl:done:d${dayIdx}:w${weekIdx}`, "1");
}
function loadProfile() {
  const raw = store.get("ppl:profile");
  return raw ? JSON.parse(raw) : null;
}
function saveProfile(profile) {
  store.set("ppl:profile", JSON.stringify(profile));
}
function resetMeso() {
  const weeks = MESO ? MESO.weeks : 6;
  const days = MESO ? MESO.days : 6;
  for (let d = 0; d < days; d++)
    for (let w = 0; w <= weeks; w++) {
      try { localStorage.removeItem(`ppl:day${d}:week${w}`); } catch {}
      try { localStorage.removeItem(`ppl:notes:d${d}:w${w}`); } catch {}
      try { localStorage.removeItem(`ppl:done:d${d}:w${w}`); } catch {}
    }
  saveCurrentWeek(0);
}

// ─── EXERCISE OVERRIDES ───────────────────────────────────────────────────────
// "this week only" override: ppl:exov:d{dayIdx}:w{weekIdx}:ex{exIdx} = exerciseId
// "entire meso" override:    ppl:exov:d{dayIdx}:ex{exIdx}             = exerciseId
function loadExOverride(dayIdx, weekIdx, exIdx) {
  return store.get(`ppl:exov:d${dayIdx}:w${weekIdx}:ex${exIdx}`)
    || store.get(`ppl:exov:d${dayIdx}:ex${exIdx}`)
    || null;
}
function saveExOverride(dayIdx, weekIdx, exIdx, exId, scope) {
  if (scope === "week") {
    store.set(`ppl:exov:d${dayIdx}:w${weekIdx}:ex${exIdx}`, exId);
  } else {
    store.set(`ppl:exov:d${dayIdx}:ex${exIdx}`, exId);
    // Clear any week-specific overrides so meso override takes effect
    for (let w = 0; w <= (MESO ? MESO.weeks : 6); w++)
      try { localStorage.removeItem(`ppl:exov:d${dayIdx}:w${w}:ex${exIdx}`); } catch {}
  }
}

// ─── MESO CONFIG BUILDER ──────────────────────────────────────────────────────

      mesoRows: [
        [0,"3 RIR","Accumulation","Establish baseline. Leave plenty in the tank. Form focus."],
        [1,"2-3 RIR","Accumulation","Match weights with better technique. Small adds if easy."],
        [2,"2 RIR","Intensification","+5 lbs anchors. Push closer to failure on accessories."],
        [3,"1-2 RIR","Intensification","+5 lbs anchors again. Accessories +2.5-5 lbs."],
        [4,"1 RIR","Peak","+5 lbs. One rep from failure. Push hard."],
        [5,"0-1 RIR","Peak","PR attempts on anchors. Max effort week."],
        [null,"N/A","DELOAD","50-60% of W6 weight. 2 sets only. Zero failure. Recover."],
      ],
    },
    8: {
      phases: ["Accumulation","Accumulation","Accumulation","Intensification","Intensification","Intensification","Peak","Peak"],
      rirs:   ["4 RIR","3 RIR","2-3 RIR","2 RIR","1-2 RIR","1-2 RIR","1 RIR","0-1 RIR"],
      mesoRows: [
        [0,"4 RIR","Accumulation","Establish baseline. Technique first. Build the groove."],
        [1,"3 RIR","Accumulation","Small weight adds. Stay far from failure."],
        [2,"2-3 RIR","Accumulation","+2.5-5 lbs. Volume is the goal this block."],
        [3,"2 RIR","Intensification","Transition week. +5 lbs on anchors. Technique stays tight."],
        [4,"1-2 RIR","Intensification","+5 lbs. Push accessories near failure."],
        [5,"1-2 RIR","Intensification","Hold or add small. Fatigue management."],
        [6,"1 RIR","Peak","One rep from failure. PR setup week."],
        [7,"0-1 RIR","Peak","PR attempts on all anchors. Max effort."],
        [null,"N/A","DELOAD","50-60% of peak weight. 2 sets only. Zero failure. Recover."],
      ],
    },
    10: {
      phases: ["Accumulation","Accumulation","Accumulation","Accumulation","Intensification","Intensification","Intensification","Peak","Peak","Peak"],
      rirs:   ["4 RIR","3-4 RIR","3 RIR","2-3 RIR","2 RIR","1-2 RIR","1-2 RIR","1 RIR","0-1 RIR","0 RIR"],
      mesoRows: [
        [0,"4 RIR","Accumulation","Establish baseline. Volume focus. No heroics."],
        [1,"3-4 RIR","Accumulation","Small adds on anchors. Build work capacity."],
        [2,"3 RIR","Accumulation","+2.5-5 lbs across the board."],
        [3,"2-3 RIR","Accumulation","Final accumulation push. High volume."],
        [4,"2 RIR","Intensification","Transition to heavier loads. +5 lbs anchors."],
        [5,"1-2 RIR","Intensification","+5 lbs. Accessories follow suit."],
        [6,"1-2 RIR","Intensification","Hold or small adds. Manage fatigue."],
        [7,"1 RIR","Peak","One rep from failure. PR prep."],
        [8,"0-1 RIR","Peak","Near-limit loads. Set up the PR week."],
        [9,"0 RIR","Peak","Max effort. PR attempts on all anchors."],
        [null,"N/A","DELOAD","50-60% of peak weight. 2 sets only. Zero failure. Recover."],
      ],
    },
    12: {
      phases: ["Accumulation","Accumulation","Accumulation","Accumulation","Intensification","Intensification","Intensification","Intensification","Peak","Peak","Peak","Peak"],
      rirs:   ["4 RIR","4 RIR","3 RIR","3 RIR","2-3 RIR","2 RIR","2 RIR","1-2 RIR","1 RIR","0-1 RIR","0-1 RIR","0 RIR"],
      mesoRows: [
        [0,"4 RIR","Accumulation","Establish baseline. Long meso — patience pays off."],
        [1,"4 RIR","Accumulation","Refine technique. Small adds only if very easy."],
        [2,"3 RIR","Accumulation","+2.5 lbs. Build the volume base."],
        [3,"3 RIR","Accumulation","+2.5-5 lbs. Final volume block push."],
        [4,"2-3 RIR","Intensification","Transition. +5 lbs anchors. Technique stays tight."],
        [5,"2 RIR","Intensification","+5 lbs across. Push accessories toward failure."],
        [6,"2 RIR","Intensification","Hold or +2.5 lbs. Fatigue management block."],
        [7,"1-2 RIR","Intensification","Final intensification push. High load, controlled failure."],

      ],
    },
  };
  const cfg = configs[mesoLen] || configs[6];
  // Build progressive overload targets scaled to meso length
  const pw = Array.from({length:mesoLen}, (_,i) => {
    if (i === 0) return "Establish";
    if (i === mesoLen-1) return "PR attempt";

    return "+5 lbs";

  const pr = Array.from({length:mesoLen}, (_,i) => {
    if (i === 0) return "Establish";
    if (i === mesoLen-1) return "Max reps / PR";
    if (i === Math.floor(mesoLen/2)) return "↑ weight";
    return "+1-2 reps";
  });
  return {
    weeks: mesoLen,
    days: daysPerWeek || 6,
    splitType: splitType || "ppl",
    phases: [...cfg.phases, "Deload"],
    rirs:   [...cfg.rirs,   "N/A — DELOAD"],
    mesoRows: cfg.mesoRows,
    progTargets: { weight: pw, reps: pr },

}

// ─── BACKUP / RESTORE ─────────────────────────────────────────────────────────
// Silently snapshot all ppl: keys into a rolling backup stored in localStorage.
// Keeps the last 3 snapshots. No download, no prompt — fully automatic.
function snapshotData() {
  try {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith("ppl:") && !key.startsWith("ppl:backup:")) {
        data[key] = localStorage.getItem(key);
      }
    }
    const snap = JSON.stringify({ version:1, snappedAt: new Date().toISOString(), data });
    // Rotate: shift backup:1 → backup:2, backup:0 → backup:1, write new → backup:0
    const b2 = localStorage.getItem("ppl:backup:1");
    if (b2) localStorage.setItem("ppl:backup:2", b2);
    const b1 = localStorage.getItem("ppl:backup:0");
    if (b1) localStorage.setItem("ppl:backup:1", b1);
    localStorage.setItem("ppl:backup:0", snap);
  } catch(e) { /* silent */ }
}

// Download the most recent snapshot as a .json file (user-initiated only)
function exportData() {
  try {
    const raw = localStorage.getItem("ppl:backup:0");
    const payload = raw || JSON.stringify({ version:1, snappedAt: new Date().toISOString(), data: (() => {
      const d = {};
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith("ppl:") && !k.startsWith("ppl:backup:")) d[k] = localStorage.getItem(k);
      }
      return d;
    })() });
    const blob = new Blob([payload], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ppl-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
  } catch(e) { alert("Export failed."); }
}

function importData(file, onDone) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      const data = parsed.data || parsed; // support both formats
      Object.entries(data).forEach(([k,v]) => {
        if (k.startsWith("ppl:")) localStorage.setItem(k, v);
      });
      onDone(true);
    } catch {
      onDone(false);
    }
  };
  reader.readAsText(file);
}

// ─── COMPUTE MESO CONFIG FROM STORED PROFILE ─────────────────────────────────
const _storedProfile = (() => { try { return JSON.parse(localStorage.getItem("ppl:profile")); } catch { return null; } })();
let MESO = buildMesoConfig(
  _storedProfile?.mesoLength || 6,
  _storedProfile?.workoutDays?.length || _storedProfile?.daysPerWeek || 6,
  _storedProfile?.splitType || "ppl"
);

// Active days based on daysPerWeek — 3-day uses Push1/Pull1/Legs1, 6-day uses all 6
// (defined after DAYS, so we forward-declare; actual slice happens after DAYS is defined)

// ─── EXERCISE DATABASE ────────────────────────────────────────────────────────
// Schema per exercise:
//   id       : unique string key
//   name     : display name
//   muscle   : primary muscle label (shown in UI)
//   muscles  : array of muscles hit (for filtering/volume tracking)

//   pattern  : "push" | "pull" | "hinge" | "squat" | "isolation" | "carry"
//   fatigue  : "high" | "medium" | "low"
//   anchor   : true = can be the anchor (primary compound) lift for a session
//   diff     : 1 = beginner friendly, 2 = intermediate, 3 = advanced
//   sets     : default working sets
//   reps     : default rep range
//   rest     : default rest period
//   warmup   : warmup protocol note

// ─── PROGRAM GENERATOR ────────────────────────────────────────────────────────
function generateProgram(profile) {
  const equipment  = profile?.equipment    || ["barbell","dumbbell","cable","machine","bodyweight","band"];
  const duration   = profile?.sessionDuration || 60;
  const splitType  = profile?.splitType    || "ppl";
  const numDays    = profile?.workoutDays?.length || profile?.daysPerWeek || 6;
  const shortWarmup = duration <= 30;
  const exCount    = duration <= 30 ? 3 : duration <= 45 ? 4 : duration <= 60 ? 5 : duration <= 75 ? 6 : 7;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const available = EXERCISE_DB.filter(e => equipment.includes(e.equipment));

  function toEx(e, isAnchor) {
    const wu = isAnchor
      ? (shortWarmup ? "2 ramp sets — time is tight, be thorough" : e.warmup)
      : (e.fatigue === "low" ? "—" : "1 feeler set");
    return {
      id: e.id, name: e.name, muscle: e.muscle, muscles: e.muscles,
      equipment: e.equipment, tag: e.tag, anchor: !!isAnchor,
      sets: e.sets, reps: e.reps, rest: e.rest, warmup: wu,
      progression: e.pattern === "isolation" ? "reps" : "weight",
    };
  }

  // Generic day builder — pool filtered externally by caller
  function buildDay(pool, anchorPriority, musclePriority, usedAnchorIds) {
    const compoundPatterns = ["push","pull","squat","hinge"];
    const anchorEligible = pool.filter(e => e.anchor);
    const anchorCandidates = anchorEligible.length > 0
      ? anchorEligible
      : shuffle(pool).sort((a, b) =>
          (compoundPatterns.includes(a.pattern) ? 0 : 1) -
          (compoundPatterns.includes(b.pattern) ? 0 : 1));

    const anchorPool = shuffle(anchorCandidates.filter(e => !usedAnchorIds.has(e.id)));
    const anchor = anchorPool.find(e => anchorPriority.includes(e.pattern))
                || anchorPool[0]
                || shuffle(anchorCandidates)[0];

    const usedIds = new Set([anchor?.id]);
    const usedMuscles = new Set(anchor?.muscles || []);
    const accessories = [];

    for (const muscleTarget of musclePriority) {
      if (accessories.length >= exCount - 1) break;
      const cands = shuffle(pool.filter(e =>
        !e.anchor && !usedIds.has(e.id) &&
        e.muscles.some(m => m === muscleTarget || m.includes(muscleTarget))
      ));
      if (cands[0]) {
        accessories.push(cands[0]);
        usedIds.add(cands[0].id);
        cands[0].muscles.forEach(m => usedMuscles.add(m));
      }
    }

    // Fill remaining slots
    for (const filler of shuffle(pool.filter(e => !usedIds.has(e.id) && !e.anchor))) {
      if (accessories.length >= exCount - 1) break;
      accessories.push(filler);
      usedIds.add(filler.id);
    }
    for (const filler of shuffle(pool.filter(e => !usedIds.has(e.id)))) {
      if (accessories.length >= exCount - 1) break;
      accessories.push(filler);
      usedIds.add(filler.id);
    }
    return { anchor, accessories };
  }

  function makeDay(num, label, tag, muscles, note, anchor, accessories) {
    const exercises = anchor
      ? [toEx(anchor, true), ...accessories.map(a => toEx(a, false))]
      : accessories.map(a => toEx(a, false));
    return { dayNum:num, label, tag, muscles, note, cardio:null, exercises };
  }

  const anchorNotes = {
    push:  { push:"Anchor is your main press — controlled negative, explode up.", hinge:"Hip-hinge focus today — load the stretch, finish tall.", squat:"Drive through the floor, stay tight.", isolation:"Squeeze at the top, slow the negative." },
    pull:  { pull:"Retract the scapula, drive elbows to hips.", hinge:"Push the floor away, keep the bar close.", squat:"Brace your core, drive your knees out.", isolation:"Full stretch at the bottom, squeeze at the top." },
    legs:  { squat:"Brace hard, drive knees out, full depth.", hinge:"Load the hamstrings, keep the spine neutral.", push:"Full depth, controlled descent.", isolation:"Slow the negative, squeeze the contraction." },
    upper: { push:"Main press anchors today — chest and shoulders.", pull:"Primary pull — back thickness and width.", hinge:"Hinge anchor — load the posterior chain.", squat:"Compound anchor — brace and drive.", isolation:"Isolation anchor — squeeze the contraction." },
    lower: { squat:"Squat anchor — brace hard, full depth.", hinge:"Hinge anchor — hamstrings and glutes loaded.", push:"Leg press anchor — full range, control the descent.", isolation:"Isolation anchor — squeeze at peak contraction." },
    full:  { push:"Main press for the day — control the negative.", pull:"Primary pull — retract, drive, squeeze.", squat:"Squat anchor — full depth, knees out.", hinge:"Hinge anchor — load the stretch, neutral spine.", isolation:"Isolation anchor — feel every rep." },
  };

  function dayNote(side, ex) {
    if (!ex) return "Train hard and stay focused.";
    return anchorNotes[side]?.[ex.pattern] || `${ex.name} anchors today — give it everything.`;
  }

  // ── PPL SPLITS ──────────────────────────────────────────────────────────────
  if (splitType === "ppl" || !splitType) {
    const pushPool = available.filter(e => e.tag === "PUSH");
    const pullPool = available.filter(e => e.tag === "PULL");
    const legsPool = available.filter(e => e.tag === "LEGS");

    const usedPA = new Set(), usedRA = new Set(), usedLA = new Set();
    const p1 = buildDay(pushPool, ["push"], ["Chest","Upper Chest","Side Delts","Triceps","Front Delts"], usedPA);
    if (p1.anchor) usedPA.add(p1.anchor.id);
    const r1 = buildDay(pullPool, ["pull"], ["Lats","Rhomboids","Rear Delts","Biceps","Upper Traps"], usedRA);
    if (r1.anchor) usedRA.add(r1.anchor.id);
    const l1 = buildDay(legsPool, ["squat"], ["Hamstrings","Quads","Glutes","Gastrocnemius"], usedLA);
    if (l1.anchor) usedLA.add(l1.anchor.id);

    if (numDays <= 3) {
      return [
        makeDay(1,"Push Day","PUSH","Chest · Shoulders · Triceps",dayNote("push",p1.anchor),p1.anchor,p1.accessories),
        makeDay(2,"Pull Day","PULL","Back · Biceps · Rear Delts",dayNote("pull",r1.anchor),r1.anchor,r1.accessories),
        makeDay(3,"Legs Day","LEGS","Quads · Hamstrings · Glutes · Calves",dayNote("legs",l1.anchor),l1.anchor,l1.accessories),
      ];
    }

    const p2 = buildDay(pushPool, ["push"], ["Upper Chest","Side Delts","Front Delts","Triceps","Chest"], usedPA);
    const r2 = buildDay(pullPool, ["pull"], ["Lats","Mid Back","Rear Delts","Long Head Bi","Teres Major"], usedRA);
    const l2 = buildDay(legsPool, ["hinge"], ["Quads","Glutes","Hamstrings","Soleus"], usedLA);

    if (numDays === 5) {
      return [
        makeDay(1,"Push Day 1","PUSH","Chest · Shoulders · Triceps",dayNote("push",p1.anchor),p1.anchor,p1.accessories),
        makeDay(2,"Pull Day 1","PULL","Back · Biceps · Rear Delts",dayNote("pull",r1.anchor),r1.anchor,r1.accessories),
        makeDay(3,"Legs Day","LEGS","Quads · Hamstrings · Glutes · Calves",dayNote("legs",l1.anchor),l1.anchor,l1.accessories),
        makeDay(4,"Push Day 2","PUSH","Chest · Shoulders · Triceps (Variation)",dayNote("push",p2.anchor),p2.anchor,p2.accessories),
        makeDay(5,"Pull Day 2","PULL","Back · Biceps · Rear Delts (Variation)",dayNote("pull",r2.anchor),r2.anchor,r2.accessories),
      ];
    }

    // 6-day PPL ×2
    return [
      makeDay(1,"Push Day 1","PUSH","Chest · Shoulders · Triceps",dayNote("push",p1.anchor),p1.anchor,p1.accessories),
      makeDay(2,"Pull Day 1","PULL","Back · Biceps · Rear Delts",dayNote("pull",r1.anchor),r1.anchor,r1.accessories),
      makeDay(3,"Legs Day 1","LEGS","Quads · Hamstrings · Glutes · Calves",dayNote("legs",l1.anchor),l1.anchor,l1.accessories),
      makeDay(4,"Push Day 2","PUSH","Chest · Shoulders · Triceps (Variation)",dayNote("push",p2.anchor),p2.anchor,p2.accessories),
      makeDay(5,"Pull Day 2","PULL","Back · Biceps · Rear Delts (Variation)",dayNote("pull",r2.anchor),r2.anchor,r2.accessories),
      makeDay(6,"Legs Day 2","LEGS","Hamstrings · Glutes · Quads (Variation)",dayNote("legs",l2.anchor),l2.anchor,l2.accessories),
    ];
  }

  // ── UPPER / LOWER SPLITS ─────────────────────────────────────────────────────
  if (splitType === "upper_lower") {
    const upperPool = available.filter(e => e.tag === "PUSH" || e.tag === "PULL");
    const lowerPool = available.filter(e => e.tag === "LEGS");
    const pushPool  = available.filter(e => e.tag === "PUSH");
    const pullPool  = available.filter(e => e.tag === "PULL");

    const usedUA = new Set(), usedLA = new Set();
    // Upper A: horizontal push + vertical pull emphasis
    const uaPool = shuffle([
      ...pushPool.filter(e => e.pattern === "push"),
      ...pullPool.filter(e => e.pattern === "pull"),
      ...upperPool.filter(e => e.pattern === "isolation"),
    ]);
    const u1anchor = uaPool.find(e => e.anchor && e.tag === "PUSH") || uaPool.find(e => e.anchor);
    const u1 = buildDay(upperPool, ["push"], ["Chest","Lats","Side Delts","Biceps","Triceps","Rear Delts"], usedUA);
    if (u1.anchor) usedUA.add(u1.anchor.id);

    const l1 = buildDay(lowerPool, ["squat"], ["Hamstrings","Quads","Glutes","Gastrocnemius"], usedLA);
    if (l1.anchor) usedLA.add(l1.anchor.id);

    if (numDays <= 2) {
      return [
        makeDay(1,"Upper Body","UPPER","Chest · Back · Shoulders · Arms",dayNote("upper",u1.anchor),u1.anchor,u1.accessories),
        makeDay(2,"Lower Body","LOWER","Quads · Hamstrings · Glutes · Calves",dayNote("lower",l1.anchor),l1.anchor,l1.accessories),
      ];
    }

    // Upper B: vertical push + horizontal pull emphasis
    const u2 = buildDay(upperPool, ["push"], ["Upper Chest","Rhomboids","Front Delts","Long Head Bi","Long Head Tri","Mid Back"], usedUA);
    if (u2.anchor) usedUA.add(u2.anchor.id);

    const l2 = buildDay(lowerPool, ["hinge"], ["Quads","Glutes","Hamstrings","Soleus"], usedLA);

    // 4-day U/L/U/L
    return [
      makeDay(1,"Upper A","UPPER","Chest · Back · Shoulders · Arms",dayNote("upper",u1.anchor),u1.anchor,u1.accessories),
      makeDay(2,"Lower A","LOWER","Quads · Hamstrings · Glutes · Calves",dayNote("lower",l1.anchor),l1.anchor,l1.accessories),
      makeDay(3,"Upper B","UPPER","Shoulders · Back · Arms (Variation)",dayNote("upper",u2.anchor),u2.anchor,u2.accessories),
      makeDay(4,"Lower B","LOWER","Hamstrings · Glutes · Quads (Variation)",dayNote("lower",l2.anchor),l2.anchor,l2.accessories),
    ];
  }

  // ── FULL BODY SPLITS ─────────────────────────────────────────────────────────
  if (splitType === "full_body") {
    const pushPool = available.filter(e => e.tag === "PUSH");
    const pullPool = available.filter(e => e.tag === "PULL");
    const legsPool = available.filter(e => e.tag === "LEGS");

    const usedPA = new Set(), usedRA = new Set(), usedLA = new Set();

    // Full body day: 1 push compound, 1 pull compound, 1 legs compound, + accessories
    function buildFullBodyDay(pushPriority, pullPriority, legsPriority, dayNum) {
      const pDay = buildDay(pushPool, pushPriority, ["Chest","Side Delts","Triceps","Upper Chest","Front Delts"], usedPA);
      if (pDay.anchor) usedPA.add(pDay.anchor.id);
      const rDay = buildDay(pullPool, pullPriority, ["Lats","Rhomboids","Biceps","Rear Delts","Mid Back"], usedRA);
      if (rDay.anchor) usedRA.add(rDay.anchor.id);
      const lDay = buildDay(legsPool, legsPriority, ["Quads","Hamstrings","Glutes","Gastrocnemius"], usedLA);
      if (lDay.anchor) usedLA.add(lDay.anchor.id);

      // Interleave: push anchor, pull anchor, legs anchor, then accessories
      const pushEx  = pDay.anchor ? [toEx(pDay.anchor, true)] : [];
      const pullEx  = rDay.anchor ? [toEx(rDay.anchor, true)] : [];
      const legsEx  = lDay.anchor ? [toEx(lDay.anchor, true)] : [];

      // Accessories: round-robin from each pool
      const allAccessories = [];
      const pAcc = pDay.accessories.slice(0, Math.ceil((exCount - 3) / 3));
      const rAcc = rDay.accessories.slice(0, Math.ceil((exCount - 3) / 3));
      const lAcc = lDay.accessories.slice(0, Math.ceil((exCount - 3) / 3));
      const maxAcc = exCount - 3;
      for (let i = 0; i < maxAcc; i++) {
        const pool = [pAcc, rAcc, lAcc];
        const src = pool[i % 3];
        const ex = src.shift();
        if (ex) allAccessories.push(toEx(ex, false));
      }

      const exercises = [...pushEx, ...pullEx, ...legsEx, ...allAccessories];
      return {
        dayNum,
        label: `Full Body ${dayNum === 1 ? "A" : dayNum === 2 ? "B" : "C"}`,
        tag: "FULL",
        muscles: "Full Body — Push · Pull · Legs",
        note: "Full body session — compound anchors for push, pull, and legs.",
        cardio: null,
        exercises,
      };
    }

    const fb1 = buildFullBodyDay(["push"], ["pull"], ["squat"], 1);
    if (numDays <= 2) {
      const fb2 = buildFullBodyDay(["push"], ["pull"], ["hinge"], 2);
      return [fb1, fb2];
    }
    // 3-day full body
    const fb2 = buildFullBodyDay(["push"], ["pull"], ["hinge"], 2);
    const fb3 = buildFullBodyDay(["push"], ["pull"], ["squat"], 3);
    return [fb1, fb2, fb3];
  }

  // ── PUSH / PULL 4-DAY (no dedicated leg day) ─────────────────────────────────
  if (splitType === "push_pull") {
    const pushPool = available.filter(e => e.tag === "PUSH");
    const pullPool = available.filter(e => e.tag === "PULL");
    const legsPool = available.filter(e => e.tag === "LEGS");
    // Include leg accessories on push/pull days
    const pushPlusLegs = available.filter(e => e.tag === "PUSH" || (e.tag === "LEGS" && e.pattern === "squat"));
    const pullPlusLegs = available.filter(e => e.tag === "PULL" || (e.tag === "LEGS" && e.pattern === "hinge"));

    const usedPA = new Set(), usedRA = new Set();
    const p1 = buildDay(pushPlusLegs, ["push"], ["Chest","Upper Chest","Side Delts","Quads","Triceps","Front Delts"], usedPA);
    if (p1.anchor) usedPA.add(p1.anchor.id);
    const r1 = buildDay(pullPlusLegs, ["pull"], ["Lats","Rhomboids","Hamstrings","Biceps","Rear Delts"], usedRA);
    if (r1.anchor) usedRA.add(r1.anchor.id);
    const p2 = buildDay(pushPlusLegs, ["push"], ["Upper Chest","Side Delts","Quads","Front Delts","Long Head Tri"], usedPA);
    const r2 = buildDay(pullPlusLegs, ["pull"], ["Lats","Mid Back","Hamstrings","Glutes","Long Head Bi"], usedRA);

    return [
      makeDay(1,"Push A","PUSH","Chest · Shoulders · Triceps · Quads",dayNote("push",p1.anchor),p1.anchor,p1.accessories),
      makeDay(2,"Pull A","PULL","Back · Biceps · Rear Delts · Hamstrings",dayNote("pull",r1.anchor),r1.anchor,r1.accessories),
      makeDay(3,"Push B","PUSH","Shoulders · Chest · Triceps · Quads (Variation)",dayNote("push",p2.anchor),p2.anchor,p2.accessories),
      makeDay(4,"Pull B","PULL","Back · Biceps · Rear Delts · Hamstrings (Variation)",dayNote("pull",r2.anchor),r2.anchor,r2.accessories),
    ];
  }

  // Fallback — default to 3-day PPL
  return generateProgram({...profile, splitType:"ppl", daysPerWeek:3, workoutDays:[1,3,5]});
}

// ─── CALENDAR STRIP ───────────────────────────────────────────────────────────
function CalendarStrip({ currentWeek, onSelectDay, completedDays, activeDays }) {
  return (
    <div style={{display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, padding:"14px 16px"}}>
      {CALENDAR.map(({day, dayIdx}, i) => {
        const isRest = dayIdx === null;
        const done = !isRest && completedDays.has(`${dayIdx}:${currentWeek}`);
        const accent = !isRest ? activeDays[dayIdx] ? TAG_ACCENT[activeDays[dayIdx].tag] : "var(--text-dim)" : "var(--text-dim)";
        return (
          <button key={day} onClick={()=>!isRest && onSelectDay(dayIdx)} style={{
            background: done ? accent+"22" : "var(--bg-card)",
            border:`1px solid ${done ? accent : "var(--border)"}`,
            borderRadius:8, padding:"8px 4px", cursor: isRest ? "default" : "pointer",
            display:"flex", flexDirection:"column", alignItems:"center", gap:4, transition:"all 0.15s",
          }}>
            <span style={{fontSize:10, fontWeight:700, letterSpacing:"0.06em", color: isRest ? "var(--border-accent)" : "var(--text-secondary)"}}>{day}</span>
            {!isRest
              ? <><span style={{fontSize:9, color:accent, fontWeight:700}}>
                      {done ? "✓" : ({MON:"M",TUE:"Tu",WED:"W",THU:"Th",FRI:"F",SAT:"Sa",SUN:"Su"}[day] || day)}
                    </span></>
              : <span style={{fontSize:9, color:"var(--border-accent)"}}>REST</span>
            }
          </button>
        );
      })}
    </div>
  );
}

// ─── SETUP PAGE ───────────────────────────────────────────────────────────────
function SetupPage({ onComplete }) {
  const ALL_EQUIPMENT = ["barbell","dumbbell","cable","machine","bodyweight","band"];
  const EQUIP_META = {
    barbell:    { label:"BARBELL",     icon:"🏋️" },
    dumbbell:   { label:"DUMBBELLS",   icon:"💪" },
    cable:      { label:"CABLE",       icon:"🔗" },
    machine:    { label:"MACHINES",    icon:"⚙️" },
    bodyweight: { label:"BODYWEIGHT",  icon:"🤸" },
    band:       { label:"BANDS",       icon:"🔀" },
  };
  const SPLIT_CONFIG = {
    ppl:         { label:"Push · Pull · Legs", icon:"🔄", validDays:[3,5,6], defaultDays:{ 3:[1,3,5], 5:[1,2,3,5,6], 6:[1,2,3,4,5,6] }, desc:"Each muscle group hit 1–2×/week. The gold standard for hypertrophy and strength." },
    upper_lower: { label:"Upper / Lower",       icon:"⬆️", validDays:[2,4],   defaultDays:{ 2:[1,4],   4:[1,2,4,5] },                     desc:"Upper body + lower body rotation. 2 sessions per muscle group. Great recovery balance." },
    full_body:   { label:"Full Body",            icon:"💥", validDays:[2,3],   defaultDays:{ 2:[1,4],   3:[1,3,5] },                       desc:"Push, pull, and legs every session. High frequency, great for beginners and busy schedules." },
    push_pull:   { label:"Push / Pull",          icon:"↔️", validDays:[4],     defaultDays:{ 4:[1,2,4,5] },                               desc:"4-day push/pull with legs folded in. No dedicated leg day." },
  };
  // Which splits are compatible with a given day count
  const splitsForDays = (n) => Object.entries(SPLIT_CONFIG).filter(([,c]) => c.validDays.includes(n)).map(([k]) => k);
  const DAY_NAMES = ["Su","M","Tu","W","Th","F","Sa"];
  const todayStr  = new Date().toISOString().split('T')[0];

  const [step, setStep]   = useState(1);
  const [error, setError] = useState("");
  const [form, setForm]   = useState(() => ({
    name:"", age:"", gender:"", weight:"", goal:"",
    mesoLength:6, sessionDuration:60,
    equipment: [],
    theme: localStorage.getItem("ppl:theme") || "dark",
    startDate: todayStr,
    splitType: "ppl",
    workoutDays: [1,2,3,4,5,6],
    daysPerWeek: 6,
  }));

  const set = (k,v) => setForm(f => ({...f, [k]:v}));

  const setTheme = (t) => {
    document.documentElement.setAttribute("data-theme", t);
    localStorage.setItem("ppl:theme", t);
    set("theme", t);
  };

  const setSplit = (split) => {
    const cfg  = SPLIT_CONFIG[split];
    const best = cfg.validDays[cfg.validDays.length - 1];
    setForm(f => ({...f, splitType:split, workoutDays:cfg.defaultDays[best], daysPerWeek:best}));
  };

  const setDayCount = (n) => {
    const compatible = splitsForDays(n);
    const split = compatible.includes(form.splitType) ? form.splitType : compatible[0] || form.splitType;
    const cfg   = SPLIT_CONFIG[split];
    const days  = cfg?.defaultDays[n] || form.workoutDays;
    setForm(f => ({...f, daysPerWeek:n, workoutDays:days, splitType:split}));
  };

  const toggleEquipment = (item) => {
    setForm(f => {
      const has = f.equipment.includes(item);
      if (has && f.equipment.length === 1) return f;
      return {...f, equipment: has ? f.equipment.filter(e=>e!==item) : [...f.equipment, item]};
    });
  };

  const toggleDay = (dayNum) => {
    setForm(f => {
      const has  = f.workoutDays.includes(dayNum);
      if (has && f.workoutDays.length === 1) return f;
      const next = has ? f.workoutDays.filter(d=>d!==dayNum) : [...f.workoutDays, dayNum].sort((a,b)=>a-b);
      return {...f, workoutDays:next, daysPerWeek:next.length};
    });
  };

  const goNext = () => {
    setError("");
    if (step === 1) {
      if (!form.name.trim()) { setError("Please enter your name."); return; }
      if (!form.gender)      { setError("Please select a gender."); return; }
    }
    setStep(2); window.scrollTo(0,0);
  };

  const handleSubmit = () => {
    setError("");
    if (form.equipment.length === 0) { setError("Select at least one equipment type."); return; }
    const cfg = SPLIT_CONFIG[form.splitType];
    if (cfg && !cfg.validDays.includes(form.workoutDays.length)) {
      setError(`${cfg.label} needs ${cfg.validDays.join(" or ")} training days — you have ${form.workoutDays.length} selected.`);
      return;
    }
    onComplete(form);
  };

  // ── Shared style atoms ─────────────────────────────────────────────────
  const inputStyle = {
    width:"100%", background:"var(--bg-input)", border:"1px solid var(--border-accent)",
    borderRadius:12, color:"var(--text-primary)", fontSize:16, padding:"14px",
    outline:"none", fontFamily:"inherit", marginTop:8, boxSizing:"border-box",
  };
  const sLabel = { fontSize:11, fontWeight:800, letterSpacing:"0.14em", color:"var(--accent)", display:"block", marginBottom:0 };
  const sec    = { marginBottom:26 };

  // ── Schedule preview (used in step 2) ─────────────────────────────────
  const sessionSeq = () => {
    const n = form.workoutDays.length;
    if (form.splitType === "ppl")
      return n >= 6 ? ["PUSH","PULL","LEGS","PUSH","PULL","LEGS"]
           : n >= 5 ? ["PUSH","PULL","LEGS","PUSH","PULL"]
           :          ["PUSH","PULL","LEGS"];
    if (form.splitType === "upper_lower")
      return n >= 4 ? ["UPPER","LOWER","UPPER","LOWER"] : ["UPPER","LOWER"];
    if (form.splitType === "full_body")
      return ["FULL A","FULL B","FULL C"].slice(0, n);
    if (form.splitType === "push_pull")
      return ["PUSH A","PULL A","PUSH B","PULL B"].slice(0, n);
    return [];
  };
  const tagColor = (tag) =>
    tag.startsWith("PUSH") ? "var(--tag-push)"
    : tag.startsWith("PULL") ? "var(--tag-pull)"
    : tag.startsWith("LEGS") ? "var(--tag-legs)"
    : tag.startsWith("UPPER") ? "var(--phase-peak)"
    : tag.startsWith("LOWER") ? "var(--accent-blue)"
    : "var(--phase-deload)";

  const mesoEnd = (() => {
    if (!form.startDate) return null;
    const s = new Date(form.startDate + "T00:00:00");
    const e = new Date(s.getTime() + form.mesoLength * 7 * 86400000 - 86400000);
    return e.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"numeric"});
  })();

  const SchedulePreview = () => {
    const seq = sessionSeq();
    return (
      <div style={{background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:14, overflow:"hidden"}}>
        <div style={{padding:"11px 16px", borderBottom:"1px solid var(--border)", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <span style={{fontSize:10, fontWeight:800, letterSpacing:"0.14em", color:"var(--text-muted)"}}>WEEKLY SCHEDULE</span>
          <span style={{fontSize:10, fontWeight:700, color:"var(--accent)"}}>{form.workoutDays.length}×/WEEK</span>
        </div>
        <div style={{display:"flex", padding:"10px 8px"}}>
          {DAY_NAMES.map((d, i) => {
            const idx   = form.workoutDays.indexOf(i);
            const isOn  = idx !== -1;
            const label = isOn ? seq[idx] : null;
            return (
              <div key={i} style={{
                flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:5,
                padding:"9px 2px", borderRadius:9, margin:"0 1px",
                background: isOn ? "rgba(var(--accent-rgb),0.07)" : "transparent",
              }}>
                <span style={{fontSize:9, fontWeight:700, color: isOn ? "var(--text-secondary)" : "var(--text-dim)", letterSpacing:"0.06em"}}>{d}</span>
                {isOn
                  ? <span style={{fontSize:7, fontWeight:900, color:tagColor(label), letterSpacing:"0.03em", textAlign:"center", lineHeight:1.3}}>{label}</span>
                  : <span style={{fontSize:8, color:"var(--border-accent)"}}>REST</span>}
              </div>
            );
          })}
        </div>
        {mesoEnd && (
          <div style={{padding:"9px 16px", borderTop:"1px solid var(--border)", display:"flex", justifyContent:"space-between", fontSize:11, color:"var(--text-muted)"}}>
            <span>Start <b style={{color:"var(--text-primary)"}}>{new Date(form.startDate+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</b></span>
            <span>End <b style={{color:"var(--text-primary)"}}>{mesoEnd}</b></span>
          </div>
        )}
      </div>
    );
  };

  // ── Progress header ────────────────────────────────────────────────────
  const Header = () => (
    <div style={{padding:"20px 20px 0"}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
        <div>
          <div style={{fontSize:10, fontWeight:800, letterSpacing:"0.16em", color:"var(--accent)"}}>
            STEP {step} OF 2
          </div>
          <div style={{fontSize:18, fontWeight:900, color:"var(--text-primary)", marginTop:3, letterSpacing:"0.02em"}}>
            {step === 1 ? "About You" : "Your Program"}
          </div>
        </div>
        {step === 2 && (
          <button onClick={() => { setError(""); setStep(1); window.scrollTo(0,0); }} style={{
            background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:10,
            padding:"8px 14px", cursor:"pointer", fontSize:12, fontWeight:700,
            color:"var(--text-secondary)", letterSpacing:"0.06em",
          }}>‹ BACK</button>
        )}
      </div>
      {/* Progress bar */}
      <div style={{height:3, background:"var(--bg-surface)", borderRadius:99, overflow:"hidden"}}>
        <div style={{
          height:"100%", borderRadius:99, background:"var(--accent)",
          width: step === 1 ? "50%" : "100%",
          transition:"width 0.4s cubic-bezier(0.4,0,0.2,1)",
        }}/>
      </div>
    </div>
  );

  // ════════════════════════════════════════════════════════
  // RENDER
  // ════════════════════════════════════════════════════════
  return (
    <div style={{minHeight:"100vh", background:"var(--bg-root)", display:"flex", flexDirection:"column", maxWidth:480, margin:"0 auto"}}>

      {/* Top bar */}
      <div style={{background:"var(--bg-surface)", borderBottom:"1px solid var(--border)", padding:"14px 20px", display:"flex", alignItems:"center", gap:10}}>
        <span style={{fontSize:20}}>🏋️</span>
        <div>
          <div style={{fontSize:13, fontWeight:900, letterSpacing:"0.1em", color:"var(--text-primary)"}}>IronOS Training</div>
          <div style={{fontSize:10, color:"var(--text-muted)", letterSpacing:"0.06em", marginTop:1}}>MESOCYCLE SETUP</div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1, overflowY:"auto"}}>
        <Header />

        {/* ─── STEP 1 ─── */}
        {step === 1 && (
          <div style={{padding:"24px 20px 40px"}}>

            {/* Name */}
            <div style={sec}>
              <label style={sLabel}>YOUR NAME *</label>
              <input type="text" placeholder="First name" value={form.name}
                onChange={e=>set("name",e.target.value)} style={inputStyle} autoFocus />
            </div>

            {/* Gender */}
            <div style={sec}>
              <label style={sLabel}>GENDER *</label>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:8}}>
                {[["m","Male ♂"],["f","Female ♀"]].map(([val,lbl]) => (
                  <button key={val} onClick={()=>set("gender",val)} style={{
                    padding:"16px", borderRadius:12, cursor:"pointer",
                    fontWeight:800, fontSize:14, letterSpacing:"0.04em",
                    background: form.gender===val ? "rgba(var(--accent-rgb),0.12)" : "var(--bg-card)",
                    border:`1px solid ${form.gender===val ? "var(--accent)" : "var(--border)"}`,
                    color: form.gender===val ? "var(--accent)" : "var(--text-muted)",
                    transition:"all 0.15s",
                  }}>{lbl}</button>
                ))}
              </div>
            </div>

            {/* Age + Weight */}
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, ...sec}}>
              <div>
                <label style={sLabel}>AGE</label>
                <input type="number" inputMode="numeric" placeholder="e.g. 35"
                  value={form.age} onChange={e=>set("age",e.target.value)} style={inputStyle} />
              </div>
              <div>
                <label style={sLabel}>WEIGHT (lbs)</label>
                <input type="number" inputMode="decimal" placeholder="e.g. 185"
                  value={form.weight} onChange={e=>set("weight",e.target.value)} style={inputStyle} />
              </div>
            </div>

            {/* Goal */}
            <div style={sec}>
              <label style={sLabel}>GOAL FOR THIS MESO</label>
              <textarea
                placeholder="e.g. Hit 8% body fat, add 20 lbs to my squat, stay consistent..."
                value={form.goal} onChange={e=>set("goal",e.target.value)}
                style={{...inputStyle, minHeight:88, resize:"vertical", lineHeight:1.6}}
              />
            </div>

            {/* Theme */}
            <div style={sec}>
              <label style={sLabel}>DISPLAY THEME</label>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:8}}>
                {[["dark","🌑","DARK","Concrete & Ember"],["light","☀️","LIGHT","Bone & Ink"]].map(([val,ico,lbl,desc]) => (
                  <button key={val} onClick={()=>setTheme(val)} style={{
                    padding:"16px 12px", borderRadius:12, cursor:"pointer", textAlign:"left",
                    background: form.theme===val ? "rgba(var(--accent-rgb),0.1)" : "var(--bg-card)",
                    border:`1px solid ${form.theme===val ? "var(--accent)" : "var(--border)"}`,
                    transition:"all 0.15s",
                  }}>
                    <div style={{fontSize:22, marginBottom:6}}>{ico}</div>
                    <div style={{fontSize:12, fontWeight:900, letterSpacing:"0.08em", color:form.theme===val?"var(--accent)":"var(--text-primary)", marginBottom:3}}>{lbl}</div>
                    <div style={{fontSize:10, color:"var(--text-muted)", lineHeight:1.4}}>{desc}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Error */}
            {error && <div style={{background:"var(--danger-bg)", border:"1px solid var(--danger)", borderRadius:10, padding:"12px 14px", marginBottom:16, fontSize:13, color:"var(--danger)"}}>{error}</div>}

            <button onClick={goNext} style={{
              width:"100%", padding:"20px", borderRadius:14, cursor:"pointer",
              background:"var(--btn-primary-bg)", border:"1px solid var(--btn-primary-border)",
              color:"var(--btn-primary-text)", fontSize:16, fontWeight:900, letterSpacing:"0.08em",
              boxShadow:"0 4px 24px rgba(var(--accent-rgb),0.3)",
            }}>CONTINUE →</button>
          </div>
        )}

        {/* ─── STEP 2 ─── */}
        {step === 2 && (
          <div style={{padding:"24px 20px 40px"}}>

            {/* Equipment */}
            <div style={sec}>
              <label style={sLabel}>AVAILABLE EQUIPMENT *</label>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginTop:8}}>
                {ALL_EQUIPMENT.map(val => {
                  const sel = form.equipment.includes(val);
                  return (
                    <button key={val} onClick={()=>toggleEquipment(val)} style={{
                      padding:"14px 6px", borderRadius:12, cursor:"pointer", textAlign:"center",
                      fontWeight:700, fontSize:11, letterSpacing:"0.06em", lineHeight:1.4,
                      background: sel ? "rgba(var(--accent-rgb),0.1)" : "var(--bg-card)",
                      border:`1px solid ${sel ? "var(--accent)" : "var(--border)"}`,
                      color: sel ? "var(--accent)" : "var(--text-muted)",
                      transition:"all 0.15s",
                    }}>
                      <div style={{fontSize:22, marginBottom:5}}>{EQUIP_META[val].icon}</div>
                      {EQUIP_META[val].label}
                    </button>
                  );
                })}
              </div>
              <div style={{fontSize:11, color:"var(--text-muted)", marginTop:8}}>
                {form.equipment.length === 0
                  ? <span style={{color:"var(--danger)",fontWeight:700}}>⚠️ Select at least one equipment type.</span>
                  : form.equipment.length === 6 ? "Full gym access — all exercise variations available."
                  : `Training with: ${form.equipment.map(e=>EQUIP_META[e].label.toLowerCase()).join(", ")}.`}
              </div>
            </div>

            {/* Days per week */}
            <div style={sec}>
              <label style={sLabel}>DAYS PER WEEK *</label>
              <div style={{display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6, marginTop:8}}>
                {[2,3,4,5,6].map(n => {
                  const active = form.workoutDays.length === n;
                  const compatible = splitsForDays(n);
                  return (
                    <button key={n} onClick={()=>setDayCount(n)} style={{
                      padding:"14px 4px", borderRadius:11, cursor:"pointer",
                      fontWeight:800, fontSize:16, letterSpacing:"0.02em",
                      background: active ? "rgba(var(--accent-rgb),0.12)" : "var(--bg-card)",
                      border:`1px solid ${active ? "var(--accent)" : "var(--border)"}`,
                      color: active ? "var(--accent)" : "var(--text-muted)",
                      transition:"all 0.15s",
                    }}>
                      {n}
                      <div style={{fontSize:8, fontWeight:700, marginTop:3, opacity:0.7}}>DAYS</div>
                    </button>
                  );
                })}
              </div>
              <div style={{fontSize:11, color:"var(--text-muted)", marginTop:8}}>
                {form.workoutDays.length === 2 && "2 days — maintenance or very busy schedules."}
                {form.workoutDays.length === 3 && "3 days — each muscle group trained once per week."}
                {form.workoutDays.length === 4 && "4 days — great balance of frequency and recovery."}
                {form.workoutDays.length === 5 && "5 days — high frequency, strong weekly volume."}
                {form.workoutDays.length === 6 && "6 days — maximum frequency, optimal for hypertrophy."}
              </div>
            </div>

            {/* Training split — only show options valid for current day count */}
            <div style={sec}>
              <label style={sLabel}>TRAINING SPLIT *</label>
              <div style={{fontSize:11, color:"var(--text-muted)", marginTop:4, marginBottom:10}}>
                Based on {form.workoutDays.length} days/week:
              </div>
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                {splitsForDays(form.workoutDays.length).map(key => {
                  const cfg = SPLIT_CONFIG[key];
                  const sel = form.splitType === key;
                  return (
                    <button key={key} onClick={()=>setSplit(key)} style={{
                      padding:"14px 16px", borderRadius:12, cursor:"pointer", textAlign:"left",
                      background: sel ? "rgba(var(--accent-rgb),0.1)" : "var(--bg-card)",
                      border:`1px solid ${sel ? "var(--accent)" : "var(--border)"}`,
                      transition:"all 0.15s",
                    }}>
                      <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:5}}>
                        <span style={{fontSize:18}}>{cfg.icon}</span>
                        <span style={{fontSize:13, fontWeight:900, letterSpacing:"0.06em", color:sel?"var(--accent)":"var(--text-primary)"}}>{cfg.label}</span>
                        <span style={{
                          marginLeft:"auto", fontSize:9, fontWeight:800, letterSpacing:"0.1em",
                          padding:"2px 8px", borderRadius:4,
                          background: sel ? "rgba(var(--accent-rgb),0.15)" : "var(--bg-surface)",
                          color: sel ? "var(--accent)" : "var(--text-muted)",
                        }}>{cfg.validDays.filter(d=>d===form.workoutDays.length).join()} DAYS</span>
                      </div>
                      <div style={{fontSize:11, color:"var(--text-muted)", lineHeight:1.5, paddingLeft:28}}>{cfg.desc}</div>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Training days — which days of the week */}
            <div style={sec}>
              <label style={sLabel}>WHICH DAYS?</label>
              <div style={{fontSize:11, color:"var(--text-muted)", marginTop:4, marginBottom:10}}>
                Tap to customise — or use the defaults above
              </div>
              <div style={{display:"flex", gap:5}}>
                {[["Su",0],["M",1],["Tu",2],["W",3],["Th",4],["F",5],["Sa",6]].map(([lbl,num]) => {
                  const sel = form.workoutDays.includes(num);
                  return (
                    <button key={num} onClick={()=>toggleDay(num)} style={{
                      flex:1, padding:"11px 0", borderRadius:9, cursor:"pointer",
                      fontWeight:800, fontSize:11, letterSpacing:"0.03em",
                      background: sel ? "rgba(var(--accent-rgb),0.15)" : "var(--bg-card)",
                      border:`1px solid ${sel ? "var(--accent)" : "var(--border)"}`,
                      color: sel ? "var(--accent)" : "var(--text-muted)",
                      transition:"all 0.15s",
                    }}>{lbl}</button>
                  );
                })}
              </div>
              {/* Validation nudge */}
              {(() => {
                const cfg   = SPLIT_CONFIG[form.splitType];
                const valid = cfg?.validDays.includes(form.workoutDays.length);
                return !valid && (
                  <div style={{fontSize:11, color:"var(--danger)", fontWeight:700, marginTop:8}}>
                    ⚠️ {cfg?.label} needs {cfg?.validDays.join(" or ")} days — you have {form.workoutDays.length}
                  </div>
                );
              })()}

            </div>

            {/* Session duration */}
            <div style={sec}>
              <label style={sLabel}>SESSION DURATION</label>
              <div style={{display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6, marginTop:8}}>
                {[30,45,60,75,90].map(n => (
                  <button key={n} onClick={()=>set("sessionDuration",n)} style={{
                    padding:"14px 4px", borderRadius:10, cursor:"pointer",
                    fontWeight:700, fontSize:13, letterSpacing:"0.04em",
                    background: form.sessionDuration===n ? "rgba(var(--accent-rgb),0.1)" : "var(--bg-card)",
                    border:`1px solid ${form.sessionDuration===n ? "var(--accent)" : "var(--border)"}`,
                    color: form.sessionDuration===n ? "var(--accent)" : "var(--text-muted)",
                    transition:"all 0.15s",
                  }}>{n}<br/><span style={{fontSize:9,fontWeight:500,opacity:0.7}}>min</span></button>
                ))}
              </div>
              <div style={{fontSize:11, color:form.sessionDuration===30?"var(--phase-intens)":"var(--text-muted)", marginTop:8, lineHeight:1.6}}>
                {form.sessionDuration===30 && "⚠️ 30 min: abbreviated warm-up. Take extra time on anchor lifts when possible."}
                {form.sessionDuration===45 && "Anchor lift + 3–4 accessories. Tight rest periods."}
                {form.sessionDuration===60 && "Full warm-up, 4–5 exercises, solid rest. The sweet spot."}
                {form.sessionDuration===75 && "Full protocol, 5–6 exercises, no rushing."}
                {form.sessionDuration===90 && "Complete warm-up, 6+ exercises, max volume."}
              </div>
            </div>

            {/* Meso length */}
            <div style={sec}>
              <label style={sLabel}>MESO CYCLE LENGTH *</label>
              <div style={{display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6, marginTop:8}}>
                {[4,6,8,10,12].map(n => (
                  <button key={n} onClick={()=>set("mesoLength",n)} style={{
                    padding:"12px 4px", borderRadius:10, cursor:"pointer",
                    fontWeight:700, fontSize:14, letterSpacing:"0.02em",
                    background: form.mesoLength===n ? "rgba(var(--accent-rgb),0.1)" : "var(--bg-card)",
                    border:`1px solid ${form.mesoLength===n ? "var(--accent)" : "var(--border)"}`,
                    color: form.mesoLength===n ? "var(--accent)" : "var(--text-muted)",
                    transition:"all 0.15s",
                  }}>{n}<br/><span style={{fontSize:9,fontWeight:500,opacity:0.7}}>wks</span></button>
                ))}
              </div>
              <div style={{fontSize:11, color:"var(--text-muted)", marginTop:8}}>
                {form.mesoLength===4  && "Short & intense — great for a focused push."}
                {form.mesoLength===6  && "Standard meso — the sweet spot for most trainees."}
                {form.mesoLength===8  && "Extended accumulation — more volume base before peaking."}
                {form.mesoLength===10 && "Advanced — high volume block with long intensification."}
                {form.mesoLength===12 && "Full periodization — max accumulation, full peak. Commitment required."}
              </div>
            </div>

            {/* Start date */}
            <div style={sec}>
              <label style={sLabel}>START DATE *</label>
              <input type="date" value={form.startDate}
                onChange={e=>set("startDate",e.target.value)}
                style={{...inputStyle, colorScheme:form.theme==="light"?"light":"dark"}}
              />
              {mesoEnd && (
                <div style={{fontSize:11, color:"var(--text-muted)", marginTop:8}}>
                  Meso ends <b style={{color:"var(--text-primary)"}}>{mesoEnd}</b> · {form.mesoLength} weeks
                </div>
              )}

            </div>

            {/* Error */}
            {error && <div style={{background:"var(--danger-bg)", border:"1px solid var(--danger)", borderRadius:10, padding:"12px 14px", marginBottom:16, fontSize:13, color:"var(--danger)"}}>{error}</div>}

            <button onClick={handleSubmit} style={{
              width:"100%", padding:"20px", borderRadius:14, cursor:"pointer",
              background:"var(--btn-primary-bg)", border:"1px solid var(--btn-primary-border)",
              color:"var(--btn-primary-text)", fontSize:17, fontWeight:900, letterSpacing:"0.08em",
              boxShadow:"0 4px 24px rgba(var(--accent-rgb),0.35)",
            }}>LET'S GET IT 🔥</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── READY DIALOG ─────────────────────────────────────────────────────────────
function ReadyDialog({ dayLabel, userName, isDone, isLocked, onYes, onNo }) {
  const greetings = [
    "Time to earn it.",
    "No shortcuts. No excuses.",
    "The bar is waiting.",
    "This is where it happens.",
    "Show up and show out.",
    "Another day, another W.",
    "Champions are built in sessions like this.",
    "Lock in. Let's work.",
  ];
  const [msg] = useState(() => greetings[Math.floor(Math.random() * greetings.length)]);

  // Locked — prior days not complete
  if (isLocked) {
    return (
      <div style={{
        position:"fixed", inset:0, zIndex:250,
        background:"rgba(0,0,0,0.85)", backdropFilter:"blur(6px)",
        display:"flex", alignItems:"center", justifyContent:"center", padding:24,
      }}>
        <div style={{
          background:"var(--bg-card)",
          border:"1px solid var(--text-dim)", borderRadius:20,
          padding:"32px 24px", maxWidth:340, width:"100%",
          boxShadow:"0 24px 60px rgba(0,0,0,0.7)",
          animation:"dialogIn 0.2s cubic-bezier(0.34,1.56,0.64,1)",
          textAlign:"center",
        }}>
          <div style={{fontSize:44, marginBottom:14}}>🔒</div>
          <div style={{fontSize:11, fontWeight:700, letterSpacing:"0.16em", color:"var(--text-muted)", marginBottom:8}}>
            {dayLabel.toUpperCase()}
          </div>
          <div style={{fontSize:20, fontWeight:900, color:"var(--text-primary)", marginBottom:10, lineHeight:1.3}}>
            Finish previous days first.
          </div>
          <div style={{fontSize:13, color:"var(--text-secondary)", marginBottom:28, lineHeight:1.6}}>
            Complete all prior sessions this week before unlocking this day. You can still review it below.
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
            <button onClick={onNo} style={{
              padding:"15px", borderRadius:12, cursor:"pointer",
              background:"transparent", border:"1px solid var(--border)",
              color:"var(--text-muted)", fontSize:15, fontWeight:700,
            }}>GO BACK</button>
            <button onClick={onYes} style={{
              padding:"15px", borderRadius:12, cursor:"pointer",
              background:"var(--bg-card)", border:"1px solid var(--text-dim)",
              color:"var(--text-secondary)", fontSize:15, fontWeight:700,
            }}>REVIEW</button>
          </div>
        </div>
      </div>
    );
  }

  if (isDone) {
    return (
      <div style={{
        position:"fixed", inset:0, zIndex:250,
        background:"rgba(0,0,0,0.85)", backdropFilter:"blur(6px)",
        display:"flex", alignItems:"center", justifyContent:"center", padding:24,
      }}>
        <div style={{
          background:"var(--bg-card)",
          border:"1px solid var(--success-bg)", borderRadius:20,
          padding:"32px 24px", maxWidth:340, width:"100%",
          boxShadow:"0 24px 60px rgba(0,0,0,0.7)",
          animation:"dialogIn 0.2s cubic-bezier(0.34,1.56,0.64,1)",
          textAlign:"center",
        }}>
          <div style={{fontSize:44, marginBottom:14}}>✅</div>
          <div style={{fontSize:11, fontWeight:700, letterSpacing:"0.16em", color:"var(--phase-accum)", marginBottom:8}}>
            {dayLabel.toUpperCase()}
          </div>
          <div style={{fontSize:20, fontWeight:900, color:"var(--text-primary)", marginBottom:10, lineHeight:1.3}}>
            This session is already complete.
          </div>
          <div style={{fontSize:13, color:"var(--text-secondary)", marginBottom:28, lineHeight:1.6}}>
            Would you like to review your logged weights? You can still update your session notes, but weights and reps are locked.
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
            <button onClick={onNo} style={{
              padding:"15px", borderRadius:12, cursor:"pointer",
              background:"transparent", border:"1px solid var(--border)",
              color:"var(--text-muted)", fontSize:15, fontWeight:700,
            }}>GO BACK</button>
            <button onClick={onYes} style={{
              padding:"15px", borderRadius:12, cursor:"pointer",
              background:"var(--success-bg)", border:"1px solid var(--success-bg)",
              color:"var(--phase-accum)", fontSize:15, fontWeight:800,
            }}>REVIEW</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{
      position:"fixed", inset:0, zIndex:250,
      background:"rgba(0,0,0,0.85)", backdropFilter:"blur(6px)",
      display:"flex", alignItems:"center", justifyContent:"center", padding:24,
    }}>
      <div style={{
        background:"var(--bg-card)",
        border:"1px solid #1e3a5f", borderRadius:20,
        padding:"32px 24px", maxWidth:340, width:"100%",
        boxShadow:"0 24px 60px rgba(0,0,0,0.7)",
        animation:"dialogIn 0.2s cubic-bezier(0.34,1.56,0.64,1)",
        textAlign:"center",
      }}>
        <div style={{fontSize:44, marginBottom:14}}>💪</div>
        <div style={{fontSize:11, fontWeight:700, letterSpacing:"0.16em", color:"var(--accent)", marginBottom:8}}>
          {dayLabel.toUpperCase()}
        </div>
        <div style={{fontSize:20, fontWeight:900, color:"var(--text-primary)", marginBottom:10, lineHeight:1.3}}>
          Are you ready to get after it{userName ? `, ${userName}` : ""}?
        </div>
        <div style={{fontSize:13, color:"var(--accent)", marginBottom:28, lineHeight:1.6}}>
          {msg}
        </div>
        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
          <button onClick={onNo} style={{
            padding:"15px", borderRadius:12, cursor:"pointer",
            background:"transparent", border:"1px solid var(--border)",
            color:"var(--text-muted)", fontSize:15, fontWeight:700,
          }}>NOT YET</button>
          <button onClick={onYes} style={{
            padding:"15px", borderRadius:12, cursor:"pointer",

function ExerciseCard({ exercise, exIdx, weekIdx, weekData, onUpdateSet, onWeightAutoFill, onLastSetFilled, expanded, onToggle, done, readOnly, onSwapClick }) {
  const goal = PROG_TARGETS[exercise.progression][weekIdx];
  const goalColor = weekIdx < 2 ? "var(--text-muted)" : weekIdx < 4 ? "var(--phase-accum)" : weekIdx < 5 ? "#f59e0b" : "var(--danger)";

  const handleWeightBlur = (s, value) => {
    if (s === 0 && value.trim() !== "" && !isNaN(parseFloat(value))) {
      onWeightAutoFill(exIdx, value, exercise.sets);
    }
  };

  const handleRepsChange = (s, value) => {
    onUpdateSet(exIdx, s, "reps", value);
    // Trigger immediately on last set when a valid positive number is entered
    if (s === exercise.sets - 1 && value.trim() !== "" && parseFloat(value) > 0) {
      onLastSetFilled(exIdx, exercise.name);
    }
  };

  const handleRepsBlur = (s, value) => {
    // Fallback: also catch on blur in case onChange fires before state updates settle
    if (s === exercise.sets - 1 && value.trim() !== "" && parseFloat(value) > 0) {
      onLastSetFilled(exIdx, exercise.name);
    }
  };

  return (
    <div style={{borderBottom:"1px solid #111827", opacity: done ? 0.5 : 1, transition:"opacity 0.3s"}}>
      {/* Header row: tap to expand + swap button */}
      <div style={{display:"flex", alignItems:"stretch"}}>

          <div style={{flex:1, minWidth:0}}>
            <div style={{display:"flex", alignItems:"baseline", gap:8, flexWrap:"wrap"}}>
              <div style={{fontSize:20, fontWeight:700, color: done ? "var(--text-muted)" : "var(--text-primary)", lineHeight:1.3}}>{exercise.name}</div>
              {exercise.muscle && (
                <span style={{fontSize:11, color:"#f59e0b", fontWeight:700, letterSpacing:"0.05em"}}>
                  {exercise.muscle.toUpperCase()}
                </span>
              )}
              {exercise.equipment && (() => {
                const eqIcon = {barbell:"🏋️",dumbbell:"💪",cable:"🔗",machine:"🤖",bodyweight:"🤸",band:"🟡"};
                return (
                  <span style={{fontSize:10, color:"var(--text-muted)", fontWeight:700, letterSpacing:"0.05em"}}>
                    {eqIcon[exercise.equipment] || "⚙️"} {exercise.equipment}

              {done && <span style={{fontSize:14, color:"var(--phase-accum)"}}>✓</span>}
            </div>

              <span style={{
                display:"inline-flex", alignItems:"center", padding:"4px 10px",
